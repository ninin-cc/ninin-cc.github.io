    <!-- モーダル制御用スクリプト -->
    <script>
        function openMangaModal() {
            const modal = document.getElementById('mangaModal');
            modal.classList.remove('hidden');
            // 背景のスクロールを無効化
            document.body.style.overflow = 'hidden';
        }

        function closeMangaModal() {
            const modal = document.getElementById('mangaModal');
            modal.classList.add('hidden');
            // 背景のスクロールを有効化
            document.body.style.overflow = '';
        }

        // 漫画サムネイルのスライドショー（3秒おきに 2.jpg -> 4.jpg -> 6.jpg -> 1.jpg をループ）
        document.addEventListener('DOMContentLoaded', () => {
            const thumbnail = document.getElementById('manga-thumbnail');
            if (!thumbnail) return;

            // 表示する画像の順番
            const images = [
                './img/m/2.jpg',
                './img/m/4.jpg',
                './img/m/6.jpg',
                './img/m/1.jpg'
            ];
            
            // 初回ロード時はHTMLで指定された 1.jpg が表示されているので、
            // 最初の切り替え先は 2.jpg (index:0) とする
            let currentIndex = 0;

            setInterval(() => {
                const nextSrc = images[currentIndex];
                
                // 切り替え時にフワッとするように一瞬透明度を下げる
                thumbnail.style.opacity = '0.5';
                
                setTimeout(() => {
                    thumbnail.src = nextSrc;
                    thumbnail.style.opacity = '1';
                    
                    // 万が一画像がない場合のプレースホルダー文字も更新
                    const fileName = nextSrc.split('/').pop();
                    thumbnail.onerror = function() {
                        this.src = `https://placehold.co/600x400/fdfcf9/a8a29e?text=Manga+(${fileName})`;
                    };
                }, 150); // 150ms後に画像を差し替え

                // 次の画像のインデックスをセット
                currentIndex = (currentIndex + 1) % images.length;
            }, 3000); // 3000ms = 3秒ごとに実行
        });
    </script>
