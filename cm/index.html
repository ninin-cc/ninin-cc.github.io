    function App() {
      const [started, setStarted] = useState(false);
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [resultType, setResultType] = useState(null);
      const [resultScores, setResultScores] = useState(null);
      const [toastMessage, setToastMessage] = useState('');
      const [selectedChoiceIndex, setSelectedChoiceIndex] = useState(null);
      const [tempSelectedChoiceIndex, setTempSelectedChoiceIndex] = useState(null);
      const [isPractice, setIsPractice] = useState(false);
      const [tutorialCompleted, setTutorialCompleted] = useState(false);
      
      // ホバーアニメーション用 (0〜100)
      const [hoverPos, setHoverPos] = useState(50);

      // 質問が変わるたびにホバー位置をリセット
      useEffect(() => {
        if (started && !resultType) {
          setHoverPos(50);
          setSelectedChoiceIndex(null);
          setTempSelectedChoiceIndex(null);
        }
      }, [currentIndex, started, resultType, isPractice]);

      const shuffleArray = (array) => {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      }

      const generateTodayQuestions = () => {
        // 厳選された16問すべてをランダムにシャッフルして出題
        return shuffleArray(questionsPool).map(q => ({
          ...q,
          options: shuffleArray(q.options)
        }));
      };

      const startQuiz = () => {
        const questions = generateTodayQuestions();
        setCurrentQuestions(questions);
        setCurrentIndex(0);
        setAnswers([]);
        setResultType(null);
        setResultScores(null);
        setSelectedChoiceIndex(null);
        setTempSelectedChoiceIndex(null);
        setIsPractice(false);
        setTutorialCompleted(false);
        setStarted(true);
      };

      const startTutorial = () => {
        setCurrentQuestions([]);
        setCurrentIndex(0);
        setAnswers([]);
        setResultType(null);
        setResultScores(null);
        setSelectedChoiceIndex(null);
        setTempSelectedChoiceIndex(null);
        setIsPractice(true);
        setTutorialCompleted(false);
        setHoverPos(50);
        setStarted(true);
      };

      const returnToTop = () => {
        setStarted(false);
        setIsPractice(false);
        setTutorialCompleted(false);
        setSelectedChoiceIndex(null);
        setTempSelectedChoiceIndex(null);
        setHoverPos(50);
      };

      const handleAnswer = (scoreUpdates) => {
        const newAnswers = [...answers, scoreUpdates];
        setAnswers(newAnswers);
        if (currentIndex < currentQuestions.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateResult(newAnswers);
        }
      };

      const handleBack = () => {
        if (isPractice) return;
        
        if (tempSelectedChoiceIndex !== null) {
          setTempSelectedChoiceIndex(null);
          setHoverPos(50);
          return;
        }

        if (currentIndex > 0) {
          setSelectedChoiceIndex(null);
          setTempSelectedChoiceIndex(null);
          setCurrentIndex(currentIndex - 1);
          setAnswers(answers.slice(0, -1));
        }
      };

      const handleChoiceSelect = (choice) => {
        if (selectedChoiceIndex !== null) return;
        
        // 1回目のタップ（仮選択）
        if (tempSelectedChoiceIndex !== choice.index) {
          setTempSelectedChoiceIndex(choice.index);
          setHoverPos(choice.hoverPos);
        } else {
          // 2回目のタップ（決定）
          setSelectedChoiceIndex(choice.index);
          setTempSelectedChoiceIndex(null);
          setHoverPos(choice.hoverPos);
          
          window.setTimeout(() => {
            if (isPractice) {
              setTutorialCompleted(true);
            } else {
              handleAnswer(choice.scoreUpdates);
            }
          }, 420);
        }
      };

      const calculateResult = (finalAnswers) => {
        const scores = { W: 0, K: 0, N: 0, A: 0 };
        finalAnswers.forEach(updates => {
          updates.forEach(update => { if (scores[update.type] !== undefined) scores[update.type] += update.weight; });
        });
        const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
        const maxType = sortedTypes[0];
        const maxScore = scores[maxType];
        const secondType = sortedTypes[1];
        const secondScore = scores[secondType];
        const minType = sortedTypes[3];

        let front = maxType; 
        let isDouble = false;
        let frontKey = "";

        // 85%以上でダブルフロントと判定する
        if (maxScore > 0) {
          const ratio = secondScore / maxScore;
          if (ratio >= 0.85) {
            isDouble = true;
            // テーマ取得用にアルファベット順のキーを作っておく
            frontKey = [maxType, secondType].sort().join('_');
          }
        }

        setResultScores(scores);
        // 詳細は3パターンのうちどれか1つをランダムに選ぶ（現状は1パターンで固定）
        const detailIndex = 0;
        setResultType({ front: front, second: secondType, back: minType, isDouble: isDouble, frontKey: frontKey, detailIndex: detailIndex });
      };

      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 5000);
      };

      if (!started) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 flex-col">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center animate-fade-in border border-slate-100">
              <div className="mb-6 flex items-center justify-center gap-4">
                <div className="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl shadow-lg flex flex-none items-center justify-center transform -rotate-6">
                  <span className="text-3xl sm:text-4xl">🌈</span>
                </div>
                <h1 className="text-left text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-tight leading-tight">RIESM™ mini<br/><span className="text-lg sm:text-xl text-indigo-600">コミュニケーション・モードチェック</span></h1>
              </div>
              
              {/* ▼ アコーディオンに変更した説明文 ▼ */}
              <details open className="mb-8 group border border-slate-200 rounded-xl bg-white shadow-sm overflow-hidden text-left">
                <summary className="cursor-pointer font-bold text-slate-700 p-4 bg-slate-50 hover:bg-slate-100 transition-colors flex justify-between items-center list-none [&::-webkit-details-marker]:hidden">
                  <span className="flex items-center gap-2">アプリの説明と注意</span>

                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" />
                  </svg>
                </summary>
                <div className="p-4 text-slate-600 font-medium leading-relaxed text-[13px] sm:text-sm border-t border-slate-100 bg-white">

                  <div className="my-2.5 p-3 bg-indigo-50/80 border-l-4 border-indigo-500 rounded-r-md text-slate-800 font-bold leading-relaxed">
                    あなたが無意識に入りやすい「心のモード」を知るための簡易チェックです。<br/>
                    優劣や性格の良し悪しを測るものではありません。
                  </div>
                  あなたの会話の「クセ」や、意識しないと使いにくいモードを知るためのツールです。<br/>
                  直感で、今の自分に近い方を選んでください。
                </div>
              </details>
              
              <div className="space-y-4 mb-8">
                <button onClick={startTutorial} className="w-full py-4 px-6 bg-white text-slate-800 rounded-xl font-bold text-lg hover:bg-slate-50 transition-all shadow-md active:scale-[0.98] border border-slate-200">
                  チュートリアル
                </button>
                <button onClick={startQuiz} className="w-full py-4 px-6 bg-slate-800 text-white rounded-xl font-bold text-lg hover:bg-slate-700 transition-all shadow-md active:scale-[0.98]">
                  いまの自分を観る
                </button>
              </div>

              {/* ▼ インフォメーション＆観測のヒントエリア ▼ */}
              <div className="bg-blue-50 rounded-xl p-4 text-left border border-blue-100 mb-6">
                <div className="flex items-start gap-3 mb-4">
                  <div className="mt-0.5"><InfoIcon /></div>
                  <p className="text-xs sm:text-sm text-blue-800 leading-relaxed">
                    <span className="font-bold">コミュニケーションのモードは、相手や状況によって揺らぎます。</span><br/>
                    このアプリは、変化するモードを観る「鏡」のようなものです。<br/>
                    基礎体温を測るように、気になった時に何度でも試してみてください。<br/>
                    逆に<span className="font-bold">「何度やっても変わらない部分（バックス）」</span>に気づくことも、自己理解の大きな一歩です。
                  </p>
                </div>
                <div className="bg-white/60 rounded-lg p-2.5 text-[11px] sm:text-xs text-blue-900 font-medium flex items-center justify-center gap-1.5 shadow-sm border border-blue-100/50">
                  <span className="text-sm">📱</span> ブラウザのメニュー（︙）から【ホーム画面に追加】すると便利です
                </div>
              </div>
              {/* ▲ インフォメーションエリア ここまで ▲ */}

              {/* ▼ 完全版への導線エリア ▼ */}
              <div className="rounded-xl p-4 sm:p-5 border border-slate-200 bg-white text-left shadow-sm">
                <p className="text-[13px] text-slate-600 mb-3 leading-relaxed font-medium">
                  さらに詳しく知りたい方は完全版RIESM™へ<br className="hidden sm:block"/>
                  <span className="font-bold bg-gradient-to-r from-indigo-100 via-purple-100 to-pink-100 px-1 rounded-sm text-slate-800">「どんな役割で力を発揮しやすいか・どうしたら自然にラクにできるのか？」</span>まで深く整理できます。
                </p>
                <div className="space-y-2">
                  <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="flex items-center justify-between p-3 bg-white rounded-lg border border-slate-200 hover:bg-slate-50 transition-all group">
                    <div>
                      <div className="text-[10px] sm:text-[11px] text-slate-500 font-bold mb-0.5">仕事や人間関係で本格的に活かしたい方は</div>
                      <div className="text-[13px] sm:text-sm font-bold text-slate-800 group-hover:text-slate-600 transition-colors">🌈 完全版RIESM™へ</div>
                    </div>
                    <div className="text-slate-400 group-hover:text-slate-500"><ExternalLinkIcon /></div>
                  </a>
                </div>
              </div>
              {/* ▲ 導線エリア ここまで ▲ */}

              <div className="mt-8 text-center">
                <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className="text-[11px] sm:text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors inline-flex items-center gap-1">
                  🌈RIESM™について詳しく知る(note) <ExternalLinkIcon />
                </a>
                <div className="h-4"></div>
                <div>
                  <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="text-[10px] sm:text-xs text-slate-400 font-medium hover:text-slate-600 transition-colors">
                    © 2026 ninin consulting＆counseling
                  </a>
                </div>
                <div className="h-4"></div>
              </div>
            </div>
          </div>
        );
      }

      if (resultType) {
        // ダブルフロント時の情報を動的生成
        let result;
        if (resultType.isDouble) {
          const frontData = resultsData[resultType.front];
          const secondData = resultsData[resultType.second];
          const themeKey = resultType.frontKey;
          
          result = {
            title: `${frontData.title} ＆ ${secondData.title}`,
            subTitle: `（${frontData.subTitle.replace(/[（）]/g, '')} × ${secondData.subTitle.replace(/[（）]/g, '')}）`,
            detail: [`${frontData.detail[0]}\n\n${secondAdditions[resultType.second]}`],
            theme: doubleThemes[themeKey] || frontData.theme
          };
        } else {
          result = resultsData[resultType.front];
        }

        const t = result.theme;
        const backsData = {
          W: "あなたは、対話を論理的に進めたり、相手の気持ちを深く受け止めたりする力が自然に働きやすい傾向がある一方で、「とりあえず面白そうだからやってみよう」と直感で動いたり、場のノリに合わせて自由な発想を広げたりするモードは、意識しないと出てきにくいかもしれません。\n計画性や安全性を大切にする傾向がありそうです。",
          K: "あなたは、相手の気持ちを優しく受け止めたり、柔軟な発想で会話を広げたりする力が自然に働きやすい傾向がある一方で、話を論理的に整理して結論を出したり、ルールや計画に基づいて客観的に判断を下したりするモードは、意識しないと後回しになりやすいかもしれません。\n枠にはめるよりも、その場の自然な流れや感情を大切にする傾向がありそうです。",
          N: "あなたは、問題を解決するための道筋を考えたり、リスクを回避して安全に物事を進めたりする力が自然に働きやすい傾向がある一方で、相手のネガティブな言葉にただ黙ってうなずいたり、結論を出さずに相手のペースに合わせて待つようなモードは、意識しないと短くなりやすいかもしれません。\nただ受け止めるよりも、前に進むための合理的なサポートを大切にする傾向がありそうです。",
          A: "あなたは、相手の可能性を信じて背中を押したり、気持ちを深く受け止めたりする力が自然に働きやすい傾向がある一方で、周囲の空気を読んで慎重に行動したり、考えられるリスクを事前に指摘してブレーキを踏んだりするモードは、意識しないと後回しになりやすいかもしれません。\n恐れずに自分や相手の想いを優先して一歩を踏み出すことを大切にする傾向がありそうです。"
        };
        const backResult = { desc: backsData[resultType.back] };

        return (
          <div className={`min-h-screen flex items-center justify-center p-2 sm:p-4 py-8 sm:py-12 transition-colors duration-1000 ${t.bg}`}>
            <div className="max-w-lg w-full animate-fade-in relative">
              {toastMessage && (
                <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl z-50 text-sm font-bold text-center whitespace-pre-line w-[90%] max-w-sm border border-slate-600">
                  {toastMessage}
                </div>
              )}
              
              <div id="result-card" className={`bg-white rounded-2xl sm:rounded-3xl shadow-2xl overflow-hidden border-2 ${t.border}`}>
                
                <div className="bg-white">
                  <div className={`p-6 sm:p-8 text-center relative overflow-hidden bg-gradient-to-r ${t.header} text-white`}>
                    <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent"></div>
                    <h2 className="text-xs sm:text-sm font-bold tracking-widest text-white/90 mb-3 relative z-10">
                      あなたの【主モード】
                    </h2>
                    <div className="flex items-center justify-center gap-4 mb-2 relative z-10">
                      <ModeIcon type={resultType.front} className="w-8 h-8 sm:w-10 sm:h-10 drop-shadow-md" />
                      {resultType.isDouble && (
                        <>
                          <span className="text-xl sm:text-2xl font-bold opacity-70">+</span>
                          <ModeIcon type={resultType.second} className="w-8 h-8 sm:w-10 sm:h-10 drop-shadow-md" />
                        </>
                      )}
                    </div>
                    <h1 className="text-xl sm:text-2xl font-extrabold relative z-10 drop-shadow-md">
                      {result.title}
                      {result.subTitle && (
                        <>
                          <br />
                          <span className="text-sm sm:text-lg font-bold opacity-90">{result.subTitle}</span>
                        </>
                      )}
                    </h1>
                  </div>
                  
                  <div className="p-4 sm:p-8 pb-1 sm:pb-2">
                    <div className={`rounded-2xl p-4 sm:p-6 border border-white/50 shadow-inner bg-white/60`}>
                      <h3 className={`font-bold text-xs sm:text-sm mb-4 sm:mb-5 tracking-wide text-center ${t.textLight}`}>今のあなたのモードバランス</h3>
                      <div className="space-y-3 sm:space-y-4">
                        {['W', 'K', 'N', 'A'].sort((a, b) => resultScores[b] - resultScores[a]).map(type => {
                          const score = resultScores[type];
                          const maxScore = Math.max(...Object.values(resultScores));
                          const percent = maxScore > 0 ? Math.round(30 + (score / maxScore) * 70) : 30;
                          const barColors = { W: 'bg-amber-400', K: 'bg-blue-500', N: 'bg-pink-400', A: 'bg-cyan-400' };
                          const labels = { W: '発想型', K: '構造型', N: '共感型', A: '調整型' };
                          return (
                            <div key={type} className="flex items-center gap-2">
                              <div className={`w-5 sm:w-6 flex justify-center`}>
                                <ModeIcon type={type} className={`w-4 h-4 sm:w-5 sm:h-5 ${t.textLight}`} />
                              </div>
                              <div className={`w-14 sm:w-16 text-left sm:text-right text-[10px] sm:text-xs font-bold ${t.textLight}`}>{labels[type]}</div>
                              <div className="flex-1 h-3 sm:h-4 bg-slate-200/50 rounded-full overflow-hidden">
                                <div className={`h-full ${barColors[type]} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${percent}%` }}></div>
                              </div>
                              <div className={`w-8 sm:w-10 text-right text-xs font-bold ${t.text}`}>{percent}%</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="px-4 sm:px-8 pb-0">
                  <div className={`rounded-xl sm:rounded-2xl p-4 sm:p-6 mb-4 border border-white/50 shadow-inner ${t.cardBg}`}>
                    <p className={`leading-relaxed text-sm md:text-base font-medium whitespace-pre-line ${t.text}`}>{result.detail[0]}</p>
                  </div>
                </div>

                <div className="px-4 sm:px-8 pb-4 space-y-3 sm:space-y-4">
                  <button onClick={startQuiz} className={`flex items-center justify-center gap-2 w-full py-3 sm:py-4 px-4 sm:px-6 rounded-xl font-bold transition-all text-sm md:text-base ${t.btnBg} ${t.text} ${t.btnHover}`}>
                    <RefreshCwIcon /> もう一度観る
                  </button>

                  {/* ▼ 完全版への導線エリア ▼ */}
                  <div className={`mt-6 p-4 sm:p-5 rounded-xl border-2 ${t.border} bg-white/80 text-left shadow-sm`}>
                    <p className={`text-[13px] md:text-sm font-medium mb-3 leading-relaxed ${t.text}`}>
                      さらに詳しく知りたい方は完全版RIESM™へ<br className="hidden sm:block"/>
                      <span className="font-bold bg-gradient-to-r from-indigo-100 via-purple-100 to-pink-100 px-1 rounded-sm">「どんな役割で力を発揮しやすいか・どうしたら自然にラクにできるのか？」</span>まで深く整理できます。
                    </p>
                    <div className="space-y-2">
                      <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className={`flex items-center justify-between p-3 rounded-lg shadow-sm hover:shadow transition-all group text-white bg-gradient-to-r ${t.header}`}>
                        <div>
                          <div className="text-[10px] sm:text-[11px] font-bold mb-0.5 opacity-90">仕事や人間関係で本格的に活かしたい方は</div>
                          <div className="text-[13px] sm:text-sm font-bold">🌈 完全版RIESM™へ</div>
                        </div>
                        <div className="opacity-80 group-hover:opacity-100"><ExternalLinkIcon /></div>
                      </a>
                    </div>
                  </div>
                  {/* ▲ 導線エリア ここまで ▲ */}
                </div>

                <div className="px-4 sm:px-8 pb-6 sm:pb-8">
                  <div className={`rounded-xl sm:rounded-2xl p-4 sm:p-6 mb-4 border border-white/50 shadow-inner ${t.cardBg}`}>
                    <div>
                      <h4 className={`font-bold text-[13px] md:text-sm mb-4 opacity-90 ${t.text}`}>▼ バックスについて</h4>
                      <p className={`text-[13px] md:text-sm font-medium opacity-80 whitespace-pre-line leading-relaxed ${t.text}`}>{backResult.desc}</p>
                      
                      <div className={`mt-6 p-4 sm:p-5 rounded-xl bg-white/40 border border-white/50 shadow-sm`}>
                         <p className={`text-[11px] sm:text-xs font-bold opacity-90 leading-relaxed ${t.text}`}>
                           💡 バックスとは、意識しないと使いにくい、または後回しになりやすい心のモードです。欠点ではなく、今後鍛えることでコミュニケーションの幅が広がる可能性のある領域かもしれません。
                         </p>
                      </div>
                    </div>
                  </div>

                  <div className="text-center pt-2 sm:pt-3 space-y-2">
                    <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className={`text-[11px] sm:text-xs font-bold opacity-60 hover:opacity-100 transition-opacity inline-flex items-center gap-1 ${t.text}`}>
                      🌈RIESM™について詳しく知る(note) <ExternalLinkIcon />
                    </a>
                    <div>
                      <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="text-[10px] sm:text-xs text-slate-400 font-medium hover:text-slate-600 transition-colors">

      const q = isPractice ? practiceQuestion : currentQuestions[currentIndex];
      const progress = isPractice ? 4 : ((currentIndex + 1) / currentQuestions.length) * 100;
      const labelStrong = q.isSituation ? "に、強く惹かれる" : "と、強くそう思う";
      const labelMid = q.isSituation ? "に、惹かれる" : "と、そう思う";

      const topType = q.options[0].type;
      const bottomType = q.options[1].type;
      const topColorRGB = bgColors[topType];
      const bottomColorRGB = bgColors[bottomType];
      const answerChoices = [
        {
          index: 0,
          hoverPos: 15,
          caption: 'かなりA',
          topSize: 'w-10 h-10 sm:w-12 sm:h-12',
          bottomSize: null,
          scoreUpdates: [{ type: q.options[0].type, weight: 4 }],

        },

          caption: 'A',
          topSize: 'w-8 h-8 sm:w-10 sm:h-10',
          bottomSize: null,
          scoreUpdates: [{ type: q.options[0].type, weight: 3 }],
          ariaLabel: `【${q.options[0].text}】${labelMid}`
        },
        {
          index: 2,
          hoverPos: 45,
          caption: 'ややA',
          topSize: 'w-7 h-7 sm:w-8 sm:h-8',
          bottomSize: 'w-4 h-4 sm:w-5 sm:h-5',
          scoreUpdates: [{ type: q.options[0].type, weight: 2 }, { type: q.options[1].type, weight: 1 }],
          ariaLabel: `どちらかといえば【${q.options[0].text}】だが、【${q.options[1].text}】もある`
        },
        {
          index: 3,
          hoverPos: 55,
          caption: 'ややB',
          topSize: 'w-4 h-4 sm:w-5 sm:h-5',
          bottomSize: 'w-7 h-7 sm:w-8 sm:h-8',
          scoreUpdates: [{ type: q.options[1].type, weight: 2 }, { type: q.options[0].type, weight: 1 }],
          ariaLabel: `どちらかといえば【${q.options[1].text}】だが、【${q.options[0].text}】もある`
        },
        {
          index: 4,
          hoverPos: 70,
          caption: 'B',
          topSize: null,
          bottomSize: 'w-8 h-8 sm:w-10 sm:h-10',
          scoreUpdates: [{ type: q.options[1].type, weight: 3 }],
          ariaLabel: `【${q.options[1].text}】${labelMid}`
        },
        {
          index: 5,
          hoverPos: 85,
          caption: 'かなりB',
          topSize: null,
          bottomSize: 'w-10 h-10 sm:w-12 sm:h-12',
          scoreUpdates: [{ type: q.options[1].type, weight: 4 }],
          ariaLabel: `【${q.options[1].text}】${labelStrong}`
        }
      ];

      return (
        <div className="min-h-screen flex items-center justify-center p-2 sm:p-4 bg-slate-50 transition-colors duration-1000">
          <div className="max-w-md w-full bg-white/90 rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border border-white/60 animate-fade-in relative backdrop-blur-2xl">
            
            {/* 背景グラデーション: 上 */}
            <div 
              className="absolute top-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${100 - hoverPos + 10}%`, 
                background: `linear-gradient(to bottom, rgba(${topColorRGB}, 0.35) 0%, rgba(${topColorRGB}, 0) 100%)`,
              }}
            ></div>

            {/* 背景グラデーション: 下 */}
            <div 
              className="absolute bottom-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${hoverPos + 10}%`, 
                background: `linear-gradient(to top, rgba(${bottomColorRGB}, 0.35) 0%, rgba(${bottomColorRGB}, 0) 100%)`,
              }}
            ></div>

            <div className="relative z-20 h-1.5 bg-slate-100/50 w-full">
              <div className="h-full bg-indigo-500 transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
            </div>

            <div className="relative z-10 p-3 sm:p-8 pb-2 sm:pb-6">
              <div className="text-[11px] sm:text-sm font-bold text-slate-500 mb-2 sm:mb-4 tracking-wider flex justify-between drop-shadow-sm px-1">
                <span>{isPractice ? 'PRACTICE' : 'QUESTION'}</span>
                <span>{isPractice ? '練習' : `${currentIndex + 1} / ${currentQuestions.length}`}</span>
              </div>
              
              <h2 className="min-h-[5rem] sm:min-h-[7rem] flex items-center text-base sm:text-xl font-bold text-slate-800 mb-3 sm:mb-6 leading-relaxed bg-white p-3 sm:p-6 rounded-xl sm:rounded-2xl shadow-md border border-slate-200">
                {q.text}
              </h2>
              
              <div className="space-y-3 sm:space-y-4 animate-fade-in relative z-10">
                {/* Aの枠：左端を覆うスリムな帯状ラベルと完全中央配置のテキスト */}
                <div className="relative rounded-xl sm:rounded-2xl border border-white/70 bg-white/70 shadow-sm backdrop-blur-md flex items-center min-h-[4.5rem] overflow-hidden">
                  <div
                    className="absolute top-0 left-0 h-full w-6 sm:w-7 flex items-center justify-center text-[10px] sm:text-xs font-black text-white shadow-md z-10"
                    style={{ backgroundColor: `rgb(${topColorRGB})` }}
                  >
                    A
                  </div>
                  {/* absolute inset-0 を使って枠全体を基準にテキストを中央配置 */}
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none px-8">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-slate-900 text-center w-full">{q.options[0].text}</p>
                  </div>
                  {/* 高さを確保するための透明なダミー要素（テキストと同じ内容） */}
                  <div className="w-full py-4 sm:py-5 px-8 opacity-0">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-center">{q.options[0].text}</p>
                  </div>
                </div>

                <div className="relative rounded-2xl border border-white/70 bg-white/55 p-2 sm:p-3 shadow-inner backdrop-blur-md">
                  <div className="grid grid-cols-6 items-start gap-0.5 sm:gap-1">
                    {answerChoices.map(choice => {
                      const isSelected = selectedChoiceIndex === choice.index;
                      const isTempSelected = tempSelectedChoiceIndex === choice.index;
                      const isDimmed = (selectedChoiceIndex !== null && !isSelected) || (tempSelectedChoiceIndex !== null && !isTempSelected);
                      const topShadow = (isSelected || isTempSelected) ? `0 0 24px 8px rgba(${topColorRGB}, 0.55)` : `0 0 10px rgba(${topColorRGB}, 0.25)`;
                      const bottomShadow = (isSelected || isTempSelected) ? `0 0 24px 8px rgba(${bottomColorRGB}, 0.55)` : `0 0 10px rgba(${bottomColorRGB}, 0.25)`;

                      return (
                        <button
                          key={choice.index}
                          type="button"
                          aria-label={choice.ariaLabel}
                          title={choice.ariaLabel}
                          disabled={selectedChoiceIndex !== null}
                          onMouseEnter={() => setHoverPos(choice.hoverPos)}
                          onMouseLeave={() => selectedChoiceIndex === null && tempSelectedChoiceIndex === null && setHoverPos(50)}
                          onClick={() => handleChoiceSelect(choice)}
                          className={`relative group flex min-w-0 flex-col items-center rounded-xl border py-1 sm:py-2 transition-all duration-300 active:scale-[0.97] disabled:cursor-wait ${(isSelected || isTempSelected) ? 'border-white bg-white/90 shadow-[0_0_24px_rgba(255,255,255,0.95)]' : 'border-transparent hover:bg-white/70 hover:shadow-sm'} ${isDimmed ? 'opacity-45' : ''}`}
                        >
                          {isTempSelected && isPractice && (
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap bg-orange-400/95 text-white text-[9px] sm:text-[10px] font-bold px-2.5 py-1 rounded-full shadow-md z-40 animate-fade-in pointer-events-none tracking-wide">
                              2タップで決定
                            </div>
                          )}
                          <div className="relative h-20 sm:h-24 w-full">
                            <div className={`absolute top-1/2 h-px -translate-y-1/2 bg-slate-300/80 ${choice.index === 0 ? 'left-1/2 right-0' : choice.index === answerChoices.length - 1 ? 'left-0 right-1/2' : 'left-0 right-0'}`}></div>
                            <span className={`absolute left-1/2 top-1/2 z-10 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap rounded-full bg-white/85 px-1 py-0.5 text-[10px] sm:text-[11px] font-black leading-none shadow-sm transition-colors ${(isSelected || isTempSelected) ? 'text-slate-900 ring-1 ring-white' : 'text-slate-500 group-hover:text-slate-800'}`}>
                              {choice.caption}
                            </span>
                            {choice.topSize && (
                              <div className="absolute bottom-1/2 left-0 right-0 flex justify-center pb-1">
                                <div
                                  className={`rounded-full transition-all duration-300 ${choice.topSize} ${(isSelected || isTempSelected) ? 'riesm-orb-selected ring-2 ring-white' : 'group-hover:scale-110'}`}
                                  style={{ backgroundColor: `rgb(${topColorRGB})`, boxShadow: topShadow }}
                                ></div>
                              </div>
                            )}
                            {choice.bottomSize && (
                              <div className="absolute top-1/2 left-0 right-0 flex justify-center pt-1">
                                <div
                                  className={`rounded-full transition-all duration-300 ${choice.bottomSize} ${(isSelected || isTempSelected) ? 'riesm-orb-selected ring-2 ring-white' : 'group-hover:scale-110'}`}
                                  style={{ backgroundColor: `rgb(${bottomColorRGB})`, boxShadow: bottomShadow }}
                                ></div>
                              </div>
                            )}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Bの枠：右端を覆うスリムな帯状ラベルと完全中央配置のテキスト */}
                <div className="relative rounded-xl sm:rounded-2xl border border-white/70 bg-white/70 shadow-sm backdrop-blur-md flex items-center min-h-[4.5rem] overflow-hidden">
                  <div
                    className="absolute top-0 right-0 h-full w-6 sm:w-7 flex items-center justify-center text-[10px] sm:text-xs font-black text-white shadow-md z-10"
                    style={{ backgroundColor: `rgb(${bottomColorRGB})` }}
                  >
                    B
                  </div>
                  {/* absolute inset-0 を使って枠全体を基準にテキストを中央配置 */}
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none px-8">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-slate-900 text-center w-full">{q.options[1].text}</p>
                  </div>
                  {/* 高さを確保するための透明なダミー要素（テキストと同じ内容） */}
                  <div className="w-full py-4 sm:py-5 px-8 opacity-0">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-center">{q.options[1].text}</p>
                  </div>
                </div>
              </div>

              {isPractice && tutorialCompleted && (
                <div className="absolute inset-0 z-30 flex items-center justify-center bg-slate-900/25 p-4 backdrop-blur-sm">
                  <div role="dialog" aria-modal="true" className="w-full max-w-xs rounded-2xl border border-white/80 bg-white/95 p-5 text-center shadow-2xl animate-fade-in">
                    <p className="mb-3 text-base sm:text-lg font-extrabold leading-relaxed text-slate-900">
                      選択方法はわかりましたでしょうか？
                    </p>
                    <p className="mb-5 text-sm sm:text-base font-bold leading-relaxed text-slate-700">
                      このように自分の気持ちを素直に感じて選んで下さい。
                    </p>
                    <button
                      onClick={returnToTop}
                      className="w-full rounded-xl bg-slate-800 px-4 py-3 text-sm sm:text-base font-bold text-white shadow-sm transition-all hover:bg-slate-700 active:scale-[0.98]"
                    >
                      TOP画面にもどる
                    </button>
                  </div>
                </div>
              )}

              <div className="mt-2 sm:mt-6 flex items-center justify-between border-t border-slate-200 pt-2 sm:pt-4 relative z-10 px-1">
                <button 
                  onClick={handleBack} 
                  disabled={isPractice || currentIndex === 0 || selectedChoiceIndex !== null} 
                  className={`flex items-center gap-1 text-[13px] sm:text-base font-extrabold text-slate-800 transition-opacity ${isPractice || currentIndex === 0 || selectedChoiceIndex !== null ? 'opacity-30 cursor-not-allowed' : 'hover:opacity-70'}`}
                >
                  <ArrowLeftIcon /> もどる
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
