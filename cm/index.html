    }

      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes riesmOrbPulse {

                    A
                  </div>
                  <div className="w-full flex items-center justify-center px-10 py-4 sm:px-12 sm:py-5 relative z-10">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-slate-900 text-center break-words">{q.options[0].text}</p>
                  </div>
                </div>

                {/* 6択ボタン群：Safari対策のため、absoluteを減らしてFlexboxでレイアウト構築 */}
                <div className="relative rounded-2xl border border-white/70 bg-white/55 p-2 sm:p-3 shadow-inner backdrop-blur-md transform-gpu">
                  <div className="grid grid-cols-6 items-start gap-0.5 sm:gap-1">
                    {answerChoices.map(choice => {
                      const isSelected = selectedChoiceIndex === choice.index;
                      const isTempSelected = tempSelectedChoiceIndex === choice.index;
                      const isDimmed = (selectedChoiceIndex !== null && !isSelected) || (tempSelectedChoiceIndex !== null && !isTempSelected);
                      const topShadow = (isSelected || isTempSelected) ? `0 0 24px 8px rgba(${topColorRGB}, 0.55)` : `0 0 10px rgba(${topColorRGB}, 0.25)`;
                      const bottomShadow = (isSelected || isTempSelected) ? `0 0 24px 8px rgba(${bottomColorRGB}, 0.55)` : `0 0 10px rgba(${bottomColorRGB}, 0.25)`;

                      return (
                        <button
                          key={choice.index}
                          type="button"
                          aria-label={choice.ariaLabel}
                          title={choice.ariaLabel}
                          disabled={selectedChoiceIndex !== null}
                          onMouseEnter={() => setHoverPos(choice.hoverPos)}
                          onMouseLeave={() => selectedChoiceIndex === null && tempSelectedChoiceIndex === null && setHoverPos(50)}
                          onClick={() => handleChoiceSelect(choice)}
                          className={`relative group w-full flex flex-col items-center rounded-xl border transition-all duration-300 active:scale-[0.97] disabled:cursor-wait ${(isSelected || isTempSelected) ? 'border-white bg-white/90 shadow-[0_0_24px_rgba(255,255,255,0.95)]' : 'border-transparent hover:bg-white/70 hover:shadow-sm'} ${isDimmed ? 'opacity-45' : ''} transform-gpu`}
                        >
                          <div className="w-full flex flex-col items-center py-1 sm:py-2 relative">
                            {isTempSelected && isPractice && (
                              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap bg-orange-400/95 text-white text-[9px] sm:text-[10px] font-bold px-2.5 py-1 rounded-full shadow-md z-40 animate-fade-in pointer-events-none tracking-wide transform-gpu">
                                2タップで決定
                              </div>
                            )}
                            <div className="relative h-20 sm:h-24 w-full flex flex-col justify-center items-center">
                              {/* 横線 */}
                              <div className={`absolute top-1/2 h-px -translate-y-1/2 bg-slate-300/80 ${choice.index === 0 ? 'left-1/2 right-0' : choice.index === answerChoices.length - 1 ? 'left-0 right-1/2' : 'left-0 right-0'}`}></div>
                              
                              {/* 上の丸 */}
                              <div className="flex-1 w-full flex flex-col justify-end items-center relative z-0">
                                {choice.topSize && (
                                  <div
                                    className={`rounded-full transition-all duration-300 ${choice.topSize} ${(isSelected || isTempSelected) ? 'riesm-orb-selected ring-2 ring-white' : 'group-hover:scale-110'}`}
                                    style={{ backgroundColor: `rgb(${topColorRGB})`, boxShadow: topShadow }}
                                  ></div>
                                )}
                              </div>
                              
                              {/* 中央のキャプション (絶対配置に変更して押し出しを防止) */}
                              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-10 flex items-center justify-center pointer-events-none">
                                <span className={`whitespace-nowrap rounded-full bg-white/75 px-1.5 py-0.5 text-[10px] sm:text-[11px] font-black leading-none shadow-sm backdrop-blur-sm transition-colors ${(isSelected || isTempSelected) ? 'text-slate-900 ring-1 ring-white bg-white/95' : 'text-slate-500/90 group-hover:text-slate-800'}`}>
                                  {choice.caption}
                                </span>
                              </div>
                              
                              {/* 下の丸 */}
                              <div className="flex-1 w-full flex flex-col justify-start items-center relative z-0">
                                {choice.bottomSize && (
                                  <div
                                    className={`rounded-full transition-all duration-300 ${choice.bottomSize} ${(isSelected || isTempSelected) ? 'riesm-orb-selected ring-2 ring-white' : 'group-hover:scale-110'}`}
                                    style={{ backgroundColor: `rgb(${bottomColorRGB})`, boxShadow: bottomShadow }}
                                  ></div>
                                )}
                              </div>
                            </div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Bの枠：テキストを全体の中央に配置するためバッジを絶対配置化 */}
                <div className="relative rounded-xl sm:rounded-2xl border border-white/70 bg-white/70 shadow-sm backdrop-blur-md flex min-h-[4.5rem] overflow-hidden transform-gpu">
                  <div className="w-full flex items-center justify-center px-10 py-4 sm:px-12 sm:py-5 relative z-10">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-slate-900 text-center break-words">{q.options[1].text}</p>
                  </div>
                  <div
                    className="absolute top-0 right-0 h-full w-6 sm:w-7 flex items-center justify-center text-[10px] sm:text-xs font-black text-white shadow-md z-10"
                    style={{ backgroundColor: `rgb(${bottomColorRGB})` }}
                  >
                    B
                  </div>
                </div>
              </div>

              {isPractice && tutorialCompleted && (
                <div className="absolute inset-0 z-30 flex items-center justify-center bg-slate-900/25 p-4 backdrop-blur-sm">
                  <div role="dialog" aria-modal="true" className="w-full max-w-sm rounded-2xl border border-white/80 bg-white/95 p-6 text-center shadow-2xl animate-fade-in">
                    <p className="mb-3 text-base sm:text-lg font-extrabold leading-relaxed text-slate-900">
                      選択方法はわかりましたでしょうか？
                    </p>
                    <p className="mb-6 text-[13px] sm:text-sm font-bold leading-relaxed text-slate-700">
                      このように自分の気持ちを素直に感じて選んで下さい。<br/>
                      <br/>
                      ここからが支援モードの傾向確認設問です。<br/>
                      全部で５分くらいです。<br/>
                      リラックスしてお進みください。
                    </p>
                    <button
                      onClick={startQuiz}
                      className={`w-full rounded-xl px-4 py-3 sm:py-4 text-sm sm:text-base font-bold shadow-sm transition-all active:scale-[0.98] ${
                        colorMode === 'colorful'
                          ? 'bg-gradient-to-r from-amber-400 to-pink-500 text-white hover:opacity-90'
                          : 'bg-gradient-to-r from-emerald-400 to-lime-400 text-emerald-950 hover:opacity-90'
                      }`}
                    >
                      準備はできたので開始する
                    </button>
                  </div>
                </div>
              )}

              <div className="mt-2 sm:mt-6 flex items-center justify-between border-t border-slate-200 pt-2 sm:pt-4 relative z-10 px-1">
                <button 
                  onClick={handleBack} 
                  disabled={selectedChoiceIndex !== null} 
                  className={`flex items-center gap-1 text-[13px] sm:text-base font-extrabold text-slate-800 transition-opacity ${selectedChoiceIndex !== null ? 'opacity-30 cursor-not-allowed' : 'hover:opacity-70'}`}
                >
                  <ArrowLeftIcon /> もどる
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
