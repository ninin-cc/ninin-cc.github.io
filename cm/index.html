  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes riesmOrbPulse {
      0% { transform: scale(1); filter: brightness(1); }
      55% { transform: scale(1.18); filter: brightness(1.18); }
      100% { transform: scale(1.08); filter: brightness(1.08); }
    }
    .riesm-orb-selected {
      animation: riesmOrbPulse 0.42s ease-out both;
    }
    .loading-screen {

    const resultsData = {
      W: {
        title: "発想型（ワンダー）",

        detail: [

                  <div className="p-4 sm:p-8 pb-1 sm:pb-2">
                    <div className={`rounded-2xl p-4 sm:p-6 border border-white/50 shadow-inner bg-white/60`}>
                      <h3 className={`font-bold text-xs sm:text-sm mb-4 sm:mb-5 tracking-wide text-center ${t.textLight}`}>今のあなたのモードバランス</h3>
                      <div className="space-y-3 sm:space-y-4">
                        {['W', 'K', 'N', 'A'].sort((a, b) => resultScores[b] - resultScores[a]).map(type => {
                          const score = resultScores[type];
                          const maxScore = Math.max(...Object.values(resultScores));
                          const percent = maxScore > 0 ? Math.round(30 + (score / maxScore) * 70) : 30;
                          const barColors = { W: 'bg-amber-400', K: 'bg-blue-500', N: 'bg-pink-400', A: 'bg-cyan-400' };
                          const labels = { W: '発想型', K: '構造型', N: '共感型', A: '調整型' };
                          return (
                            <div key={type} className="flex items-center gap-2">
                              <div className={`w-5 sm:w-6 flex justify-center`}>
                                <ModeIcon type={type} className={`w-4 h-4 sm:w-5 sm:h-5 ${t.textLight}`} />
                              </div>
                              <div className={`w-14 sm:w-16 text-left sm:text-right text-[10px] sm:text-xs font-bold ${t.textLight}`}>{labels[type]}</div>
                              <div className="flex-1 h-3 sm:h-4 bg-slate-200/50 rounded-full overflow-hidden">
                                <div className={`h-full ${barColors[type]} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${percent}%` }}></div>
                              </div>
                              <div className={`w-8 sm:w-10 text-right text-xs font-bold ${t.text}`}>{percent}%</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="px-4 sm:px-8 pb-0">
                  <div className={`rounded-xl sm:rounded-2xl p-4 sm:p-6 mb-4 border border-white/50 shadow-inner ${t.cardBg}`}>
                    <p className={`leading-relaxed text-sm md:text-base font-medium whitespace-pre-line ${t.text}`}>{result.detail[0]}</p>
                  </div>
                </div>

                <div className="px-4 sm:px-8 pb-4 space-y-3 sm:space-y-4">
                  <button onClick={startQuiz} className={`flex items-center justify-center gap-2 w-full py-3 sm:py-4 px-4 sm:px-6 rounded-xl font-bold transition-all text-sm md:text-base ${t.btnBg} ${t.text} ${t.btnHover}`}>
                    <RefreshCwIcon /> もう一度観る
                  </button>

                  {/* ▼ 完全版への導線エリア ▼ */}
                  <div className={`mt-6 p-4 sm:p-5 rounded-xl border-2 ${t.border} bg-white/80 text-left shadow-sm`}>
                    <p className={`text-[13px] md:text-sm font-medium mb-3 leading-relaxed ${t.text}`}>
                      さらに詳しく知りたい方は完全版RIESM™へ<br className="hidden sm:block"/>
                      <span className="font-bold bg-gradient-to-r from-indigo-100 via-purple-100 to-pink-100 px-1 rounded-sm">「どんな役割で力を発揮しやすいか・どうしたら自然にラクにできるのか？」</span>まで深く整理できます。
                    </p>
                    <div className="space-y-2">
                      <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className={`flex items-center justify-between p-3 rounded-lg shadow-sm hover:shadow transition-all group text-white bg-gradient-to-r ${t.header}`}>
                        <div>
                          <div className="text-[10px] sm:text-[11px] font-bold mb-0.5 opacity-90">仕事や人間関係で本格的に活かしたい方は</div>
                          <div className="text-[13px] sm:text-sm font-bold">🌈 完全版RIESM™へ</div>
                        </div>
                        <div className="opacity-80 group-hover:opacity-100"><ExternalLinkIcon /></div>
                      </a>
                    </div>
                  </div>
                  {/* ▲ 導線エリア ここまで ▲ */}
                </div>

                <div className="px-4 sm:px-8 pb-6 sm:pb-8">
                  <div className={`rounded-xl sm:rounded-2xl p-4 sm:p-6 mb-4 border border-white/50 shadow-inner ${t.cardBg}`}>
                    <div>
                      <h4 className={`font-bold text-[13px] md:text-sm mb-4 opacity-90 ${t.text}`}>▼ バックスについて</h4>
                      <p className={`text-[13px] md:text-sm font-medium opacity-80 whitespace-pre-line leading-relaxed ${t.text}`}>{backResult.desc}</p>
                      
                      <div className={`mt-6 p-4 sm:p-5 rounded-xl bg-white/40 border border-white/50 shadow-sm`}>
                         <p className={`text-[11px] sm:text-xs font-bold opacity-90 leading-relaxed ${t.text}`}>
                           💡 バックスとは、意識しないと使いにくい、または後回しになりやすい支援モードです。苦手や欠点ではなく、今後鍛えることで支援の幅が広がる可能性のある領域です。
                         </p>
                      </div>
                    </div>
                  </div>

                  <div className="text-center pt-2 sm:pt-3 space-y-2">
                    <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className={`text-[11px] sm:text-xs font-bold opacity-60 hover:opacity-100 transition-opacity inline-flex items-center gap-1 ${t.text}`}>
                      🌈RIESM™について詳しく知る(note) <ExternalLinkIcon />
                    </a>
                    <div>
                      <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="text-[10px] sm:text-xs text-slate-400 font-medium hover:text-slate-600 transition-colors">
                        © 2026 ninin consulting＆counseling
                      </a>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        );
      }

      const q = isPractice ? practiceQuestion : currentQuestions[currentIndex];
      const progress = isPractice ? 4 : ((currentIndex + 1) / currentQuestions.length) * 100;
      const labelStrong = q.isSituation ? "に、強く惹かれる" : "と、強くそう思う";
      const labelMid = q.isSituation ? "に、惹かれる" : "と、そう思う";

      const topType = q.options[0].type;
      const bottomType = q.options[1].type;
      const topColorRGB = bgColors[topType];
      const bottomColorRGB = bgColors[bottomType];
      const answerChoices = [
        {
          index: 0,
          hoverPos: 15,
          caption: 'かなりA',
          topSize: 'w-10 h-10 sm:w-12 sm:h-12',
          bottomSize: null,
          scoreUpdates: [{ type: q.options[0].type, weight: 4 }],
          ariaLabel: `【${q.options[0].text}】${labelStrong}`
        },
        {
          index: 1,
          hoverPos: 30,
          caption: 'A',
          topSize: 'w-8 h-8 sm:w-10 sm:h-10',
          bottomSize: null,
          scoreUpdates: [{ type: q.options[0].type, weight: 3 }],
          ariaLabel: `【${q.options[0].text}】${labelMid}`
        },
        {
          index: 2,
          hoverPos: 45,
          caption: 'ややA',
          topSize: 'w-7 h-7 sm:w-8 sm:h-8',
          bottomSize: 'w-4 h-4 sm:w-5 sm:h-5',
          scoreUpdates: [{ type: q.options[0].type, weight: 2 }, { type: q.options[1].type, weight: 1 }],
          ariaLabel: `どちらかといえば【${q.options[0].text}】だが、【${q.options[1].text}】もある`
        },
        {
          index: 3,
          hoverPos: 55,
          caption: 'ややB',
          topSize: 'w-4 h-4 sm:w-5 sm:h-5',
          bottomSize: 'w-7 h-7 sm:w-8 sm:h-8',
          scoreUpdates: [{ type: q.options[1].type, weight: 2 }, { type: q.options[0].type, weight: 1 }],
          ariaLabel: `どちらかといえば【${q.options[1].text}】だが、【${q.options[0].text}】もある`
        },
        {
          index: 4,
          hoverPos: 70,
          caption: 'B',
          topSize: null,
          bottomSize: 'w-8 h-8 sm:w-10 sm:h-10',
          scoreUpdates: [{ type: q.options[1].type, weight: 3 }],
          ariaLabel: `【${q.options[1].text}】${labelMid}`
        },
        {
          index: 5,
          hoverPos: 85,
          caption: 'かなりB',
          topSize: null,
          bottomSize: 'w-10 h-10 sm:w-12 sm:h-12',
          scoreUpdates: [{ type: q.options[1].type, weight: 4 }],
          ariaLabel: `【${q.options[1].text}】${labelStrong}`
        }
      ];

      return (
        <div className="min-h-screen flex items-center justify-center p-2 sm:p-4 bg-slate-50 transition-colors duration-1000">
          <div className="max-w-md w-full bg-white/90 rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border border-white/60 animate-fade-in relative backdrop-blur-2xl">
            
            {/* 背景グラデーション: 上 */}
            <div 
              className="absolute top-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${100 - hoverPos + 10}%`, 
                background: `linear-gradient(to bottom, rgba(${topColorRGB}, 0.35) 0%, rgba(${topColorRGB}, 0) 100%)`,
              }}
            ></div>

            {/* 背景グラデーション: 下 */}
            <div 
              className="absolute bottom-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${hoverPos + 10}%`, 
                background: `linear-gradient(to top, rgba(${bottomColorRGB}, 0.35) 0%, rgba(${bottomColorRGB}, 0) 100%)`,
              }}
            ></div>

            <div className="relative z-20 h-1.5 bg-slate-100/50 w-full">
              <div className="h-full bg-indigo-500 transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
            </div>

            <div className="relative z-10 p-3 sm:p-8 pb-2 sm:pb-6">
              <div className="text-[11px] sm:text-sm font-bold text-slate-500 mb-2 sm:mb-4 tracking-wider flex justify-between drop-shadow-sm px-1">
                <span>{isPractice ? 'PRACTICE' : 'QUESTION'}</span>
                <span>{isPractice ? '練習' : `${currentIndex + 1} / ${currentQuestions.length}`}</span>
              </div>
              
              <h2 className="min-h-[5rem] sm:min-h-[7rem] flex items-center text-base sm:text-xl font-bold text-slate-800 mb-3 sm:mb-6 leading-relaxed bg-white p-3 sm:p-6 rounded-xl sm:rounded-2xl shadow-md border border-slate-200">
                {q.text}
              </h2>
              
              <div className="space-y-3 sm:space-y-4 animate-fade-in relative z-10">
                <div className="relative rounded-xl sm:rounded-2xl border border-white/70 bg-white/70 p-3 pt-6 sm:p-4 pt-7 shadow-sm backdrop-blur-md">
                  <span
                    className="absolute -top-3 left-3 flex h-7 w-7 items-center justify-center rounded-full text-xs font-black text-white ring-2 ring-white shadow-md"
                    style={{ backgroundColor: `rgb(${topColorRGB})`, boxShadow: `0 0 14px rgba(${topColorRGB}, 0.55)` }}
                  >
                    A
                  </span>
                  <p className="w-full text-center text-[13px] sm:text-base font-bold leading-relaxed text-slate-900">{q.options[0].text}</p>
                </div>

                <div className="relative rounded-2xl border border-white/70 bg-white/55 p-2 sm:p-3 shadow-inner backdrop-blur-md">
                  <div className="grid grid-cols-6 items-start gap-0.5 sm:gap-1">
                    {answerChoices.map(choice => {
                      const isSelected = selectedChoiceIndex === choice.index;
                      const isDimmed = selectedChoiceIndex !== null && !isSelected;
                      const topShadow = isSelected ? `0 0 24px 8px rgba(${topColorRGB}, 0.55)` : `0 0 10px rgba(${topColorRGB}, 0.25)`;
                      const bottomShadow = isSelected ? `0 0 24px 8px rgba(${bottomColorRGB}, 0.55)` : `0 0 10px rgba(${bottomColorRGB}, 0.25)`;

                      return (
                        <button
                          key={choice.index}
                          type="button"
                          aria-label={choice.ariaLabel}
                          title={choice.ariaLabel}
                          disabled={selectedChoiceIndex !== null}
                          onMouseEnter={() => setHoverPos(choice.hoverPos)}
                          onMouseLeave={() => selectedChoiceIndex === null && setHoverPos(50)}
                          onClick={() => handleChoiceSelect(choice)}
                          className={`group flex min-w-0 flex-col items-center rounded-xl border py-1 sm:py-2 transition-all duration-300 active:scale-[0.97] disabled:cursor-wait ${isSelected ? 'border-white bg-white/90 shadow-[0_0_24px_rgba(255,255,255,0.95)]' : 'border-transparent hover:bg-white/70 hover:shadow-sm'} ${isDimmed ? 'opacity-45' : ''}`}
                        >
                          <div className="relative h-20 sm:h-24 w-full">
                            <div className={`absolute top-1/2 h-px -translate-y-1/2 bg-slate-300/80 ${choice.index === 0 ? 'left-1/2 right-0' : choice.index === answerChoices.length - 1 ? 'left-0 right-1/2' : 'left-0 right-0'}`}></div>
                            <span className={`absolute left-1/2 top-1/2 z-10 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap rounded-full bg-white/85 px-1 py-0.5 text-[10px] sm:text-[11px] font-black leading-none shadow-sm transition-colors ${isSelected ? 'text-slate-900 ring-1 ring-white' : 'text-slate-500 group-hover:text-slate-800'}`}>
                              {choice.caption}
                            </span>
                            {choice.topSize && (
                              <div className="absolute bottom-1/2 left-0 right-0 flex justify-center pb-1">
                                <div
                                  className={`rounded-full transition-all duration-300 ${choice.topSize} ${isSelected ? 'riesm-orb-selected ring-2 ring-white' : 'group-hover:scale-110'}`}
                                  style={{ backgroundColor: `rgb(${topColorRGB})`, boxShadow: topShadow }}
                                ></div>
                              </div>
                            )}
                            {choice.bottomSize && (
                              <div className="absolute top-1/2 left-0 right-0 flex justify-center pt-1">
                                <div
                                  className={`rounded-full transition-all duration-300 ${choice.bottomSize} ${isSelected ? 'riesm-orb-selected ring-2 ring-white' : 'group-hover:scale-110'}`}
                                  style={{ backgroundColor: `rgb(${bottomColorRGB})`, boxShadow: bottomShadow }}
                                ></div>
                              </div>
                            )}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <div className="relative rounded-xl sm:rounded-2xl border border-white/70 bg-white/70 p-3 pt-6 sm:p-4 pt-7 shadow-sm backdrop-blur-md">
                  <span
                    className="absolute -top-3 right-3 flex h-7 w-7 items-center justify-center rounded-full text-xs font-black text-white ring-2 ring-white shadow-md"
                    style={{ backgroundColor: `rgb(${bottomColorRGB})`, boxShadow: `0 0 14px rgba(${bottomColorRGB}, 0.55)` }}
                  >
                    B
                  </span>
                  <p className="w-full text-center text-[13px] sm:text-base font-bold leading-relaxed text-slate-900">{q.options[1].text}</p>
                </div>
              </div>

              {isPractice && tutorialCompleted && (
                <div className="absolute inset-0 z-30 flex items-center justify-center bg-slate-900/25 p-4 backdrop-blur-sm">
                  <div role="dialog" aria-modal="true" className="w-full max-w-xs rounded-2xl border border-white/80 bg-white/95 p-5 text-center shadow-2xl animate-fade-in">
                    <p className="mb-3 text-base sm:text-lg font-extrabold leading-relaxed text-slate-900">
                      選択方法はわかりましたでしょうか？
                    </p>
                    <p className="mb-5 text-sm sm:text-base font-bold leading-relaxed text-slate-700">
                      このように自分の気持ちを素直に感じて選んで下さい。
                    </p>
                    <button
                      onClick={returnToTop}
                      className="w-full rounded-xl bg-slate-800 px-4 py-3 text-sm sm:text-base font-bold text-white shadow-sm transition-all hover:bg-slate-700 active:scale-[0.98]"
                    >
                      TOP画面にもどる
                    </button>
                  </div>
                </div>
              )}

              <div className="mt-2 sm:mt-6 flex items-center justify-between border-t border-slate-200 pt-2 sm:pt-4 relative z-10 px-1">
                <button 
                  onClick={handleBack} 
                  disabled={isPractice || currentIndex === 0 || selectedChoiceIndex !== null} 
                  className={`flex items-center gap-1 text-[13px] sm:text-base font-extrabold text-slate-800 transition-opacity ${isPractice || currentIndex === 0 || selectedChoiceIndex !== null ? 'opacity-30 cursor-not-allowed' : 'hover:opacity-70'}`}
                >
                  <ArrowLeftIcon /> もどる
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
