      bottom: 0;
      left: 38px;
      width: 1px;

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ページ切り替えのフェードイン */
    .animate-page-turn {

      animation: fadeIn 0.3s ease-out forwards;
    }

    /* ページめくり（左固定で右から左へ縮小）アニメーション */
    .page-flip-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(to right, #050505 0%, #1a1a1a 95%, #3a3a3a 100%);
      z-index: 100;
      transform-origin: left center;
      animation: flipLeft 0.5s ease-in-out forwards;
      pointer-events: none;
    }
    @keyframes flipLeft {
      0% { transform: scaleX(1); opacity: 1; }
      99% { transform: scaleX(0); opacity: 1; }
      100% { transform: scaleX(0); opacity: 0; }
    }
    
    /* オーラエフェクト */

<body class="rpg-font min-h-screen relative" style="background-image: url('./img/cafeei.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
  <!-- 背景の暗さを和らげる -->
  <div class="absolute inset-0 z-0 bg-black bg-opacity-30"></div>
  <div id="root" class="relative z-10 w-full max-w-2xl mx-auto p-4 md:p-6 min-h-screen flex flex-col overflow-hidden"></div>

  <script src="./js/yuuri.bundle.js"></script>
  <script>
    (() => {
      const blockedCommandKeys = new Set(['u', 's']);
      const blockedDevtoolKeys = new Set(['i', 'j', 'c']);

      document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      document.addEventListener('dragstart', (event) => {
        event.preventDefault();
      });

      document.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        const commandKey = event.ctrlKey || event.metaKey;
        const shouldBlock =
          event.key === 'F12' ||
          (commandKey && blockedCommandKeys.has(key)) ||
          (commandKey && event.shiftKey && blockedDevtoolKeys.has(key));

        if (!shouldBlock) return;
        event.preventDefault();
        event.stopImmediatePropagation();
      }, true);
    })();
  </script>
