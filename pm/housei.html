            color: "text-orange-700",
            lineColor: "stroke-orange-400 border-orange-400 bg-orange-100",
            events: [
              { year: 1986, value: "60歳(努力)" },
              { year: 1998, value: "60歳(義務)" },
              { year: 2006, value: "65歳(段階)" },
              { year: 2013, value: "65歳(義務)" },
              { year: 2021, value: "70歳(努力)" },
              { year: 2025, value: "65歳(完全)" }
            ]
          },
          {
            title: "時間外労働上限",
            color: "text-rose-700",
            lineColor: "stroke-rose-400 border-rose-400 bg-rose-100",
            events: [
              { year: 2019, value: "大企業" },
              { year: 2020, value: "中小企業" },
              { year: 2024, value: "猶予業種" }
            ]
          },
          {
            title: "雇用保険適用拡大",
            color: "text-emerald-700",
            lineColor: "stroke-emerald-400 border-emerald-400 bg-emerald-100",
            events: [
              { year: 1989, value: "週33時間" },
              { year: 2001, value: "週20時間" },
              { year: 2028, value: "週10時間" }
            ]
          }
        ];

        // カテゴリ（分野）ごとの色分け設定
        const categoryConfig = {
            society: { icon: 'globe', color: 'text-emerald-700', bg: 'bg-white', border: 'border-emerald-500', label: '社会情勢' },
            law: { icon: 'scale', color: 'text-blue-900', bg: 'bg-white', border: 'border-blue-900', label: '法律' },
            education: { icon: 'graduation-cap', color: 'text-rose-700', bg: 'bg-white', border: 'border-rose-500', label: '教育関係' },
            system: { icon: 'briefcase', color: 'text-amber-700', bg: 'bg-white', border: 'border-amber-500', label: '制度・施策' },
            guideline: { icon: 'book-open', color: 'text-purple-700', bg: 'bg-white', border: 'border-purple-500', label: '指針・計画' },
        };
        const categoryKeys = ['society', 'law', 'education', 'system', 'guideline'];

        // ==========================================
        // 状態管理・フィルターデータ
        // ==========================================
        let viewMode = 'map'; 
        let currentScale = 100; 
        let currentPeriod = 'all'; 
        let isExpandAll = false; 
        let isCompactWidth = false; 

        // ★ 各レーンの表示状態を管理するオブジェクト
        let laneVisibility = {
            leaders: true,
            theory: true,
            trend: true,
            society: true,
            law: true,
            education: true,
            system: true,
            guideline: true
        };

        // フィルタリングされたデータ
        let fTimelineData = [];
        let fTheoryData = [];
        let fTrendData = [];
        let fMapYears = [];

        // ==========================================
        // ロジック関数
        // ==========================================

        function getPeriodBgClass(year) {
            const group = Math.floor((year - 1) / 5);
            return group % 2 === 0 ? 'bg-slate-300/40' : 'bg-teal-900/5';
        }

        function getCardBgClass(subCategory) {
            if (subCategory === 'mental') return 'bg-gradient-to-br from-emerald-100 to-white';
            if (subCategory === 'career') return 'bg-gradient-to-br from-amber-100 to-white';
            return 'bg-white';
        }

        function getEconomicStr(year) {
            const years = Object.keys(economicData).map(Number).sort((a,b) => a-b);
            let targetYear = years[0];
            for(let y of years) {
                if(y <= year) targetYear = y;
                else break;
            }
            return economicData[targetYear];
        }

        function updateFilteredData() {
            let minYear = 0;
            let maxYear = 9999;
            if (currentPeriod === 'p1') { minYear = 1943; maxYear = 1985; }
            if (currentPeriod === 'p2') { minYear = 1985; maxYear = 2011; }
            if (currentPeriod === 'p3') { minYear = 2011; maxYear = 2030; }

            fTimelineData = timelineData.filter(d => d.year >= minYear && d.year <= maxYear);
            fTheoryData = theoryData.filter(d => d.year >= minYear && d.year <= maxYear);
            
            fTrendData = [];
            trendData.forEach(trend => {
                const events = trend.events.filter(e => e.year >= minYear && e.year <= maxYear);
                if (events.length > 0) {
                    fTrendData.push({ ...trend, events: events });
                }
            });

            const allY = new Set(fTimelineData.map(d => d.year));
            fTheoryData.forEach(d => allY.add(d.year));
            fTrendData.forEach(trend => trend.events.forEach(e => allY.add(e.year)));
            fMapYears = Array.from(allY).sort((a, b) => a - b);
        }

        function setPeriod(period) {
            currentPeriod = period;
            updateFilteredData();
            renderApp();
        }

        function changeFontSize(step) {
            currentScale += step * 10;
            if (currentScale < 70) currentScale = 70;
            if (currentScale > 150) currentScale = 150;
            renderApp();
        }

        function toggleExpandAll() {
            if (viewMode === 'list') return;
            isExpandAll = !isExpandAll;
            renderApp();
        }

        function toggleCompactWidth() {
            isCompactWidth = !isCompactWidth;
            renderApp();
        }

        // ★ レーンの表示/非表示を切り替える関数
        function toggleLane(laneKey) {
            laneVisibility[laneKey] = !laneVisibility[laneKey];
            renderApp();
        }

        const getSafeLines = (text, innerW, fontSize) => {
            if (!text || typeof text !== 'string') return 1;
            const safeInnerW = Math.max(innerW, 50); 
            let length = 0;
            for (let i = 0; i < text.length; i++) {
                length += text.charCodeAt(i) > 255 ? fontSize : fontSize * 0.6;
            }
            return Math.max(1, Math.ceil(length / safeInnerW));
        };

        function calculateTheoryHeight(theory, scale, baseWidth) {
            if (!isExpandAll) return 32 * scale; 
            const width = baseWidth * scale; 
            const innerWidth = width - 20 * scale;
            const titleSize = 13 * scale;
            const descSize = 11 * scale;
            
            const titleText = (theory.name || "") + " " + (theory.theory || "");
            const descText = theory.description || "";
            
            const titleLines = getSafeLines(titleText, innerWidth, titleSize);
            const descLines = getSafeLines(descText, innerWidth, descSize);
            
            const titleH = titleLines * titleSize * 1.4;
            const descH = descLines * descSize * 1.6;
            
            return titleH + descH + 32 * scale; 
        }

        function calculateItemHeight(item, scale, isS, baseWidth) {
            if (!isExpandAll) return 32 * scale; 
            const width = baseWidth * scale; 
            const innerWidth = width - 20 * scale;
            const titleSize = (isS ? 14 : 13) * scale;
            const descSize = 11 * scale;
            
            const titleText = item.title || "";
            const descText = item.description || "";
            
            const titleLines = getSafeLines(titleText, innerWidth, titleSize);
            const descLines = getSafeLines(descText, innerWidth, descSize);
            
            const titleH = titleLines * titleSize * 1.4;
            const descH = descLines * descSize * 1.6;
            
            return titleH + descH + 32 * scale; 
        }

        function getTheoryLayout(colWidth) {
            const scale = currentScale / 100;
            const positioned = [];
            let maxBottom = 0;

            [...fTheoryData].sort((a, b) => a.year - b.year).forEach(theory => {
                const yearIndex = fMapYears.indexOf(theory.year);
                const left = yearIndex * colWidth + 8 * scale;
                
                let width, height;
                if (isExpandAll) {
                    const baseW = isCompactWidth ? 160 : 240;
                    width = baseW * scale; 
                    height = calculateTheoryHeight(theory, scale, baseW);
                } else {
                    const nameLen = (theory.name || "").length;
                    const padding = isCompactWidth ? 16 : 24;
                    width = nameLen * 14 * scale + padding * scale; 
                    height = 32 * scale;
                }
                
                const right = left + width;
                let currentY = 12 * scale; 
                
                let loopCount = 0;
                while (loopCount < 100) {
                    const currentBottom = currentY + height;
                    const isOverlap = positioned.some(p => {
                        const overlapX = left < p.right + 6 * scale && right > p.left;
                        const overlapY = currentY < p.bottom + 4 * scale && currentBottom > p.top;
                        return overlapX && overlapY;
                    });

                    if (!isOverlap) break;
                    currentY += 8 * scale; 
                    loopCount++;
                }

                positioned.push({ ...theory, left, right, top: currentY, bottom: currentY + height, width, height });
                maxBottom = Math.max(maxBottom, currentY + height);
            });

            return {
                items: positioned,
                height: Math.max(56 * scale, maxBottom + 16 * scale)
            };
        }
        
        function getLayoutData(colWidth) {
            const scale = currentScale / 100;
            const layout = {};
            
            categoryKeys.forEach(cat => {
                const items = fTimelineData.filter(d => d.category === cat).sort((a, b) => a.year - b.year);
                const positionedItems = [];
                let maxBottom = 0;

                items.forEach(item => {
                    const leftIndex = fMapYears.indexOf(item.year);
                    const left = leftIndex * colWidth;
                    const isS = item.importance === 'S';
                    
                    let width, height;
                    if (isExpandAll) {
                        const baseW = isCompactWidth ? (isS ? 160 : 130) : (isS ? 220 : 180);
                        width = baseW * scale;
                        height = calculateItemHeight(item, scale, isS, baseW);
                    } else {
                        const baseW = isCompactWidth ? (isS ? 130 : 100) : (isS ? 190 : 150);
                        width = baseW * scale;
                        height = 32 * scale; 
                    }
                    const right = left + width;

                    let currentY = 16 * scale; 
                    
                    let loopCount = 0;
                    while (loopCount < 100) {
                        const currentBottom = currentY + height;
                        const isOverlap = positionedItems.some(p => {
                            const overlapX = left < p.right + 12 * scale && right > p.left;
                            const overlapY = currentY < p.bottom + 6 * scale && currentBottom > p.top;
                            return overlapX && overlapY;
                        });

                        if (!isOverlap) break;
                        currentY += 8 * scale;
                        loopCount++;
                    }

                    positionedItems.push({
                        ...item, left, right, top: currentY, bottom: currentY + height, width, height, isS
                    });
                    
                    maxBottom = Math.max(maxBottom, currentY + height);
                });

                layout[cat] = {
                    items: positionedItems,
                    height: Math.max(70 * scale, maxBottom + 20 * scale) 
                };
            });
            return layout;
        }

        function getXPos(year, fMapYears, COL_W) {
            if (!fMapYears || fMapYears.length === 0) return 0;
            const getPoint = (i) => i * COL_W + COL_W / 2;

            if (year <= fMapYears[0]) {
                if (fMapYears.length >= 2) {
                    const span = fMapYears[1] - fMapYears[0];
                    const pxPerYear = COL_W / span;
                    const diff = fMapYears[0] - year;
                    return getPoint(0) - (diff * pxPerYear);
                }
                return getPoint(0);
            }
            
            const lastI = fMapYears.length - 1;
            if (year >= fMapYears[lastI]) {
                if (fMapYears.length >= 2) {
                    const span = fMapYears[lastI] - fMapYears[lastI-1];
                    const pxPerYear = COL_W / span;
                    const diff = year - fMapYears[lastI];
                    return getPoint(lastI) + (diff * pxPerYear);
                }
                return getPoint(lastI);
            }
            
            for (let i = 0; i < lastI; i++) {
                if (year >= fMapYears[i] && year < fMapYears[i+1]) {
                    const ratio = (year - fMapYears[i]) / (fMapYears[i+1] - fMapYears[i]);
                    const p1 = getPoint(i);
                    const p2 = getPoint(i+1);
                    return p1 + (p2 - p1) * ratio;
                }
            }
            return 0;
        }

        window.toggleLane = toggleLane; // グローバルに公開

        function drawConnections() {
            const container = document.getElementById('map-container');
            const svg = document.getElementById('svg-connections');
            if (!container || !svg || viewMode !== 'map') return;

            const containerRect = container.getBoundingClientRect();
            
            const paths = svg.querySelectorAll('path');
            paths.forEach(p => p.remove());

            fTimelineData.forEach(item => {
                // そのアイテムの属するカテゴリが表示されている場合のみ線を引く
                if (!laneVisibility[item.category]) return;

                if (item.relatedTo && item.relatedTo.length > 0) {
                    item.relatedTo.forEach(targetId => {
                        const targetItem = fTimelineData.find(d => d.id === targetId);
                        // ターゲット先のカテゴリも表示されている場合のみ線を引く
                        if (!targetItem || !laneVisibility[targetItem.category]) return;

                        const fromEl = document.getElementById(`card-${targetId}`);
                        const toEl = document.getElementById(`card-${item.id}`);
                        
                        if (fromEl && toEl) {
                            const fromRect = fromEl.getBoundingClientRect();
                            const toRect = toEl.getBoundingClientRect();

                            const startX = fromRect.right - containerRect.left;
                            const startY = (fromRect.top + fromRect.height / 2) - containerRect.top;
                            const endX = toRect.left - containerRect.left;
                            const endY = (toRect.top + toRect.height / 2) - containerRect.top;
                            
                            const cpX = Math.max(30, (endX - startX) * 0.4);

                            const pathData = `M ${startX} ${startY} C ${startX + cpX} ${startY}, ${endX - cpX} ${endY}, ${endX} ${endY}`;
                            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                            path.setAttribute("d", pathData);
                            path.setAttribute("stroke", "rgba(20, 184, 166, 0.6)");
                            path.setAttribute("stroke-width", "2");
                            path.setAttribute("fill", "none");
                            path.setAttribute("stroke-dasharray", "4 3");
                            path.setAttribute("marker-end", "url(#arrowhead)");
                            
                            svg.appendChild(path);
                        }
                    });
                }
            });
        }

        // ==========================================
        // UI描画関数
        // ==========================================
        function renderList() {
            const scale = currentScale / 100;
            const sortedData = [...fTimelineData].sort((a, b) => a.year - b.year);
            let html = `<div class="w-full overflow-auto custom-scrollbar bg-slate-100" style="height: calc(100vh - 360px); min-height: 400px;">`;
            html += `<div class="p-6 md:p-10 relative border-l-4 border-teal-300 ml-4 md:ml-8 space-y-8">`;
            
            sortedData.forEach(item => {
                const catInfo = categoryConfig[item.category];
                const isFuture = item.year > new Date().getFullYear();
                const isSpecial = item.isSpecial;
                
                const cardBgClass = isSpecial ? 'bg-slate-800' : getCardBgClass(item.subCategory);
                const textColorClass = isSpecial ? 'text-white' : catInfo.color;
                const descColorClass = isSpecial ? 'text-slate-300' : 'text-slate-700';
                const borderColorClass = isSpecial ? 'border-slate-800' : catInfo.border;
                const badgeBgClass = isSpecial ? 'bg-slate-700 text-slate-100' : `bg-white/70 ${catInfo.color}`;
                const yearColorClass = isFuture ? 'text-teal-600' : (isSpecial ? 'text-slate-800' : 'text-slate-800');

                html += `
                  <div class="relative pl-6 md:pl-10 group">
                    <div class="absolute -left-2.5 mt-1.5 w-4 h-4 rounded-full border-4 border-white shadow-sm bg-slate-400 group-hover:scale-125 transition-transform"></div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xl font-bold ${yearColorClass}">
                          ${item.year}年 ${isFuture ? '<span class="text-xs bg-teal-100 text-teal-800 px-2 py-0.5 rounded-full ml-2">予定</span>' : ''}
                        </span>
                    </div>
                    <div class="rounded-xl p-5 transition-all hover:shadow-lg border-l-8 ${borderColorClass} ${isFuture ? 'border-dashed' : ''} ${cardBgClass} shadow-md">
                      <div class="flex items-center gap-2 mb-2">
                        <span class="flex items-center gap-1 text-xs px-2 py-1 rounded-md font-bold ${badgeBgClass}">
                          <i data-lucide="${catInfo.icon}" class="w-4 h-4"></i>${catInfo.label}
                        </span>
                      </div>
                      <h3 class="font-bold mb-2 ${textColorClass}" style="font-size: ${18 * scale}px; line-height: 1.4;">${item.title}</h3>
                      <p class="${descColorClass}" style="font-size: ${14 * scale}px; line-height: 1.6;">${item.description}</p>
                    </div>
                  </div>
                `;
            });
            html += `</div></div>`;
            return html;
        }

        function renderMap() {
            if (!fMapYears || fMapYears.length === 0) {
                return `<div class="p-10 text-center text-slate-500 font-bold">表示するデータがありません</div>`;
            }

            const scale = currentScale / 100;
            const baseColW = isCompactWidth ? 65 : 130;
            const COL_W = baseColW * scale; 
            
            const layoutData = getLayoutData(COL_W);
            const theoryLayout = getTheoryLayout(COL_W);
            
            // ★ 各レーンの実際の高さを表示状態に応じて決定
            const leadersH = laneVisibility.leaders ? 80 * scale : 40;
            const theoryH = laneVisibility.theory ? theoryLayout.height : 40;
            const trendH = laneVisibility.trend ? (fTrendData.length * 45 * scale + 25 * scale) : 40;

            let html = `<div class="w-full overflow-auto custom-scrollbar flex bg-slate-100" style="height: calc(100vh - 360px); min-height: 400px;">`;

            // ================= 【左側固定ヘッダー】 =================
            html += `<div class="sticky left-0 z-[45] bg-white border-r-2 border-slate-300 shadow-[4px_0_10px_rgba(0,0,0,0.05)] flex flex-col w-[120px] flex-shrink-0 print-hide">`;
            
            // 年号部分
            html += `<div class="h-[100px] min-h-[100px] flex-shrink-0 sticky top-0 z-[70] border-b-2 border-teal-600 bg-white w-full"></div>`;
            
            // 指導者ヘッダー
            html += `<div onclick="toggleLane('leaders')" class="flex flex-col items-center justify-center p-2 border-b-2 border-slate-300 bg-slate-100/50 box-border flex-shrink-0 cursor-pointer hover:bg-slate-200/50 transition-colors relative" style="height: ${leadersH}px; min-height: ${leadersH}px; max-height: ${leadersH}px; overflow: hidden;">
                        <i data-lucide="${laneVisibility.leaders ? 'minus-square' : 'plus-square'}" class="absolute top-1.5 right-1.5 w-3.5 h-3.5 text-slate-400"></i>
                        <span class="text-[11px] font-bold text-slate-700 text-center leading-tight mt-1">【指導者】${laneVisibility.leaders ? '<br>大統領／総理' : ''}</span>
                     </div>`;

            // 主要理論ヘッダー
            html += `<div onclick="toggleLane('theory')" class="flex flex-col items-center justify-center p-2 border-b-2 border-slate-300 bg-orange-50/50 box-border flex-shrink-0 cursor-pointer hover:bg-orange-100/50 transition-colors relative" style="height: ${theoryH}px; min-height: ${theoryH}px; max-height: ${theoryH}px; overflow: hidden;">
                        <i data-lucide="${laneVisibility.theory ? 'minus-square' : 'plus-square'}" class="absolute top-1.5 right-1.5 w-3.5 h-3.5 text-orange-400"></i>
                        <span class="text-[11px] font-bold text-orange-700 text-center leading-tight mt-1">【主要理論】${laneVisibility.theory ? '<br>発表年' : ''}</span>
                     </div>`;

            // 重要指標ヘッダー
            html += `<div onclick="toggleLane('trend')" class="flex flex-col items-center justify-center p-2 border-b-2 border-slate-300 bg-slate-50/50 box-border flex-shrink-0 cursor-pointer hover:bg-slate-200/50 transition-colors relative" style="height: ${trendH}px; min-height: ${trendH}px; max-height: ${trendH}px; overflow: hidden;">
                        <i data-lucide="${laneVisibility.trend ? 'minus-square' : 'plus-square'}" class="absolute top-1.5 right-1.5 w-3.5 h-3.5 text-slate-400"></i>
                        <span class="text-[11px] font-bold text-slate-700 text-center leading-tight mt-1">【重要指標】${laneVisibility.trend ? '<br>の推移' : ''}</span>
                     </div>`;

            // カテゴリ（法律、社会情勢など）ヘッダー
            categoryKeys.forEach(catKey => {
                const catInfo = categoryConfig[catKey];
                const isVisible = laneVisibility[catKey];
                const catH = isVisible ? (layoutData[catKey] ? layoutData[catKey].height : 100) : 40;
                
                html += `
                  <div onclick="toggleLane('${catKey}')" class="flex flex-col items-center justify-center p-2 border-b border-slate-200 bg-white box-border flex-shrink-0 cursor-pointer hover:bg-slate-50 transition-colors relative" style="height: ${catH}px; min-height: ${catH}px; max-height: ${catH}px; overflow: hidden;">
                    <i data-lucide="${isVisible ? 'minus-square' : 'plus-square'}" class="absolute top-1.5 right-1.5 w-3.5 h-3.5 text-slate-300"></i>
                    ${isVisible ? `
                    <div class="p-2 rounded-full mb-1 bg-slate-100 ${catInfo.color}">
                      <i data-lucide="${catInfo.icon}" class="w-5 h-5"></i>
                    </div>
                    ` : ''}
                    <span class="${isVisible ? 'text-sm' : 'text-xs mt-1'} font-bold ${catInfo.color}">${catInfo.label}</span>
                  </div>
                `;
            });
            html += `</div>`;

            // ================= 【メインガントエリア】 =================
            html += `<div class="relative min-w-max pb-8" id="map-container">
                        <svg id="svg-connections" class="absolute inset-0 pointer-events-none z-0" style="width: 100%; height: 100%;">
                          <defs>
                            <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto" fill="rgba(20, 184, 166, 0.6)">
                              <polygon points="0 0, 6 3, 0 6" />
                            </marker>
                          </defs>
                        </svg>`;

            // 【年ヘッダー（経済指標）】
            html += `<div class="flex h-[100px] min-h-[100px] flex-shrink-0 sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b-2 border-teal-600">`;
            fMapYears.forEach(year => {
                const isFuture = year > new Date().getFullYear();
                const periodBgClass = getPeriodBgClass(year);
                const eco = getEconomicStr(year);

                html += `
                  <div class="relative flex flex-col items-center justify-end pb-2 border-l border-slate-300 ${periodBgClass} flex-shrink-0" style="width: ${COL_W}px">
                    <div class="absolute top-2 left-1/2 transform -translate-x-1/2 flex flex-col gap-1 w-[90%] items-center opacity-80 hover:opacity-100 transition-opacity">
                        <span class="text-[9px] text-red-600 font-bold bg-white/90 px-1 rounded shadow-sm border border-red-200 flex justify-between w-full max-w-[80px]" style="font-size: ${isCompactWidth ? 8 : 9}px;">
                            <span class="mr-1">日経</span><span>${eco.nikkei}</span>
                        </span>
                        <span class="text-[9px] text-emerald-700 font-bold bg-white/90 px-1 rounded shadow-sm border border-emerald-200 flex justify-between w-full max-w-[80px]" style="font-size: ${isCompactWidth ? 8 : 9}px;">
                            <span class="mr-1">ドル</span><span>${eco.usd}円</span>
                        </span>
                    </div>
                    <span class="text-xl font-bold ${isFuture ? 'text-teal-600' : 'text-slate-800'}">${year}</span>
                    ${isFuture ? '<span class="absolute bottom-8 left-1/2 transform -translate-x-1/2 text-[9px] bg-teal-100 text-teal-800 px-1.5 rounded-full">予定</span>' : ''}
                  </div>
                `;
            });
            html += `</div>`;

            // 【指導者レーン】
            html += `<div class="relative border-b-2 border-slate-300 box-border" style="height: ${leadersH}px; min-height: ${leadersH}px; max-height: ${leadersH}px; width: ${fMapYears.length * COL_W}px">`;
            fMapYears.forEach((year, i) => {
                const periodBgClass = getPeriodBgClass(year);
                html += `<div class="absolute top-0 bottom-0 border-l border-dashed border-slate-300 ${periodBgClass}" style="left: ${i * COL_W}px; width: ${COL_W}px;"></div>`;
            });

            if (laneVisibility.leaders) {
                const minYear = fMapYears[0];
                const maxYear = fMapYears[fMapYears.length - 1];
                const filteredUs = usPresidents.filter(p => p.end >= minYear && p.start <= maxYear);
                const filteredJp = jpPrimeMinisters.filter(p => p.end >= minYear && p.start <= maxYear);

                const renderLeader = (leader, yBase, index) => {
                    const startX = getXPos(leader.start, fMapYears, COL_W);
                    const endX = getXPos(leader.end, fMapYears, COL_W);
                    const w = endX - startX;
                    if (w <= 0) return '';
                    
                    const barBottom = (index % 2 === 0) ? 0 : (4 * scale);
                    const textBottom = (index % 2 === 0) ? (6 * scale) : (10 * scale);
                    
                    return `
                      <div class="absolute group" style="left: ${startX}px; width: ${w}px; top: ${yBase}px; height: ${36 * scale}px;">
                          <div class="absolute left-1/2 transform -translate-x-1/2 whitespace-nowrap cursor-default font-bold ${leader.color} z-10" style="bottom: ${textBottom}px; font-size: ${10 * scale}px;">
                              ${leader.shortName}
                          </div>
                          <div class="absolute left-0 w-full ${leader.bg} rounded-full opacity-80" style="bottom: ${barBottom}px; height: ${4 * scale}px;"></div>
                          <div class="absolute top-full left-1/2 -translate-x-1/2 mt-1 hidden group-hover:block z-50 bg-white border border-slate-300 rounded px-2 py-1 text-xs shadow-lg whitespace-nowrap font-bold text-slate-700">
                              ${leader.generation} ${leader.fullName || leader.shortName}<br/>(${Math.floor(leader.start)}年〜${Math.floor(leader.end)}年)
                          </div>
                      </div>
                    `;
                };

                filteredUs.forEach((leader, i) => html += renderLeader(leader, 2 * scale, i));
                filteredJp.forEach((leader, i) => html += renderLeader(leader, 42 * scale, i)); 
            }
            html += `</div>`;


            // 【理論発表レーン】
            html += `<div class="relative border-b-2 border-slate-300 box-border" style="height: ${theoryH}px; min-height: ${theoryH}px; max-height: ${theoryH}px; width: ${fMapYears.length * COL_W}px">`;
            fMapYears.forEach((year, i) => {
                const periodBgClass = getPeriodBgClass(year);
                html += `<div class="absolute top-0 bottom-0 border-l border-dashed border-slate-300 ${periodBgClass}" style="left: ${i * COL_W}px; width: ${COL_W}px;"></div>`;
            });

            if (laneVisibility.theory) {
                theoryLayout.items.forEach(theory => {
                    if (isExpandAll) {
                        html += `
                          <div class="absolute flex flex-col justify-start transition-all duration-300 rounded-md shadow-md border-l-[5px] border-orange-500 bg-white overflow-hidden box-border"
                               style="left: ${theory.left}px; top: ${theory.top}px; height: ${theory.height}px; width: ${theory.width}px; padding: ${8 * scale}px;">
                              <div class="flex items-center gap-1 mb-1">
                                <span class="font-bold text-orange-600 truncate" style="font-size: ${13 * scale}px;">${theory.name}</span>
                                <span class="text-slate-400 font-medium flex-shrink-0" style="font-size: ${10 * scale}px;">(${theory.year}年)</span>
                              </div>
                              <h4 class="font-bold text-slate-800 whitespace-normal mb-1" style="font-size: ${11 * scale}px; line-height: 1.3;">${theory.theory}</h4>
                              <p class="text-slate-600 whitespace-normal" style="font-size: ${10 * scale}px; line-height: 1.4;">${theory.description}</p>
                          </div>
                        `;
                    } else {
                        html += `
                          <div class="absolute flex items-center justify-center px-3 py-1 rounded-md bg-white border-l-[5px] border-orange-500 shadow-[0_2px_4px_rgba(0,0,0,0.15)] hover:shadow-xl hover:z-[60] z-20 transition-all cursor-default group w-max"
                               style="left: ${theory.left}px; top: ${theory.top}px; height: ${32 * scale}px;">
                              <span class="font-bold text-orange-600 whitespace-nowrap" style="font-size: ${12 * scale}px;">${theory.name}</span>
                              
                              <div class="absolute top-full left-0 bg-white rounded-lg shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 border-l-4 border-orange-500 z-[60] pointer-events-none"
                                   style="margin-top: ${4 * scale}px; width: ${280 * scale}px; padding: ${12 * scale}px;">
                                <div class="flex items-center gap-2" style="margin-bottom: ${4 * scale}px;">
                                  <span class="font-bold text-orange-600" style="font-size: ${14 * scale}px;">${theory.name}</span>
                                  <span class="text-slate-400 font-medium" style="font-size: ${11 * scale}px;">(${theory.year}年)</span>
                                </div>
                                <h4 class="font-bold text-slate-800 whitespace-normal" style="font-size: ${13 * scale}px; margin-bottom: ${6 * scale}px; line-height: 1.3;">${theory.theory}</h4>
                                <p class="text-slate-600 whitespace-normal" style="font-size: ${11 * scale}px; line-height: 1.5;">${theory.description}</p>
                              </div>
                          </div>
                        `;
                    }
                });
            }
            html += `</div>`;

            // 【トレンド推移レーン】
            html += `<div class="relative border-b-2 border-slate-300 box-border" style="height: ${trendH}px; min-height: ${trendH}px; max-height: ${trendH}px; width: ${fMapYears.length * COL_W}px">`;
            fMapYears.forEach((year, i) => {
                const periodBgClass = getPeriodBgClass(year);
                html += `<div class="absolute top-0 bottom-0 border-l border-dashed border-slate-300 ${periodBgClass}" style="left: ${i * COL_W}px; width: ${COL_W}px;"></div>`;
            });

            if (laneVisibility.trend) {
                html += `<div class="absolute inset-0 pt-3">`;
                fTrendData.forEach((trend, index) => {
                    const top = index * 45 * scale + 25 * scale;
                    const firstYearIdx = fMapYears.indexOf(trend.events[0].year);
                    const lastYearIdx = fMapYears.indexOf(trend.events[trend.events.length - 1].year);
                    const startX = firstYearIdx * COL_W + COL_W / 2;
                    const endX = lastYearIdx * COL_W + COL_W / 2;
                    
                    html += `<div class="absolute bg-slate-300 rounded-full z-10 shadow-inner" style="left: ${startX}px; width: ${endX - startX}px; top: ${top}px; height: ${4 * scale}px;"></div>`;
                    
                    trend.events.forEach(event => {
                        const yearIndex = fMapYears.indexOf(event.year);
                        const left = yearIndex * COL_W + COL_W / 2;
                        const bgColor = trend.color.split(' ')[0]; 
                        const textColor = trend.color.split(' ')[1]; 
                        const borderColor = trend.color.split(' ')[2]; 
                        
                        html += `
                          <div class="absolute flex flex-col items-center justify-center transform -translate-x-1/2 hover:z-[60] z-30 group" style="left: ${left}px; top: ${top - 16 * scale}px;">
                              <span class="font-bold mb-[2px] ${textColor} drop-shadow-sm whitespace-nowrap" style="font-size: ${9 * scale}px;">${trend.title}</span>
                              <div class="rounded-full ${bgColor} border-2 ${borderColor} shadow-md relative z-10" style="width: ${12 * scale}px; height: ${12 * scale}px;"></div>
                              <div class="absolute font-bold bg-white border ${borderColor} ${textColor} z-20 cursor-default rounded-full shadow-sm transition-transform group-hover:scale-110 flex items-center justify-center"
                                   style="top: ${22 * scale}px; font-size: ${10 * scale}px; padding: ${1 * scale}px ${6 * scale}px; min-width: ${30 * scale}px;">
                                  ${event.value}
                              </div>
                          </div>
                        `;
                    });
                });
                html += `</div>`;
            }
            html += `</div>`;

            // 【アイテム配置エリア】
            categoryKeys.forEach(catKey => {
                const catInfo = categoryConfig[catKey];
                const isVisible = laneVisibility[catKey];
                const catH = isVisible ? (layoutData[catKey] ? layoutData[catKey].height : 100) : 40;
                
                html += `<div class="relative border-b border-slate-200 box-border" style="height: ${catH}px; min-height: ${catH}px; max-height: ${catH}px; width: ${fMapYears.length * COL_W}px">`;
                
                fMapYears.forEach((year, i) => {
                    const periodBgClass = getPeriodBgClass(year);
                    html += `<div class="absolute top-0 bottom-0 border-l border-dashed border-slate-300 ${periodBgClass}" style="left: ${i * COL_W}px; width: ${COL_W}px;"></div>`;
                });

                if(isVisible && layoutData[catKey]) {
                    layoutData[catKey].items.forEach(item => {
                        const isSpecial = item.isSpecial;
                        
                        const borderColorClass = isSpecial ? 'border-slate-800' : catInfo.border;
                        const textColorClass = isSpecial ? 'text-white' : catInfo.color;
                        const descColorClass = isSpecial ? 'text-slate-300' : 'text-slate-700';
                        const cardBgClass = isSpecial ? 'bg-slate-800' : getCardBgClass(item.subCategory);
                        const tipBgClass = isSpecial ? 'bg-slate-800' : 'bg-white';
                        
                        if (isExpandAll) {
                            html += `
                              <div id="card-${item.id}" class="absolute flex flex-col justify-start transition-all duration-300 rounded-md shadow-md border-l-[5px] ${borderColorClass} ${cardBgClass} overflow-hidden box-border" 
                                   style="left: ${item.left + 8 * scale}px; top: ${item.top}px; width: ${item.width}px; height: ${item.height}px; padding: ${8 * scale}px;">
                                  <h3 class="font-bold whitespace-normal ${textColorClass}" style="font-size: ${(item.isS ? 14 : 13) * scale}px; margin-bottom: ${4 * scale}px; line-height: 1.3;">${item.title}</h3>
                                  <p class="${descColorClass} whitespace-normal" style="font-size: ${11 * scale}px; line-height: 1.4;">${item.description}</p>
                              </div>
                            `;
                        } else {
                            html += `
                              <div id="card-${item.id}" class="absolute group hover:z-[60] z-10 transition-all duration-300 rounded-md shadow-[0_2px_5px_rgba(0,0,0,0.15)] hover:shadow-xl border-l-[5px] ${borderColorClass} ${cardBgClass}" 
                                   style="left: ${item.left + 8 * scale}px; top: ${item.top}px; width: ${item.width}px; height: ${item.height}px;">
                                   
                                  <div class="w-full h-full flex items-center" style="padding: 0 ${8 * scale}px;">
                                    <h3 class="font-bold truncate ${textColorClass}" style="font-size: ${12 * scale}px;">${item.title}</h3>
                                    
                                    <div class="absolute top-full left-0 ${tipBgClass} rounded-lg shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 border-l-[5px] ${borderColorClass} z-[60] pointer-events-none"
                                         style="margin-top: ${4 * scale}px; width: ${260 * scale}px; padding: ${12 * scale}px;">
                                      <h4 class="font-bold whitespace-normal ${textColorClass}" style="font-size: ${13 * scale}px; margin-bottom: ${4 * scale}px; line-height: 1.3;">${item.title}</h4>
                                      <p class="${descColorClass} whitespace-normal" style="font-size: ${11 * scale}px; line-height: 1.5;">${item.description}</p>
                                    </div>
                                  </div>
                              </div>
                            `;
                        }
                    });
                }
                html += `</div>`;
            });

            html += `</div></div>`;
            return html;
        }

        function renderApp() {
            try {
                const appDiv = document.getElementById('app');
                const listBtnClass = viewMode === 'list' ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white';
                const mapBtnClass = viewMode === 'map' ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white';
                
                const expandDisabledAttr = viewMode === 'list' ? 'disabled' : '';

                appDiv.innerHTML = `
                  <div class="w-full">
                    
                    <div class="bg-teal-800 text-white rounded-xl p-6 shadow-lg mb-6 flex flex-col md:flex-row justify-between md:items-end gap-4">
                      <div>
                        <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-3">
                          <i data-lucide="calendar" class="w-8 h-8"></i>
                          キャリコン・法制度クロニクル
                        </h1>
                        <p class="mt-2 text-teal-100 text-sm md:text-base">
                          社会情勢の変遷と、それに伴い整備された法律・教育・ガイドラインの関連性を俯瞰する年表
                        </p>
                        <div class="mt-3 inline-flex items-center gap-2 bg-teal-900/60 text-teal-50 px-3 py-1.5 rounded-md text-xs md:text-sm border border-teal-700 print-hide">
                          <i data-lucide="monitor" class="w-4 h-4"></i>
                          <span>PCの大画面での閲覧、またはPDF出力・印刷でのご利用を推奨します</span>
                        </div>
                      </div>
                      
                      <div class="flex flex-col gap-3 items-end print-hide">
                        <div class="flex bg-teal-900/50 rounded-lg p-1 border border-teal-700 w-max">
                          <button onclick="setPeriod('all')" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${currentPeriod === 'all' ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white'}">
                            全期間
                          </button>
                          <button onclick="setPeriod('p1')" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${currentPeriod === 'p1' ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white'}">
                            1945〜1985
                          </button>
                          <button onclick="setPeriod('p2')" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${currentPeriod === 'p2' ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white'}">
                            1985〜2011
                          </button>
                          <button onclick="setPeriod('p3')" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium rounded-md transition-colors ${currentPeriod === 'p3' ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white'}">
                            2011〜2028
                          </button>
                        </div>

                        <div class="flex items-center gap-3">
                            <div class="flex items-center bg-teal-900/50 rounded-lg p-1 border border-teal-700 w-max">
                              <button onclick="toggleCompactWidth()" class="flex items-center gap-1 px-3 py-2 text-sm font-medium rounded-md transition-colors ${isCompactWidth ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white hover:bg-teal-800/50'}">
                                <i data-lucide="${isCompactWidth ? 'expand' : 'shrink'}" class="w-4 h-4"></i>
                                ${isCompactWidth ? '通常幅' : '横幅圧縮'}
                              </button>
                            </div>

                            <div class="flex items-center bg-teal-900/50 rounded-lg p-1 border border-teal-700 w-max">
                              <button onclick="changeFontSize(-1)" class="flex items-center justify-center p-2 rounded-md transition-colors text-teal-100 hover:text-white hover:bg-teal-800/50" title="縮小">
                                <i data-lucide="zoom-out" class="w-4 h-4"></i>
                              </button>
                              <div class="w-[40px] text-center text-teal-50 font-bold text-sm select-none">
                                ${currentScale}%
                              </div>
                              <button onclick="changeFontSize(1)" class="flex items-center justify-center p-2 rounded-md transition-colors text-teal-100 hover:text-white hover:bg-teal-800/50" title="拡大">
                                <i data-lucide="zoom-in" class="w-4 h-4"></i>
                              </button>
                            </div>

                            <div class="flex bg-teal-900/50 rounded-lg p-1 border border-teal-700 w-max">
                              <button onclick="setViewMode('list')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-md transition-colors ${listBtnClass}">
                                <i data-lucide="list" class="w-4 h-4"></i> リスト
                              </button>
                              <button onclick="setViewMode('map')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-md transition-colors ${mapBtnClass}">
                                <i data-lucide="network" class="w-4 h-4"></i> 関連マップ
                              </button>
                              
                              <div class="w-px bg-teal-700 my-1 mx-1"></div>
                              <button onclick="toggleExpandAll()" ${expandDisabledAttr} class="flex items-center gap-1 px-3 py-2 text-sm font-medium rounded-md transition-colors ${viewMode === 'list' ? 'opacity-50 cursor-not-allowed text-teal-300' : (isExpandAll ? 'bg-white text-teal-800 shadow-sm' : 'text-teal-100 hover:text-white')}">
                                <i data-lucide="${isExpandAll ? 'minimize-2' : 'maximize-2'}" class="w-4 h-4"></i>
                                ${isExpandAll ? '折りたたむ' : 'すべて展開'}
                              </button>
                            </div>
                        </div>
                      </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
                      ${viewMode === 'list' ? renderList() : renderMap()}
                    </div>

                    <div class="mt-6 bg-white rounded-xl p-5 border border-slate-200 shadow-sm text-sm text-slate-600 flex gap-4 items-start">
                      <i data-lucide="alert-circle" class="w-5 h-5 text-teal-600 flex-shrink-0 mt-0.5"></i>
                      <div>
                        <p class="font-bold text-slate-800 mb-1">【関連マップの読み方と色分け】</p>
                        <p class="mb-2">
                          付箋やカードの色は、【分野】（社会情勢、法律、教育、制度・施策、指針）を表しています。背景のグレーの濃淡は「5年ごとの区切り（2021〜2025年など）」を表します。
                        </p>
                        <p class="mb-1">
                          ・タイトルの頭にある【S】【A】【B】は、試験における重要度（頻出度）を表しています。<br/>
                          ・付箋の背景が<span class="font-bold text-emerald-700 bg-emerald-50 px-1 rounded">薄い緑色</span>のものは「メンタルヘルス関係」、<span class="font-bold text-orange-700 bg-orange-50 px-1 rounded">薄いオレンジ色</span>のものは「雇用・職能向上関係」です。<br/>
                          ・背景が<span class="font-bold text-white bg-slate-800 px-1 rounded">ネイビー色</span>のカードは、法制度に甚大な影響を与えた「歴史的な特異点（パラダイムシフト）」を表します。<br/>
                          ・「すべて展開」をオンにすると、ホバーなしで全テキストが表示されます。オフの場合はコンパクトに表示され、ホバーで詳細が確認できます。<br/>
                          ・左側の【分野名】をクリックすると、その項目の表示／非表示を切り替えることができます。
                        </p>
                        <p>点線（矢印）は、過去の出来事から現在の制度へ至る文脈や関連性を示しています。</p>
                      </div>
                    </div>
                  </div>
                `;

                lucide.createIcons();

                if (viewMode === 'map') {
                    setTimeout(drawConnections, 100);
                }
            } catch (error) {
                console.error("Render Error:", error);
                document.getElementById('app').innerHTML = `<div class="p-8 text-red-600 bg-red-50 font-bold rounded-lg border border-red-200">描画中にエラーが発生しました。設定を初期化してページをリロードしてください。</div>`;
            }
        }

        window.addEventListener('resize', () => {
            if (viewMode === 'map') {
                drawConnections();
            }
        });

        updateFilteredData(); 
        renderApp();
    </script>
</body>
</html>
