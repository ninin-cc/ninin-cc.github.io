<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIESM light 診断</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <div id="app"></div>

  <script>
    // --- データを直接JSとして定義（翻訳不要な形） ---
    const QUESTIONS = [
      { id: 1, typeA: 'W', typeB: 'K', text: '新しいアイデアを思いついたとき', optA: 'まず試したくなる', optB: '実現性やリスクを考える' },
      { id: 4, typeA: 'A', typeB: 'N', text: '初対面の人との会話', optA: '様子を見ながら慎重に入る', optB: '自然に話しかけられる' },
      { id: 14, typeA: 'realistic', typeB: 'social', text: 'チームで任されたい役割は', optA: 'データや実務', optB: 'サポートや対話' },
      { id: 5, typeA: 'A', typeB: 'W', text: '知らないことに出会ったとき', optA: '少し警戒する', optB: 'ワクワクする' },
      { id: 9, typeA: 'K', typeB: 'N', text: '誰かがミスしたとき', optA: '正すことが大事', optB: '気持ちを守るのが大事' },
      { id: 16, typeA: 'enterprising', typeB: 'investigative', text: '困難な課題に直面したとき', optA: 'どう突破するか（結果）', optB: 'なぜそうなるか（原因）' },
      { id: 19, isSelect: true, text: 'あなたが一番「やりがいを感じる」役割は？', 
        options: [
          { type: 'social', text: '雰囲気を良くするサポート役' },
          { type: 'conventional', text: 'ルールを整える管理役' },
          { type: 'realistic', text: '現場で形にする実務担当' },
          { type: 'investigative', text: '仕組みを分析する役割' },
          { type: 'enterprising', text: '巻き込んで引っ張るリーダー' },
          { type: 'artistic', text: '新しいアイデアを考える役割' }
        ]
      },
      { id: 20, isSelect: true, text: '言われて「一番嬉しい」言葉は？', 
        options: [
          { type: 'W', text: '「面白くてワクワクする！」' },
          { type: 'K', text: '「冷静で頼りになる！」' },
          { type: 'N', text: '「気遣いが安心する！」' },
          { type: 'A', text: '「細やかな配慮が助かる！」' }
        ]
      }
    ];

    const RESULTS = {
      W: { name: 'ワンダー', color: 'bg-orange-500', desc: '好奇心が原動力。新しい世界を切り開く冒険家。' },
      K: { name: 'キーパー', color: 'bg-blue-900', desc: '論理と規律。チームを安全に導く守護者。' },
      N: { name: 'ナーチャー', color: 'bg-pink-500', desc: '共感と調和。安心感をもたらす癒やしの泉。' },
      A: { name: 'アダプター', color: 'bg-sky-600', desc: '適応と配慮。環境をスキャンし調整するレーダー。' }
    };

    let state = {
      step: 'start',
      currentIdx: 0,
      modeScores: { W: 0, K: 0, N: 0, A: 0 },
      interestScores: { social: 1, conventional: 1, realistic: 1, investigative: 1, enterprising: 1, artistic: 1 }
    };

    function render() {
      const root = document.getElementById('app');
      if (state.step === 'start') {
        root.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-4">
            <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center space-y-6 fade-in">
              <div class="text-5xl">🚀</div>
              <h1 class="text-3xl font-bold text-gray-900">RIESM light</h1>
              <p class="text-gray-600">あなたの「コックピット」を見つけましょう。</p>
              <button onclick="start()" class="w-full py-4 bg-gray-900 text-white rounded-xl font-bold hover:bg-gray-800 transition-all">診断スタート</button>
            </div>
          </div>`;
      } else if (state.step === 'question') {
        const q = QUESTIONS[state.currentIdx];
        let buttons = '';
        if (q.isSelect) {
          buttons = q.options.map(o => `<button onclick="answer(null, 0, '${o.type}')" class="w-full py-3 px-4 bg-white border border-gray-200 rounded-xl text-left hover:bg-gray-50 mb-2">${o.text}</button>`).join('');
        } else {
          buttons = `
            <button onclick="answer('A', 2)" class="w-full py-3 bg-gray-100 rounded-xl font-bold mb-2">「${q.optA}」に近い</button>
            <button onclick="answer('B', 2)" class="w-full py-3 bg-gray-100 rounded-xl font-bold mb-2">「${q.optB}」に近い</button>
            <button onclick="answer('none', 0)" class="w-full py-2 text-gray-400 text-sm">どちらでもない</button>`;
        }
        root.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-4">
            <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 fade-in">
              <div class="text-xs text-gray-400 mb-4">質問 ${state.currentIdx + 1} / ${QUESTIONS.length}</div>
              <h2 class="text-xl font-bold mb-8 text-center">${q.text}</h2>
              <div class="flex flex-col">${buttons}</div>
            </div>
          </div>`;
      } else if (state.step === 'result') {
        const max = Math.max(...Object.values(state.modeScores));
        const winners = Object.keys(state.modeScores).filter(k => state.modeScores[k] === max);
        const res = RESULTS[winners[0]];
        root.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-4">
            <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden fade-in text-center">
              <div class="${res.color} p-8 text-white">
                <div class="text-sm opacity-80 mb-2">フロントモード</div>
                <div class="text-4xl font-black">${winners.map(w => RESULTS[w].name).join(' & ')}</div>
              </div>
              <div class="p-8 space-y-6">
                <p class="text-gray-600 leading-relaxed">${res.desc}</p>
                <button onclick="location.reload()" class="w-full py-3 text-gray-400 text-sm border-t">もう一度診断する</button>
              </div>
            </div>
          </div>`;
      }
    }

    window.start = () => { state.step = 'question'; render(); };
    window.answer = (choice, val, directType) => {
      const q = QUESTIONS[state.currentIdx];
      if (directType) {
        if (state.currentIdx === 7) state.modeScores[directType] += 1;
        else state.interestScores[directType] += 3;
      } else {
        const target = (state.currentIdx < 2 || state.currentIdx === 3 || state.currentIdx === 4) ? 'modeScores' : 'interestScores';
        const type = (choice === 'A') ? q.typeA : q.typeB;
        if (choice !== 'none') state[target][type] += val;
      }
      if (state.currentIdx < QUESTIONS.length - 1) {
        state.currentIdx++;
      } else {
        state.step = 'result';
      }
      render();
    };

    render();
  </script>
</body>
</html>
