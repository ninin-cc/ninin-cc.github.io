    const generateQuizList = () => {
      const selected = [];
      ['R', 'I', 'A', 'S', 'E', 'C'].forEach(cat => {
        const qs = QUESTIONS.filter(q => q.type === 'riasec' && q.category === cat);
        qs.sort(() => 0.5 - Math.random());
        selected.push(...qs.slice(0, 2));
      });
      ['A', 'FC', 'CP', 'NP', 'AC'].forEach(cat => {
        const qs = QUESTIONS.filter(q => q.type === 'ego' && q.category === cat);
        qs.sort(() => 0.5 - Math.random());
        selected.push(...qs.slice(0, 2));
      });
      return selected.sort(() => 0.5 - Math.random());
    };

    const EGO_LABELS = [
      { id: 'FC', name: 'ワンダー', letter: 'W', color: 'text-orange-500', gradient: 'from-orange-400 to-orange-500' },
      { id: 'CP', name: 'キーパー', letter: 'K', color: 'text-blue-600', gradient: 'from-blue-500 to-blue-600' },
      { id: 'NP', name: 'ナーチャー', letter: 'N', color: 'text-pink-500', gradient: 'from-pink-400 to-pink-500' },
      { id: 'AC', name: 'アダプター', letter: 'A', color: 'text-cyan-500', gradient: 'from-cyan-400 to-cyan-500' }
    ];
    const RIASEC_LABELS = [
      { id: 'S', kanji1: '貢', kanji2: '献' },
      { id: 'C', kanji1: '整', kanji2: '合' },
      { id: 'R', kanji1: '体', kanji2: '感' },
      { id: 'I', kanji1: '探', kanji2: '究' },
      { id: 'E', kanji1: '達', kanji2: '成' },
      { id: 'A', kanji1: '創', kanji2: '造' }
    ];

    function App() {
      const [phase, setPhase] = useState('start'); 
      const [quizList, setQuizList] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState([]);

      const handleStart = () => {
        setQuizList(generateQuizList());
        setCurrentIndex(0);
        setAnswers([]);
        setPhase('quiz');
      };

      const handleAnswer = (val) => {
        const newAnswers = [...answers, val];
        setAnswers(newAnswers);
        if (currentIndex + 1 < quizList.length) {
          setCurrentIndex(currentIndex + 1);
        } else {
          setPhase('result');
        }
      };

      const handleBack = () => {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
          setAnswers(answers.slice(0, -1));
        }
      };

      const calculateScores = () => {
        const scores = {
          riasec: { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 },
          ego: { A: 0, FC: 0, CP: 0, NP: 0, AC: 0 }
        };
        answers.forEach((ans, idx) => {
          const q = quizList[idx];
          let val = ans;
          if (q.reverse) val = 6 - ans;
          scores[q.type][q.category] += val;
        });
        Object.keys(scores.riasec).forEach(key => {
          scores.riasec[key] = scores.riasec[key] * 1.1;
        });
        return scores;
      };

      const [isProcessing, setIsProcessing] = useState(false);

      // Web Share API を活用したシェア＆ダウンロード機能
      const handleCaptureAll = async () => {
        if (isProcessing) return;
        setIsProcessing(true);
        
        const cockpitElem = document.getElementById('capture-cockpit');
        const roleElem = document.getElementById('capture-role');
        if (!cockpitElem || !roleElem) {
          setIsProcessing(false);
          return;
        }

        const cloneOptions = (targetId) => ({
          scale: 2,
          backgroundColor: '#f8fafc',
          onclone: (clonedDoc) => {
            const credit = clonedDoc.getElementById(`${targetId}-credit`);
            if (credit) credit.classList.remove('hidden');
            const title = clonedDoc.getElementById(`${targetId}-title`);
            if (title) title.classList.remove('hidden');

            // 画像生成時のみ、巨大なバッジのサイズを通常サイズにリセットしてはみ出しを防止
            const badges = clonedDoc.querySelectorAll('.rank-badge-large');
            badges.forEach(badge => {
              badge.classList.remove('text-[24px]', 'sm:text-[32px]');
              badge.classList.add('text-sm', 'sm:text-lg');
            });
          }
        });

        try {
          // キャンバスを生成
          const canvas1 = await window.html2canvas(cockpitElem, cloneOptions('capture-cockpit'));
          const canvas2 = await window.html2canvas(roleElem, cloneOptions('capture-role'));
          
          // Blobに変換
          const getBlob = (canvas) => new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
          const blob1 = await getBlob(canvas1);
          const blob2 = await getBlob(canvas2);
          
          const file1 = new File([blob1], 'riesm_cockpit.png', { type: 'image/png' });
          const file2 = new File([blob2], 'riesm_role.png', { type: 'image/png' });

          // スマホなどのWeb Share API対応環境であればダイアログを開く
          if (navigator.canShare && navigator.canShare({ files: [file1, file2] })) {
            try {
              await navigator.share({
                files: [file1, file2],
                title: '🌈RIESM cockpit Lite 診断結果',
                text: '私のRIESM診断結果です！\nhttps://ninin-cc.github.io/riesm.html'
              });
            } catch (err) {
              // ユーザーがシェアをキャンセルした場合は何もしない、それ以外のエラーはダウンロードへ
              if (err.name !== 'AbortError') {
                 downloadFiles(canvas1, canvas2);
              }
            }
          } else {
             // 未対応環境（PC等）の場合は自動でダウンロードさせる
             downloadFiles(canvas1, canvas2);
          }
        } catch (error) {
          console.error('画像生成エラー:', error);
        } finally {
          setIsProcessing(false);
        }
      };

      const downloadFiles = async (canvas1, canvas2) => {
        const link = document.createElement('a');
        link.download = 'riesm_cockpit.png';
        link.href = canvas1.toDataURL('image/png');
        link.click();
        
        await new Promise(resolve => setTimeout(resolve, 500)); // 連続ダウンロードブロック対策
        
        link.download = 'riesm_role.png';
        link.href = canvas2.toDataURL('image/png');
        link.click();
      };

      if (phase === 'start') {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen px-2 sm:px-4 animate-fade-in py-10 w-full overflow-x-hidden">
            <div className="glass-panel p-5 sm:p-12 rounded-[32px] max-w-md w-full text-center relative overflow-hidden box-border">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 via-cyan-400 to-teal-400"></div>
              <div className="w-full flex justify-center mb-1">
                <h1 className="text-[28px] sm:text-[34px] font-black tracking-tight leading-tight text-slate-800 text-center">
                  🌈RIESM™
                  <span className="block text-xl sm:text-2xl text-slate-500 font-bold mt-1">cockpit Lite</span>
                </h1>
              </div>
              
              <div className="mt-8 mb-10 text-slate-600 text-[13px] sm:text-[14px] leading-relaxed font-medium flex flex-col items-center space-y-5 px-1 sm:px-2">
                <div className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-cyan-50 to-blue-50 text-cyan-600 px-5 py-2.5 rounded-full border border-cyan-100 shadow-sm">
                  <PlaneIcon className="w-5 h-5 text-cyan-500" />
                  <span className="font-bold text-sm">さぁあなただけのコックピットを見つけにいきましょう！</span>
                </div>

                <div className="text-center space-y-3 bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-100 w-full box-border">
                  <p>
                    <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="font-bold text-slate-700 underline hover:text-slate-900 transition-colors">101問の完全版RIESM™</a>に比べ、<br className="hidden sm:block"/>
                    全22問・約5分でサクッとご自身の傾向がわかる<span className="font-bold text-slate-700">簡易版（Lite）</span>です。
                  </p>
                  <p className="text-slate-500 text-[12px] sm:text-[13px]">
                    直感で答えられる設問が多いですが、中には回答に葛藤するものもあるかもしれません。<br/>
                    そんな時はゆっくりと悩みながら、<br className="sm:hidden"/>今の気持ちに一番近いところを選んでください。
                  </p>
                </div>
              </div>
              
              <button onClick={handleStart} className="w-full py-4 px-6 rounded-2xl bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white font-bold text-lg shadow-[0_4px_14px_0_rgba(6,182,212,0.39)] transition-all active:scale-[0.98] flex items-center justify-center gap-2 group box-border">
                テイクオフ<span className="group-hover:translate-x-1 transition-transform"><ChevronRight /></span>
              </button>

              <div className="mt-6 text-center">
                <a href="https://note.com/ninin2025/m/m46481d279232" target="_blank" rel="noopener noreferrer" className="text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors underline inline-flex items-center gap-1">
                  🌈RIESM™をもっと知りたい方へ <ExternalLink />
                </a>
              </div>
            </div>
            
            {/* 共通フッター（スタート画面用） */}
            <div className="mt-12 mb-8 text-center text-[13px] sm:text-sm text-slate-500 font-medium">
              <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="hover:text-slate-800 transition-colors underline">
                © 2026 ninin consulting＆counseling
              </a>
            </div>
          </div>
        );
      }

      if (phase === 'quiz') {
        const currentQ = quizList[currentIndex];
        const progress = ((currentIndex) / quizList.length) * 100;
        return (
          <div className="flex flex-col min-h-screen px-3 sm:px-4 pt-8 pb-12 max-w-lg mx-auto animate-fade-in w-full overflow-x-hidden">
            <div className="w-full bg-slate-200 rounded-full h-2 mb-6 overflow-hidden shadow-inner mt-4 box-border">
              <div className="bg-gradient-to-r from-cyan-400 to-blue-500 h-2 rounded-full transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
            </div>
            
            {/* === 設問エリア（上部に配置） === */}
            <div className="w-full mb-6 bg-white p-6 sm:p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center min-h-[160px] sm:min-h-[200px] box-border relative">
              <div className="absolute top-4 right-4 sm:top-5 sm:right-5 text-[11px] sm:text-sm font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100 shadow-sm">
                Q.{currentIndex + 1} / {quizList.length}
              </div>
              <h3 className="text-xl sm:text-2xl md:text-3xl font-extrabold leading-relaxed text-center break-auto text-slate-800 mt-6 sm:mt-8">
                {currentQ.text}
              </h3>
            </div>

            {/* === 選択肢エリア（設問のすぐ下に配置） === */}
            <div className="w-full mb-6 bg-white p-4 sm:p-6 rounded-3xl shadow-sm border border-slate-200 box-border">
              <div className="flex justify-between items-end h-24 sm:h-32 px-1 sm:px-4 mb-4">
                {[1, 2, 3, 4, 5].map((val) => {
                  const sizeClasses = { 1: 'w-7 h-7 sm:w-10 sm:h-10', 2: 'w-9 h-9 sm:w-12 sm:h-12', 3: 'w-11 h-11 sm:w-14 sm:h-14', 4: 'w-14 h-14 sm:w-16 sm:h-16', 5: 'w-16 h-16 sm:w-20 sm:h-20' };
                  return (
                    <div key={val} onClick={() => handleAnswer(val)} className="flex flex-col justify-end items-center h-full w-[18%] cursor-pointer group relative">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={`${sizeClasses[val]} text-slate-300 group-hover:text-cyan-400 group-active:text-cyan-500 transition-all duration-200 drop-shadow-sm group-hover:scale-110 group-active:scale-95`}><path d="M6.002 3.195C6.002 2.133 7.158 1.47 8.077 2.01L20.81 9.815C21.706 10.364 21.706 11.636 20.81 12.185L8.077 19.99C7.158 20.53 6.002 19.867 6.002 18.805V3.195Z" /></svg>
                      <div className="absolute bottom-0 w-12 h-16 sm:w-16 sm:h-20"></div>
                    </div>
                  );
                })}
              </div>
              <div className="flex justify-between w-full px-1 sm:px-2 text-[11px] sm:text-sm font-bold text-slate-500">
                <span className="w-1/3 text-left">当てはまらない</span>
                <span className="w-1/3 text-center">どちらでも<br/>ない</span>
                <span className="w-1/3 text-right">おおいに<br/>当てはまる</span>
              </div>
            </div>
            
            {/* === ナビゲーション（選択肢のすぐ下に配置） === */}
            <div className="flex items-center justify-center pt-2 pb-4">
              <button onClick={handleBack} disabled={currentIndex === 0} className={`flex items-center gap-1 text-[13px] sm:text-base font-extrabold text-slate-400 transition-opacity ${currentIndex === 0 ? 'opacity-30 cursor-not-allowed' : 'hover:opacity-70 hover:text-blue-600'}`}>
                <ArrowLeftIcon /> 前の質問へ戻る
              </button>
            </div>
            
            {/* 共通フッター（一番下に配置） */}
            <div className="mt-auto text-center text-[13px] sm:text-sm text-slate-400 font-medium pt-8">
              <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="hover:text-slate-800 transition-colors underline">
                © 2026 ninin consulting＆counseling
              </a>
            </div>
          </div>
        );
      }

      if (phase === 'result') {
        const scores = calculateScores();
        const allCells = [];
        EGO_LABELS.forEach(mode => { RIASEC_LABELS.forEach(typeObj => { allCells.push({ modeId: mode.id, typeId: typeObj.id, heat: scores.ego[mode.id] * scores.riasec[typeObj.id] }); }); });
        allCells.sort((a, b) => b.heat - a.heat);
        
        const top3 = allCells.slice(0, 3);
        const bottom3 = allCells.slice(-3).reverse();
        const top1Role = ROLE_DEFINITIONS[top3[0].typeId][top3[0].modeId];
        const top2Role = ROLE_DEFINITIONS[top3[1].typeId][top3[1].modeId];
        const bottom1Role = ROLE_DEFINITIONS[bottom3[0].typeId][bottom3[0].modeId];
        
        const getRankBadge = (modeId, typeId) => {
          const topIndex = top3.findIndex(c => c.modeId === modeId && c.typeId === typeId);
          if (topIndex === 0) return '①';
          if (topIndex === 1) return '②';
          if (topIndex === 2) return '③';
          const bottomIndex = bottom3.findIndex(c => c.modeId === modeId && c.typeId === typeId);
          if (bottomIndex === 0) return '❶';
          if (bottomIndex === 1) return '❷';
          if (bottomIndex === 2) return '❸';
          return null;
        };

        const getHeatColorRanked = (heat) => {
          if (heat >= allCells[3].heat) return 'bg-[#f05a28] text-white'; 
          if (heat >= allCells[11].heat) return 'bg-[#f68b61] text-white'; 
          if (heat >= allCells[19].heat) return 'bg-[#fbcebc] text-slate-700'; 
          return 'bg-[#d6d2c4] text-slate-800'; 
        };

        // 診断結果(1位)と当日の日付から招待コードを自動生成
        const getInviteCode = () => {
          const d = new Date();
          const mm = String(d.getMonth() + 1).padStart(2, '0');
          const dd = String(d.getDate()).padStart(2, '0');
          const topType = top3[0].typeId;
          const topModeInfo = EGO_LABELS.find(m => m.id === top3[0].modeId);
          const topModeLetter = topModeInfo ? topModeInfo.letter : '';
          return `rl-${topType}${topModeLetter}-${mm}${dd}`;
        };

        return (
          <div className="flex flex-col min-h-screen px-2 sm:px-4 py-8 sm:py-12 items-center animate-fade-in w-full max-w-2xl mx-auto overflow-x-hidden">
            
            <div className="w-full flex flex-col gap-6 mb-8 box-border">
              
              {/* === キャプチャ対象 1: コックピット === */}
              <div id="capture-cockpit" className="bg-[#f8fafc] p-2 sm:p-4 rounded-[40px] w-full box-border">
                <div className="glass-panel p-4 sm:p-10 rounded-[32px] w-full flex flex-col items-center box-border">
                  
                  <h2 className="text-[24px] sm:text-[32px] font-black tracking-tight leading-tight text-slate-800 text-center mb-8 sm:mb-10">
                    🌈RIESM™<br/>
                    <span className="block text-xl sm:text-2xl text-slate-500 font-bold mt-1">cockpit Lite</span>
                  </h2>

                  <div className="w-full max-w-[480px] flex flex-col gap-y-6 sm:gap-y-8 box-border">
                    
                    {/* 1. マトリックス本体 */}
                    <div className="cockpit-grid gap-1.5 sm:gap-2 w-full">
                      <div className="invisible">Label</div>
                      {EGO_LABELS.map(mode => (
                        <div key={mode.id} className="flex flex-col justify-center items-center pb-2">
                          <div className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-white font-black bg-gradient-to-br ${mode.gradient} shadow-sm text-sm sm:text-base`}>{mode.letter}</div>
                          <span className={`text-[10px] sm:text-xs font-bold mt-1.5 ${mode.color}`}>{mode.name}</span>
                        </div>
                      ))}
                      {RIASEC_LABELS.map(typeObj => (
                        <React.Fragment key={typeObj.id}>
                          <div className="flex justify-end items-center pr-1.5 sm:pr-2">
                            <div className="flex items-end -space-x-1 sm:-space-x-2">
                              <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-white font-black bg-gradient-to-br from-orange-400 to-orange-500 shadow-md text-sm sm:text-base relative z-10">{typeObj.kanji1}</div>
                              <div className="w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center text-white font-bold bg-gradient-to-br from-orange-300 to-orange-400 shadow-sm text-[9px] sm:text-[10px] relative z-0 mb-0.5">{typeObj.kanji2}</div>
                            </div>
                          </div>
                          {EGO_LABELS.map(mode => {
                            const heat = scores.ego[mode.id] * scores.riasec[typeObj.id];
                            const badge = getRankBadge(mode.id, typeObj.id);
                            let badgeClass = "text-sm sm:text-lg";
                            // rank-badge-largeクラスを追加してキャプチャ時にサイズダウンできるようにする
                            if (badge === '①' || badge === '②' || badge === '❶') badgeClass = "text-[24px] sm:text-[32px] font-black rank-badge-large";
                            return (
                              <div key={`${typeObj.id}-${mode.id}`} className="aspect-[5/2]">
                                <div className={`w-full h-full rounded-md flex items-center justify-center font-bold ${badgeClass} ${getHeatColorRanked(heat)} transition-all duration-300 shadow-sm`}>{badge}</div>
                              </div>
                            );
                          })}
                        </React.Fragment>
                      ))}
                    </div>

                    {/* 2. 凡例 */}
                    <div className="w-full border-t border-slate-100 pt-4">
                      <div className="flex flex-row justify-center gap-6 sm:gap-12 text-[10px] sm:text-xs font-bold text-slate-500 px-1">
                        <div className="flex items-center gap-1.5 sm:gap-2"><div className="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded bg-[#f05a28] shadow-sm"></div><span>自然にできる役割</span></div>
                        <div className="flex items-center gap-1.5 sm:gap-2"><div className="w-3 sm:w-3.5 h-3 sm:h-3.5 rounded bg-[#d6d2c4] shadow-sm"></div><span>できるけど疲れる役割</span></div>
                      </div>
                    </div>

                  </div>

                  {/* クレジット (キャプチャ時のみ表示) */}
                  <div id="capture-cockpit-credit" className="hidden mt-10 text-center text-[11px] sm:text-xs font-bold text-slate-400">
                    🌈RIESM™ cockpit Lite © 2026 ninin consulting＆counseling
                  </div>
                </div>
              </div>

              {/* === 画像シェアボタン === */}
              <div className="w-full my-4 px-2 sm:px-0 box-border">
                <button 
                  onClick={handleCaptureAll} 
                  disabled={isProcessing}
                  className={`w-full py-4 px-4 bg-slate-800 text-white rounded-2xl font-black shadow-md flex items-center justify-center gap-2 text-base sm:text-lg transition-all ${isProcessing ? 'opacity-70 cursor-wait' : 'hover:bg-slate-900 active:scale-[0.98]'}`}
                >
                  <ShareIcon /> {isProcessing ? 'シェアの準備中...' : '画像をSNSにシェアする'}
                </button>
              </div>

              {/* === キャプチャ対象 2: 役割解説 === */}
              <div id="capture-role" className="bg-[#f8fafc] p-2 sm:p-4 rounded-[40px] w-full box-border">
                <div className="glass-panel p-5 sm:p-10 rounded-[32px] w-full flex flex-col items-center box-border">
                  
                  {/* タイトル (キャプチャ時のみ表示) */}
                  <div id="capture-role-title" className="hidden w-full flex justify-center mb-10">
                    <h2 className="text-[22px] sm:text-[26px] font-black tracking-tight leading-tight text-slate-800 text-center">
                      🌈RIESM™ cockpit Lite<br/>
                      <span className="block text-base sm:text-lg text-slate-500 font-bold mt-1">あなたの役割解説</span>
                    </h2>
                  </div>

                  <div className="w-full max-w-[480px] flex flex-col gap-y-6 sm:gap-y-8 box-border">
                    
                    {/* 3. 自然にできる役割 TOP2 解説 */}
                    <div className="w-full bg-orange-50/70 p-5 sm:p-8 rounded-[24px] sm:rounded-[32px] border border-orange-200 shadow-sm relative box-border">
                      <div className="absolute -top-3.5 left-4 bg-[#f05a28] text-white text-[10px] sm:text-xs font-bold px-3 sm:px-4 py-1.5 rounded-full shadow-sm">自然にできる役割（強み）</div>
                      <div className="space-y-6 pt-2">
                        <div className="min-w-0">
                          <div className="flex items-center font-black text-base sm:text-xl text-[#f05a28] mb-2 sm:mb-3 leading-none">
                            <span className="mr-1.5 sm:mr-2 text-xl sm:text-2xl">①</span>
                            <span className="break-words text-[15px] sm:text-xl">{top1Role.name}</span>
                          </div>
                          <p className="text-[12px] sm:text-[14px] text-slate-700 leading-[1.8] font-medium text-justify">{top1Role.desc_natural}</p>
                        </div>
                        <div className="h-px w-full bg-orange-200/60"></div>
                        <div className="min-w-0">
                          <div className="flex items-center font-black text-base sm:text-xl text-[#f05a28] mb-2 sm:mb-3 leading-none">
                            <span className="mr-1.5 sm:mr-2 text-xl sm:text-2xl">②</span>
                            <span className="break-words text-[15px] sm:text-xl">{top2Role.name}</span>
                          </div>
                          <p className="text-[12px] sm:text-[14px] text-slate-700 leading-[1.8] font-medium text-justify">{top2Role.desc_natural}</p>
                        </div>
                      </div>
                    </div>

                    {/* 4. できるけど疲れる役割 TOP1 解説 */}
                    <div className="w-full bg-slate-100/70 p-5 sm:p-8 rounded-[24px] sm:rounded-[32px] border border-slate-200 shadow-sm relative box-border">
                      <div className="absolute -top-3.5 left-4 bg-slate-600 text-white text-[10px] sm:text-xs font-bold px-3 sm:px-4 py-1.5 rounded-full shadow-sm">できるけど疲れる役割（消耗）</div>
                      <div className="pt-2 min-w-0">
                        <div className="flex items-center font-black text-base sm:text-xl text-slate-800 mb-2 sm:mb-3 leading-none">
                          <span className="mr-1.5 sm:mr-2 text-xl sm:text-2xl">❶</span>
                          <span className="break-words text-[15px] sm:text-xl">{bottom1Role.name}</span>
                        </div>
                        <p className="text-[12px] sm:text-[14px] text-slate-600 leading-[1.8] font-medium text-justify">{bottom1Role.desc_tiring}</p>
                      </div>
                    </div>

                  </div>

                  {/* クレジット (キャプチャ時のみ表示) */}
                  <div id="capture-role-credit" className="hidden mt-10 text-center text-[11px] sm:text-xs font-bold text-slate-400">
                    🌈RIESM™ cockpit Lite © 2026 ninin consulting＆counseling
                  </div>
                </div>
              </div>

            </div>

            <div className="w-full space-y-4 box-border px-1 sm:px-0">
              
              {/* 完全版案内パネル */}
              <div className="bg-white p-5 sm:p-8 rounded-[24px] sm:rounded-[32px] border border-slate-200 text-center space-y-5 shadow-sm box-border">
                <h3 className="font-black text-lg md:text-xl text-slate-800">🌈 より深く自分を知るために</h3>
                <div className="text-[13px] md:text-sm text-slate-600 leading-relaxed text-left space-y-4 font-medium">
                  <p>
                    今回の診断は全22問の「簡易版（Lite）」です。あなたが【自然に使いやすい役割】と【少し疲れやすい役割】の傾向をサクッと確認できますが、<span className="font-bold text-slate-800">直感的な選択のブレによって結果が極端に出ることもあります。</span>
                  </p>
                  <p>
                    もし「少し違うかも？」と感じた場合はもう一度やり直してみるのも良いでしょう。ただし、人の心の動きは「役割」だけでは決まりません。
                  </p>
                  <p>
                    <span className="font-bold text-slate-800">全101問</span>からなる<span className="font-bold text-slate-800">「完全版RIESM™（リズム）」</span>では、4つのモードのバランス、根底にある興味関心、ストレス時の傾向、そして対人関係での活かし方まで含めて、あなたの特性を<span className="font-bold text-orange-500">より立体的かつ精密に整理</span>します。
                  </p>
                </div>
                
                {/* 完全版イメージ画像エリア */}
                <div className="w-full flex flex-col gap-4 mt-4 mb-2">
                  <div className="text-left">
                    <p className="text-[13px] sm:text-[14px] font-bold text-slate-800">
                      👇 完全版で手に入る「あなた専用の詳細レポート」
                    </p>
                  </div>
                  
                  <div className="rounded-2xl overflow-hidden border border-slate-200 shadow-sm bg-slate-50">
                    <img src="https://ninin-cc.github.io/img/kanzen.png" alt="完全版RIESMのレポートイメージ" className="w-full h-auto object-contain" />
                  </div>

                  {/* 完全版の魅力・キャッチコピー */}
                  <div className="flex flex-col items-center gap-2">
                    <div className="flex flex-wrap gap-2 justify-center">
                      <span className="text-[11px] sm:text-xs font-bold bg-blue-50 text-blue-700 px-2.5 py-1 rounded-md border border-blue-100 shadow-sm">上司に見せたくなるワタシのトリセツ</span>
                      <span className="text-[11px] sm:text-xs font-bold bg-pink-50 text-pink-700 px-2.5 py-1 rounded-md border border-pink-100 shadow-sm">ご家族・パートナーとの幸せな接しかた</span>
                      <span className="text-[11px] sm:text-xs font-bold bg-orange-50 text-orange-700 px-2.5 py-1 rounded-md border border-orange-100 shadow-sm">私だけの自然でラクな【役割】</span>
                    </div>
                    <div className="rounded-2xl overflow-hidden border border-slate-200 shadow-sm bg-slate-50 w-full mt-1">
                      <img src="https://ninin-cc.github.io/img/rei2.png" alt="完全版RIESMの詳細イメージ" className="w-full h-auto object-contain" />
                    </div>
                  </div>
                </div>

                <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 w-full py-4 px-4 bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-800 hover:to-slate-900 text-white rounded-2xl font-bold shadow-md text-sm md:text-base transition-all active:scale-[0.98] box-border">
                  完全版RIESM™の詳細・お申し込み <ExternalLink />
                </a>
                
                <div className="bg-slate-50 p-4 sm:p-5 rounded-2xl border border-slate-200 text-left box-border">
                  <p className="text-[13px] sm:text-sm font-bold text-slate-700 mb-2 flex items-center gap-1.5">
                    <span className="text-orange-500">🎁</span> Lite受検者 限定特典
                  </p>
                  <p className="text-[12px] sm:text-[13px] text-slate-600 mb-4 font-medium leading-relaxed">
                    完全版は通常5,000円ですが、Lite受検後に下記の<span className="font-bold text-slate-800">招待コード</span>をご記入いただくと、<span className="font-bold text-orange-500 text-base">3,000円</span>で受検可能です。
                  </p>
                  <div className="flex items-center justify-center gap-3 bg-white py-3 sm:py-3.5 rounded-xl border border-slate-200 font-mono text-lg sm:text-2xl font-bold text-slate-700 tracking-[0.1em] sm:tracking-[0.2em] shadow-inner box-border overflow-hidden">
                    {getInviteCode()}
                  </div>
                </div>

              </div>

              <button onClick={() => window.location.reload()} className="w-full py-4 px-6 bg-transparent text-slate-500 rounded-xl font-bold hover:bg-slate-200 flex items-center justify-center gap-2 text-sm md:text-base transition-colors box-border">
                <RefreshCw /> もう一度診断する
              </button>
            </div>
            
            {/* 共通フッター（結果画面用） */}
            <div className="mt-12 mb-8 text-center text-[12px] sm:text-sm text-slate-500 font-medium">
              <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="hover:text-slate-800 transition-colors underline">
                © 2026 ninin consulting＆counseling
              </a>
            </div>

          </div>
        );
      }
      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
