<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合同会社ninin</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
        }
        .link-card:hover {
            transform: translateY(-4px);
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen flex flex-col items-center">

    <!-- ヒーローセクション -->
    <header class="w-full max-w-2xl pt-16 pb-10 px-6 text-center flex flex-col items-center">
        <div class="mb-8 flex justify-center min-h-[120px] items-center">
            <!-- ninin ロゴ画像 -->
            <img 
                src="https://ninin-cc.github.io/img/ninin.png" 
                alt="ninin logo" 
                class="h-32 w-auto object-contain transition-opacity duration-500"
                onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'w-24 h-24 bg-white rounded-full flex items-center justify-center border border-stone-100 shadow-sm\'><span class=\'text-xl font-light tracking-widest text-stone-300 italic\'>ninin</span></div>';"
            >
        </div>
        <h1 class="text-3xl font-bold tracking-tight mb-2 text-stone-900 font-sans">合同会社ninin</h1>
        <p class="text-lg text-stone-500 font-medium mb-6">consulting ＆ counseling</p>
        
        <div class="max-w-xs w-full h-px bg-stone-200"></div>
    </header>

    <!-- 導入メッセージ -->
    <section class="w-full max-w-2xl px-6 mb-12 text-center fade-in">
        <p class="text-stone-600 leading-relaxed italic text-sm md:text-base px-4">
            「相互理解・リフレーミング・人生の意味を再認識する『伏線回収』」<br class="hidden md:block" />
            対話を通じて、あなたの人生の物語を共に編み直します。
        </p>
    </section>

    <!-- メインリンク一覧 -->
    <main class="w-full max-w-md px-6 flex-grow fade-in" style="animation-delay: 0.2s;">
        <div class="space-y-4">
            <!-- 🌈RIESM -->
            <a href="https://riesm.jp/" target="_blank" rel="noopener noreferrer" 
               class="link-card group block w-full bg-white p-5 rounded-2xl shadow-sm border border-stone-100 transition-all duration-300 hover:shadow-md active:scale-95">
                <div class="flex items-center space-x-4">
                    <div class="p-3 rounded-xl text-white bg-slate-800 shadow-sm transition-transform group-hover:scale-110">
                        <i data-lucide="globe" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center justify-between">
                            <h2 class="text-xl font-bold">🌈RIESM</h2>
                            <i data-lucide="external-link" class="w-4 h-4 text-stone-300 group-hover:text-stone-500"></i>
                        </div>
                        <p class="text-sm text-stone-400 mt-1">RIESM（リズム）受検のご案内</p>
                    </div>
                </div>
            </a>

            <!-- note -->
            <a href="https://note.com/ninin2025" target="_blank" rel="noopener noreferrer" 
               class="link-card group block w-full bg-white p-5 rounded-2xl shadow-sm border border-stone-100 transition-all duration-300 hover:shadow-md active:scale-95">
                <div class="flex items-center space-x-4">
                    <div class="p-3 rounded-xl text-white bg-green-600 shadow-sm transition-transform group-hover:scale-110">
                        <i data-lucide="book-open" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center justify-between">
                            <h2 class="text-xl font-bold">note</h2>
                            <i data-lucide="external-link" class="w-4 h-4 text-stone-300 group-hover:text-stone-500"></i>
                        </div>
                        <p class="text-sm text-stone-400 mt-1">日々の気づきや「人生の物語化」を綴る場所</p>
                    </div>
                </div>
            </a>

            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/ninin2025/" target="_blank" rel="noopener noreferrer" 
               class="link-card group block w-full bg-white p-5 rounded-2xl shadow-sm border border-stone-100 transition-all duration-300 hover:shadow-md active:scale-95">
                <div class="flex items-center space-x-4">
                    <div class="p-3 rounded-xl text-white bg-blue-700 shadow-sm transition-transform group-hover:scale-110">
                        <i data-lucide="linkedin" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center justify-between">
                            <h2 class="text-xl font-bold">LinkedIn</h2>
                            <i data-lucide="external-link" class="w-4 h-4 text-stone-300 group-hover:text-stone-500"></i>
                        </div>
                        <p class="text-sm text-stone-400 mt-1">ビジネスプロフィール・キャリアコンサルティング</p>
                    </div>
                </div>
            </a>

            <!-- X (Twitter) -->
            <a href="https://x.com/ninin2025" target="_blank" rel="noopener noreferrer" 
               class="link-card group block w-full bg-white p-5 rounded-2xl shadow-sm border border-stone-100 transition-all duration-300 hover:shadow-md active:scale-95">
                <div class="flex items-center space-x-4">
                    <div class="p-3 rounded-xl text-white bg-black shadow-sm transition-transform group-hover:scale-110">
                        <i data-lucide="twitter" class="w-6 h-6"></i>
                    </div>
                    <div class="flex-grow">
                        <div class="flex items-center justify-between">
                            <h2 class="text-xl font-bold">X (Twitter)</h2>
                            <i data-lucide="external-link" class="w-4 h-4 text-stone-300 group-hover:text-stone-500"></i>
                        </div>
                        <p class="text-sm text-stone-400 mt-1">リアルタイムな発信と対話の場</p>
                    </div>
                </div>
            </a>
        </div>

        <!-- 公告リンク -->
        <div class="mt-12 mb-20 text-center">
            <a href="https://ninin-cc.github.io/koukoku.html" 
               class="inline-flex items-center space-x-2 text-stone-400 hover:text-stone-600 transition-all py-2 px-6 border border-stone-200 rounded-full text-sm bg-white/50 hover:bg-white hover:shadow-sm">
                <i data-lucide="file-text" class="w-4 h-4"></i>
                <span>電子公告はこちら</span>
            </a>
        </div>
    </main>

    <!-- フッター -->
    <footer class="w-full py-8 px-6 text-center border-t border-stone-100 bg-white mt-auto">
        <p class="text-xs text-stone-400 tracking-widest uppercase">
            © <span id="year"></span> ninin LLC. All Rights Reserved.
        </p>
    </footer>

    <script>
        // アイコンの初期化
        lucide.createIcons();
        // 現在の年をセット
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
