<head>

  <!-- React & ReactDOM -->

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel -->

  <!-- Tailwind CSS -->

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- html2canvas (画像保存用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { 
      margin: 0; padding: 0; background: #000; color: #f3f4f6; overflow-x: hidden; 
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    html, body { -webkit-touch-callout: none; }
    img { -webkit-user-drag: none; user-select: none; }
    .rpg-font { font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0; }
    
    /* ルビの調整 */
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: white; } /* ルビを白文字に */
    h1 rt { font-size: 0.35em; } /* タイトルでのルビはさらに小さく */

    .rpg-button { 
      border: 2px solid #4b2a14 !important; 
      padding: 12px 16px; 
      border-radius: 7px; 
      transition: all 0.2s; 
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(69,32,12,0.16) 34%, transparent 52%, rgba(255,255,255,0.06) 72%, rgba(69,32,12,0.18)),
        linear-gradient(180deg, #b8793e 0%, #8b5329 48%, #5f351b 100%) !important;
      color: #fff8df !important; 
      cursor: pointer; 
      text-align: center; 
      font-weight: bold;
      text-shadow: 0 1px 0 rgba(43, 24, 10, 0.9), 0 2px 4px rgba(0,0,0,0.45);
      box-shadow:
        inset 0 2px 0 rgba(255, 232, 176, 0.45),
        inset 0 -3px 0 rgba(45, 22, 8, 0.65),
        0 4px 0 #3a1d0c,
        0 8px 16px rgba(0,0,0,0.32) !important;
    }
    .rpg-button:hover:not(:disabled) { 
      background:
        linear-gradient(90deg, rgba(255,255,255,0.12), transparent 18%, rgba(69,32,12,0.14) 34%, transparent 52%, rgba(255,255,255,0.08) 72%, rgba(69,32,12,0.15)),
        linear-gradient(180deg, #c98945 0%, #9a5e30 48%, #70401f 100%) !important;
      color: #fffaf0 !important; 
      transform: translateY(-1px);
    }
    .rpg-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      filter: grayscale(0.35);
      box-shadow:
        inset 0 1px 0 rgba(255, 232, 176, 0.25),
        inset 0 -2px 0 rgba(45, 22, 8, 0.55),
        0 2px 0 #3a1d0c !important;
    }

    .dialog-note {
      position: relative;
      overflow: hidden;
      color: #2d1b10;
      background:
        linear-gradient(90deg, rgba(126, 73, 34, 0.18) 0 2px, transparent 2px 100%),
        repeating-linear-gradient(to bottom, transparent 0 27px, rgba(126, 73, 34, 0.18) 28px, transparent 29px),
        linear-gradient(135deg, #f8eac2 0%, #ecd19a 54%, #d4ad6b 100%);
      background-size: 100% 100%, 100% 29px, 100% 100%;
      border: 1px solid rgba(102, 59, 27, 0.62);
      border-radius: 8px;
      padding: 16px;
      box-shadow:
        inset 0 0 28px rgba(90, 48, 18, 0.22),
        inset 0 2px 0 rgba(255,255,255,0.5),
        0 3px 10px rgba(0,0,0,0.22);
    }
    .dialog-note::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 38px;
      width: 1px;
      background: rgba(132, 63, 45, 0.28);
    }
    .dialog-note::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(113, 70, 34, 0.12), transparent 18%),
        radial-gradient(circle at 85% 70%, rgba(113, 70, 34, 0.10), transparent 20%);
      opacity: 0.7;
    }
    .dialog-note > * {
      position: relative;
      z-index: 1;
    }
    .dialog-note rt {
      color: #5c3620;
    }

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ページ切り替え of fade-in */
    .animate-page-turn { 
      position: relative;
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* ページめくり（左固定で右から左へ縮小）アニメーション */
    .page-flip-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(to right, #050505 0%, #1a1a1a 95%, #3a3a3a 100%);
      z-index: 100;
      transform-origin: left center;
      animation: flipLeft 0.5s ease-in-out forwards;
      pointer-events: none;
    }
    @keyframes flipLeft {
      0% { transform: scaleX(1); opacity: 1; }
      99% { transform: scaleX(0); opacity: 1; }
      100% { transform: scaleX(0); opacity: 0; }
    }
    
    /* オーラエフェクト */
    .aura-effect-a {
      animation: pulseAuraA 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(230,194,128,0.6);
    }
    @keyframes pulseAuraA {
      0% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(230,194,128,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
    }

    .progress-bar-fill {
      transition: width 0.3s ease-out;
    }

    /* html2canvasでも絶対にぼやけない、クッキリした黒い縁取り */
    .text-shadow-strong {
      text-shadow: 
        1px 1px 0 #000, 
        -1px -1px 0 #000,
        -1px 1px 0 #000,
        1px -1px 0 #000,
        0 3px 5px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body class="rpg-font min-h-screen relative" style="background-image: url('./img/cafeei.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
  <!-- 背景の暗さを和らげる -->
  <div class="absolute inset-0 z-0 bg-black bg-opacity-30"></div>
  <div id="root" class="relative z-10 w-full max-w-2xl mx-auto p-4 md:p-6 min-h-screen flex flex-col overflow-hidden"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 設定データ ---
    const CONFIG = {
      appTitlePre: "～心の天気™～",
      appTitleMain: "-喫茶-RIESM-での語らい-",
      char1: {
        name: "マスター",
        img: "./img/mt.jpg",
        dialogColor: "bg-[#4b2e19] border-amber-500",
        imgBg: "bg-gradient-to-b from-stone-700 to-stone-950"
      },
      char2: {
        name: "理澄",
        img: "./img/rz.jpg",
        dialogColor: "bg-[#4b2e19] border-amber-500",
        imgBg: "bg-gradient-to-b from-rose-700 to-rose-950"
      }
    };

    // --- 10の物語と役割の定義 ---
    const WEATHER_DATA = {
      silent: {
        name: '静かにがんばる',
        role: '「まだ大丈夫」と自分に言い聞かせる役割',
        icon: 'fa-solid fa-battery-quarter',
        color: 'text-[#5c3620]',
        category: 'energy'
      },
      burden: {
        name: '背負いすぎる',
        role: '人の期待に応えようとする役割',
        icon: 'fa-solid fa-weight-hanging',
        color: 'text-[#5c3620]',
        category: 'relation'
      },
      conform: {
        name: '合わせすぎる',
        role: '自分の気持ちを後回しにして周囲に合わせる役割',
        icon: 'fa-solid fa-masks-theater',
        color: 'text-[#5c3620]',
        category: 'relation'
      },
      overthink: {
        name: '考えすぎる',
        role: '先の不安をすべて一人で抱え込む役割',
        icon: 'fa-solid fa-head-side-virus',
        color: 'text-[#5c3620]',
        category: 'thought'
      },
      suppress: {
        name: '怒りを飲み込む',
        role: '波風を立てないよう感情をため込む役割',
        icon: 'fa-solid fa-volcano',
        color: 'text-[#5c3620]',
        category: 'relation'
      },
      blame: {
        name: '自分を責める',
        role: '「自分が悪い」とすべての責任を負う役割',
        icon: 'fa-solid fa-hand-point-left',
        color: 'text-[#5c3620]',
        category: 'thought'
      },
      restless: {
        name: '休めない',
        role: '常に動き続けなければと焦りを背負う役割',
        icon: 'fa-solid fa-person-running',
        color: 'text-[#5c3620]',
        category: 'thought'
      },
      unclear: {
        name: '自分の気持ちが分からない',
        role: '自分の本当のSOSを見失ってまで平気を装う役割',
        icon: 'fa-solid fa-cloud',
        color: 'text-[#5c3620]',
        category: 'energy'
      },
      loss: {
        name: '失ったものを抱える',
        role: 'もう戻らない時間や関係を一人で守り続ける役割',
        icon: 'fa-solid fa-clock-rotate-left',
        color: 'text-[#5c3620]',
        category: 'energy'
      },
      endure: {
        name: 'ひとりで耐える',
        role: '「どうせわかってもらえない」と一人で耐える役割',
        icon: 'fa-solid fa-person-shelter',
        color: 'text-[#5c3620]',
        category: 'energy'
      }
    };

    // カテゴリの定義
    const CATEGORIES = {
      relation: { name: '人との関わりで背負う荷物', max: 18, color: 'bg-[#4a2e1b]' },
      thought: { name: '思考と自責で重くなる荷物', max: 18, color: 'bg-[#2c3e50]' },
      energy: { name: 'エネルギー枯渇と孤独の荷物', max: 24, color: 'bg-[#8b6b45]' }
    };

    // --- 設問データ (Q1 - Q10) ---
    const QUESTIONS = [
      { 
        id: 1, 
        type: 'silent', 
        story: 'いつも通りにしているけれど、少し疲れているんだ。朝起きるのが重くて。ひとりになると、急に力が入らなくなるんだよね…。',
        question: '私の心の天気は、雨っぽいな…。\n\nあなたはどう…？' 
      },
      { 
        id: 2, 
        type: 'burden', 
        story: '頼まれると、つい引き受けてしまうんだ。周りを困らせたくなくて、自分のことを後回しにして。気づくと、自分だけが抱えている気がする…。',
        question: '私の心の天気は、少し雨が降ってるかな…。\n\nあなたは…？' 
      },
      { 
        id: 3, 
        type: 'conform', 
        story: '本当は違うと思っても、言わないことが多いんだ。空気を悪くしたくなくて、笑って合わせて。あとから、自分の気持ちが分からなくなる…。',
        question: 'きみはどう…？' 
      },
      { 
        id: 4, 
        type: 'overthink', 
        story: '先のことを考えると、不安が大きくなるんだ。失敗したらどうしよう、と何度も考えてしまって。考えすぎて、動けなくなることがある…。',
        question: 'あなたもそう…？' 
      },
      { 
        id: 5, 
        type: 'suppress', 
        story: '本当は納得していないんだ。でも、面倒になると思って言葉を飲み込んで。怒りたくても怒れなくて、心にモヤモヤが残るんだ…。',
        question: 'きみはどう…？' 
      },
      { 
        id: 6, 
        type: 'blame', 
        story: '何かあると、自分が悪かったのではと考えるんだ。もっと上手くできたはずだ、と何度も思い返して。人には優しく、自分には厳しくしてしまう…。',
        question: 'あなたはどう…？' 
      },
      { 
        id: 7, 
        type: 'restless', 
        story: '休んでいても、頭では次のことを考えているんだ。何もしない時間が、少し落ち着かなくて。止まったら取り残される気がするんだよね…。',
        question: 'あなたもそう…？' 
      },
      { 
        id: 8, 
        type: 'unclear', 
        story: 'つらいのか、疲れているのか、自分でも分からないんだ。大きな問題はないけれど、心がぼんやりしていて。「どうしたいの？」と聞かれても、すぐ答えられないんだ…。',
        question: 'あなたは…？' 
      },
      { 
        id: 9, 
        type: 'loss', 
        story: 'もう戻らない時間や関係を、ふと思い出すんだ。前を向こうとしているけれど、まだ心に残っていて。人にはあまり話さないけれど、忘れられないものがある…。',
        question: 'きみはどう…？' 
      },
      { 
        id: 10, 
        type: 'endure', 
        story: '人と話したり、笑ったりすることはあるんだ。でも、本当にしんどいことは誰にも話していなくて。分かってもらえない気がして、ひとりで抱えてしまうんだ…。',
        question: 'あなたはどう…？' 
      }
    ];

    // 配列シャッフル関数
    const shuffleArray = (array) => {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    // --- 共通UIコンポーネント ---
    const WindowBox = ({ title, children, iconName, className = "" }) => {
      const hasBg = className.includes('bg-');
      const defaultBg = hasBg ? '' : 'bg-black ';
      
      return (
        <div className={`${defaultBg}text-white border-2 md:border-4 border-gray-400 px-3 pb-3 pt-10 md:px-5 md:pb-5 md:pt-14 rounded-lg shadow-xl relative w-full mt-8 ${className}`}>
          {title && (
            <div className={`absolute left-2 md:left-4 top-0 -translate-y-1/2 ${hasBg ? 'bg-gray-900 bg-opacity-80' : 'bg-black'} px-2 py-1 md:px-3 md:py-2 flex items-center space-x-1.5 border-2 border-gray-400 rounded max-w-[95%]`}>
              {iconName && <i className={`${iconName} text-yellow-300 shrink-0 text-[10px] md:text-base`}></i>}
              <h2 className="text-[11px] md:text-base font-bold tracking-widest text-yellow-100 leading-snug truncate">{title}</h2>
            </div>
          )}
          <div className="w-full h-full flex flex-col">{children}</div>
        </div>
      );
    };

    const DialogBox = ({ charConfig, text, imageSide = 'left' }) => {
      const { name, img, dialogColor, imgBg } = charConfig;
      const isImageRight = imageSide === 'right';

      return (
        <div className={`w-full ${dialogColor} border-2 p-1 md:p-1 rounded-lg mb-6 relative animate-fade-in shadow-xl mt-6`}>
          <div className={`absolute -top-3 ${isImageRight ? 'right-4' : 'left-4'} ${dialogColor.split(' ')[0]} px-3 border border-white rounded-full text-white text-sm font-bold tracking-widest shadow-sm z-10`}>
            {name}
          </div>
          <div className="mt-2 w-full block dialog-note">
            <div className={`w-16 h-16 md:w-20 md:h-20 ${imgBg} border-2 border-white rounded-md overflow-hidden shadow-inner ${isImageRight ? 'float-right ml-4 mb-2' : 'float-left mr-4 mb-2'}`}>
              <img src={img} alt={name} className="w-full h-full object-contain scale-110" style={{ imageRendering: 'auto', transform: isImageRight ? 'scaleX(-1) scale(1.1)' : 'scale(1.1)' }} />
            </div>
            <div className="text-[#2d1b10] text-sm md:text-base leading-relaxed whitespace-pre-wrap font-medium">
              {text}
            </div>
            <div className="clear-both"></div>
          </div>
        </div>
      );
    };

    const ProgressBar = ({ current, total, label }) => {
      const percentage = Math.max(0, Math.min(100, (current / total) * 100));
      return (
        <div className="w-full mb-4 relative z-20 bg-black bg-opacity-80 p-3 rounded-lg border border-gray-600 shadow-md">
          <div className="flex justify-between text-xs text-gray-300 mb-2 px-1 font-bold">
            <span>{label}</span>
            <span>{current} / {total}</span>
          </div>
          <div className="w-full bg-gray-800 rounded-full h-2 border border-gray-600 overflow-hidden">
            <div className="bg-yellow-400 h-full progress-bar-fill" style={{ width: `${percentage}%` }}></div>
          </div>
        </div>
      );
    };

    // --- 7分割の画像ボタンコンポーネント ---
    const AnswerImageButton = ({ val, selectedVal, onSelect, showDoubleTapMessage = false, showLabels = true }) => {
      const isSelected = selectedVal === val;
      
      // ガイドとなるラベルテキストを設定（両端と中央のみ、showLabelsがtrueのときのみ）
      let labelText = null;
      if (showLabels) {
        if (val === 0) labelText = "わたしは\n大丈夫";
        if (val === 3) labelText = "なんとも\nいえない";
        if (val === 6) labelText = "かなり\nひどい";
      }

      return (
        <div className="flex-1 flex flex-col items-center h-full relative group">
          {/* ガイドテキスト領域 */}
          {showLabels ? (
            <div className="h-8 md:h-10 flex items-end justify-center pb-1.5 md:pb-2 w-full">
              {labelText && (
                <span className={`text-[9px] md:text-xs font-bold text-center leading-tight whitespace-pre-wrap transition-colors drop-shadow-md ${isSelected ? 'text-yellow-300' : 'text-gray-300 group-hover:text-yellow-100'}`}>
                  {labelText}
                </span>
              )}
            </div>
          ) : null}

          <button 
            onClick={() => onSelect(val)} 
            className={`w-full flex-1 relative rounded overflow-hidden transition-all duration-300 ${isSelected ? 'ring-2 ring-yellow-400 scale-110 shadow-[0_0_15px_rgba(250,204,21,0.6)] z-20' : 'ring-1 ring-gray-600 hover:scale-105 z-10'}`}
          >
            {/* 歪まないように画像を配置 */}
            <img 
              src="./img/tenki.jpg" 
              alt="心の天気"
              className="absolute top-0 h-full max-w-none"
              style={{
                width: '700%',
                left: `-${val * 100}%`,
                objectFit: 'cover'
              }}
            />
            
            {/* 選択時の2回タップ案内 */}
            {isSelected && showDoubleTapMessage && (
              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none w-[120%] text-center">
                <span className="bg-black bg-opacity-90 px-1 py-1 rounded text-[8px] md:text-[10px] text-yellow-300 font-bold animate-pulse shadow-md block leading-tight">
                  もう一度<br/>タップ
                </span>
              </div>
            )}
          </button>
        </div>
      );
    };

    // --- メインアプリケーション ---
    const App = () => {
      const [step, setStep] = useState('intro'); // intro, practice, question, calculating, result
      const [qIndex, setQIndex] = useState(0);
      const [scores, setScores] = useState({ silent: 0, burden: 0, conform: 0, overthink: 0, suppress: 0, blame: 0, restless: 0, unclear: 0, loss: 0, endure: 0 });
      const [scoreHistory, setScoreHistory] = useState([]); 
      
      // 質問配列を生成する関数（1,2問目と9,10問目を固定、中間6問をシャッフル）
      const generateQuestions = () => {
        const qSilent = QUESTIONS.find(q => q.type === 'silent'); // 1問目固定
        const qBurden = QUESTIONS.find(q => q.type === 'burden'); // 2問目固定
        const qLoss = QUESTIONS.find(q => q.type === 'loss');     // 9問目固定
        const qEndure = QUESTIONS.find(q => q.type === 'endure'); // 10問目固定
        
        const middleQ = QUESTIONS.filter(q => 
          !['silent', 'burden', 'loss', 'endure'].includes(q.type)
        );
        
        return [qSilent, qBurden, ...shuffleArray(middleQ), qLoss, qEndure];
      };

      const [shuffledQuestions, setShuffledQuestions] = useState(generateQuestions);
      
      const [results, setResults] = useState(null);
      const [popupType, setPopupType] = useState('none');
      const [animationKey, setAnimationKey] = useState(0); 
      const [tempSelectedVal, setTempSelectedVal] = useState(null);

      // --- スコア処理 ---
      const handleAnswer = (val) => {
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        const q = shuffledQuestions[qIndex];
        setScoreHistory([...scoreHistory, { ...scores }]);

        const newScores = { ...scores };
        newScores[q.type] = val; // 7択なのでスコアは 0〜6 (最大60点)

        setScores(newScores);
        setTempSelectedVal(null); 
        setAnimationKey(prev => prev + 1);

        if (qIndex < shuffledQuestions.length - 1) {
          setQIndex(qIndex + 1);
          window.scrollTo(0, 0);
        } else {
          calculateResult(newScores);
        }
      };

      const handleExampleAnswer = (val) => {
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        setTempSelectedVal(null); 
        // 練習は何を選んでも説明ポップアップを開く
        setPopupType('start');
      };

      const handleBack = () => {
        setAnimationKey(prev => prev + 1);
        setTempSelectedVal(null); 

        if (step === 'practice') {
          setStep('intro');
          window.scrollTo(0, 0);
          return;
        }

        if (step === 'question' && qIndex === 0) {
          setStep('practice');
          window.scrollTo(0, 0);
          return;
        }

        if (scoreHistory.length === 0) return;

        const prevScores = scoreHistory[scoreHistory.length - 1];
        setScores(prevScores);
        setScoreHistory(scoreHistory.slice(0, -1));

        if (step === 'question' && qIndex > 0) {
          setQIndex(qIndex - 1);
          window.scrollTo(0, 0);
        }
      };

      const calculateResult = (finalScores) => {
        setStep('calculating');
        
        // スコア順にソートして上位を抽出
        const sorted = Object.entries(finalScores).sort((a, b) => b[1] - a[1]);
        
        const top3 = [];
        // 1位は必ず表示
        top3.push(sorted[0][0]);
        // 2位はスコアが3点（真ん中の曇り以上）の場合のみ表示
        if (sorted[1][1] >= 3) {
          top3.push(sorted[1][0]);
        }
        // 3位はスコアが3点（真ん中の曇り以上）の場合のみ表示
        if (sorted[2][1] >= 3) {
          top3.push(sorted[2][0]);
        }
        
        const totalScore = Object.values(finalScores).reduce((sum, val) => sum + val, 0);

        // カテゴリ別スコアの計算
        const categoryScores = { relation: 0, thought: 0, energy: 0 };
        Object.entries(finalScores).forEach(([key, score]) => {
          const cat = WEATHER_DATA[key].category;
          categoryScores[cat] += score;
        });

        setTimeout(() => {
          setResults({ top3, totalScore, finalScores, categoryScores });
          setStep('result');
          window.scrollTo(0, 0);
        }, 1500);
      };

      const resetApp = () => {
        if(window.confirm('最初からやり直しますか？')) {
          setStep('intro');
          setQIndex(0);
          setScores({ silent: 0, burden: 0, conform: 0, overthink: 0, suppress: 0, blame: 0, restless: 0, unclear: 0, loss: 0, endure: 0 });
          setScoreHistory([]);
          setResults(null);
          setPopupType('none');
          setTempSelectedVal(null);
          
          // リセット時も構成ルールに従って再生成
          setShuffledQuestions(generateQuestions());
          
          window.scrollTo(0, 0);
        }
      };

      const openPopup = (type) => setPopupType(type);
      const closePopup = () => setPopupType('none');

      const handleSaveImage = () => {
        const element = document.getElementById('result-capture-area');
        if (!element) return;
        window.scrollTo(0, 0);

        setTimeout(() => {
          html2canvas(element, { 
            backgroundColor: '#f8eac2', // 明るいクラフトノートの色
            scale: 3, // 解像度を上げてさらに高画質・鮮明に
            useCORS: true,
            allowTaint: true,
            logging: false
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'kokoro_weather_result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            closePopup();
          }).catch(err => {
            console.error('画像保存エラー', err);
            alert('画像の保存に失敗しました。');
            closePopup();
          });
        }, 300);
      };

      // --- 各画面のレンダリング ---
      const renderIntro = () => (
        <div className="animate-fade-in flex-1 flex flex-col items-center justify-center">
          <div className="text-center mb-4">
            <h1 className="font-bold text-white mb-2 leading-tight flex flex-col items-center justify-center" style={{ textShadow: '2px 2px 0 #000' }}>
              <span className="text-2xl md:text-4xl mb-1">{CONFIG.appTitlePre}</span>
              <span className="text-yellow-300 text-sm md:text-base font-bold tracking-widest">{CONFIG.appTitleMain}</span>
            </h1>
          </div>

          <DialogBox 
            charConfig={CONFIG.char1} 
            text={`よく来てくださいました。\nここでは、あなたが抱えている【重くなっている役割】と、今の【心の天気】を見つめていきます。\n\n難しく考えすぎなくて大丈夫です。\n一杯の珈琲を飲むように、今の自分の感覚に耳を澄ませながら、直感で選んでみてください。`} 
          />
          <DialogBox 
            charConfig={CONFIG.char2} 
            imageSide="right"
            text={`全部で10問です。\n3分くらいで終わると思います。\n\n今の自分にどれくらい当てはまるか、7つの空の景色から選んでくださいね。`} 
          />

          <div className="flex flex-col gap-4 w-full items-center mb-8 mt-4">
            <button 
              onClick={() => {
                setAnimationKey(prev => prev + 1);
                setStep('practice');
                window.scrollTo(0, 0);
              }}
              className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black w-full md:w-auto px-10 py-4 text-lg font-bold shadow-[0_0_15px_rgba(59,130,246,0.3)]"
            >
              見つめてみる
            </button>

            <div className="flex flex-col gap-2 mt-2">
              <button onClick={() => openPopup('talk')} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center justify-center gap-2 underline underline-offset-4">
                <i className="fa-solid fa-comments"></i> ひとに話してみる
              </button>
            </div>
          </div>
        </div>
      );

      const renderPractice = () => (
        <div className="w-full flex flex-col items-center">
          <WindowBox title="練習" iconName="fa-solid fa-gamepad" className="!bg-transparent mb-8 animate-fade-in">
            <p className="text-sm md:text-base text-gray-300 text-center mb-4 font-bold border-b border-gray-600 pb-3">
              まずは練習です。<br />
              一度押すと選択され、もう一度押すと決定されます。<br />
              直感に近い感覚で選んでみてください。
            </p>
            <div className="flex flex-col w-full py-1">
              
              <div className="bg-[#4b3e2c] bg-opacity-60 border border-[#e6c280] rounded-lg p-4 md:p-5 flex justify-center relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)] mb-4">
                <p className="text-sm md:text-lg font-bold text-[#fdf6e3] leading-relaxed text-center max-w-[20em]">
                  今日の天気はどんな感じですか？
                </p>
              </div>

              <div className="relative my-2 bg-black bg-opacity-40 rounded-xl p-2 border border-gray-700 shadow-inner">
                {/* 練習用はラベルテキストを非表示にするため、高さもh-28 md:h-36に調整 */}
                <div className="flex justify-between items-stretch relative z-10 w-full gap-1 md:gap-2 h-28 md:h-36">
                  {[0, 1, 2, 3, 4, 5, 6].map(val => (
                    <AnswerImageButton 
                      key={val} 
                      val={val} 
                      selectedVal={tempSelectedVal}
                      onSelect={handleExampleAnswer}
                      showDoubleTapMessage={true} 
                      showLabels={false}
                    />
                  ))}
                </div>
              </div>

            </div>
          </WindowBox>

          <div className="flex justify-center mt-2">
            <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
              ◀ もどる
            </button>
          </div>
        </div>
      );

      const renderQuestion = () => {
        const q = shuffledQuestions[qIndex];
        
        return (
          <div className="w-full">
            <WindowBox title={`誰かの言葉 ${qIndex + 1}`} iconName="fa-solid fa-book-open" className="!bg-transparent">
              <div className="flex flex-col w-full py-1">
                
                <div className="bg-[#5c4a30] bg-opacity-40 border border-[#e6c280] rounded-lg p-5 md:p-6 flex flex-col justify-center relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)] mb-6">
                  {/* 前半の語り（story）部分：2pt大きく、明るい純白（text-stone-50）にする */}
                  <p className="text-base md:text-lg font-bold text-stone-50 leading-loose text-left max-w-[20em] whitespace-pre-wrap">
                    {q.story}
                  </p>

                  {/* 後半の問いかけ（question）部分：従来サイズ（text-sm md:text-base）と従来の穏やかな色（text-[#fdf6e3]/85）で描画 */}
                  {q.question && (
                    <p className="text-sm md:text-base font-bold text-[#fdf6e3]/85 leading-loose text-left max-w-[20em] whitespace-pre-wrap mt-4 border-t border-[#e6c280]/20 pt-4">
                      {q.question}
                    </p>
                  )}
                </div>

                <div className="relative bg-black bg-opacity-40 rounded-xl p-2 border border-gray-700 shadow-inner">
                  {/* 本番はラベルテキストが入るため、全体の高さを確保 (h-36 md:h-44) */}
                  <div className="flex justify-between items-stretch relative z-10 w-full gap-1 md:gap-2 h-36 md:h-44">
                    {[0, 1, 2, 3, 4, 5, 6].map(val => (
                      <AnswerImageButton 
                        key={val} 
                        val={val} 
                        selectedVal={tempSelectedVal}
                        onSelect={handleAnswer}
                        showDoubleTapMessage={false} 
                        showLabels={true}
                      />
                    ))}
                  </div>
                </div>

              </div>
            </WindowBox>

            <div className="mt-4">
              <ProgressBar current={qIndex + 1} total={shuffledQuestions.length} label="進捗" />
            </div>

            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderCalculating = () => (
        <div className="flex-1 flex flex-col items-center justify-center animate-pulse">
          <i className="fa-solid fa-mug-hot text-5xl text-amber-300 mb-4"></i>
          <p className="text-xl font-bold text-white tracking-widest">こころの空模様を見つめています...</p>
        </div>
      );

      const renderResult = () => {
        if (!results) return null;
        const { top3, totalScore, finalScores } = results;

        let weatherText = "";
        let weatherIcon = "";
        let weatherImageUrl = "";
        
        // 7択(最大60点)のスコアに応じた天気と背景画像の判定（8段階）
        if (totalScore >= 52) {
          weatherText = "激しい雨（嵐のようかもしれません）";
          weatherIcon = "fa-cloud-bolt"; // 雷雨
          weatherImageUrl = "https://images.unsplash.com/photo-1428592953211-077101b2021b?q=80&w=800&auto=format&fit=crop"; // 嵐・雷
        } else if (totalScore >= 45) {
          weatherText = "雨（本降りです）";
          weatherIcon = "fa-cloud-showers-heavy"; // 強い雨
          weatherImageUrl = "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=800&auto=format&fit=crop"; // 本降りの雨
        } else if (totalScore >= 38) {
          weatherText = "雨まじりのくもり";
          weatherIcon = "fa-cloud-showers-water"; // 雨
          weatherImageUrl = "https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?q=80&w=800&auto=format&fit=crop"; // 雨の窓滴
        } else if (totalScore >= 30) {
          weatherText = "くもり（一時 雨）";
          weatherIcon = "fa-cloud-rain"; // パラつく雨
          weatherImageUrl = "https://images.unsplash.com/photo-1501630834273-4b5604d2ee31?q=80&w=800&auto=format&fit=crop"; // 雨が降りそうな曇り
        } else if (totalScore >= 22) {
          weatherText = "くもり";
          weatherIcon = "fa-cloud"; // 曇り
          weatherImageUrl = "https://images.unsplash.com/photo-1499956827185-0d63ee78a910?q=80&w=800&auto=format&fit=crop"; // 厚い雲
        } else if (totalScore >= 14) {
          weatherText = "くもり（ときどき 晴れ）";
          weatherIcon = "fa-cloud-sun"; // 雲と太陽
          weatherImageUrl = "https://images.unsplash.com/photo-1534088568595-a066f410cbda?q=80&w=800&auto=format&fit=crop"; // 雲間からの光
        } else if (totalScore >= 7) {
          weatherText = "晴れ（ときどき くもり）";
          weatherIcon = "fa-cloud-sun"; // 雲と太陽
          weatherImageUrl = "https://images.unsplash.com/photo-1601297183305-6df142704ea2?q=80&w=800&auto=format&fit=crop"; // 晴れの中に少し雲
        } else {
          weatherText = "快晴（穏やかな空です）";
          weatherIcon = "fa-sun"; // 太陽
          weatherImageUrl = "https://images.unsplash.com/photo-1529153549247-9ea822f6d0a7?q=80&w=800&auto=format&fit=crop"; // 雲ひとつない青空
        }

        // 局地的な天気の追加と気遣いメッセージの生成
        const maxSingleScore = Math.max(...Object.values(finalScores));
        const isRainingOverall = totalScore >= 30; // 全体が「くもり（一時 雨）」以上の雨模様かどうか
        
        let localAlertText = null;
        let localAlertIcon = "";
        let localAlertColor = "";

        if (maxSingleScore === 6) { // 7段目(赤)が1つでもある場合
          weatherText += "\nところにより『嵐』";
          localAlertIcon = "fa-cloud-bolt";
          localAlertColor = "text-red-400";
          if (isRainingOverall) {
            localAlertText = "全体的にも雨模様ですが、とくに一箇所、嵐のように激しく吹き荒れている役割があるようです。\nいろんな荷物が重なって、あなたは誰にも言えない痛みを抱え続けてきたのかもしれません。どうか、その痛みを一人で抱え込みすぎないでくださいね。";
          } else {
            localAlertText = "心のどこか一箇所で、嵐のように吹き荒れている部分があるようです。\n周りからは穏やかに見えても、その役割においてあなたは誰にも言えない痛みを抱え続けてきたのかもしれません。どうか、その痛みを一人で抱え込みすぎないでくださいね。";
          }
        } else if (maxSingleScore === 5) { // 6段目(オレンジ)が1つでもある場合
          weatherText += "\nところにより『大雨』";
          localAlertIcon = "fa-cloud-showers-heavy";
          localAlertColor = "text-orange-400";
          if (isRainingOverall) {
            localAlertText = "いろんな役割が重なる中で、一部分だけ、さらに大雨のように負担が集中している役割があるようです。\nそこだけは、少し限界を超えて無理をしてしまっていませんか？ まずはその一番重い荷物から、そっと下ろして雨宿りをする時間も大切ですよ。";
          } else {
            localAlertText = "一部分だけ、大雨のように負担が集中している役割があるようです。\nそこだけは、少し無理をしてしまっていませんか？ 全体が穏やかだと自分でも見過ごしがちですが、雨宿りをする時間も大切ですよ。";
          }
        } else if (maxSingleScore === 4) { // 5段目(黄色)が1つでもある場合
          weatherText += "\nところにより『雨』";
          localAlertIcon = "fa-cloud-rain";
          localAlertColor = "text-yellow-400";
          if (isRainingOverall) {
             localAlertText = "一部の役割で、少し雨脚が強くなっているようです。\n全体的な雨やくもり空に隠れて見えにくいですが、その小さな無理が積もると心が冷えてしまいます。少しだけ傘をさして、休んでみてもいいのですよ。";
          } else {
             localAlertText = "一部の役割で、少し雨が降り始めているようです。\n他の空が晴れているからと、まだ大丈夫と思っているかもしれませんが、その小さな無理が積もると心が冷えてしまいます。少しだけ傘をさして、休んでみてもいいのですよ。";
          }
        }

        let globalAlert = null;
        if (totalScore >= 45) {
          globalAlert = (
            <div className="bg-[#4a1c1c] border border-red-500 text-red-100 p-2 md:p-3 rounded-lg shadow-md text-[10px] md:text-sm leading-relaxed mb-3">
              <p className="font-bold text-red-300 mb-1"><i className="fa-solid fa-triangle-exclamation"></i> 抱え込んでいませんか？</p>
              <p className="drop-shadow-md">複数の役割を同時に背負っている状態かもしれません。ひとりで整理しようとせず、専門家と一緒に見つめることも選択肢です。</p>
            </div>
          );
        } else if (totalScore <= 13) {
          globalAlert = (
            <div className="bg-[#1c2a4a] border border-blue-500 text-blue-100 p-2 md:p-3 rounded-lg shadow-md text-[10px] md:text-sm leading-relaxed mb-3">
              <p className="font-bold text-blue-300 mb-1"><i className="fa-solid fa-sun"></i> 穏やかな空模様のようです</p>
              <p className="drop-shadow-md">
                今の心の天気が安定していることは、とても素敵なことですね。<br />
                それでも、もし心の奥のほうに言葉にならない「小さな引っかかり」を感じているとしたら、どうか無理に晴れを装わなくても大丈夫ですからね。<br />
                当てはまらなかった物語の中にも、これからの自分をそっと守るヒントがあるかもしれません。
              </p>
            </div>
          );
        }

        let localAlert = null;
        if (localAlertText) {
          localAlert = (
            <div className="bg-[#2d241b] border border-amber-600/50 text-[#fdf6e3] p-2 md:p-3 rounded-lg shadow-md text-[10px] md:text-sm leading-relaxed mb-3">
              <p className={`font-bold ${localAlertColor} mb-1`}><i className={`fa-solid ${localAlertIcon}`}></i> 局地的な空模様について</p>
              <p className="drop-shadow-md whitespace-pre-wrap">{localAlertText}</p>
            </div>
          );
        }

        // カテゴリ順にソートした質問配列を作成
        const categoryOrder = ['relation', 'thought', 'energy'];
        const sortedQuestions = [...QUESTIONS].sort((a, b) => {
          const catA = WEATHER_DATA[a.type].category;
          const catB = WEATHER_DATA[b.type].category;
          if (catA !== catB) {
            return categoryOrder.indexOf(catA) - categoryOrder.indexOf(catB);
          }
          return a.id - b.id;
        });

        return (
          <div className="animate-fade-in w-full space-y-6 pb-12">
            
            {/* マスターのセリフ */}
            <div className="w-full pt-4 px-2">
              <DialogBox 
                charConfig={CONFIG.char1} 
                text={`お疲れ様でした。\nここに出た結果は、あなたを決めつけるものではありません。\n\n今、心がどんな天気なのか、どんな役割を背負っているのか。\nそれを少しだけ言葉にして、外に出してみるためのものです。`} 
              />
            </div>

            {/* ====== ここから下が画像保存エリア ====== */}
            <div id="result-capture-area" className="w-full flex flex-col gap-6 py-6 px-2 md:px-4 rounded-xl">
              
              {/* 1枚のノート */}
              <div className="w-full dialog-note border-2 border-amber-600 shadow-xl animate-fade-in relative m-0">
                <div className="relative z-10 flex flex-col h-full">

                  {/* 心の天気 */}
                  <div className="w-full mb-6">
                    <h4 className="font-bold text-[#5c3620] mb-2 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-cloud-sun text-[#5c3620]"></i> 心の天気
                    </h4>
                    <div className="relative flex flex-col items-center justify-center p-6 md:p-10 rounded-xl shadow-md border border-[#5c3620]/10 overflow-hidden min-h-[140px] md:min-h-[180px]">
                      <img 
                        src={weatherImageUrl} 
                        crossOrigin="anonymous" 
                        alt="心の天気" 
                        className="absolute inset-0 w-full h-full object-cover" 
                      />
                      <div className="absolute inset-0 bg-black bg-opacity-30"></div>
                      
                      <div className="relative z-10 flex flex-col items-center justify-center h-full gap-4 md:gap-6 py-2">
                        <i className={`fa-solid ${weatherIcon} text-5xl md:text-6xl text-white text-shadow-strong block`}></i>
                        <p className="text-sm md:text-lg font-bold text-white tracking-widest text-center text-shadow-strong leading-tight whitespace-pre-wrap">{weatherText}</p>
                      </div>
                    </div>
                  </div>

                  {/* アラートメッセージ */}
                  {(globalAlert || localAlert) && (
                    <div className="mb-5">
                      {globalAlert}
                      {localAlert}
                    </div>
                  )}

                  {/* こころの荷物のバランス（イコライザー） */}
                  <div className="pt-4 border-t border-amber-800/20 mb-2">
                    <h4 className="font-bold text-[#5c3620] mb-8 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-sliders text-[#5c3620]"></i> 荷物の重さ
                    </h4>
                    <div className="w-full px-1 md:px-2">
                      {/* イコライザー本体 */}
                      <div className="flex flex-row justify-between items-end w-full h-28 md:h-36 mb-2 border-b border-[#5c3620]/30 pb-2">
                        {sortedQuestions.map((q, index) => {
                          const key = q.type;
                          const score = finalScores[key] || 0;
                          const data = WEATHER_DATA[key];
                          
                          return (
                            <div key={`eq-${key}`} className="flex flex-col items-center justify-end h-full w-[8%] group relative cursor-pointer">
                              <div className="flex flex-col w-full items-center justify-end flex-1">
                                {[7, 6, 5, 4, 3, 2, 1].map(level => {
                                  let blockColor = 'bg-[#5c3620] bg-opacity-10';
                                  
                                  if (score >= level - 1) { 
                                    if (level === 1) blockColor = 'bg-emerald-500 opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]'; 
                                    else if (level === 2) blockColor = 'bg-green-500 opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]';
                                    else if (level === 3) blockColor = 'bg-lime-400 opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]';
                                    else if (level === 4) blockColor = 'bg-yellow-400 opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]';
                                    else if (level === 5) blockColor = 'bg-amber-500 opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]';
                                    else if (level === 6) blockColor = 'bg-orange-500 opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]';
                                    else blockColor = 'bg-red-600 opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]';
                                  }
                                  
                                  return (
                                    <div 
                                      key={level} 
                                      className={`w-full max-w-[16px] md:max-w-[24px] h-2 md:h-3 rounded-sm transition-all duration-1000 ease-out mb-0.5 md:mb-1 ${blockColor}`}
                                    ></div>
                                  );
                                })}
                              </div>
                              <div className="mt-1 md:mt-1.5 flex flex-col items-center">
                                <span className="text-[#5c3620] font-bold text-[9px] md:text-[11px] leading-none mb-0.5">{index + 1}</span>
                                <i className={`${data.icon} text-[#5c3620] text-xs md:text-lg opacity-80 group-hover:opacity-100 transition-opacity`}></i>
                              </div>
                              
                              {/* ツールチップ */}
                              <div className="absolute -top-10 md:-top-12 left-1/2 transform -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-[#2d1b10] text-[#fff8df] text-[10px] md:text-xs px-2 py-1.5 rounded shadow-lg pointer-events-none z-20">
                                {data.name}
                                <div className="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-2 h-2 bg-[#2d1b10] rotate-45"></div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      
                      {/* 凡例 */}
                      <div className="mt-4 pt-3 border-t border-amber-800/20">
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-x-2 gap-y-2 text-[9px] md:text-[10px] text-[#2d1b10] font-medium bg-[#5c3620] bg-opacity-5 p-2 md:p-3 rounded-lg border border-[#5c3620]/10">
                          {sortedQuestions.map((q, index) => {
                            const data = WEATHER_DATA[q.type];
                            return (
                              <div key={`legend-item-${q.type}`} className="flex items-center gap-1">
                                <span className="font-bold text-[#5c3620] w-3 md:w-4 text-right shrink-0">{index + 1}.</span>
                                <span className="truncate py-1 leading-relaxed" title={data.name}>{data.name}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>

                </div>
              </div>

              {/* アクションボタン群 */}
              <div data-html2canvas-ignore="true" className="text-center py-2 md:py-4 flex flex-col md:flex-row items-center justify-center gap-4 relative z-20">
                <button onClick={() => openPopup('save')} className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-blue-900 border-blue-400 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                  <i className="fa-solid fa-camera"></i> あとで見返す
                </button>

                <a 
                  href="https://ninin-cc.github.io/" 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-yellow-900 border-yellow-500 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(250,204,21,0.2)]"
                >
                  <i className="fa-solid fa-comments"></i> ひとに話してみる
                </a>
              </div>

              {/* 2枚目のノート */}
              <div className="w-full dialog-note border-2 border-amber-600 shadow-xl animate-fade-in relative m-0">
                <div className="relative z-10 flex flex-col h-full">

                  {/* 重くなっている役割 */}
                  <div className="mb-5">
                    <h4 className="font-bold text-[#5c3620] mb-3 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-suitcase text-[#5c3620]"></i> 今、重くなっているかもしれない役割
                    </h4>
                    <div className="space-y-3 pl-1 md:pl-2">
                      {top3.map((key) => {
                        const data = WEATHER_DATA[key];
                        return (
                          <div key={`role-${key}`} className="flex items-start gap-2">
                            <i className="fa-solid fa-check text-[#5c3620] mt-1"></i>
                            <p className="text-sm md:text-base text-[#2d1b10] font-bold leading-relaxed">{data.role}</p>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 小さな問い */}
                  <div className="pt-4 border-t border-amber-800/20">
                    <h4 className="font-bold text-[#5c3620] mb-2 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-seedling text-emerald-600"></i> 小さな問い
                    </h4>
                    <div className="pl-2 md:pl-4 space-y-1.5 border-l-4 border-emerald-600/50 ml-1 py-1">
                      <p className="text-sm md:text-base text-[#2d1b10] font-medium leading-relaxed">その役割は、いつから少し重くなっていたのでしょうか。</p>
                      <p className="text-sm md:text-base text-[#2d1b10] font-medium leading-relaxed">もし一つだけ軽くできるとしたら、何を少し手放したいでしょうか。</p>
                    </div>
                  </div>

                </div>
              </div>
              
            </div>
            {/* ====== ここまでが画像保存エリア ====== */}

            {/* 理澄からのメッセージ */}
            <div className="w-full px-2 pb-4">
              <DialogBox 
                charConfig={CONFIG.char2} 
                imageSide="right"
                text={
                  <span>
                    お疲れ様でした！ここまで見つめてみて、いかがでしたか？<br />
                    うまく言葉にならなくても、ぜんぜん大丈夫ですよ。<br />
                    背負いすぎた役割って、知らず知らずのうちに重い荷物になっちゃうものですから…。<br />
                    <br />
                    もしよかったら、このノートを見ながら、一緒に少しだけ荷物整理してみませんか？<br />
                    マスターも私も、いつでもここでお待ちしてますね！<br />
                    <br />
                    <span className="text-emerald-800 text-[11px] md:text-xs font-bold">
                      ※相談をご希望の方は、上の「ひとに話してみる」ボタンからお進みください。
                    </span>
                  </span>
                }
              />
            </div>

            {/* アクションボタン群 */}
            <div className="text-center pt-2 flex flex-col items-center gap-4">
              <button onClick={resetApp} className="text-gray-400 hover:text-white underline underline-offset-4 text-sm mt-2">
                もう一度最初から見つめる
              </button>
            </div>
          </div>
        );
      };

      const renderPopup = () => {
        if (popupType === 'none') return null;

        // 本番の10問に移る直前の、説明用クッション（構造化）ポップアップ
        if (popupType === 'start') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="こころの準備" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  {/* 理澄のセリフ：改行とダッシュによる「間」を持たせた美しい言葉遣いへ修正 */}
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`このあと、10人の「誰かの言葉」が聞こえてきます。\n\nその言葉を聞いて――\n\n「自分の心の天気はどうなのかな……？」とゆっくり感じてみてください。\n\nでは、準備ができたら、下のボタンをおしてくださいね。`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={() => {
                        closePopup();
                        setAnimationKey(prev => prev + 1);
                        setStep('question');
                        window.scrollTo(0, 0);
                      }}
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      すすむ
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'notYet') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="ゆっくりで大丈夫" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`難しく考えすぎなくて大丈夫です。\n直感に近い感覚で選んでみてくださいね。`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'talk') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="カフェの片隅で" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={`自分が背負っている役割は、一人で抱えているだけでは見えにくいことがあります。\n\n言葉にして、誰かに話してみることで、\n「ああ、自分はこんなに背負っていたんだ」と気づくこともあります。\n\nもしよければ、nininキャリアルームで、あなたの話をゆっくり聞かせてください。`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <a 
                      href="https://ninin-cc.github.io/" 
                      target="_blank" 
                      rel="noopener noreferrer" 
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-door-open"></i> nininキャリアルームへ
                    </a>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今は閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'save') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="こころの記録" iconName="fa-solid fa-camera" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={<span>いいですね！<br />ご自身の『こころの天気と役割』を画像で保存しましょうか？<br />あとでゆっくり見返して、自分と対話するヒントにしてくださいね！</span>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={handleSaveImage}
                      className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-download"></i> 画像として保存する
                    </button>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今はやめておく
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }
      };

      return (
        <div className="flex flex-col flex-1 w-full justify-between relative pb-16">
          <div className="w-full">
            <div key={animationKey} className={animationKey > 0 ? "animate-page-turn w-full" : "w-full"}>
              {step === 'intro' && renderIntro()}
              {step === 'practice' && renderPractice()}
              {step === 'question' && renderQuestion()}
            </div>
            {step === 'calculating' && renderCalculating()}
            {step === 'result' && renderResult()}
          </div>
          
          {/* フッター */}
          <div className="w-full mt-12 mb-4 flex flex-col items-center animate-fade-in">
            {(step === 'intro' || step === 'result') && (
              <div className="w-full bg-black bg-opacity-60 border border-gray-500 rounded p-3 text-center text-[9px] md:text-xs text-gray-300 shadow-sm mb-4">
                <p className="mb-3 text-yellow-100 opacity-90 leading-relaxed">
                  ※本アプリは医療的な診断や占い、性格を決めつけるものではありません。<br className="hidden md:block" />
                  ご自身の「重くなっている役割」に気づき、これからの働き方や生き方を考えるための「自己理解のきっかけ」としてご活用ください。
                </p>
                <div className="border-t border-gray-600/50 pt-2">
                  <p className="mb-1 leading-relaxed text-gray-400">本アプリは、交流分析・RIASEC・役割理論・キャリア理論などの知見をもとに、現代の働き方や人間関係に合わせて設計された RIESM™ / RoleTRADE™ の考え方に基づいて作されています。</p>
                  <p className="text-gray-400">© ninin consulting & counseling LLC. All rights reserved.</p>
                </div>
              </div>
            )}

            <div className="w-full border-t border-gray-500/50 pt-3 flex flex-col items-center justify-center gap-1.5 text-[10px] md:text-xs text-gray-400">
              <a href="https://ninin-cc.github.io/" target="_blank" rel="noopener noreferrer" className="hover:text-yellow-300 transition-colors underline underline-offset-4">
                © 2026 ninin consulting＆counseling
              </a>
              <div className="font-mono opacity-70">
                PageNO: {step === 'question' ? qIndex + 1 : step}
              </div>
            </div>
          </div>

          {renderPopup()}

          {animationKey > 0 && step !== 'calculating' && step !== 'result' && (
            <div key={`page-turn-${animationKey}`} className="page-flip-overlay"></div>
          )}

          {/* 開発用：結果スキップの透明ボタン */}
          <div 
            onClick={() => {
              // 開発用ボタンを押すたびにランダムなスコアを生成して様々な天気を確認できるようにする
              const randomScore = () => Math.floor(Math.random() * 7); // 7択（0〜6）に対応
              const dummyScores = { 
                silent: randomScore(), burden: randomScore(), conform: randomScore(), 
                overthink: randomScore(), suppress: randomScore(), blame: randomScore(), 
                restless: randomScore(), unclear: randomScore(), loss: randomScore(), endure: randomScore() 
              };
              calculateResult(dummyScores);
            }}
            className="w-full h-16 absolute bottom-0 left-0 cursor-pointer opacity-0 z-50"
            title="結果画面へスキップ（開発用・ランダムスコア）"
          ></div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
