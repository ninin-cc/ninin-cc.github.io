<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>～心の天気予報～ -喫茶-RIESM-での語らい-</title>

  <!-- LINE内蔵ブラウザ対策: 外部ブラウザ（Safari/Chrome）で開くように促す -->
  <script>
    if (/Line/i.test(navigator.userAgent) && window.location.search.indexOf('openExternalBrowser=1') === -1) {
      var separator = window.location.href.indexOf('?') === -1 ? '?' : '&';
      window.location.href = window.location.href + separator + 'openExternalBrowser=1';
    }
  </script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z1T35THNDV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('config', 'G-Z1T35THNDV');

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- html2canvas (画像保存用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { margin: 0; padding: 0; background: #000; color: #f3f4f6; overflow-x: hidden; }
    html, body { -webkit-touch-callout: none; }
    img { -webkit-user-drag: none; user-select: none; }
    .rpg-font { font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0; }
    
    /* ルビの調整 */
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: white; } /* ルビを白文字に */
    h1 rt { font-size: 0.35em; } /* タイトルでのルビはさらに小さく */

    .rpg-button { 
      border: 2px solid #4b2a14 !important; 
      padding: 12px 16px; 
      border-radius: 7px; 
      transition: all 0.2s; 
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08), transparent 18%, rgba(69,32,12,0.16) 34%, transparent 52%, rgba(255,255,255,0.06) 72%, rgba(69,32,12,0.18)),
        linear-gradient(180deg, #b8793e 0%, #8b5329 48%, #5f351b 100%) !important;
      color: #fff8df !important; 
      cursor: pointer; 
      text-align: center; 
      font-weight: bold;
      text-shadow: 0 1px 0 rgba(43, 24, 10, 0.9), 0 2px 4px rgba(0,0,0,0.45);
      box-shadow:
        inset 0 2px 0 rgba(255, 232, 176, 0.45),
        inset 0 -3px 0 rgba(45, 22, 8, 0.65),
        0 4px 0 #3a1d0c,
        0 8px 16px rgba(0,0,0,0.32) !important;
    }
    .rpg-button:hover:not(:disabled) { 
      background:
        linear-gradient(90deg, rgba(255,255,255,0.12), transparent 18%, rgba(69,32,12,0.14) 34%, transparent 52%, rgba(255,255,255,0.08) 72%, rgba(69,32,12,0.15)),
        linear-gradient(180deg, #c98945 0%, #9a5e30 48%, #70401f 100%) !important;
      color: #fffaf0 !important; 
      transform: translateY(-1px);
    }
    .rpg-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      filter: grayscale(0.35);
      box-shadow:
        inset 0 1px 0 rgba(255, 232, 176, 0.25),
        inset 0 -2px 0 rgba(45, 22, 8, 0.55),
        0 2px 0 #3a1d0c !important;
    }

    .dialog-note {
      position: relative;
      overflow: hidden;
      color: #2d1b10;
      background:
        linear-gradient(90deg, rgba(126, 73, 34, 0.18) 0 2px, transparent 2px 100%),
        repeating-linear-gradient(to bottom, transparent 0 27px, rgba(126, 73, 34, 0.18) 28px, transparent 29px),
        linear-gradient(135deg, #f8eac2 0%, #ecd19a 54%, #d4ad6b 100%);
      background-size: 100% 100%, 100% 29px, 100% 100%;
      border: 1px solid rgba(102, 59, 27, 0.62);
      border-radius: 8px;
      padding: 16px;
      box-shadow:
        inset 0 0 28px rgba(90, 48, 18, 0.22),
        inset 0 2px 0 rgba(255,255,255,0.5),
        0 3px 10px rgba(0,0,0,0.22);
    }
    .dialog-note::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 38px;
      width: 1px;
      background: rgba(132, 63, 45, 0.28);
    }
    .dialog-note::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(113, 70, 34, 0.12), transparent 18%),
        radial-gradient(circle at 85% 70%, rgba(113, 70, 34, 0.10), transparent 20%);
      mix-blend-mode: multiply;
    }
    .dialog-note > * {
      position: relative;
      z-index: 1;
    }
    .dialog-note rt {
      color: #5c3620;
    }

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ページ切り替えのフェードイン */
    .animate-page-turn { 
      position: relative;
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* ページめくり（左固定で右から左へ縮小）アニメーション */
    .page-flip-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(to right, #050505 0%, #1a1a1a 95%, #3a3a3a 100%);
      z-index: 100;
      transform-origin: left center;
      animation: flipLeft 0.5s ease-in-out forwards;
      pointer-events: none;
    }
    @keyframes flipLeft {
      0% { transform: scaleX(1); opacity: 1; }
      99% { transform: scaleX(0); opacity: 1; }
      100% { transform: scaleX(0); opacity: 0; }
    }
    
    /* オーラエフェクト */
    .aura-effect-a {
      animation: pulseAuraA 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(230,194,128,0.6);
    }
    @keyframes pulseAuraA {
      0% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(230,194,128,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
    }

    .progress-bar-fill {
      transition: width 0.3s ease-out;
    }

    /* 結果カードのスタイル（透過度を上げてノートの罫線を見せる） */
    .result-card-gold {
      background: linear-gradient(135deg, rgba(40,30,0,0.3), rgba(10,5,0,0.4));
      border: 1px solid rgba(250, 204, 21, 0.5);
      box-shadow: inset 0 0 10px rgba(250, 204, 21, 0.1);
    }
    .result-card-silver {
      background: linear-gradient(135deg, rgba(20,30,40,0.3), rgba(5,10,15,0.4));
      border: 1px solid rgba(148, 163, 184, 0.5);
    }
    .result-card-bronze {
      background: linear-gradient(135deg, rgba(40,15,5,0.3), rgba(15,5,0,0.4));
      border: 1px solid rgba(180, 83, 9, 0.5);
    }
  </style>
</head>
<body class="rpg-font min-h-screen relative" style="background-image: url('./img/cafeei.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
  <!-- 背景の暗さを和らげる -->
  <div class="absolute inset-0 z-0 bg-black bg-opacity-30"></div>
  <div id="root" class="relative z-10 w-full max-w-2xl mx-auto p-4 md:p-6 min-h-screen flex flex-col overflow-hidden"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 設定データ ---
    const CONFIG = {
      appTitlePre: "～心の天気予報～",
      appTitleMain: "-喫茶-RIESM-での語らい-",
      char1: {
        name: "マスター",
        img: "./img/mt.jpg",
        dialogColor: "bg-[#4b2e19] border-amber-500",
        imgBg: "bg-gradient-to-b from-stone-700 to-stone-950"
      },
      char2: {
        name: "理澄",
        img: "./img/rz.jpg",
        dialogColor: "bg-[#4b2e19] border-amber-500",
        imgBg: "bg-gradient-to-b from-rose-700 to-rose-950"
      }
    };

    // --- 10の物語と役割の定義 ---
    const WEATHER_DATA = {
      silent: {
        name: '静かにがんばる人',
        role: '「まだ大丈夫」と自分に言い聞かせる役割',
        icon: 'fa-solid fa-battery-quarter',
        color: 'text-[#5c3620]',
        category: 'energy'
      },
      burden: {
        name: '背負いすぎる人',
        role: '人の期待に応えようとする役割',
        icon: 'fa-solid fa-weight-hanging',
        color: 'text-[#5c3620]',
        category: 'relation'
      },
      conform: {
        name: '合わせすぎる人',
        role: '自分の気持ちを後回しにして周囲に合わせる役割',
        icon: 'fa-solid fa-masks-theater',
        color: 'text-[#5c3620]',
        category: 'relation'
      },
      overthink: {
        name: '考えすぎる人',
        role: '先の不安をすべて一人で抱え込む役割',
        icon: 'fa-solid fa-head-side-virus',
        color: 'text-[#5c3620]',
        category: 'thought'
      },
      suppress: {
        name: '怒りを飲み込む人',
        role: '波風を立てないよう感情をため込む役割',
        icon: 'fa-solid fa-volcano',
        color: 'text-[#5c3620]',
        category: 'relation'
      },
      blame: {
        name: '自分を責める人',
        role: '「自分が悪い」とすべての責任を負う役割',
        icon: 'fa-solid fa-hand-point-left',
        color: 'text-[#5c3620]',
        category: 'thought'
      },
      restless: {
        name: '休めない人',
        role: '常に動き続けなければと焦りを背負う役割',
        icon: 'fa-solid fa-person-running',
        color: 'text-[#5c3620]',
        category: 'thought'
      },
      unclear: {
        name: '気持ちが見えにくい人',
        role: '自分の本当のSOSを見失ってまで平気を装う役割',
        icon: 'fa-solid fa-cloud',
        color: 'text-[#5c3620]',
        category: 'energy'
      },
      loss: {
        name: '失ったものを抱える人',
        role: 'もう戻らない時間や関係を一人で守り続ける役割',
        icon: 'fa-solid fa-clock-rotate-left',
        color: 'text-[#5c3620]',
        category: 'energy'
      },
      endure: {
        name: 'ひとりで耐える人',
        role: '「どうせわかってもらえない」と一人で耐える役割',
        icon: 'fa-solid fa-person-shelter',
        color: 'text-[#5c3620]',
        category: 'energy'
      }
    };

    // カテゴリの定義 (こげ茶とネイビーのバランス)
    const CATEGORIES = {
      relation: { name: '人との関わりで背負う荷物', max: 9, color: 'bg-[#4a2e1b]' }, // 深いこげ茶
      thought: { name: '思考と自責で重くなる荷物', max: 9, color: 'bg-[#2c3e50]' }, // ネイビー（スレートグレー）
      energy: { name: 'エネルギー枯渇と孤独の荷物', max: 12, color: 'bg-[#8b6b45]' } // キャメル（明るいこげ茶）
    };

    // --- 設問データ (Q1 - Q10) ---
    const QUESTIONS = [
      { id: 1, type: 'silent', text: 'いつも通りにしているけれど、少し疲れている。\n朝起きるのが重い。\nひとりになると、急に力が入らない。' },
      { id: 2, type: 'burden', text: '頼まれると、つい引き受けてしまう。\n周りを困らせたくなくて、自分のことを後回しにする。\n気づくと、自分だけが抱えている気がする。' },
      { id: 3, type: 'conform', text: '本当は違うと思っても、言わないことが多い。\n空気を悪くしたくなくて、笑って合わせる。\nあとから、自分の気持ちが分からなくなる。' },
      { id: 4, type: 'overthink', text: '先のことを考えると、不安が大きくなる。\n失敗したらどうしよう、と何度も考える。\n考えすぎて、動けなくなることがある。' },
      { id: 5, type: 'suppress', text: '本当は納得していない。\nでも、面倒になると思って言葉を飲み込む。\n怒りたくても怒れない。\n心にモヤモヤが残る。' },
      { id: 6, type: 'blame', text: '何かあると、自分が悪かったのではと考える。\nもっと上手くできたはずだ、と何度も思い返す。\n人には優しく、自分には厳しくしてしまう。' },
      { id: 7, type: 'restless', text: '休んでいても、頭では次のことを考えている。\n何もしない時間が、少し落ち着かない。\n止まったら取り残される気がする。' },
      { id: 8, type: 'unclear', text: 'つらいのか、疲れているのか、自分でも分からない。\n大きな問題はないけれど、心がぼんやりしている。\n「どうしたいの？」と聞かれても、すぐ答えられない。' },
      { id: 9, type: 'loss', text: 'もう戻らない時間や関係を、ふと思い出す。\n前を向こうとしているけれど、まだ心に残っている。\n人にはあまり話さないけれど、忘れられないものがある。' },
      { id: 10, type: 'endure', text: '人と話したり、笑ったりすることはある。\nでも、本当にしんどいことは誰にも話していない。\n分かってもらえない気がして、ひとりで抱えてしまう。' }
    ];

    // --- 共通UIコンポーネント ---
    const WindowBox = ({ title, children, iconName, className = "" }) => (
      <div className={`bg-black text-white border-2 md:border-4 border-gray-400 px-3 pb-3 pt-10 md:px-5 md:pb-5 md:pt-14 rounded-lg shadow-xl relative w-full mt-8 ${className}`}>
        {title && (
          <div className="absolute left-2 md:left-4 top-0 -translate-y-1/2 bg-black px-2 py-1 md:px-3 md:py-2 flex items-center space-x-1.5 border-2 border-gray-400 rounded max-w-[95%]">
            {iconName && <i className={`${iconName} text-yellow-300 shrink-0 text-[10px] md:text-base`}></i>}
            <h2 className="text-[11px] md:text-base font-bold tracking-widest text-yellow-100 leading-snug truncate">{title}</h2>
          </div>
        )}
        <div className="w-full h-full flex flex-col">{children}</div>
      </div>
    );

    // キャラクターのセリフボックス
    const DialogBox = ({ charConfig, text, imageSide = 'left' }) => {
      const { name, img, dialogColor, imgBg } = charConfig;
      const isImageRight = imageSide === 'right';

      return (
        <div className={`w-full ${dialogColor} border-2 p-1 md:p-1 rounded-lg mb-6 relative animate-fade-in shadow-xl mt-6`}>
          <div className={`absolute -top-3 ${isImageRight ? 'right-4' : 'left-4'} ${dialogColor.split(' ')[0]} px-3 border border-white rounded-full text-white text-sm font-bold tracking-widest shadow-sm z-10`}>
            {name}
          </div>
          <div className="mt-2 w-full block dialog-note">
            <div className={`w-16 h-16 md:w-20 md:h-20 ${imgBg} border-2 border-white rounded-md overflow-hidden shadow-inner ${isImageRight ? 'float-right ml-4 mb-2' : 'float-left mr-4 mb-2'}`}>
              <img src={img} alt={name} className="w-full h-full object-contain scale-110" style={{ imageRendering: 'auto', transform: isImageRight ? 'scaleX(-1) scale(1.1)' : 'scale(1.1)' }} />
            </div>
            <div className="text-[#2d1b10] text-sm md:text-base leading-relaxed whitespace-pre-wrap font-medium">
              {text}
            </div>
            <div className="clear-both"></div>
          </div>
        </div>
      );
    };

    const ProgressBar = ({ current, total, label }) => {
      const percentage = Math.max(0, Math.min(100, (current / total) * 100));
      return (
        <div className="w-full mb-4 relative z-20 bg-black bg-opacity-80 p-3 rounded-lg border border-gray-600 shadow-md">
          <div className="flex justify-between text-xs text-gray-300 mb-2 px-1 font-bold">
            <span>{label}</span>
            <span>{current} / {total}</span>
          </div>
          <div className="w-full bg-gray-800 rounded-full h-2 border border-gray-600 overflow-hidden">
            <div className="bg-yellow-400 h-full progress-bar-fill" style={{ width: `${percentage}%` }}></div>
          </div>
        </div>
      );
    };

    const AnswerCircle = ({ val, selectedVal, onSelect, showDoubleTapMessage = false }) => {
      const textMap = ["ぜんぜん\n当てはまらない", "あまり\n当てはまらない", "やや\n当てはまる", "すごく\n当てはまる"];
      
      const sizes = [
        'w-6 h-6 md:w-8 md:h-8',
        'w-10 h-10 md:w-12 md:h-12',
        'w-14 h-14 md:w-16 md:h-16',
        'w-16 h-16 md:w-20 md:h-20'
      ];
      const bgColors = [
        'bg-[#5c4a30] bg-opacity-40',
        'bg-[#8b6b45] bg-opacity-60',
        'bg-[#b58b53] bg-opacity-80',
        'bg-[#e6c280] bg-opacity-100'
      ];

      const isSelected = selectedVal === val;

      return (
        <button 
          onClick={() => onSelect(val)} 
          className="flex-1 flex flex-col items-center group relative z-10 hover:bg-gray-800 hover:bg-opacity-60 rounded-lg transition-all py-2"
        >
          <div className="h-20 md:h-24 w-full relative flex items-center justify-center">
            {/* 中央の基準線 */}
            <div className={`absolute top-1/2 h-px bg-slate-500 -translate-y-1/2 z-0 ${val === 0 ? 'left-1/2 right-0' : val === 3 ? 'left-0 right-1/2' : 'left-0 right-0'}`}></div>
            
            {isSelected && showDoubleTapMessage && (
              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none w-max">
                <span className="bg-black bg-opacity-90 px-3 py-1.5 rounded-full text-[10px] md:text-xs text-yellow-300 font-bold animate-pulse border border-yellow-500 shadow-[0_0_10px_rgba(250,204,21,0.5)]">
                  もう一度押して決定
                </span>
              </div>
            )}

            <div className={`rounded-full ${bgColors[val]} transform transition-all duration-300 ${sizes[val]} ${isSelected ? 'aura-effect-a scale-110 border-2 border-white z-10' : 'border border-gray-400 group-hover:scale-110 shadow-[0_0_10px_rgba(230,194,128,0.2)] z-10'}`}></div>
          </div>
          <div className="h-10 mt-1 flex items-center justify-center w-full relative">
            <span className={`text-[10px] md:text-xs text-center leading-tight whitespace-pre-wrap font-bold transition-colors ${isSelected ? 'text-yellow-300' : 'text-gray-400 group-hover:text-yellow-200'}`}>
              {textMap[val]}
            </span>
          </div>
        </button>
      );
    };

    // --- メインアプリケーション ---
    const App = () => {
      const [step, setStep] = useState('intro'); // intro, practice, question, calculating, result
      const [qIndex, setQIndex] = useState(0);
      const [scores, setScores] = useState({ silent: 0, burden: 0, conform: 0, overthink: 0, suppress: 0, blame: 0, restless: 0, unclear: 0, loss: 0, endure: 0 });
      const [scoreHistory, setScoreHistory] = useState([]); 
      
      const [results, setResults] = useState(null);
      const [popupType, setPopupType] = useState('none');
      const [animationKey, setAnimationKey] = useState(0); 
      const [tempSelectedVal, setTempSelectedVal] = useState(null);

      // --- スコア処理 ---
      const handleAnswer = (val) => {
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        const q = QUESTIONS[qIndex];
        setScoreHistory([...scoreHistory, { ...scores }]);

        const newScores = { ...scores };
        newScores[q.type] = val; 

        setScores(newScores);
        setTempSelectedVal(null); 
        setAnimationKey(prev => prev + 1);

        if (qIndex < QUESTIONS.length - 1) {
          setQIndex(qIndex + 1);
          window.scrollTo(0, 0);
        } else {
          calculateResult(newScores);
        }
      };

      const handleExampleAnswer = (val) => {
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        setTempSelectedVal(null); 
        if (val >= 2) {
          setPopupType('start');
        } else {
          setPopupType('notYet');
        }
      };

      const handleBack = () => {
        setAnimationKey(prev => prev + 1);
        setTempSelectedVal(null); 

        if (step === 'practice') {
          setStep('intro');
          window.scrollTo(0, 0);
          return;
        }

        if (step === 'question' && qIndex === 0) {
          setStep('practice');
          window.scrollTo(0, 0);
          return;
        }

        if (scoreHistory.length === 0) return;

        const prevScores = scoreHistory[scoreHistory.length - 1];
        setScores(prevScores);
        setScoreHistory(scoreHistory.slice(0, -1));

        if (step === 'question' && qIndex > 0) {
          setQIndex(qIndex - 1);
          window.scrollTo(0, 0);
        }
      };

      const calculateResult = (finalScores) => {
        setStep('calculating');
        
        // スコア順にソートして上位を抽出
        const sorted = Object.entries(finalScores).sort((a, b) => b[1] - a[1]);
        
        const top3 = [];
        // 1位は必ず表示
        top3.push(sorted[0][0]);
        // 2位はスコアが2点（やや当てはまる）以上の場合のみ表示
        if (sorted[1][1] >= 2) {
          top3.push(sorted[1][0]);
        }
        // 3位はスコアが2点（やや当てはまる）以上の場合のみ表示
        if (sorted[2][1] >= 2) {
          top3.push(sorted[2][0]);
        }
        
        const totalScore = Object.values(finalScores).reduce((sum, val) => sum + val, 0);

        // カテゴリ別スコアの計算
        const categoryScores = { relation: 0, thought: 0, energy: 0 };
        Object.entries(finalScores).forEach(([key, score]) => {
          const cat = WEATHER_DATA[key].category;
          categoryScores[cat] += score;
        });

        setTimeout(() => {
          setResults({ top3, totalScore, finalScores, categoryScores });
          setStep('result');
          window.scrollTo(0, 0);
        }, 1500);
      };

      const resetApp = () => {
        if(window.confirm('最初からやり直しますか？')) {
          setStep('intro');
          setQIndex(0);
          setScores({ silent: 0, burden: 0, conform: 0, overthink: 0, suppress: 0, blame: 0, restless: 0, unclear: 0, loss: 0, endure: 0 });
          setScoreHistory([]);
          setResults(null);
          setPopupType('none');
          setTempSelectedVal(null);
          window.scrollTo(0, 0);
        }
      };

      const openPopup = (type) => setPopupType(type);
      const closePopup = () => setPopupType('none');

      const handleSaveImage = () => {
        const element = document.getElementById('result-capture-area');
        if (!element) return;
        window.scrollTo(0, 0);

        setTimeout(() => {
          html2canvas(element, { 
            backgroundColor: '#0a0a0a', 
            scale: 2, 
            useCORS: true
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'kokoro_weather_result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            closePopup();
          }).catch(err => {
            console.error('画像保存エラー', err);
            alert('画像の保存に失敗しました。');
            closePopup();
          });
        }, 300);
      };

      // --- 各画面のレンダリング ---
      const renderIntro = () => (
        <div className="animate-fade-in flex-1 flex flex-col items-center justify-center">
          <div className="text-center mb-4">
            <h1 className="font-bold text-white mb-2 leading-tight flex flex-col items-center justify-center" style={{ textShadow: '2px 2px 0 #000' }}>
              <span className="text-2xl md:text-4xl mb-1">{CONFIG.appTitlePre}</span>
              <span className="text-yellow-300 text-sm md:text-base font-bold tracking-widest">{CONFIG.appTitleMain}</span>
            </h1>
          </div>

          <DialogBox 
            charConfig={CONFIG.char1} 
            text={`よく来てくださいました。\nここでは、あなたが抱えている【重くなっている役割】と、今の【心の天気】を見つめていきます。\n\n難しく考えすぎなくて大丈夫です。\n一杯の珈琲を飲むように、今の自分の感覚に耳を澄ませながら、直感で選んでみてください。`} 
          />
          <DialogBox 
            charConfig={CONFIG.char2} 
            imageSide="right"
            text={`全部で10個の『物語』を読みます。\n3分くらいで終わると思います。\n\n今の自分にどれくらい当てはまるか、4段階の◯から選んでくださいね。`} 
          />

          <div className="flex flex-col gap-4 w-full items-center mb-8 mt-4">
            <button 
              onClick={() => {
                setAnimationKey(prev => prev + 1);
                setStep('practice');
                window.scrollTo(0, 0);
              }}
              className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black w-full md:w-auto px-10 py-4 text-lg font-bold shadow-[0_0_15px_rgba(59,130,246,0.3)]"
            >
              見つめてみる
            </button>

            <div className="flex flex-col gap-2 mt-2">
              <button onClick={() => openPopup('talk')} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center justify-center gap-2 underline underline-offset-4">
                <i className="fa-solid fa-comments"></i> ひとに話してみる
              </button>
            </div>
          </div>
        </div>
      );

      const renderPractice = () => (
        <div className="w-full flex flex-col items-center">
          <WindowBox title="練習" iconName="fa-solid fa-gamepad" className="bg-opacity-90 mb-8 animate-fade-in">
            <p className="text-sm md:text-base text-gray-300 text-center mb-4 font-bold border-b border-gray-600 pb-3">
              まずは練習です。<br />
              今のあなたにどれくらい当てはまるか、<br className="md:hidden" />感覚で選んでみてください。<br />
              一度押すと選択され、もう一度押すと決定されます。
            </p>
            <div className="flex flex-col w-full py-1">
              
              <div className="bg-[#4b3e2c] bg-opacity-60 border border-[#e6c280] rounded-lg p-4 md:p-5 text-center relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)] mb-4">
                <p className="text-sm md:text-lg font-bold text-[#fdf6e3] leading-relaxed">
                  いま、温かい飲み物を飲んで、<br className="md:hidden" />ほっと一息つきたい気分だ。
                </p>
              </div>

              <div className="relative my-2 bg-black bg-opacity-40 rounded-xl p-2 border border-gray-700 shadow-inner">
                <div className="flex justify-between items-start relative z-10 w-full gap-2">
                  {[0, 1, 2, 3].map(val => (
                    <AnswerCircle 
                      key={val} 
                      val={val} 
                      selectedVal={tempSelectedVal}
                      onSelect={handleExampleAnswer}
                      showDoubleTapMessage={true} 
                    />
                  ))}
                </div>
              </div>

            </div>
          </WindowBox>

          <div className="flex justify-center mt-2">
            <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
              ◀ もどる
            </button>
          </div>
        </div>
      );

      const renderQuestion = () => {
        const q = QUESTIONS[qIndex];
        
        return (
          <div className="w-full">
            <WindowBox title={`物語 ${qIndex + 1}`} iconName="fa-solid fa-book-open" className="bg-opacity-90">
              <div className="flex flex-col w-full py-1">
                
                <div className="bg-[#5c4a30] bg-opacity-40 border border-[#e6c280] rounded-lg p-5 md:p-6 text-center relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)] mb-6">
                  <p className="text-sm md:text-base font-bold text-[#fdf6e3] leading-loose whitespace-pre-wrap">
                    {q.text}
                  </p>
                </div>

                <p className="text-center text-gray-400 text-xs md:text-sm font-bold mb-2">今のあなたに、どれくらい当てはまりますか？</p>

                <div className="relative bg-black bg-opacity-40 rounded-xl p-2 border border-gray-700 shadow-inner">
                  <div className="flex justify-between items-start relative z-10 w-full gap-2">
                    {[0, 1, 2, 3].map(val => (
                      <AnswerCircle 
                        key={val} 
                        val={val} 
                        selectedVal={tempSelectedVal}
                        onSelect={handleAnswer}
                        showDoubleTapMessage={false} 
                      />
                    ))}
                  </div>
                </div>

              </div>
            </WindowBox>

            <div className="mt-4">
              <ProgressBar current={qIndex + 1} total={QUESTIONS.length} label="物語の進捗" />
            </div>

            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderCalculating = () => (
        <div className="flex-1 flex flex-col items-center justify-center animate-pulse">
          <i className="fa-solid fa-mug-hot text-5xl text-amber-300 mb-4"></i>
          <p className="text-xl font-bold text-white tracking-widest">こころの空模様を見つめています...</p>
        </div>
      );

      const renderResult = () => {
        if (!results) return null;
        const { top3, totalScore, finalScores } = results;

        let weatherText = "";
        let weatherIcon = "";
        if (totalScore >= 22) {
          weatherText = "雨（激しく降っているかもしれません）";
          weatherIcon = "fa-cloud-showers-heavy text-[#5c3620]";
        } else if (totalScore >= 15) {
          weatherText = "雨まじりのくもり";
          weatherIcon = "fa-cloud-rain text-[#5c3620]";
        } else if (totalScore >= 8) {
          weatherText = "くもり";
          weatherIcon = "fa-cloud text-[#5c3620]";
        } else {
          weatherText = "晴れ（時々くもり）";
          weatherIcon = "fa-sun text-[#5c3620]";
        }

        let alertMessage = null;
        if (totalScore >= 25) {
          alertMessage = (
            <div className="bg-[#4a1c1c] border border-red-500 text-red-100 p-2 md:p-3 rounded-lg shadow-md text-[10px] md:text-sm leading-relaxed">
              <p className="font-bold text-red-300 mb-1"><i className="fa-solid fa-triangle-exclamation"></i> 抱え込んでいませんか？</p>
              <p>複数の役割を同時に背負っている状態かもしれません。ひとりで整理しようとせず、専門家と一緒に見つめることも選択肢です。</p>
            </div>
          );
        } else if (totalScore <= 5) {
          alertMessage = (
            <div className="bg-[#1c2a4a] border border-blue-500 text-blue-100 p-2 md:p-3 rounded-lg shadow-md text-[10px] md:text-sm leading-relaxed">
              <p className="font-bold text-blue-300 mb-1"><i className="fa-solid fa-sun"></i> 穏やかな空模様です</p>
              <p>心の天気が安定しているようです。当てはまらなかった物語の中にも、これからの自分を守るヒントがあるかもしれません。</p>
            </div>
          );
        }

        return (
          <div className="animate-fade-in w-full space-y-6 pb-12">
            <div id="result-capture-area" className="w-full pt-4 pb-4 px-2">
              <DialogBox 
                charConfig={CONFIG.char1} 
                text={`お疲れ様でした。\nここに出た結果は、あなたを決めつけるものではありません。\n\n今、心がどんな天気なのか、どんな役割を背負っているのか。\nそれを少しだけ言葉にして、外に出してみるためのものです。`} 
              />

              {/* 1枚のノートに全てをまとめる */}
              <div className="w-full dialog-note border-2 border-amber-600 mt-6 shadow-xl animate-fade-in relative">
                <div className="relative z-10 flex flex-col h-full">

                  {/* 上部：近い物語 と 心の天気 の横並び */}
                  <div className="flex flex-row gap-2 md:gap-4 items-stretch w-full mb-5">
                    {/* 左：近い物語 */}
                    <div className="flex-1 min-w-0 flex flex-col">
                      <h4 className="font-bold text-[#5c3620] mb-2 flex items-center gap-1.5 text-sm md:text-base">
                        <i className="fa-solid fa-book-open-reader text-[#5c3620]"></i> 近い物語
                      </h4>
                      <div className="space-y-2 h-full flex flex-col justify-center">
                        {top3.map((key, idx) => {
                          const data = WEATHER_DATA[key];
                          
                          return (
                            <div key={key} className="p-1.5 md:p-3 flex flex-row items-center">
                              <div className="font-bold text-sm md:text-xl mr-2 md:mr-4 text-[#5c3620] w-4 md:w-8 text-center shrink-0">
                                {idx + 1}
                              </div>
                              <div className="flex flex-col md:flex-row items-start md:items-center gap-0.5 md:gap-3">
                                <i className={`${data.icon} text-lg md:text-2xl ${data.color} drop-shadow-sm`}></i>
                                <h3 className="text-xs md:text-base font-bold text-[#2d1b10] leading-tight text-left">{data.name}</h3>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* 右：心の天気 */}
                    <div className="flex-1 min-w-0 flex flex-col">
                      <h4 className="font-bold text-[#5c3620] mb-2 flex items-center gap-1.5 text-sm md:text-base">
                        <i className="fa-solid fa-cloud-sun text-[#5c3620]"></i> 心の天気
                      </h4>
                      <div className="flex flex-col items-center justify-center p-3 md:p-4 flex-1">
                        <i className={`fa-solid ${weatherIcon} text-4xl md:text-5xl mb-2 md:mb-3 drop-shadow-sm`}></i>
                        <p className="text-xs md:text-base font-bold text-[#2d1b10] tracking-widest text-center">{weatherText}</p>
                      </div>
                    </div>
                  </div>

                  {/* アラートメッセージ */}
                  {alertMessage && (
                    <div className="mb-5">
                      {alertMessage}
                    </div>
                  )}

                  {/* こころの荷物のバランス（イコライザー） */}
                  <div className="pt-4 border-t border-amber-800/20 mb-5">
                    <h4 className="font-bold text-[#5c3620] mb-4 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-sliders text-[#5c3620]"></i> 心の波長（バランス）
                    </h4>
                    <div className="w-full px-1 md:px-2">
                      {/* イコライザー本体 */}
                      <div className="flex flex-row justify-between items-end w-full h-24 md:h-32 mb-2 border-b border-[#5c3620]/30 pb-2">
                        {QUESTIONS.map((q, index) => {
                          const key = q.type;
                          const score = finalScores[key] || 0;
                          const data = WEATHER_DATA[key];
                          const catColor = CATEGORIES[data.category].color;
                          
                          return (
                            <div key={`eq-${key}`} className="flex flex-col items-center justify-end h-full w-[8%] group relative cursor-pointer">
                              <div className="flex flex-col gap-1 md:gap-1.5 w-full items-center justify-end h-full">
                                {[3, 2, 1].map(level => (
                                  <div 
                                    key={level} 
                                    className={`w-full max-w-[16px] md:max-w-[24px] h-4 md:h-6 rounded-sm transition-all duration-1000 ease-out ${score >= level ? catColor + ' opacity-90 shadow-[0_2px_4px_rgba(0,0,0,0.3)]' : 'bg-[#5c3620] bg-opacity-10'}`}
                                  ></div>
                                ))}
                              </div>
                              <div className="mt-1 md:mt-2 flex flex-col items-center">
                                <span className="text-[#5c3620] font-bold text-[9px] md:text-[11px] leading-none mb-0.5">{index + 1}</span>
                                <i className={`${data.icon} text-[#5c3620] text-xs md:text-lg opacity-80 group-hover:opacity-100 transition-opacity`}></i>
                              </div>
                              
                              {/* ツールチップ */}
                              <div className="absolute -top-10 md:-top-12 left-1/2 transform -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap bg-[#2d1b10] text-[#fff8df] text-[10px] md:text-xs px-2 py-1.5 rounded shadow-lg pointer-events-none z-20">
                                {data.name}
                                {/* 吹き出しの三角 */}
                                <div className="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-2 h-2 bg-[#2d1b10] rotate-45"></div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      
                      {/* 凡例（印刷・詳細確認用） */}
                      <div className="mt-4 pt-3 border-t border-amber-800/20">
                        {/* 色の凡例 */}
                        <div className="flex flex-wrap justify-center gap-x-4 gap-y-2 mb-4 text-[9px] md:text-[11px] font-bold text-[#5c3620]">
                          {Object.keys(CATEGORIES).map(catKey => {
                            const cat = CATEGORIES[catKey];
                            return (
                              <div key={`legend-${catKey}`} className="flex items-center gap-1.5">
                                <div className={`w-3 h-3 md:w-4 md:h-4 rounded-sm ${cat.color} opacity-90 shadow-sm`}></div>
                                <span>{cat.name}</span>
                              </div>
                            )
                          })}
                        </div>
                        
                        {/* 項目の凡例 */}
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-x-2 gap-y-1.5 text-[9px] md:text-[10px] text-[#2d1b10] font-medium bg-[#5c3620] bg-opacity-5 p-2 md:p-3 rounded-lg border border-[#5c3620]/10">
                          {QUESTIONS.map((q, index) => {
                            const data = WEATHER_DATA[q.type];
                            return (
                              <div key={`legend-item-${q.type}`} className="flex items-center gap-1">
                                <span className="font-bold text-[#5c3620] w-3 md:w-4 text-right shrink-0">{index + 1}.</span>
                                <span className="truncate" title={data.name}>{data.name}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 重くなっている役割 */}
                  <div className="pt-4 border-t border-amber-800/20 mb-5">
                    <h4 className="font-bold text-[#5c3620] mb-3 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-suitcase text-[#5c3620]"></i> 今、重くなっているかもしれない役割
                    </h4>
                    <div className="space-y-3 pl-1 md:pl-2">
                      {top3.map((key) => {
                        const data = WEATHER_DATA[key];
                        return (
                          <div key={`role-${key}`} className="flex items-start gap-2">
                            <i className="fa-solid fa-check text-[#5c3620] mt-1"></i>
                            <p className="text-sm md:text-base text-[#2d1b10] font-bold leading-relaxed">{data.role}</p>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 小さな問い */}
                  <div className="pt-4 border-t border-amber-800/20 mb-5">
                    <h4 className="font-bold text-[#5c3620] mb-2 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-seedling text-emerald-600"></i> 小さな問い
                    </h4>
                    <div className="pl-2 md:pl-4 space-y-1.5 border-l-4 border-emerald-600/50 ml-1 py-1">
                      <p className="text-sm md:text-base text-[#2d1b10] font-medium leading-relaxed">その役割は、いつから少し重くなっていたのでしょうか。</p>
                      <p className="text-sm md:text-base text-[#2d1b10] font-medium leading-relaxed">もし一つだけ軽くできるとしたら、何を少し手放したいでしょうか。</p>
                    </div>
                  </div>

                  {/* 相談への道しるべ */}
                  <div className="pt-4 border-t border-amber-800/20">
                    <h4 className="font-bold text-[#5c3620] mb-2 flex items-center gap-1.5 text-sm md:text-base">
                      <i className="fa-solid fa-door-open text-[#5c3620]"></i> 相談への道しるべ
                    </h4>
                    <div className="pl-2 md:pl-4 space-y-1.5 border-l-4 border-amber-600/50 ml-1 py-1">
                      <p className="text-sm md:text-base text-[#2d1b10] font-medium leading-relaxed">
                        うまく話せなくても大丈夫です。<br />
                        重すぎる役割はつらい荷物にもなりがちです。<br />
                        この結果を見ながら、整理し、持っている荷物を軽くすることもできるかもしれません。
                      </p>
                      <p className="pt-2 text-emerald-800 text-[11px] md:text-xs font-bold">
                        ※相談をご希望の方は、下の「ひとに話してみる」ボタンからお進みください。
                      </p>
                    </div>
                  </div>

                </div>
              </div>

            </div>

            {/* アクションボタン群 */}
            <div className="text-center pt-4 flex flex-col items-center gap-4">
              <button onClick={() => openPopup('save')} className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-blue-900 border-blue-400 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                <i className="fa-solid fa-camera"></i> あとで見返す
              </button>

              <a 
                href="https://ninin-cc.github.io/" 
                target="_blank" 
                rel="noopener noreferrer" 
                className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-yellow-900 border-yellow-500 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(250,204,21,0.2)]"
              >
                <i className="fa-solid fa-comments"></i> ひとに話してみる
              </a>

              <button onClick={resetApp} className="text-gray-400 hover:text-white underline underline-offset-4 text-sm mt-4">
                もう一度最初から見つめる
              </button>
            </div>
          </div>
        );
      };

      const renderPopup = () => {
        if (popupType === 'none') return null;

        if (popupType === 'start') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="準備完了！" iconName="fa-solid fa-flag-checkered" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`迷ったときは、“どちらが少し近いかな”くらいで大丈夫です。`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={() => {
                        closePopup();
                        setAnimationKey(prev => prev + 1);
                        setStep('question');
                        window.scrollTo(0, 0);
                      }}
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      物語へ進む
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'notYet') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="ゆっくりで大丈夫" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`難しく考えすぎなくて大丈夫です。\n直感に近い感覚で選んでみてくださいね。`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'talk') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="カフェの片隅で" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={`自分が背負っている役割は、一人で抱えているだけでは見えにくいことがあります。\n\n言葉にして、誰かに話してみることで、\n「ああ、自分はこんなに背負っていたんだ」と気づくこともあります。\n\nもしよければ、nininキャリアルームで、あなたの話をゆっくり聞かせてください。`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <a 
                      href="https://ninin-cc.github.io/" 
                      target="_blank" 
                      rel="noopener noreferrer" 
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-door-open"></i> nininキャリアルームへ
                    </a>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今は閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'save') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="こころの記録" iconName="fa-solid fa-camera" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={<span>いいですね！<br />ご自身の『こころの天気と役割』を画像で保存しましょうか？<br />あとでゆっくり見返して、自分と対話するヒントにしてくださいね！</span>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={handleSaveImage}
                      className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-download"></i> 画像として保存する
                    </button>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今はやめておく
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }
      };

      return (
        <div className="flex flex-col flex-1 w-full justify-between">
          <div className="w-full">
            <div key={animationKey} className={animationKey > 0 ? "animate-page-turn w-full" : "w-full"}>
              {step === 'intro' && renderIntro()}
              {step === 'practice' && renderPractice()}
              {step === 'question' && renderQuestion()}
            </div>
            {step === 'calculating' && renderCalculating()}
            {step === 'result' && renderResult()}
          </div>
          
          {/* フッター */}
          <div className="w-full mt-12 mb-4 flex flex-col items-center animate-fade-in">
            {(step === 'intro' || step === 'result') && (
              <div className="w-full bg-black bg-opacity-60 border border-gray-500 rounded p-3 text-center text-[9px] md:text-xs text-gray-300 shadow-sm mb-4">
                <p className="mb-3 text-yellow-100 opacity-90 leading-relaxed">
                  ※本アプリは医療的な診断や占い、性格を決めつけるものではありません。<br className="hidden md:block" />
                  ご自身の「重くなっている役割」に気づき、これからの働き方や生き方を考えるための「自己理解のきっかけ」としてご活用ください。
                </p>
                <div className="border-t border-gray-600/50 pt-2">
                  <p className="mb-1 leading-relaxed text-gray-400">本アプリは、交流分析・RIASEC・役割理論・キャリア理論などの知見をもとに、現代の働き方や人間関係に合わせて設計された RIESM™ / RoleTRADE™ の考え方に基づいて作られています。</p>
                  <p className="text-gray-400">© ninin consulting & counseling LLC. All rights reserved.</p>
                </div>
              </div>
            )}

            <div className="w-full border-t border-gray-500/50 pt-3 flex flex-col items-center justify-center gap-1.5 text-[10px] md:text-xs text-gray-400">
              <a href="https://ninin-cc.github.io/" target="_blank" rel="noopener noreferrer" className="hover:text-yellow-300 transition-colors underline underline-offset-4">
                © 2026 ninin consulting＆counseling
              </a>
              <div className="font-mono opacity-70">
                PageNO: {step === 'question' ? qIndex + 1 : step}
              </div>
            </div>
          </div>

          {renderPopup()}

          {animationKey > 0 && step !== 'calculating' && step !== 'result' && (
            <div key={`page-turn-${animationKey}`} className="page-flip-overlay"></div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
