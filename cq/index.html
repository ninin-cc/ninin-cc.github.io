<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャリアクエスト ～あなたの休息と、旅立ちに祝福を～</title>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
    body { margin: 0; padding: 0; background: #000; }
    .rpg-font { font-family: 'DotGothic16', sans-serif; letter-spacing: 0.05em; }
    .rpg-input { background: rgba(0,0,0,0.5); border: none; border-bottom: 2px solid white; color: white; outline: none; padding: 8px; width: 100%; transition: border-color 0.2s; }
    .rpg-input:focus { border-color: #fcd34d; background: rgba(0,0,0,0.8); }
    .rpg-button { border: 2px solid white; padding: 6px 16px; border-radius: 4px; transition: all 0.2s; background: black; color: white; cursor: pointer; text-align: center; }
    .rpg-button:hover:not(:disabled) { background: white; color: black; }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .app-footer a { color: inherit; text-decoration: underline; text-underline-offset: 3px; }

    @media print {
      @page {
        size: A4 portrait;
        margin: 12mm;
      }

      html, body {
        background: #fff !important;
      }

      .print-hidden {
        display: none !important;
      }

      .print-shell {
        background: #fff !important;
        background-image: none !important;
        min-height: auto !important;
        padding: 0 !important;
      }

      .print-container {
        color: #111 !important;
        max-width: 100% !important;
        min-height: auto !important;
        padding-bottom: 0 !important;
      }

      .print-friendly {
        background: #fff !important;
        color: #111 !important;
        border-color: #333 !important;
        box-shadow: none !important;
      }

      .print-friendly * {
        color: #111 !important;
      }

      .print-avoid-break {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .print-page-break {
        page-break-before: always;
        break-before: page;
      }

      .lifeline-print {
        background: #fff !important;
        border-color: #333 !important;
        max-height: 95mm;
        overflow: hidden;
      }

      .lifeline-print svg {
        width: 100% !important;
        max-height: 90mm !important;
        height: auto !important;
      }

      .lifeline-print foreignObject div {
        background: #fff !important;
        color: #111 !important;
      }
