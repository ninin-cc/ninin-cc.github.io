    (function () {

      var isInAppBrowser = /Line\/|FBAN|FBAV|FB_IAB|Instagram|Twitter|MicroMessenger|TikTok|LinkedInApp|Pinterest|KAKAOTALK|NAVER|NewsPicks/i.test(ua);
      if (!isInAppBrowser) return;

      try {
        if (sessionStorage.getItem('cq_external_browser_redirect_attempted') === '1') return;
        sessionStorage.setItem('cq_external_browser_redirect_attempted', '1');
      } catch (error) {}

      var currentUrl = window.location.href;
      var isAndroid = /Android/i.test(ua);
      var isIOS = /iPhone|iPad|iPod/i.test(ua);

      window.setTimeout(function () {
        if (isAndroid) {
          var strippedUrl = currentUrl.replace(/^https?:\/\//i, '');
          var scheme = /^https:\/\//i.test(currentUrl) ? 'https' : 'http';
          window.location.href = 'intent://' + strippedUrl + '#Intent;scheme=' + scheme + ';package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(currentUrl) + ';end';
          return;
        }

        if (isIOS && /^https?:\/\//i.test(currentUrl)) {
          window.location.href = currentUrl
            .replace(/^https:\/\//i, 'googlechromes://')
            .replace(/^http:\/\//i, 'googlechrome://');
        }
      }, 1);
    })();

    function useCasualSourceGuard() {
      useEffect(() => {
        const guardedKeys = new Set(['s', 'u']);
        const guardedShiftKeys = new Set(['i', 'j', 'c']);

        const block = (event) => {
          event.preventDefault();
          event.stopPropagation();
          return false;
        };

        const handleContextMenu = (event) => block(event);
        const handleDragStart = (event) => block(event);
        const handleKeyDown = (event) => {
          const key = event.key.toLowerCase();
          const usesModifier = event.ctrlKey || event.metaKey;

          if (event.key === 'F12') return block(event);
          if (usesModifier && guardedKeys.has(key)) return block(event);
          if (usesModifier && event.shiftKey && guardedShiftKeys.has(key)) return block(event);
        };

        document.addEventListener('contextmenu', handleContextMenu);
        document.addEventListener('dragstart', handleDragStart);
        document.addEventListener('keydown', handleKeyDown, true);

        return () => {
          document.removeEventListener('contextmenu', handleContextMenu);
          document.removeEventListener('dragstart', handleDragStart);
          document.removeEventListener('keydown', handleKeyDown, true);
        };
      }, []);
    }

    function useLocalStorage(key, initialValue) {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          return item ? JSON.parse(item) : initialValue;
        } catch (error) {
          console.log(error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          setStoredValue((currentValue) => {
            const valueToStore = value instanceof Function ? value(currentValue) : value;
            window.localStorage.setItem(key, JSON.stringify(valueToStore));
            return valueToStore;
          });
        } catch (error) {
          console.log(error);
        }
      };

      return [storedValue, setValue];
    }

    const LifelineChart = ({ data }) => {
      if (!data || data.length === 0) return <div className="text-center p-4">記録がありません。</div>;
      const sortedData = [...data].sort((a, b) => a.age - b.age);
      const width = 1000; const height = 300; const paddingX = 50; const paddingY = 20;
      const chartWidth = width - paddingX * 2; const chartHeight = height - paddingY * 2;

      const getX = (index) => paddingX + (index * (chartWidth / Math.max(1, sortedData.length - 1)));
      const getY = (satisfaction) => {
        const normalized = (satisfaction + 50) / 100;
        return paddingY + chartHeight - (normalized * chartHeight);
      };

      const generateSmoothPath = (items) => {
        if (items.length === 0) return '';
        if (items.length === 1) return `M ${getX(0)},${getY(items[0].satisfaction)}`;
        let path = `M ${getX(0)},${getY(items[0].satisfaction)}`;
        for (let i = 0; i < items.length - 1; i++) {
          const x0 = getX(i); const y0 = getY(items[i].satisfaction);
          const x1 = getX(i + 1); const y1 = getY(items[i + 1].satisfaction);
          const cx0 = x0 + (x1 - x0) * 0.4; const cy0 = y0;
          const cx1 = x1 - (x1 - x0) * 0.4; const cy1 = y1;
          path += ` C ${cx0},${cy0} ${cx1},${cy1} ${x1},${y1}`;
        }
        return path;
      };

      const pathData = generateSmoothPath(sortedData);

      return (
        <div className="w-full bg-gray-900 border-2 border-dashed border-gray-600 p-2 rounded mt-4 lifeline-print print-avoid-break">

    const CanList = ({ cans, emptyText = 'まだ記録されていません。', compact = false, onRemove }) => {

    const WriteCue = ({ active }) => (
      <div className={`write-cue ${active ? 'is-blinking' : 'is-resting'}`} aria-hidden="true">▼</div>
    );

    const imageTheme = {
      width: 1200,
      height: 1697,
      bg: '#07111f',
      panel: '#0f172a',
      panel2: '#111827',
      border: '#facc15',
      text: '#f8fafc',
      muted: '#cbd5e1',
      blue: '#60a5fa',
      red: '#f87171',
      green: '#4ade80',
      purple: '#c084fc',
      parchment: '#f2dfad',
      parchmentBorder: '#a87533',
      ink: '#071f3f',
      brown: '#6b3f15'
    };

    const canvasFont = (size, weight = '400') => `${weight} ${size}px 'DotGothic16', 'Yu Gothic', 'Meiryo', sans-serif`;

    const roundRectPath = (ctx, x, y, w, h, r = 12) => {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    };

    const fillRoundRect = (ctx, x, y, w, h, r, fill, stroke, lineWidth = 2) => {
      ctx.save();
      roundRectPath(ctx, x, y, w, h, r);
      if (fill) {
        ctx.fillStyle = fill;
        ctx.fill();
      }
      if (stroke) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }
      ctx.restore();
    };

    const canvasLines = (ctx, text, maxWidth) => {
      const source = String(text || '');
      const lines = [];
      source.split('\n').forEach(part => {
        if (!part) {
          lines.push('');
          return;
        }
        let line = '';
        [...part].forEach(char => {
          const test = line + char;
          if (line && ctx.measureText(test).width > maxWidth) {
            lines.push(line);
            line = char;
          } else {
            line = test;
          }
        });
        lines.push(line);
      });
      return lines.length ? lines : [''];
    };

    const drawCanvasText = (ctx, text, x, y, maxWidth, lineHeight, options = {}) => {
      ctx.save();
      ctx.font = options.font || canvasFont(24);
      ctx.fillStyle = options.color || imageTheme.text;
      ctx.textBaseline = 'top';
      const lines = canvasLines(ctx, text || options.emptyText || '', maxWidth);
      const maxLines = options.maxLines || lines.length;
      const visibleLines = lines.slice(0, maxLines);
      visibleLines.forEach((line, index) => {
        let visible = line;
        if (index === maxLines - 1 && lines.length > maxLines) visible = `${line.slice(0, Math.max(0, line.length - 1))}…`;
        ctx.fillText(visible, x, y + index * lineHeight);
      });
      ctx.restore();
      return y + visibleLines.length * lineHeight;
    };

    const drawExportBackground = (ctx, height) => {
      const gradient = ctx.createLinearGradient(0, 0, 0, height);

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, imageTheme.width, height);
      ctx.strokeStyle = imageTheme.border;
      ctx.lineWidth = 6;
      ctx.strokeRect(32, 32, imageTheme.width - 64, height - 64);

    const drawExportFooter = (ctx, y) => {

      ctx.fillText(title, imageTheme.width / 2, y + 98);

      y += 150;
      fillRoundRect(ctx, 90, y, imageTheme.width - 180, 120, 10, '#0b1220', imageTheme.border, 3);
      ctx.textAlign = 'center';

      ctx.font = canvasFont(20, '700');
      ctx.fillText('お客様', imageTheme.width / 2, y + 20);

      ctx.font = canvasFont(42, '700');
      ctx.fillText(`${player.name || 'お名前未入力'}  ${player.age || '?'}歳`, imageTheme.width / 2, y + 52);
      ctx.textAlign = 'left';
      return y + 155;
    };

    const drawSectionTitle = (ctx, title, y) => {
      ctx.font = canvasFont(28, '700');

      ctx.fillText(`▼ ${title}`, 90, y);
      return y + 46;

    const drawDarkCard = (ctx, x, y, w, h) => {
      fillRoundRect(ctx, x, y, w, h, 10, '#0f172a', '#334155', 2);
    };

    const drawParchmentCard = (ctx, x, y, w, h) => {
      fillRoundRect(ctx, x, y, w, h, 10, imageTheme.parchment, imageTheme.parchmentBorder, 3);
      ctx.save();
      ctx.strokeStyle = 'rgba(90, 60, 24, 0.18)';
      ctx.lineWidth = 1;
      for (let lineY = y + 34; lineY < y + h - 18; lineY += 30) {
        ctx.beginPath();
        ctx.moveTo(x + 18, lineY);

    const cropCanvas = (canvas, usedHeight) => {

    const downloadCanvasPng = (canvas, filename) => {
      canvas.toBlob(blob => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }, 'image/png');
    };

    const drawLifeChartOnCanvas = (ctx, memories, x, y, w, h) => {
      const sorted = [...(memories || [])].sort((a, b) => a.age - b.age);
      drawDarkCard(ctx, x, y, w, h);
      const px = 54;
      const py = 36;
      const chartX = x + px;
      const chartY = y + py;
      const chartW = w - px * 2;
      const chartH = h - py * 2;
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(chartX, chartY + chartH / 2);
      ctx.lineTo(chartX + chartW, chartY + chartH / 2);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.font = canvasFont(18);
      ctx.fillStyle = imageTheme.muted;
      ctx.fillText('+50', chartX - 42, chartY - 4);
      ctx.fillText('±0', chartX - 38, chartY + chartH / 2 - 10);
      ctx.fillText('-50', chartX - 42, chartY + chartH - 18);

      if (!sorted.length) {
        drawCanvasText(ctx, '出来事はまだ記録されていません。', chartX + 40, chartY + 110, chartW - 80, 30, { font: canvasFont(26), color: imageTheme.muted });
        return;
      }

      const getX = index => chartX + index * (chartW / Math.max(1, sorted.length - 1));
      const getY = satisfaction => chartY + chartH - (((Number(satisfaction) + 50) / 100) * chartH);

      ctx.beginPath();
      sorted.forEach((item, index) => {
        const cx = getX(index);
        const cy = getY(item.satisfaction);
        if (index === 0) {
          ctx.moveTo(cx, cy);
        } else {
          const prevX = getX(index - 1);
          const prevY = getY(sorted[index - 1].satisfaction);
          const c0x = prevX + (cx - prevX) * 0.4;
          const c1x = cx - (cx - prevX) * 0.4;
          ctx.bezierCurveTo(c0x, prevY, c1x, cy, cx, cy);
        }
      });
      ctx.strokeStyle = imageTheme.border;
      ctx.lineWidth = 5;
      ctx.stroke();

      sorted.forEach((item, index) => {
        const cx = getX(index);
        const cy = getY(item.satisfaction);
        ctx.fillStyle = imageTheme.bg;
        ctx.beginPath();
        ctx.arc(cx, cy, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = imageTheme.border;
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.font = canvasFont(18, '700');
        ctx.fillStyle = imageTheme.text;
        ctx.textAlign = 'center';
        ctx.fillText(`${item.age}歳`, cx, y + h - 28);
        ctx.textAlign = 'left';

        const labelY = cy < chartY + chartH / 2 ? cy + 16 : cy - 58;
        fillRoundRect(ctx, cx - 78, labelY, 156, 46, 6, 'rgba(0,0,0,0.7)', null);
        drawCanvasText(ctx, item.event || '', cx - 70, labelY + 7, 140, 16, { font: canvasFont(14), color: imageTheme.text, maxLines: 2 });
      });
    };

    const drawOverflowCount = (ctx, text, x, y, color = imageTheme.muted) => {

    const createA4Canvas = () => {
      const canvas = document.createElement('canvas');

    const drawFixedFooter = (ctx) => drawExportFooter(ctx, imageTheme.height - 92);

    const createMemoryExportImage = ({ player, memories, chartInsight }) => {
      const canvas = createA4Canvas();
      const ctx = canvas.getContext('2d');
      let y = drawExportHeader(ctx, '歩んできた道：Memory', player);
      y = drawSectionTitle(ctx, 'ライフラインチャート', y);
      drawLifeChartOnCanvas(ctx, memories, 90, y, imageTheme.width - 180, 360);
      y += 400;

      y = drawSectionTitle(ctx, '出来事の一覧', y);
      const sorted = [...(memories || [])].sort((a, b) => a.age - b.age);
      const contentW = imageTheme.width - 180;
      const gap = 18;
      const colW = (contentW - gap) / 2;
      const rowH = 82;
      const visible = sorted.slice(0, 8);

      if (!visible.length) {
        drawDarkCard(ctx, 90, y, contentW, 82);
        drawCanvasText(ctx, '出来事はまだ記録されていません。', 120, y + 26, contentW - 60, 26, { font: canvasFont(22), color: imageTheme.muted });
        y += 106;
      } else {
        visible.forEach((item, index) => {
          const col = index % 2;
          const row = Math.floor(index / 2);
          const cardX = 90 + col * (colW + gap);
          const cardY = y + row * rowH;
          drawDarkCard(ctx, cardX, cardY, colW, rowH - 12);
          ctx.font = canvasFont(20, '700');
          ctx.fillStyle = imageTheme.border;
          ctx.fillText(`${item.age}歳`, cardX + 20, cardY + 16);
          ctx.fillStyle = Number(item.satisfaction) >= 0 ? imageTheme.blue : imageTheme.red;
          ctx.fillText(`${Number(item.satisfaction) > 0 ? '+' : ''}${item.satisfaction}`, cardX + colW - 72, cardY + 16);
          drawCanvasText(ctx, item.event || '', cardX + 92, cardY + 14, colW - 178, 22, { font: canvasFont(18), color: imageTheme.text, maxLines: 2 });
        });
        y += Math.ceil(visible.length / 2) * rowH + 4;
        if (sorted.length > visible.length) {
          drawOverflowCount(ctx, `ほか ${sorted.length - visible.length} 件の出来事があります。`, 92, y);
          y += 32;
        }
      }

      y = drawSectionTitle(ctx, 'ライフラインを見て気づいたこと', y + 10);
      drawDarkCard(ctx, 90, y, contentW, 190);
      drawCanvasText(ctx, chartInsight || 'まだメモはありません。', 120, y + 24, contentW - 60, 28, { font: canvasFont(22), color: imageTheme.text, maxLines: 5 });
      drawFixedFooter(ctx);
      return canvas;
    };

    const createStatusExportImage = ({ player, cans, canInsight, allyInsight }) => {
      const canvas = createA4Canvas();
      const ctx = canvas.getContext('2d');
      let y = drawExportHeader(ctx, '強み：Can', player);
      y = drawSectionTitle(ctx, '専門スキル・汎用スキル・仲間', y);

      const contentW = imageTheme.width - 180;
      const gap = 18;
      const cardW = (contentW - gap * 2) / 3;
      const cardH = 520;
      const groupY = y;

      ['skill', 'magic', 'ally'].forEach((type, index) => {
        const group = (cans || []).filter(c => c.type === type);
        const meta = canTypeMeta[type];
        const x = 90 + index * (cardW + gap);
        drawDarkCard(ctx, x, groupY, cardW, cardH);
        ctx.font = canvasFont(24, '700');
        ctx.fillStyle = type === 'skill' ? imageTheme.blue : type === 'magic' ? imageTheme.purple : imageTheme.green;
        ctx.fillText(meta.label, x + 22, groupY + 24);
        let innerY = groupY + 70;
        const visible = group.slice(0, 6);
        if (!visible.length) {
          drawCanvasText(ctx, '未記録', x + 22, innerY, cardW - 44, 26, { font: canvasFont(21), color: imageTheme.muted });
        } else {
          visible.forEach(item => {
            ctx.fillStyle = type === 'skill' ? imageTheme.blue : type === 'magic' ? imageTheme.purple : imageTheme.green;
            ctx.font = canvasFont(20, '700');
            ctx.fillText(`・${item.name}`, x + 22, innerY);
            innerY = drawCanvasText(ctx, item.desc || '説明なし', x + 42, innerY + 26, cardW - 64, 21, { font: canvasFont(17), color: imageTheme.muted, maxLines: 2 }) + 14;
          });
          if (group.length > visible.length) {
            drawOverflowCount(ctx, `ほか ${group.length - visible.length} 件`, x + 22, groupY + cardH - 38);
          }
        }
      });

      y = groupY + cardH + 36;
      y = drawSectionTitle(ctx, '気づき', y);
      const memoW = (contentW - gap) / 2;
      drawDarkCard(ctx, 90, y, memoW, 360);
      ctx.font = canvasFont(22, '700');
      ctx.fillStyle = imageTheme.border;
      ctx.fillText('専門スキル・汎用スキルから見えた気づき', 118, y + 26);
      drawCanvasText(ctx, canInsight || 'まだメモはありません。', 118, y + 68, memoW - 56, 27, { font: canvasFont(21), color: imageTheme.text, maxLines: 9 });

      const allyX = 90 + memoW + gap;
      drawDarkCard(ctx, allyX, y, memoW, 360);
      ctx.font = canvasFont(22, '700');
      ctx.fillStyle = imageTheme.border;
      ctx.fillText('仲間・関係性から見えた気づき', allyX + 28, y + 26);
      drawCanvasText(ctx, allyInsight || 'まだメモはありません。', allyX + 28, y + 68, memoW - 56, 27, { font: canvasFont(21), color: imageTheme.text, maxLines: 9 });

      drawFixedFooter(ctx);
      return canvas;
    };

    const createWillMustExportImage = ({ player, will, willOneYearInsight, willThreeYearsInsight, selectedMust, mustInsight }) => {
      const canvas = createA4Canvas();
      const ctx = canvas.getContext('2d');
      let y = drawExportHeader(ctx, '次の目標：Will / Quest', player);
      const contentW = imageTheme.width - 180;
      const gap = 18;

      y = drawSectionTitle(ctx, '次の目標：Will', y);
      drawDarkCard(ctx, 90, y, contentW, 330);
      ctx.font = canvasFont(22, '700');
      ctx.fillStyle = imageTheme.border;
      ctx.fillText('1年後', 120, y + 28);
      let innerY = drawCanvasText(ctx, will.oneYear || '未記録', 120, y + 62, contentW - 60, 26, { font: canvasFont(21), color: imageTheme.text, maxLines: 4 });
      ctx.fillStyle = imageTheme.border;
      ctx.font = canvasFont(22, '700');
      ctx.fillText('3年後', 120, innerY + 16);
      innerY = drawCanvasText(ctx, will.threeYears || '未記録', 120, innerY + 48, contentW - 60, 26, { font: canvasFont(21), color: imageTheme.text, maxLines: 4 });
      ctx.fillStyle = imageTheme.blue;
      ctx.font = canvasFont(24, '700');
      ctx.fillText(`目指すロール：${will.job || '未記録'}`, 120, Math.min(y + 292, innerY + 18));

      y += 366;
      const memoW = (contentW - gap) / 2;
      drawDarkCard(ctx, 90, y, memoW, 210);
      ctx.font = canvasFont(21, '700');
      ctx.fillStyle = imageTheme.border;
      ctx.fillText('1年後の気づき', 118, y + 24);
      drawCanvasText(ctx, willOneYearInsight || 'まだメモはありません。', 118, y + 62, memoW - 56, 25, { font: canvasFont(19), color: imageTheme.text, maxLines: 5 });
      const threeX = 90 + memoW + gap;
      drawDarkCard(ctx, threeX, y, memoW, 210);
      ctx.font = canvasFont(21, '700');
      ctx.fillStyle = imageTheme.border;
      ctx.fillText('3年後の気づき', threeX + 28, y + 24);
      drawCanvasText(ctx, willThreeYearsInsight || 'まだメモはありません。', threeX + 28, y + 62, memoW - 56, 25, { font: canvasFont(19), color: imageTheme.text, maxLines: 5 });

      y += 252;
      y = drawSectionTitle(ctx, '会社・組織からのミッション：Must', y);
      const must = selectedMust || {};
      drawParchmentCard(ctx, 90, y, contentW, 500);
      ctx.fillStyle = imageTheme.brown;
      ctx.font = canvasFont(21, '700');
      ctx.fillText('接続したミッション', 125, y + 28);
      ctx.fillStyle = imageTheme.ink;
      ctx.font = canvasFont(31, '700');
      drawCanvasText(ctx, must.title || '未選択', 125, y + 62, contentW - 70, 38, { font: canvasFont(31, '700'), color: imageTheme.ink, maxLines: 2 });
      let nextY = drawCanvasText(ctx, must.desc || '概要なし', 125, y + 142, contentW - 70, 27, { font: canvasFont(21), color: imageTheme.ink, maxLines: 4 });
      ctx.strokeStyle = imageTheme.parchmentBorder;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(125, nextY + 16);
      ctx.lineTo(imageTheme.width - 125, nextY + 16);
      ctx.stroke();
      ctx.fillStyle = imageTheme.brown;
      ctx.font = canvasFont(21, '700');
      ctx.fillText('Willとの接続メモ', 125, nextY + 38);
      nextY = drawCanvasText(ctx, must.connection || '未記録', 125, nextY + 74, contentW - 70, 25, { font: canvasFont(19), color: imageTheme.ink, maxLines: 5 });
      ctx.strokeStyle = imageTheme.parchmentBorder;
      ctx.beginPath();
      ctx.moveTo(125, nextY + 14);
      ctx.lineTo(imageTheme.width - 125, nextY + 14);
      ctx.stroke();
      ctx.fillStyle = imageTheme.brown;
      ctx.font = canvasFont(21, '700');
      ctx.fillText('接続してみた気づき', 125, nextY + 36);
      drawCanvasText(ctx, mustInsight || 'まだメモはありません。', 125, nextY + 72, contentW - 70, 25, { font: canvasFont(19), color: imageTheme.ink, maxLines: 5 });

      drawFixedFooter(ctx);
      return canvas;
    };

    const App = () => {
      useCasualSourceGuard();

      const [scene, setScene] = useLocalStorage('cq_scene', 'intro');
      const [introStep, setIntroStep] = useLocalStorage('cq_intro_step', 0);
      const [isInputPhase, setIsInputPhase] = useLocalStorage('cq_input_phase', false);
      const [player, setPlayer] = useLocalStorage('cq_player', { name: '', age: '' });

      const [canStep, setCanStep] = useLocalStorage('cq_can_step', 0);
      const [cans, setCans] = useLocalStorage('cq_cans', []);
      const [newCan, setNewCan] = useState({ type: 'skill', name: '', desc: '' });
      const [canConfirming, setCanConfirming] = useState(false);

      const [memories, setMemories] = useLocalStorage('cq_memories', []);
      const [newMemory, setNewMemory] = useState({ age: '', event: '', satisfaction: 0 });
      const [memoryStep, setMemoryStep] = useLocalStorage('cq_memory_step', 0);
      const [chartInsight, setChartInsight] = useLocalStorage('cq_chart_insight', '');
      const [showRestPrompt, setShowRestPrompt] = useState(false);
      const [canInsight, setCanInsight] = useLocalStorage('cq_can_insight', '');
      const [allyInsight, setAllyInsight] = useLocalStorage('cq_ally_insight', '');

      const [willStep, setWillStep] = useLocalStorage('cq_will_step', 0);
      const [will, setWill] = useLocalStorage('cq_will', { job: '', oneYear: '', threeYears: '' });
      const [willOneYearInsight, setWillOneYearInsight] = useLocalStorage('cq_will_one_year_insight', '');
      const [willThreeYearsInsight, setWillThreeYearsInsight] = useLocalStorage('cq_will_three_years_insight', '');

      const [musts, setMusts] = useLocalStorage('cq_musts', []);
      const [newMust, setNewMust] = useState({ title: '', desc: '', connection: '' });
      const [mustInsight, setMustInsight] = useLocalStorage('cq_must_insight', '');
      const [mustStep, setMustStep] = useLocalStorage('cq_must_step', 0);
      const [mustWorkStep, setMustWorkStep] = useLocalStorage('cq_must_work_step', 0);
      const [activeMustId, setActiveMustId] = useLocalStorage('cq_active_must_id', null);
      const [mustQuestAdded, setMustQuestAdded] = useLocalStorage('cq_must_quest_added', false);
      const [mustRecollectionVisible, setMustRecollectionVisible] = useState(false);
      const [mustDraftStarted, setMustDraftStarted] = useState(false);
      const [mustConnectionStarted, setMustConnectionStarted] = useState(false);
      const [mustInsightStarted, setMustInsightStarted] = useState(() => Boolean(mustInsight));

      useEffect(() => {
        const allowedTypes = canStep === 0 ? ['skill', 'magic'] : ['ally'];
        if (!allowedTypes.includes(newCan.type)) {
          setNewCan({ type: allowedTypes[0], name: '', desc: '' });
        }
        setCanConfirming(false);
      }, [canStep]);

      useEffect(() => {
        const legacyDefault = musts.length === 1
          && musts[0].id === 1
          && musts[0].title === '会社・組織からのミッション'
          && musts[0].desc === '経験をつみ、古き良きものも活かすことも、必要に応じて最新の形へ進化させることも望まれている。';
        if (legacyDefault) {
          setMusts([]);
          setActiveMustId(null);
          setNewMust({ title: '', desc: '', connection: '' });
          setMustWorkStep(0);
          setMustQuestAdded(false);
        }
      }, []);

      const getSuggestedAges = () => {
        const currentAge = parseInt(player.age) || 30;
        const effectiveStartAge = currentAge < 22 ? 18 : 22;
        const diff = Math.max(0, currentAge - effectiveStartAge);
        return [
          effectiveStartAge,
          Math.floor(effectiveStartAge + diff * 0.25),
          Math.floor(effectiveStartAge + diff * 0.50),
          Math.floor(effectiveStartAge + diff * 0.75),
          currentAge
        ];
      };

      const getPageNo = () => {
        switch (scene) {
          case 'intro': return `1-${introStep + 1}${isInputPhase ? '-Input' : ''}`;
          case 'can': return `2-${canStep + 1}${isInputPhase ? '-Input' : ''}`;
          case 'memory': return `3-${memoryStep + 1}${isInputPhase ? '-Input' : ''}`;
          case 'chart': return '4';
          case 'will': return `5-${willStep + 1}${isInputPhase ? '-Input' : ''}`;
          case 'must': return `6-${mustStep + 1}`;
          case 'summary': return '7';
          default: return '0';
        }
      };

      const clearAdventureData = () => {
        const keysToRemove = [];
        for (let i = 0; i < window.localStorage.length; i++) {
          const key = window.localStorage.key(i);
          if (key && key.startsWith('cq_')) keysToRemove.push(key);
        }
        keysToRemove.forEach(key => window.localStorage.removeItem(key));
      };

      const scrollTop = () => window.scrollTo(0, 0);

      const nextScene = (next) => {
        scrollTop();
        setShowRestPrompt(false);
        setIsInputPhase(false);
        if (next === 'intro') setIntroStep(0);
        if (next === 'memory' && memories.length === 0) {
          setMemoryStep(0);
          const suggestedAges = getSuggestedAges();
          setNewMemory({ age: suggestedAges[0], event: '', satisfaction: 0 });
        }
        if (next === 'will') setWillStep(0);
        if (next === 'must') {
          setMustStep(0);
          setMustWorkStep(0);
          setMustQuestAdded(musts.length > 0);
          setMustRecollectionVisible(false);
        }
        setScene(next);
      };

      const goToIntro = () => {
        scrollTop();
        setShowRestPrompt(false);
        setIsInputPhase(false);
        setIntroStep(0);
        setScene('intro');
      };

      const goToCanInput = (step) => {
        scrollTop();
        setShowRestPrompt(false);
        setCanStep(step);
        setNewCan({ type: step === 0 ? 'skill' : 'ally', name: '', desc: '' });
        setCanConfirming(false);
        setIsInputPhase(true);
        setScene('can');
      };

      const goToWillInput = (step) => {
        scrollTop();
        setShowRestPrompt(false);
        setWillStep(step);
        setIsInputPhase(true);
        setScene('will');
      };

      const goToMustEdit = () => {
        scrollTop();
        setShowRestPrompt(false);
        setIsInputPhase(false);
        setMustStep(1);
        setMustWorkStep(0);
        setMustQuestAdded(musts.length > 0);
        setMustRecollectionVisible(true);
        setScene('must');
      };

      const goToProgressScene = (target) => {
        if (target === 'intro') return goToIntro();
        if (target === 'can') return goToCanInput(0);
        if (target === 'will') return goToWillInput(0);
        if (target === 'must') return goToMustEdit();

        scrollTop();
        setShowRestPrompt(false);
        setIsInputPhase(false);
        if (target === 'memory' && memories.length === 0) {
          const suggestedAges = getSuggestedAges();
          setMemoryStep(0);
          setNewMemory({ age: suggestedAges[0], event: '', satisfaction: 0 });
        }
        setScene(target);
      };

      const handleStartCan = () => {
        setCanStep(0);
        setNewCan({ type: 'skill', name: '', desc: '' });
        setCanConfirming(false);
        nextScene('can');
      };

      const handleAddCan = () => {
        if (!newCan.name) return;
        setCans([...cans, { ...newCan, id: Date.now() }]);
        setNewCan({ type: newCan.type, name: '', desc: '' });
        setCanConfirming(false);
      };
      const handleRemoveCan = (id) => {
        setCans(cans.filter(c => c.id !== id));
        setCanConfirming(false);
      };

      const handleCompleteCanStep = () => {
        setCanConfirming(false);
        if (canStep === 0) {
          setCanStep(1);
          setNewCan({ type: 'ally', name: '', desc: '' });
          setIsInputPhase(false);
          scrollTop();
        } else {
          nextScene('memory');
        }
      };

      const handleBackCanStep = () => {
        setCanStep(0);
        setNewCan({ type: 'skill', name: '', desc: '' });
        setCanConfirming(false);
        setIsInputPhase(false);
        scrollTop();
      };

      const handleAddMemory = () => {
        if (!newMemory.event || !newMemory.age) return;
        setMemories([...memories, { ...newMemory, id: Date.now(), age: Number(newMemory.age), satisfaction: Number(newMemory.satisfaction) }]);
        const nextStep = memoryStep + 1;
        setMemoryStep(nextStep);
        setIsInputPhase(false);

        if (nextStep < 5) {
          const suggestedAges = getSuggestedAges();
          setNewMemory({ age: suggestedAges[nextStep], event: '', satisfaction: 0 });
        } else {
          setNewMemory({ age: '', event: '', satisfaction: 0 });
        }
      };

      const handleSkipMemory = () => {
        const nextStep = memoryStep + 1;
        setMemoryStep(nextStep);
        setIsInputPhase(false);

        if (nextStep < 5) {
          const suggestedAges = getSuggestedAges();
          setNewMemory({ age: suggestedAges[nextStep], event: '', satisfaction: 0 });
        } else {
          setNewMemory({ age: '', event: '', satisfaction: 0 });
        }
      };

      const handleRemoveMemory = (id) => setMemories(memories.filter(m => m.id !== id));

      const getMustConnectionTemplate = (hint = '') => {
        const oneYearWill = will.oneYear || '〇〇';
        const threeYearsWill = will.threeYears || '△△';
        return `${hint ? `${hint}\n\n` : ''}それは私の１年後のWILLである「${oneYearWill}」を実現するのに役立つかもしれない。\nさらには・・・\n\nそれは私の３年後のWILLである「${threeYearsWill}」を実現するのに役立つかもしれない。\nさらには・・・`;
      };
      const normalizeMustConnection = (text = '') => (
        text.includes('それは私の１年後のWILL') ? text : getMustConnectionTemplate(text)
      );

      const handleAddMust = () => {
        if (!newMust.title) return;
        const existing = musts.find(m => m.title === newMust.title);
        const connection = existing ? (existing.connection || normalizeMustConnection(newMust.connection)) : normalizeMustConnection(newMust.connection);
        const id = existing ? existing.id : Date.now();
        const mustToAdd = {
          id,
          title: newMust.title,
          desc: newMust.desc,
          connection
        };
        setMusts(existing ? musts.map(m => m.id === existing.id ? mustToAdd : m) : [...musts, mustToAdd]);
        setActiveMustId(id);
        setNewMust({ title: '', desc: '', connection: '' });
        setMustQuestAdded(true);
        setMustDraftStarted(false);
      };
      const handleProceedToMustConnection = () => {
        if (musts.length === 0) return;
        if (musts.length > 1) {
          setMustWorkStep(1);
          scrollTop();
          return;
        }
        const target = musts[0];
        setActiveMustId(target.id);
        setNewMust({
          title: target.title,
          desc: target.desc,
          connection: target.connection || normalizeMustConnection('')
        });
        setMustConnectionStarted(false);
        setMustWorkStep(2);
        scrollTop();
      };
      const handleStartMustConnection = (must) => {
        setActiveMustId(must.id);
        setNewMust({
          title: must.title,
          desc: must.desc,
          connection: must.connection || normalizeMustConnection('')
        });
        setMustConnectionStarted(false);
        setMustWorkStep(2);
        scrollTop();
      };
      const handleSaveMustConnection = () => {
        if (!activeMustId) return;
        setMusts(musts.map(m => m.id === activeMustId ? { ...m, connection: newMust.connection } : m));
        setMustWorkStep(3);
        scrollTop();
      };
      const handleEditMustConnection = (connection) => {
        setMustConnectionStarted(true);
        setNewMust({ ...newMust, connection });
        if (activeMustId) {
          setMusts(musts.map(m => m.id === activeMustId ? { ...m, connection } : m));
        }
      };
      const handleEditActiveMust = (updates) => {
        const updatedMust = { ...newMust, ...updates };
        setNewMust(updatedMust);
        if (activeMustId) {
          setMusts(musts.map(m => m.id === activeMustId ? { ...m, ...updates } : m));
        }
      };
      const handleRemoveMust = (id) => {
        const remainingMusts = musts.filter(m => m.id !== id);
        setMusts(remainingMusts);
        setMustQuestAdded(remainingMusts.length > 0);
        if (activeMustId === id) {
          setActiveMustId(null);
          setNewMust({ title: '', desc: '', connection: '' });
          setMustWorkStep(0);
        } else if (remainingMusts.length === 0) {
          setActiveMustId(null);
          setNewMust({ title: '', desc: '', connection: '' });
        }
      };

      const handleReset = () => {
        if (window.confirm('これまでの記録（キャリアシート）をすべて消去して、初めからやり直しますか？')) {
          clearAdventureData();
          window.location.reload();
        }
      };

      const handleSuspend = () => {
        if (window.confirm('ここまでのキャリアシートはこのブラウザに保存されています。ここで中断しますか？')) {
          alert('保存しました。あとで同じブラウザでこのページを開くと、この場面から再開できます。');
        }
      };

      const renderIntro = () => {
        const dialogsIntro = [
          { speaker: "マスター", type: "reflem", text: "「いらっしゃい、見ない顔だね。私はこの喫茶RIESMのマスターだ。こっちは娘の理澄（りず）。」" },
          { speaker: "理澄", type: "haruka", imageSide: "left", text: "「いらっしゃいませ！お仕事帰りですか？お疲れ様です。\n私、いろんな方のお仕事の話を聞くのが好きなんです。\nよかったら、お名前と年齢を教えてもらえませんか？」" }
        ];

        return (
          <div className="flex flex-col items-center justify-center space-y-6 animate-fade-in mt-10">
            {!isInputPhase ? (
              <>
                {introStep === 0 && (
                  <div className="w-full max-w-2xl text-center animate-fade-in">
                    <DialogBox speaker="マスター" type="reflem" text="「これはスマホでもできるが、できればパソコンの大きな画面でやったほうがいいよ。」" />
                    <p className="mt-4 rounded border border-yellow-600 bg-black bg-opacity-65 px-4 py-3 text-left font-sans text-xs leading-relaxed text-yellow-100">
                      ※注意　LINEやX等のアプリ内ブラウザで開くとうまく動作できない事があります。chromeやEdge、safariなどの純正ブラウザで開くことをお勧めします。
                    </p>
                    <button onClick={() => setIntroStep(1)} className="rpg-button text-xl px-8 py-4 mt-8 animate-bounce">
                      喫茶店に入る
                    </button>
                    {renderAppNote('mt-5')}
                  </div>
                )}

                {introStep === 1 && (
                  <div className="w-full text-center animate-fade-in">
                    <NarrationBox iconName="fa-solid fa-mug-hot" text={"あなたは、仕事の帰りにふらっと立ち寄った喫茶「RIESM」にいる。\nコーヒーを飲みながら一息ついていると、\nカウンター越しにマスターと看板娘が興味深そうに声をかけてきた。"} />
                    <button onClick={() => setIntroStep(2)} className="rpg-button text-xl px-8 py-4 mt-4 animate-bounce">
                      次へ
                    </button>
                  </div>
                )}

                {introStep === 2 && (
                  <div className="w-full max-w-2xl text-center animate-fade-in">
                    <DialogGroup dialogs={dialogsIntro}>
                      <button onClick={() => setIsInputPhase(true)} className="rpg-button text-xl px-8 py-4 mt-4 animate-bounce">
                        答える
                      </button>
                    </DialogGroup>
                  </div>
                )}
              </>
            ) : (
              <div className="w-full max-w-md animate-fade-in">
                <WindowBox title="お客様情報" iconName="fa-regular fa-message">
                  <div className="space-y-5 p-2">
                    <div>
                      <label className="text-gray-300 text-sm block mb-1">なまえ</label>
                      <input type="text" className="rpg-input text-xl" value={player.name} onChange={e => setPlayer({...player, name: e.target.value})} placeholder="例：ああああ" />
                    </div>
                    <div>
                      <label className="text-gray-300 text-sm block mb-1">ねんれい（キャリアの現在地として表示されます）</label>
                      <div className="flex items-end gap-3">
                        <input type="number" className="rpg-input text-xl w-24 text-center" value={player.age} onChange={e => setPlayer({...player, age: e.target.value})} placeholder="30" />
                        <span className="text-yellow-400 font-bold mb-1 text-xl">→ {player.age || '??'}歳</span>
                      </div>
                    </div>
                  </div>
                </WindowBox>
                <div className="text-center mt-6">
                  <button onClick={handleStartCan} disabled={!player.name || !player.age} className={`rpg-button text-xl px-8 py-4 ${(!player.name || !player.age) ? 'opacity-50 cursor-not-allowed' : 'animate-pulse'}`}>
                    二人との会話を続ける
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderCan = () => {
        const pName = player.name || 'お客様';
        const isWeaponMagicStep = canStep === 0;
        const allowedTypes = isWeaponMagicStep ? ['skill', 'magic'] : ['ally'];
        const activeType = allowedTypes.includes(newCan.type) ? newCan.type : allowedTypes[0];
        const visibleCans = cans.filter(c => allowedTypes.includes(c.type));
        const title = isWeaponMagicStep ? 'シーン2-1：専門スキル・汎用スキルの確認' : 'シーン2-2：仲間・関係性の確認';
        const dialog = isWeaponMagicStep
          ? [{ speaker: "マスター", type: "reflem", text: `「${player.age}歳の ${pName} さんだね。いい顔をしてる。\nまずは、あなたがこれまで仕事で磨いてきた『専門スキル』と『汎用スキル』を教えてくれないか。\n下の候補から選んでもいいし、自分で思いつく強みを追加してもいい。\n専門スキルも、ポータブルな汎用スキルも、立派なあなたの力だよ。」` }]
          : [{ speaker: "理澄", type: "haruka", text: `「${pName}さんの強み、すごく見えてきました！\n次は、職場でどんな人たちに支えられてきたか、どんな関係性を築いてきたかを聞かせてください。\n仲間とのつながりも、大切な財産ですよね！」` }];

        return (
          <div className="space-y-6 max-w-4xl mx-auto w-full">
            {!isInputPhase ? (
              <div className="animate-fade-in text-center">
                <DialogGroup dialogs={dialog}>
                  <div className="flex flex-col md:flex-row justify-between items-center mt-8 gap-4 w-full">
                    {isWeaponMagicStep ? (
                      <button onClick={() => nextScene('intro')} className="text-gray-400 hover:text-white px-4 py-2 order-2 md:order-1 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-arrow-right rotate-180"></i> 喫茶店の入口へ戻る
                      </button>
                    ) : (
                      <button onClick={handleBackCanStep} className="text-gray-400 hover:text-white px-4 py-2 order-2 md:order-1 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-arrow-right rotate-180"></i> 専門スキル・汎用スキルに戻る
                      </button>
                    )}
                    <button
                      onClick={() => {
                        setNewCan({ type: activeType, name: '', desc: '' });
                        setCanConfirming(false);
                        setIsInputPhase(true);
                      }}
                      className="rpg-button text-xl px-8 py-4 animate-bounce flex items-center gap-2 order-1 md:order-2"
                    >
                      <i className="fa-regular fa-message"></i> {isWeaponMagicStep ? '専門スキルと汎用スキルを語る' : '仲間との関係性を語る'}
                    </button>
                    <div className="w-40 hidden md:block order-3"></div>
                  </div>
                </DialogGroup>
              </div>
            ) : (
              <div className="animate-fade-in w-full">
                <div className="flex justify-between items-center mb-4">
                  <button onClick={() => setIsInputPhase(false)} className="text-gray-400 hover:text-white flex items-center gap-2"><i className="fa-solid fa-arrow-right rotate-180"></i> 会話に戻る</button>
                  <p className="text-yellow-300 font-bold">{isWeaponMagicStep ? '専門スキル・汎用スキルの棚卸し' : '仲間・関係性の棚卸し'}</p>
                </div>

                <WindowBox title={title} iconName={isWeaponMagicStep ? "fa-solid fa-shield-halved" : "fa-solid fa-people-group"}>
                  <div className="bg-gray-900 p-4 rounded-lg mb-6">
                    <CanList cans={visibleCans} emptyText={isWeaponMagicStep ? '専門スキルと汎用スキルはまだ記録されていません。' : '仲間との関係性はまだ記録されていません。'} onRemove={handleRemoveCan} />
                  </div>

                  <div className="border-t border-gray-600 pt-4 space-y-3">
                    <p className="text-sm text-yellow-300">▼ まだ記録していない{isWeaponMagicStep ? '専門スキルや汎用スキル' : '仲間との関係性'}はあるか？</p>
                    <div className="flex gap-2">
                      {allowedTypes.map(type => (
                        <button
                          key={type}
                          onClick={() => setNewCan({ ...newCan, type, name: '', desc: '' })}
                          className={`flex-1 py-2 rounded text-sm font-bold transition-colors border-2 ${activeType === type ? canTypeMeta[type].active : 'bg-gray-800 border-transparent text-gray-400'}`}
                        >
                          {canTypeMeta[type].label}
                        </button>
                      ))}
                    </div>
                    <div className="bg-black bg-opacity-50 p-3 rounded border border-gray-700">
                      <div className="flex flex-wrap gap-2">
                        {presetCans[activeType].map((preset, idx) => {
                          const isAdded = cans.some(c => c.name === preset.name);
                          return (
                            <button
                              key={idx}
                              onClick={() => {
                                setCanConfirming(false);
                                if (isAdded) {
                                  setCans(cans.filter(c => !(c.type === activeType && c.name === preset.name)));
                                } else {
                                  setCans([...cans, { id: Date.now() + Math.random(), type: activeType, name: preset.name, desc: preset.desc }]);
                                }
                              }}
                              className={`text-sm border px-3 py-1.5 rounded transition-all ${isAdded ? 'border-yellow-400 bg-yellow-900 bg-opacity-80 text-yellow-100 font-bold hover:bg-red-900 hover:border-red-400' : 'border-gray-500 text-gray-300 hover:bg-gray-800'}`}
                            >
                              {preset.name} {isAdded && <i className="fa-solid fa-check ml-1"></i>}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    <div className="flex flex-col md:flex-row gap-2 items-center mt-2">
                      <input type="text" placeholder="名前 (自由に編集・手動追加も可能)" className="rpg-input flex-1 w-full" value={newCan.name} onChange={e => setNewCan({...newCan, type: activeType, name: e.target.value})} />
                      <input type="text" placeholder="説明" className="rpg-input flex-1 w-full" value={newCan.desc} onChange={e => setNewCan({...newCan, type: activeType, desc: e.target.value})} />
                      <button onClick={handleAddCan} disabled={!newCan.name} className={`rpg-button whitespace-nowrap md:w-auto w-full ${!newCan.name ? 'opacity-50' : ''}`}>追加</button>
                    </div>
                    <div className="mt-5">
                      <label className="text-gray-400 text-sm flex items-center gap-1 mb-2">
                        <i className="fa-solid fa-feather-pointed"></i> {isWeaponMagicStep ? '専門スキル・汎用スキルについての気づき' : '仲間・関係性についての気づき'}
                      </label>
                      <textarea
                        className="rpg-input resize-none w-full text-sm leading-relaxed"
                        rows={5}
                        value={isWeaponMagicStep ? canInsight : allyInsight}
                        onChange={e => isWeaponMagicStep ? setCanInsight(e.target.value) : setAllyInsight(e.target.value)}
                        placeholder={isWeaponMagicStep
                          ? '例：私は〇〇の場面で、〇〇という力を使ってきた。\n例：自分では当たり前だと思っていたが、〇〇は私の強みかもしれない。'
                          : '例：私は〇〇さん／〇〇な人たちに支えられてきた。\n例：困ったとき、〇〇という関係性が力になっていた。'}
                      />
                    </div>
                  </div>
                </WindowBox>
                {canConfirming ? (
                  <div className="mt-8 animate-fade-in">
                    <DialogBox
                      speaker={isWeaponMagicStep ? "マスター" : "理澄"}
                      type={isWeaponMagicStep ? "reflem" : "haruka"}
                      imageSide={isWeaponMagicStep ? "left" : "right"}
                      text={isWeaponMagicStep
                        ? "「ふむ、これでいいかな？\n専門スキルと汎用スキル、両方確認できたかい？」"
                        : "「このような方々とお仕事されてきたんですね✨\nこれで大丈夫ですか？」"}
                    />
                    <div className="flex flex-col md:flex-row justify-center gap-3 mt-4">
                      <button onClick={() => setCanConfirming(false)} className="rpg-button text-base px-6 py-3">
                        もう少し書き足す
                      </button>
                      <button onClick={handleCompleteCanStep} className="rpg-button text-base px-8 py-3 bg-white text-black font-bold flex items-center justify-center gap-2">
                        OK、次へ進む <i className="fa-solid fa-arrow-right"></i>
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="text-center mt-8">
                    <button onClick={() => setCanConfirming(true)} className="rpg-button text-base px-8 py-3 flex items-center justify-center gap-2 mx-auto bg-white text-black font-bold">
                      {isWeaponMagicStep ? 'マスターに確認してもらう' : '理澄に確認してもらう'} <i className="fa-solid fa-arrow-right"></i>
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      const renderMemory = () => {
        const currentAge = parseInt(player.age) || 30;
        const suggestedAges = getSuggestedAges();
        const pName = player.name || '〇〇';

        const dialogSteps = [
          [{ speaker: "理澄", type: "haruka", text: `「まずは${pName}さんが社会に出たばかりの頃…\n新入社員（${suggestedAges[0]}歳ごろ）の時はどうでしたか？期待や不安がたくさんあったと思います！」` }],
          [{ speaker: "マスター", type: "reflem", text: `「ふむ。仕事にも少し慣れてきた、${suggestedAges[1]}歳ごろの思い出はどうだい？\n何か心に残っている出来事はあるかな？」` }],
          [{ speaker: "理澄", type: "haruka", text: `「そんなことが有ったんですね…！次は、${suggestedAges[2]}歳ごろの思い出を聞かせてください！\n何か大きな成功や、逆に苦労したことなどはありましたか？」` }],
          [{ speaker: "マスター", type: "reflem", text: `「うんうん。次は${suggestedAges[3]}歳ごろだね。\n責任ある立場になったりした頃じゃないかな？」` }],
          [{ speaker: "理澄", type: "haruka", text: `「最後は、最近（${currentAge}歳ごろ）のことについて教えてください！\n今の${pName}さんを形作っている出来事を知りたいです！」` }]
        ];

        const isCompleted = memoryStep >= 5;

        return (
          <div className="space-y-6 max-w-4xl mx-auto w-full">
            {!isInputPhase ? (
              <div className="animate-fade-in text-center">
                {!isCompleted ? (
                  <DialogGroup dialogs={dialogSteps[memoryStep]}>
                    <div className="flex flex-col md:flex-row justify-between items-center mt-8 gap-4 w-full">
                      <button onClick={() => nextScene('can')} className="text-gray-400 hover:text-white px-4 py-2 order-2 md:order-1 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-arrow-right rotate-180"></i> 強み確認に戻る
                      </button>
                      <button onClick={() => setIsInputPhase(true)} className="rpg-button text-xl px-8 py-4 animate-bounce flex items-center gap-2 order-1 md:order-2">
                        <i className="fa-regular fa-message"></i> 出来事を振り返る（{memoryStep + 1}/5）
                      </button>
                      <div className="w-48 hidden md:block order-3"></div>
                    </div>
                    <button onClick={handleSkipMemory} className="text-gray-500 text-sm mt-6 hover:text-gray-300 block mx-auto transition-colors">
                      この年代はスキップする
                    </button>
                  </DialogGroup>
                ) : (
                  <DialogGroup dialogs={[
                    { speaker: "マスター", type: "reflem", text: "「よく話してくれたね。あなたが歩んできたキャリアの道筋がはっきりと見えてきたよ。\nさあ、これらをライフラインチャートにまとめてみよう。」" }
                  ]}>
                    <div className="flex flex-col md:flex-row justify-between items-center mt-8 gap-4 w-full">
                      <button onClick={() => nextScene('can')} className="text-gray-400 hover:text-white px-4 py-2 order-2 md:order-1 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-arrow-right rotate-180"></i> 強み確認に戻る
                      </button>
                      <button onClick={() => nextScene('chart')} className="rpg-button text-xl px-8 py-4 animate-pulse flex items-center gap-2 bg-white text-black font-bold order-1 md:order-2">
                        ライフラインチャートを見る <i className="fa-solid fa-arrow-right"></i>
                      </button>
                      <div className="w-48 hidden md:block order-3"></div>
                    </div>
                    <button onClick={() => setIsInputPhase(true)} className="text-gray-500 text-sm mt-6 hover:text-gray-300 block mx-auto transition-colors">
                      追加で出来事を振り返る
                    </button>
                  </DialogGroup>
                )}
              </div>
            ) : (
              <div className="animate-fade-in w-full">
                <div className="flex justify-between items-center mb-4">
                  <button onClick={() => setIsInputPhase(false)} className="text-gray-400 hover:text-white flex items-center gap-2"><i className="fa-solid fa-arrow-right rotate-180"></i> 会話に戻る</button>
                </div>
                <WindowBox title={`出来事を振り返る：${newMemory.age || '追加'}歳ごろ`} iconName="fa-solid fa-book-open">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-2">
                    <div className="bg-gray-900 p-4 rounded border-2 border-gray-600 space-y-4">
                      <div className="bg-black bg-opacity-50 p-3 rounded border border-gray-700 mb-4">
                        <p className="text-xs text-gray-400 mb-2">迷ったら、よくある出来事の例から選ぶ：</p>
                        <div className="flex flex-wrap gap-2">
                          {presetMemories.map((pm, idx) => (
                            <button key={idx} onClick={() => setNewMemory({ ...newMemory, event: pm.event, satisfaction: pm.satisfaction })} className="text-xs border border-gray-500 text-gray-300 px-2 py-1 rounded hover:bg-gray-700">
                              {pm.label}
                            </button>
                          ))}
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm text-gray-400 mb-1">年齢・時期（変更可能）</label>
                        <div className="flex items-center gap-2">
                          <input type="number" className="rpg-input w-24 text-center font-bold text-yellow-300" value={newMemory.age} onChange={e => setNewMemory({...newMemory, age: e.target.value})} />
                          <span>歳ごろ</span>
                        </div>
                      </div>
                      <div>
                        <label className="block text-sm text-gray-400 mb-1">出来事</label>
                        <input type="text" className="rpg-input w-full" placeholder="例：初めてのプロジェクトを任された" value={newMemory.event} onChange={e => setNewMemory({...newMemory, event: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm text-gray-400 mb-1 flex justify-between">
                          <span>満足度（感情）</span>
                          <span className={newMemory.satisfaction > 0 ? 'text-blue-400' : newMemory.satisfaction < 0 ? 'text-red-400' : 'text-gray-400'}>
                            {newMemory.satisfaction > 0 ? '+' : ''}{newMemory.satisfaction}
                          </span>
                        </label>
                        <input type="range" min="-50" max="50" step="5" className="w-full accent-yellow-400" value={newMemory.satisfaction} onChange={e => setNewMemory({...newMemory, satisfaction: e.target.value})} />
                      </div>
                      <button onClick={handleAddMemory} className="rpg-button w-full mt-4 py-3 bg-blue-900 border-blue-400 hover:bg-blue-700 text-white font-bold">
                        出来事を記録する
                      </button>
                    </div>

                    <div className="bg-black border-2 border-gray-700 p-4 rounded max-h-[450px] overflow-y-auto">
                      <p className="text-gray-400 mb-3 border-b border-gray-700 pb-2">記録した出来事</p>
                      {memories.length === 0 ? (
                        <EmptyText>まだ出来事は記録されていません…</EmptyText>
                      ) : (
                        <ul className="space-y-3">
                          {[...memories].sort((a,b) => a.age - b.age).map(m => (
                            <li key={m.id} className="flex gap-3 text-sm items-center group bg-gray-900 bg-opacity-50 p-2 rounded border border-gray-800">
                              <span className="text-yellow-400 font-bold shrink-0 w-12">{m.age}歳</span>
                              <span className="flex-1 text-gray-200">{m.event}</span>
                              <span className={`shrink-0 font-bold w-10 text-right ${m.satisfaction > 0 ? 'text-blue-400' : m.satisfaction < 0 ? 'text-red-400' : 'text-gray-400'}`}>
                                {m.satisfaction > 0 ? '+' : ''}{m.satisfaction}
                              </span>
                              <button onClick={() => handleRemoveMemory(m.id)} className="text-gray-600 hover:text-red-400"><i className="fa-solid fa-trash"></i></button>
                            </li>
                          ))}
                        </ul>
                      )}
                    </div>
                  </div>
                </WindowBox>
              </div>
            )}
          </div>
        );
      };

      const renderChart = () => (
        <div className="space-y-6 max-w-5xl mx-auto w-full">
          <DialogBox speaker="マスター" type="reflem" text={`「なるほど…これが ${player.name} さんの歩んできたキャリアの軌跡（ライフラインチャート）か。」`} />

          <WindowBox title="シーン4：ライフラインチャート" iconName="fa-solid fa-chart-line">
            <LifelineChart data={memories} />
          </WindowBox>

          <DialogGroup dialogs={[
            { speaker: "理澄", type: "haruka", text: "「すごい…！お仕事での心の動きが、こんな風に山と谷になってるんですね！」" },
            { speaker: "マスター", type: "reflem", text: "「ああ。この山と谷を見て、自分はどういう時にやりがいを感じるのか…気づくことはあるかな？ゆっくり考えてみるといい。」" }
          ]}>
            <div className="mt-6 bg-gray-900 p-4 border border-gray-600 rounded">
              <p className="text-sm text-yellow-300 font-bold mb-2">▼ 気づき・価値観のメモ</p>
              <textarea
                className="rpg-input resize-none w-full text-gray-200 bg-black p-2 border-dashed leading-relaxed"
                rows={5}
                value={chartInsight}
                onChange={e => setChartInsight(e.target.value)}
                placeholder={"例：満足度が上がる時には、〇〇という共通点がある。\n例：つらかった出来事にも、今の自分につながる〇〇があった。"}
              ></textarea>
            </div>

            {showRestPrompt ? (
              <div className="mt-8 animate-fade-in">
                <DialogBox
                  speaker="理澄"
                  type="haruka"
                  imageSide="right"
                  text={"「たくさん話して、疲れちゃいましたよね？\nコーヒーでも飲んで、いったん休憩しますか？」"}
                />
                <div className="flex flex-col md:flex-row justify-center gap-3 mt-4">
                  <button onClick={handleSuspend} className="rpg-button text-base px-8 py-3">
                    やすむ
                  </button>
                  <button onClick={() => nextScene('will')} className="rpg-button text-base px-8 py-3 bg-white text-black font-bold flex items-center justify-center gap-2">
                    つづける <i className="fa-solid fa-arrow-right"></i>
                  </button>
                </div>
              </div>
            ) : (
              <div className="flex flex-col md:flex-row justify-between items-center mt-8 gap-4 w-full">
                <button onClick={() => nextScene('memory')} className="text-gray-400 hover:text-white px-4 py-2 order-2 md:order-1 flex items-center gap-2 transition-colors">
                  <i className="fa-solid fa-arrow-right rotate-180"></i> 出来事を語り直す
                </button>
                <button onClick={() => setShowRestPrompt(true)} className="rpg-button text-xl px-8 py-4 flex items-center justify-center gap-2 bg-white text-black font-bold order-1 md:order-2">
                  これからのことを考える <i className="fa-solid fa-arrow-right"></i>
                </button>
                <div className="w-40 hidden md:block order-3"></div>
              </div>
            )}
          </DialogGroup>
        </div>
      );

      const renderWill = () => {
        const pName = player.name || '〇〇';

        const handleNextWillStep = () => {
          if (willStep === 0) {
            setWillStep(1);
            setIsInputPhase(false);
          } else {
            nextScene('must');
          }
        };

        return (
          <div className="space-y-6 max-w-4xl mx-auto w-full">
            {!isInputPhase ? (
              <div className="animate-fade-in text-center">
                {willStep === 0 ? (
                  <DialogGroup dialogs={[
                    { speaker: "理澄", type: "haruka", text: `「${pName}さんのこれからのこと、もっと教えてください！\n直近の目標として、1年後はお仕事でどんな風になっていたいですか？」` }
                  ]}>
                    <div className="flex flex-col md:flex-row justify-between items-center mt-8 gap-4 w-full">
                      <button onClick={() => nextScene('chart')} className="text-gray-400 hover:text-white px-4 py-2 order-2 md:order-1 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-arrow-right rotate-180"></i> キャリアシートに戻る
                      </button>
                      <button onClick={() => setIsInputPhase(true)} className="rpg-button text-xl px-8 py-4 animate-bounce flex items-center gap-2 order-1 md:order-2">
                        <i className="fa-regular fa-message"></i> 1年後の未来を語る
                      </button>
                      <div className="w-40 hidden md:block order-3"></div>
                    </div>
                  </DialogGroup>
                ) : (
                  <DialogGroup dialogs={[
                    { speaker: "マスター", type: "reflem", text: "「そして3年後だ。どんなロール（役割・立場・役職・職業）を担い、どんな未来を描いているのかな？\n大きな出世や独立だけが正解じゃない。枠を外して自由に描いてみてほしい。」" }
                  ]}>
                    <div className="flex flex-col md:flex-row justify-between items-center mt-8 gap-4 w-full">
                      <button onClick={() => { setWillStep(0); setIsInputPhase(false); }} className="text-gray-400 hover:text-white px-4 py-2 order-2 md:order-1 flex items-center gap-2 transition-colors">
                        <i className="fa-solid fa-arrow-right rotate-180"></i> 1年後の話に戻る
                      </button>
                      <button onClick={() => setIsInputPhase(true)} className="rpg-button text-xl px-8 py-4 animate-bounce flex items-center gap-2 order-1 md:order-2">
                        <i className="fa-regular fa-message"></i> 3年後の未来を語る
                      </button>
                      <div className="w-40 hidden md:block order-3"></div>
                    </div>
                  </DialogGroup>

                  <SummarySection title="強み：Can" iconName="fa-solid fa-shield-halved">
                    <div className="print-hidden mb-4 flex flex-col md:flex-row gap-2">
                      <button type="button" onClick={() => goToCanInput(0)} className="rpg-button flex-1 py-2 text-sm flex items-center justify-center gap-2">
                        <i className="fa-solid fa-pen-to-square"></i> 専門スキル・汎用スキルを書き直す
                      </button>
                      <button type="button" onClick={() => goToCanInput(1)} className="rpg-button flex-1 py-2 text-sm flex items-center justify-center gap-2">
                        <i className="fa-solid fa-pen-to-square"></i> 仲間を書き直す
                      </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      {['skill', 'magic', 'ally'].map(type => {
                        const group = cans.filter(c => c.type === type);
                        const meta = canTypeMeta[type];
                        return (
                          <div key={type} className="bg-black bg-opacity-40 border border-gray-700 rounded p-3 print-friendly print-avoid-break">
                            <h4 className={`font-bold mb-2 ${meta.color}`}><i className={`${meta.icon} mr-1`}></i>{meta.label}</h4>
                            <CanList cans={group} emptyText="未記録" compact />
                          </div>
                        );
                      })}
                    </div>
                    <MemoBox title="専門スキル・汎用スキルから見えた気づき" text={canInsight} />
                    <MemoBox title="仲間・関係性から見えた気づき" text={allyInsight} />
                  </SummarySection>

                  <SummarySection title="次の目標：Will" iconName="fa-solid fa-map">
                    <div className="print-hidden mb-4 flex flex-col md:flex-row gap-2">
                      <button type="button" onClick={() => goToWillInput(0)} className="rpg-button flex-1 py-2 text-sm flex items-center justify-center gap-2">
                        <i className="fa-solid fa-pen-to-square"></i> 1年後を書き直す
                      </button>
                      <button type="button" onClick={() => goToWillInput(1)} className="rpg-button flex-1 py-2 text-sm flex items-center justify-center gap-2">
                        <i className="fa-solid fa-pen-to-square"></i> 3年後を書き直す
                      </button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="bg-black bg-opacity-40 border border-gray-700 rounded p-3 print-friendly">
                        <p className="text-sm text-gray-400 mb-1">1年後</p>
                        <p className="text-gray-200 whitespace-pre-wrap">{will.oneYear || '未記録'}</p>
                      </div>
                      <div className="bg-black bg-opacity-40 border border-gray-700 rounded p-3 print-friendly">
                        <p className="text-sm text-gray-400 mb-1">3年後</p>
                        <p className="text-gray-200 whitespace-pre-wrap">{will.threeYears || '未記録'}</p>
                      </div>
                    </div>
                    <MemoBox title="1年後の気づき" text={willOneYearInsight} />
                    <MemoBox title="3年後の気づき" text={willThreeYearsInsight} />
                  </SummarySection>

                  <SummarySection title="現実のミッション：Must" iconName="fa-solid fa-scroll">
                    <div className="print-hidden mb-4">
                      <button type="button" onClick={goToMustEdit} className="rpg-button w-full py-2 text-sm flex items-center justify-center gap-2">
                        <i className="fa-solid fa-pen-to-square"></i> ミッションを書き直す
                      </button>
                    </div>
                    <div className="space-y-3">
                      {!selectedMust ? (
                        <EmptyText>ミッションはまだ記録されていません。</EmptyText>
                      ) : (
                        <div className="parchment-card p-4 print-friendly print-avoid-break">
                          <p className="text-xs font-bold mb-2 tracking-widest text-[#6b3f15]">選択して接続したミッション</p>
                          <h4 className="text-2xl font-bold text-[#071f3f]">{selectedMust.title}</h4>
                          <p className="text-sm text-[#071f3f] mt-2 whitespace-pre-wrap">{selectedMust.desc || '概要なし'}</p>
                          <div className="border-t border-[#a87533] border-opacity-60 mt-4 pt-3">
                            <p className="text-xs text-[#6b3f15] font-bold mb-1">Willとの接続メモ</p>
                            <p className="text-sm text-[#071f3f] whitespace-pre-wrap">{selectedMust.connection || '未記録'}</p>
                          </div>
                        </div>
                      )}
                    </div>
                    <MemoBox title="接続してみた気づき" text={mustInsight} />
                  </SummarySection>
                </div>

                <div className="print-page-break">
                  <div className="print-hidden mb-6">
                    <DialogGroup dialogs={[
                      { speaker: "理澄", type: "haruka", imageSide: "left", text: "「お疲れ様です！\nキャリアシート、とても良いものができましたね。」" },
                      { speaker: "マスター", type: "reflem", text: "「うん。いい振り返りができたね。\nあなたのこれからのキャリアの道行きを、心から応援しているよ。」" }
                    ]} />
                  </div>
                  <SummarySection title="ここから先のキャリア" iconName="fa-solid fa-route">
                    <div className="text-sm md:text-base text-gray-300 leading-relaxed whitespace-pre-wrap">
{`ここまでのキャリアの振り返りがまとまりました。

このまま、ひとりで読み返してもよいでしょう。
あるいは、誰かに話すことで、まだ言葉になっていない想いや、
次の一歩が見えてくるかもしれません。

このシートをもとに、キャリアコンサルティングを受けることもできます。`}
                    </div>
                    <div className="mt-5 flex flex-col md:flex-row gap-3">
                      <button onClick={() => window.print()} className="rpg-button flex-1 py-3 text-base">
                        今は、ひとりで考えてみる
                      </button>
                      <div className="relative flex-1 group">
                        <div
                          id="talk-counselor-tooltip"
                          className="print-hidden pointer-events-none absolute bottom-full left-1/2 z-30 mb-3 w-80 max-w-[80vw] -translate-x-1/2 translate-y-2 rounded-lg border-2 border-yellow-500 bg-amber-950 bg-opacity-95 px-4 py-3 text-left text-sm leading-relaxed text-white shadow-xl opacity-0 transition-all duration-300 group-hover:translate-y-0 group-hover:opacity-100 group-focus-within:translate-y-0 group-focus-within:opacity-100"
                        >
                          <div className="absolute -top-3 left-4 rounded-full border border-white bg-amber-950 px-3 text-xs font-bold text-white">マスター</div>
                          「nininには私と理澄はいないが、経験豊富な男性と女性のカウンセラーが在籍しているそうだよ」
                          <div className="absolute left-1/2 top-full h-3 w-3 -translate-x-1/2 -translate-y-1/2 rotate-45 border-b-2 border-r-2 border-yellow-500 bg-amber-950"></div>
                        </div>
                        <a
                          href="https://ninin-cc.github.io/"
                          target="_blank"
                          rel="noopener noreferrer"
                          aria-describedby="talk-counselor-tooltip"
                          className="rpg-button block w-full py-3 text-base"
                        >
                          人に話してみる
                        </a>
                      </div>
                    </div>
                  </SummarySection>
                </div>
              </div>
            </WindowBox>

            <div className="print-hidden bg-black bg-opacity-70 border border-yellow-600 rounded p-4 mt-8">
              <p className="text-sm text-yellow-300 font-bold mb-2">▼ 画像として保存</p>
              <p className="text-xs text-gray-400 mb-3">A4縦サイズのPNGとして保存します。文字とグラフが読みやすいよう、内容ごとに3枚へ分けています。</p>
              <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                <button type="button" onClick={() => handleDownloadSummaryImage('memory')} className="rpg-button py-2 text-sm flex items-center justify-center gap-2">
                  <i className="fa-solid fa-image"></i> 歩んできた道
                </button>
                <button type="button" onClick={() => handleDownloadSummaryImage('status')} className="rpg-button py-2 text-sm flex items-center justify-center gap-2">
                  <i className="fa-solid fa-image"></i> 強み
                </button>
                <button type="button" onClick={() => handleDownloadSummaryImage('willMust')} className="rpg-button py-2 text-sm flex items-center justify-center gap-2">
                  <i className="fa-solid fa-image"></i> Willとミッション
                </button>
                <button type="button" onClick={handleDownloadAllSummaryImages} className="rpg-button py-2 text-sm flex items-center justify-center gap-2 bg-white text-black font-bold">
                  <i className="fa-solid fa-images"></i> 全部画像で保存する
                </button>
              </div>
            </div>

            <div className="print-hidden flex flex-col md:flex-row justify-between items-center mt-8 gap-4 w-full">
              <button
                onClick={goToMustEdit}
                className="text-gray-400 hover:text-white px-4 py-2 order-3 md:order-1 flex items-center gap-2 transition-colors"
              >
                <i className="fa-solid fa-arrow-right rotate-180"></i> ミッション編集に戻る
              </button>
              <button onClick={() => window.print()} className="rpg-button text-base px-8 py-3 flex items-center justify-center gap-2 order-1 md:order-2">
                <i className="fa-solid fa-print"></i> 印刷・PDF保存
              </button>
              <button onClick={handleReset} className="text-gray-400 hover:text-red-400 px-4 py-2 order-2 md:order-3 flex items-center gap-2 transition-colors">
                <i className="fa-solid fa-rotate-left"></i> 新しい振り返りを始める
              </button>
            </div>
          </div>
        );
      };

      const renderHeader = () => (
        <div className="mb-8 text-center animate-fade-in relative z-20 print-hidden">
          <h1 className="text-4xl md:text-6xl font-bold text-white mb-2" style={{ textShadow: '3px 3px 0 #000' }}>喫茶RIESM</h1>
          <p className="text-gray-300 text-[10px] md:text-xs font-bold mb-1 opacity-80" style={{ textShadow: '1px 1px 0 #000' }}>
            -RIESM™　RoleTRADE™ミッション-
          </p>
          <p className="text-yellow-300 text-sm md:text-lg font-bold tracking-widest" style={{ textShadow: '2px 2px 0 #000' }}>
            ～あなたの休息と、明日への活力に～
          </p>
        </div>
      );

      const renderProgressBar = () => {
        const SCENES = ['intro', 'can', 'memory', 'chart', 'will', 'must', 'summary'];
        const SCENE_NAMES = ['喫茶店', '強み', '出来事', 'キャリアシート', '未来', 'ミッション', 'まとめ'];
        const currentIndex = SCENES.indexOf(scene);

        return (
          <div className="w-full mb-8 relative z-20 bg-black bg-opacity-60 p-3 rounded-lg border border-gray-700 shadow-md print-hidden">
            <div className="flex justify-between text-[10px] md:text-xs text-gray-400 mb-2 px-1">
              {SCENE_NAMES.map((name, i) => (
                <button
                  key={name}
                  onClick={() => goToProgressScene(SCENES[i])}
                  className={`flex-1 cursor-pointer text-center transition-colors hover:text-white focus:outline-none focus:text-white ${i <= currentIndex ? 'text-yellow-400 font-bold' : ''}`}
                  title={`${name}へ移動`}
                  type="button"
                >
                  {name}
                </button>
              ))}
            </div>
            <div className="w-full bg-gray-800 rounded-full h-2 border border-gray-600 flex overflow-hidden">
               {SCENES.map((s, i) => (
                 <div key={s} className={`h-2 flex-1 ${i <= currentIndex ? 'bg-yellow-400' : 'bg-transparent'} ${i > 0 ? 'border-l border-gray-700' : ''}`}></div>
               ))}
            </div>
          </div>
        );
      };

      const backgroundImages = {
        tavern: "url('https://ninin-cc.github.io//cq/img/sakaba.jpg')",
        room: "url('https://ninin-cc.github.io//cq/img/heya.jpg')",
        journey: "url('https://ninin-cc.github.io//cq/img/tabidachi.jpg')"
      };
      const isOpeningScene = scene === 'intro' && introStep === 0 && !isInputPhase;
      const backgroundImage = scene === 'must'
        ? backgroundImages.room
        : isOpeningScene || scene === 'summary'
          ? backgroundImages.journey
          : backgroundImages.tavern;
      const backgroundPosition = scene === 'must'
        ? 'center'
        : isOpeningScene || scene === 'summary'
          ? 'center bottom'
          : 'center';
      const backgroundOverlayOpacity = 0.5;

      const locationName = scene === 'must'
        ? '自宅'
        : scene === 'summary'
          ? 'キャリアシートまとめ'
          : '喫茶RIESMの店内';

      const renderAppNote = (className = 'mt-10') => (
        <div className={`${className} w-full rounded border border-gray-600 bg-black bg-opacity-55 px-4 py-3 text-center font-sans text-[11px] leading-relaxed text-gray-300 print-friendly`}>
          <p>
            本アプリは、交流分析・RIASEC・役割理論などの知見をもとに、現代の働き方や人間関係に合わせて設計された RIESM™ / RoleTRADE™ の考え方に基づいて作られています。
          </p>
          <p className="mt-1">© ninin consulting & counseling LLC. All rights reserved.</p>
        </div>
      );

      return (
        <div
          className="min-h-screen p-4 md:p-8 rpg-font overflow-x-hidden relative transition-all duration-1000 print-shell"
          style={{ backgroundImage: backgroundImage, backgroundSize: 'cover', backgroundPosition: backgroundPosition, backgroundAttachment: 'fixed' }}
        >
          <div className="absolute inset-0 z-0 transition-opacity duration-1000 print-hidden" style={{ backgroundColor: `rgba(0, 0, 0, ${backgroundOverlayOpacity})` }}></div>

          <div className="pb-8 relative z-10 text-gray-100 max-w-5xl mx-auto flex flex-col min-h-[90vh] print-container">
            <div className="flex-1">
              {renderHeader()}
              {renderProgressBar()}

              {scene !== 'intro' && (
                <div className="print-hidden flex flex-col md:flex-row justify-between items-center mb-6 bg-black bg-opacity-70 p-3 md:p-4 rounded-lg border-2 border-gray-600 animate-fade-in shadow-md gap-4">
                  <div className="text-lg md:text-xl font-bold">
                    {player.name || 'お名前未入力'} <span className="text-yellow-400 ml-2">{player.age || '?'}歳</span>
                  </div>
                  <div className="flex items-center gap-2 md:gap-4 flex-wrap justify-center">
                    <div className="text-sm text-gray-400 hidden md:block">
                      現在地：{locationName}
                    </div>
                    <button onClick={handleSuspend} className="text-xs md:text-sm border border-gray-500 text-gray-400 hover:text-white hover:border-white px-3 py-1.5 rounded transition-colors flex items-center gap-1">
                      <i className="fa-solid fa-pause"></i> 中断する
                    </button>
                    <button onClick={handleReset} className="text-xs md:text-sm border border-gray-500 text-gray-400 hover:text-red-400 hover:border-red-400 px-3 py-1.5 rounded transition-colors flex items-center gap-1">
                      <i className="fa-solid fa-rotate-left"></i> キャリアシートを消す
                    </button>
                  </div>
                </div>
              )}

              {scene === 'intro' && renderIntro()}
              {scene === 'can' && renderCan()}
              {scene === 'memory' && renderMemory()}
              {scene === 'chart' && renderChart()}
              {scene === 'will' && renderWill()}
              {scene === 'must' && renderMust()}
              {scene === 'summary' && renderSummary()}
            </div>

            {scene === 'summary' && renderAppNote()}

            <footer className="app-footer text-center text-gray-300 text-xs mt-12 border-t border-gray-700 pt-4 font-sans tracking-wide">
              © 2026 <a href="https://ninin-cc.github.io/" target="_blank" rel="noopener noreferrer">ninin consulting＆counseling</a>
            </footer>
            <div className="print-hidden text-center text-gray-600 text-xs mt-2 font-sans tracking-widest">
              PageNO: {getPageNo()}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
