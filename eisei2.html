    // ==========================================
    const QUESTION_DATABASE = [
      // 【関係法令】 20問
      { id: 'h1', category: 'hourei', text: '衛生管理者を選任すべき事業場は、常時何人以上の労働者を使用する事業場か。', options: ['10人以上', '30人以上', '50人以上', '100人以上', '300人以上'], correctIndex: 2, explanation: '常時50人以上の労働者を使用する事業場では、衛生管理者を選任しなければなりません。' },
      { id: 'h2', category: 'hourei', text: '総括安全衛生管理者を選任しなければならない事業場で、常時300人以上の労働者を使用する業種はどれか。', options: ['通信業', '金融業', '製造業', '医療業', '旅館業'], correctIndex: 2, explanation: '製造業は常時300人以上で総括安全衛生管理者の選任が必要です。' },
      { id: 'h3', category: 'hourei', text: '衛生委員会の構成員として、事業者が指名する者の中に含めなければならないのはどれか。', options: ['総括安全衛生管理者', '産業医', '労働組合の代表', '作業環境測定士', '人事部長'], correctIndex: 1, explanation: '構成員には、①総括安全衛生管理者等、②衛生管理者、③産業医、④衛生に関し経験を有する労働者を含める必要があります。' },
      { id: 'h4', category: 'hourei', text: '定期健康診断は、常時使用する労働者に対し、原則としてどのくらいの頻度で行わなければならないか。', options: ['3か月以内ごとに1回', '6か月以内ごとに1回', '1年以内ごとに1回', '2年以内ごとに1回', '3年以内ごとに1回'], correctIndex: 2, explanation: '定期健康診断は、1年以内ごとに1回実施することが義務付けられています。' },
      { id: 'h5', category: 'hourei', text: '労働時間が8時間を超える場合、少なくとも何分の休憩時間を途中に与えなければならないか。', options: ['30分', '45分', '60分', '75分', '90分'], correctIndex: 2, explanation: '労働時間が6時間を超える場合は45分以上、8時間を超える場合は60分以上の休憩が必要です。' },
      { id: 'h6', category: 'hourei', text: '36協定における時間外労働の限度時間は、原則として1か月何時間か。', options: ['30時間', '40時間', '45時間', '60時間', '80時間'], correctIndex: 2, explanation: '原則として1か月45時間、1年360時間と定められています。' },
      { id: 'h7', category: 'hourei', text: '年次有給休暇は、雇入れの日から起算して6か月間継続勤務し、全労働日の何割以上出勤した労働者に付与されるか。', options: ['6割以上', '7割以上', '8割以上', '9割以上', '10割（全日）'], correctIndex: 2, explanation: '全労働日の8割以上出勤した労働者に対して、原則10日間の年次有給休暇が付与されます。' },
      { id: 'h8', category: 'hourei', text: '衛生管理者の職務に含まれないものはどれか。', options: ['健康診断の実施結果に係る記録の作成', '作業環境の維持管理', '労働者の健康障害を防止するための措置', '衛生教育の計画の作成', '作業環境測定の実施'], correctIndex: 4, explanation: '作業環境測定の実施は作業環境測定士の職務です。' },
      { id: 'h9', category: 'hourei', text: '専属の産業医を選任しなければならないのは、常時何人以上の労働者を使用する事業場か。', options: ['300人以上', '500人以上', '1000人以上', '2000人以上', '3000人以上'], correctIndex: 2, explanation: '常時1000人以上の労働者を使用する事業場などでは、専属の産業医が必要です。' },
      { id: 'h10', category: 'hourei', text: '雇入時の健康診断において、医師による健康診断を受けた後、その結果を証明する書面を提出した労働者に対しては、省略できるか。', options: ['省略できない', 'その項目について省略できる', '全て省略できる', '事業者の判断による', '労働基準監督署長の許可があれば省略できる'], correctIndex: 1, explanation: '書面を提出したときは、その項目についての健康診断を省略することができます。' },
      { id: 'h11', category: 'hourei', text: '労働基準法において、労働者を解雇しようとする場合、少なくとも何日前に予告しなければならないか。', options: ['7日前', '14日前', '20日前', '30日前', '60日前'], correctIndex: 3, explanation: '労働者を解雇する場合は、少なくとも30日前に予告をするか、30日分以上の平均賃金（解雇予告手当）を支払う必要があります。' },
      { id: 'h12', category: 'hourei', text: '衛生管理者は、少なくともどれくらいの頻度で作業場等を巡視しなければならないか。', options: ['毎日', '週に1回', '月に1回', '2か月に1回', '半年に1回'], correctIndex: 1, explanation: '衛生管理者は、少なくとも「毎週1回」作業場等を巡視し、設備、作業方法又は衛生状態に有害のおそれがあるときは、直ちに、労働者の健康障害を防止するため必要な措置を講じなければなりません。' },
      { id: 'h13', category: 'hourei', text: '産業医は、少なくともどれくらいの頻度で作業場等を巡視しなければならないか。（※事業者から所定の情報提供を受けている場合を除く原則）', options: ['毎週1回', '毎月1回', '2か月に1回', '半年に1回', '1年に1回'], correctIndex: 1, explanation: '産業医は原則として「毎月1回」作業場を巡視する必要があります。（一定の条件を満たせば2か月に1回となります）' },
      { id: 'h14', category: 'hourei', text: '安全委員会及び衛生委員会は、少なくともどれくらいの頻度で開催しなければならないか。', options: ['毎週1回', '毎月1回', '2か月に1回', '半年に1回', '1年に1回'], correctIndex: 1, explanation: '安全委員会や衛生委員会は、毎月1回以上開催することが義務付けられています。' },
      { id: 'h15', category: 'hourei', text: '深夜業（午後10時から午前5時まで）を含む業務に常時従事する労働者に対し、特定業務従事者の健康診断はどれくらいの頻度で行うか。', options: ['3か月以内ごとに1回', '6か月以内ごとに1回', '1年以内ごとに1回', '2年以内ごとに1回', '3年以内ごとに1回'], correctIndex: 1, explanation: '深夜業などの特定業務に従事する労働者には、配置替えの際および6か月以内ごとに1回、定期に健康診断を実施する必要があります。' },
      { id: 'h16', category: 'hourei', text: '常時50人以上の労働者を使用する事業場において、衛生管理者を選任できないやむを得ない事由がある場合、どのような手続きが必要か。', options: ['所轄労働基準監督署長の許可を受ける', '都道府県労働局長に届け出る', '厚生労働大臣の許可を受ける', '安全衛生委員会で承認を得る', '手続きは不要である'], correctIndex: 0, explanation: 'やむを得ない事由により衛生管理者を選任できない場合は、所轄労働基準監督署長の許可を受けることで選任を免除（または猶予）されます。' },
      { id: 'h17', category: 'hourei', text: '第二種衛生管理者免許を有する者が、衛生管理者として選任できない業種はどれか。', options: ['通信業', '金融業', '卸売業', '製造業', '情報通信業'], correctIndex: 3, explanation: '製造業、建設業、鉱業などの「有害業務と関連の深い業種」では、第一種衛生管理者の免許が必要です。' },
      { id: 'h18', category: 'hourei', text: '安全衛生推進者または衛生推進者を選任しなければならない事業場の規模は、常時何人以上何人未満の労働者を使用する事業場か。', options: ['10人以上50人未満', '20人以上50人未満', '30人以上100人未満', '50人以上100人未満', '100人以上300人未満'], correctIndex: 0, explanation: '常時10人以上50人未満の労働者を使用する事業場では、安全衛生推進者（または衛生推進者）の選任が義務付けられています。' },
      { id: 'h19', category: 'hourei', text: '産業医の職務に含まれないものはどれか。', options: ['健康診断の実施とその結果に基づく措置', '長時間労働者に対する面接指導', '作業環境の維持管理に関する措置', '労働者の健康障害の原因の調査', '事業場の経営方針の決定'], correctIndex: 4, explanation: '事業場の経営方針の決定は、産業医の職務ではありません。' },
      { id: 'h20', category: 'hourei', text: '衛生委員会の議長は、原則として誰が指名するか。', options: ['事業者', '労働組合の代表', '産業医', '衛生管理者', '所轄労働基準監督署長'], correctIndex: 0, explanation: '衛生委員会の議長は、総括安全衛生管理者またはそれに準ずる者の中から「事業者」が指名します。' },

      // 【労働衛生】 20問
      { id: 'e1', category: 'eisei', text: '事務室の空気環境の調整基準において、一酸化炭素の含有率は百万分の何以下としなければならないか。', options: ['10以下', '20以下', '50以下', '100以下', '1000以下'], correctIndex: 0, explanation: '一酸化炭素の基準は10ppm以下です。' },
      { id: 'e2', category: 'eisei', text: '精密な作業を行う場合の作業面の照度の基準として、何ルクス以上としなければならないか。', options: ['70ルクス以上', '150ルクス以上', '300ルクス以上', '500ルクス以上', '1000ルクス以上'], correctIndex: 2, explanation: '精密な作業は300ルクス以上です。' },
      { id: 'e3', category: 'eisei', text: '熱中症の予防指標として用いられるWBGT指数に含まれない要素はどれか。', options: ['気温', '湿度', '輻射熱（放射熱）', '気圧', '気流（風速）の影響'], correctIndex: 3, explanation: 'WBGTは湿度、輻射熱、気温を取り入れた指標で、気圧は含まれません。' },
      { id: 'e4', category: 'eisei', text: '情報機器作業（VDT作業）において、1日の作業時間が長い場合、1連続作業時間はどれくらいを超えないようにすべきか。', options: ['30分', '1時間', '1時間30分', '2時間', '3時間'], correctIndex: 1, explanation: '1連続作業時間は1時間を超えないようにします。' },
      { id: 'e5', category: 'eisei', text: '食中毒の原因菌のうち、手などに化膿創がある人が調理を行うことで感染・発症しやすく、潜伏期間が短いのはどれか。', options: ['サルモネラ属菌', '腸炎ビブリオ', 'カンピロバクター', '黄色ブドウ球菌', 'ボツリヌス菌'], correctIndex: 3, explanation: '黄色ブドウ球菌は化膿創に存在し、潜伏期間が1〜5時間と短いです。' },

      { id: 'e7', category: 'eisei', text: 'メタボリックシンドロームの診断基準において、男性の腹囲の基準値は何cm以上か。', options: ['80cm以上', '85cm以上', '90cm以上', '95cm以上', '100cm以上'], correctIndex: 1, explanation: '男性85cm以上、女性90cm以上が基準です。' },

    // ==========================================
    // メインアプリケーションコンポーネント
    // ==========================================
    function App() {
      const [screen, setScreen] = useState('home');
      const [category, setCategory] = useState(null);
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOptionIndex, setSelectedOptionIndex] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);
      const [aiMessage, setAiMessage] = useState(null);

      const startQuiz = (categoryId) => {
        const filtered = QUESTION_DATABASE.filter(q => q.category === categoryId);
        // 該当カテゴリの20問の中からランダムに10問を抽出
        const shuffled = [...filtered].sort(() => 0.5 - Math.random()).slice(0, 10);
        
        setCategory(CATEGORIES.find(c => c.id === categoryId));
        setCurrentQuestions(shuffled);
        setCurrentIndex(0);
        setScore(0);
        setSelectedOptionIndex(null);
        setIsAnswered(false);
        setScreen('quiz');
      };

      const handleSelectOption = (index) => {
        if (isAnswered) return;
        setSelectedOptionIndex(index);
        setIsAnswered(true);

        const isCorrect = index === currentQuestions[currentIndex].correctIndex;
        if (isCorrect) {
          setScore(prev => prev + 10);
          setAiMessage(CORRECT_MESSAGES[Math.floor(Math.random() * CORRECT_MESSAGES.length)]);
        } else {
          setAiMessage(INCORRECT_MESSAGES[Math.floor(Math.random() * INCORRECT_MESSAGES.length)]);
        }
      };

      const handleNextQuestion = () => {
        if (currentIndex < currentQuestions.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOptionIndex(null);
          setIsAnswered(false);
          setAiMessage(null);
        } else {
          setScreen('result');
        }
      };

      const resetQuiz = () => {
        setScreen('home');
      };

      const getResultMessage = (finalScore) => {
        if (finalScore === 100) return "100点！あなたが衛生管理者の神だ！";
        if (finalScore >= 90) return "90点！これは必然！受からざるを得ない！";
        if (finalScore >= 80) return "80点！すごい余裕で合格！！";
        if (finalScore >= 70) return "70点！合格だ！";
        return "惜しい！もう一息！復習して再チャレンジ！";
      };

      const getCharacterMessage = (finalScore) => {
        if (finalScore === 100) {
          return (
            <Fragment>
              <p>ガプト🔥「うおおお！満点だぁぁ！本当に最高だぜ！誇らしいぜ！🔥」</p>
              <p>ガペル❄️(•_•)「……満点なんて、生意気ね。でも……ほんとに、よく頑張ったわね。お疲れ様。」</p>
            </Fragment>
          );
        } else if (finalScore >= 70) {
          return (
            <Fragment>
              <p>ガプト🔥「見事合格ライン突破だ！この勢いで本番もぶっちぎろうぜ！🔥」</p>
              <p>ガペル❄️(•_•)「まぁ、合格点なら許してあげる。……でも本番はもっと厳しいんだから、私のサポート、ちゃんと受けなさいよ。」</p>
            </Fragment>
          );
        } else {
          return (
            <Fragment>
              <p>ガプト🔥「くそー、惜しかったな！でも絶対できる！次こそ満点だ！🔥」</p>
              <p>ガペル❄️(•_•)「あんたバカァ！？こんな点数で諦めるつもりじゃないでしょうね？……ほら、もう一回。私が最後まで付き合ってあげるから。」</p>
            </Fragment>
          );
        }
      };

      const getResultGuestMessage = (finalScore) => {
        const perfectGuests = [
          { charId: 'char', text: "ええい！君の知力は化け物か！完璧な成績だ！" },
          { charId: 'asuka', text: "満点！？……ま、まぁ、私に比べればまだまだだけど、特別に褒めてあげるわ！" },
          { charId: 'doraemon', text: "満点おめでとう！はい、『天才ヘルメット』〜！……え？そんな道具はないって？" }
        ];
        const passGuests = [
          { charId: 'amuro', text: "こんなに嬉しいことはない……見事な合格だ！" },
          { charId: 'shinji', text: "やったね。僕も自分のことみたいに嬉しいよ。" },
          { charId: 'shizuka', text: "合格点よ！今日はゆっくりお風呂に入ってさっぱりしましょ！" }
        ];
        const failGuests = [
          { charId: 'rei', text: "……まだ終わっていないわ。もう一度挑戦して。" },
          { charId: 'nobita', text: "あはは……僕のテストの点数よりはずっと高いよ！もう一回一緒にやってみようよ！" },
          { charId: 'char', text: "まだだ、まだ終わらんよ！諦めずに立て！" }
        ];

        let guests = failGuests;
        if (finalScore === 100) guests = perfectGuests;
        else if (finalScore >= 70) guests = passGuests;

        return guests[Math.floor(Math.random() * guests.length)];
      };

      // --- 画面：ホーム ---
      if (screen === 'home') {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center py-8 px-4">
            <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">
              <div className="bg-gradient-to-r from-blue-500 to-indigo-600 p-6 text-center text-white relative overflow-hidden">
                <div className="absolute top-0 right-0 opacity-20 transform translate-x-4 -translate-y-4">
                   <BookOpen size={100} />

                <h1 className="text-2xl font-extrabold mb-1 relative z-10">第二種 衛生管理者</h1>

              <div className="p-5">

                <div className="space-y-3">
                  {CATEGORIES.map(cat => {

                      <button

                          <Icon size={20} />

                        <div className="ml-3 flex-1 text-left">
                          <span className="text-lg font-bold text-gray-700 block">{cat.name}</span>
                          <span className="text-xs text-gray-500 font-medium">純粋な過去問{cat.total}問（からランダム10問）</span>
                        </div>
                        <ChevronRight className="text-gray-400 group-hover:text-indigo-500" />
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // --- 画面：クイズ ---
      if (screen === 'quiz') {
        const question = currentQuestions[currentIndex];
        const CategoryIcon = category?.icon;
        
        return (
          <div className="h-[100dvh] flex flex-col bg-slate-50 max-w-md mx-auto relative overflow-hidden shadow-2xl">
            <div className="flex-shrink-0 bg-white z-10 shadow-sm">
              <div className="flex items-center justify-between p-3 bg-indigo-600 text-white">
                <div className="flex items-center gap-2 font-bold text-sm">
                  {CategoryIcon && <CategoryIcon size={16} />}
                  {category?.name}
                </div>
                <div className="font-bold bg-white/20 px-2 py-0.5 rounded-full text-xs">
                  {currentIndex + 1} / {currentQuestions.length} 問
                </div>
              </div>
              
              <div className="h-1 w-full bg-gray-200">
                <div 
                  className="h-full bg-yellow-400 transition-all duration-500 ease-out"
                  style={{ width: `${((currentIndex) / currentQuestions.length) * 100}%` }}
                ></div>
              </div>

              <div className="p-4 border-b border-gray-100 bg-white">
                <div className="flex gap-2 mb-1">
                  <span className="text-indigo-600 font-extrabold text-lg">Q{currentIndex + 1}.</span>
                </div>
                <p className="text-gray-800 text-base font-bold leading-tight">
                  {question.text}
                </p>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 pb-8">
              <div className="space-y-2">
                {question.options.map((option, idx) => {
                  let btnClass = "w-full text-left p-3 rounded-xl border-2 transition-all duration-200 text-sm font-medium shadow-sm relative overflow-hidden ";
                  
                  if (!isAnswered) {
                    btnClass += "bg-white border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 text-gray-700 active:scale-95";
                  } else {
                    if (idx === question.correctIndex) {
                      btnClass += "bg-green-50 border-green-500 text-green-800"; 
                    } else if (idx === selectedOptionIndex) {
                      btnClass += "bg-red-50 border-red-400 text-red-700 opacity-80"; 
                    } else {
                      btnClass += "bg-gray-50 border-gray-200 text-gray-400 opacity-40"; 
                    }
                  }

                  return (
                    <button
                      key={idx}
                      disabled={isAnswered}
                      onClick={() => handleSelectOption(idx)}
                      className={btnClass}
                    >
                      <div className="flex items-center justify-between">
                        <span className="pr-4">{option}</span>
                        {isAnswered && idx === question.correctIndex && <CheckCircle2 className="text-green-500 flex-shrink-0" size={20} />}
                        {isAnswered && idx === selectedOptionIndex && idx !== question.correctIndex && <XCircle className="text-red-500 flex-shrink-0" size={20} />}
                      </div>
                    </button>
                  );
                })}
              </div>

              {isAnswered && (
                <div className="mt-4 animate-fade-in-up flex flex-col gap-3">
                  <div className={`p-4 rounded-xl ${selectedOptionIndex === question.correctIndex ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
                    <h3 className={`font-bold flex items-center gap-1 mb-1 text-sm ${selectedOptionIndex === question.correctIndex ? 'text-green-700' : 'text-red-700'}`}>
                      {selectedOptionIndex === question.correctIndex ? '⭕ 正解！' : '❌ 不正解...'}
                    </h3>
                    <p className="text-gray-700 leading-relaxed text-sm">
                      {question.explanation}
                    </p>
                  </div>

                  <button
                    onClick={handleNextQuestion}
                    className="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-md"
                  >
                    {currentIndex < currentQuestions.length - 1 ? '次の問題へ' : '結果を見る'}
                    <ArrowRight size={18} />
                  </button>

                  {aiMessage && (
                    <div className={`bg-white p-3 rounded-xl shadow-sm border ${CHARACTERS[aiMessage.charId].border} flex items-start gap-3 mt-2`}>
                      <div className={`flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center ${CHARACTERS[aiMessage.charId].bg} text-xl shadow-inner`}>
                        {CHARACTERS[aiMessage.charId].icon}
                      </div>
                      <div>
                        <p className={`text-xs font-extrabold mb-0.5 ${CHARACTERS[aiMessage.charId].color}`}>
                          {CHARACTERS[aiMessage.charId].name}
                        </p>
                        <p className="text-sm font-bold text-gray-700 leading-snug">
                          {aiMessage.text}
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        );
      }

      // --- 画面：結果 ---
      if (screen === 'result') {
        const isPerfect = score === 100;
        const guestMsg = getResultGuestMessage(score);
        
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center py-8 px-4">
            <div className="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden p-8 text-center relative">
              {isPerfect && (
                <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-20">
                   <div className="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 animate-spin-slow rounded-full mix-blend-multiply blur-3xl"></div>
                </div>
              )}

              <div className="relative z-10">
                <div className="mx-auto bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mb-5 shadow-inner">
                  <Award className={isPerfect ? "text-yellow-500" : "text-indigo-500"} size={40} />
                </div>
                
                <h2 className="text-xl font-bold text-gray-700 mb-1">最終スコア</h2>
                
                <div className="text-5xl font-extrabold mb-5 flex items-baseline justify-center gap-1">
                  <span className={isPerfect ? "text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500" : "text-indigo-600"}>
                    {score}
                  </span>
                  <span className="text-xl text-gray-400 font-bold">点</span>
                </div>

                <div className={`p-4 rounded-xl mb-6 font-bold text-base ${
                  score >= 70 ? 'bg-green-100 text-green-800' : 'bg-red-50 text-red-600'
                }`}>
                  {getResultMessage(score)}
                </div>

                <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-6 text-sm text-left font-medium text-gray-700 space-y-3">
                  {getCharacterMessage(score)}
                  
                  <div className={`mt-4 p-3 rounded-xl border flex items-start gap-3 shadow-sm ${CHARACTERS[guestMsg.charId].bg} ${CHARACTERS[guestMsg.charId].border}`}>
                     <div className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center bg-white text-base shadow-sm`}>
                        {CHARACTERS[guestMsg.charId].icon}
                      </div>
                      <div>
                        <p className={`text-xs font-extrabold mb-0.5 ${CHARACTERS[guestMsg.charId].color}`}>
                          【特別ゲスト】 {CHARACTERS[guestMsg.charId].name}
                        </p>
                        <p className="text-gray-800 font-bold">{guestMsg.text}</p>
                      </div>
                  </div>
                </div>

                <button
                  onClick={resetQuiz}
                  className="w-full bg-gray-900 hover:bg-gray-800 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-md"
                >
                  <RefreshCw size={18} />
                  別のカテゴリに挑戦する
                </button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    }

    // ==========================================
    // Reactのレンダリング処理
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
