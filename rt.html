<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIESM™ Role TRADE</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    @keyframes float {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      25% { opacity: 0.8; }
      50% { transform: translateY(-100px) translateX(20px) scale(1.2); }
      75% { opacity: 0.8; }
      100% { transform: translateY(-200px) translateX(-20px) scale(1); opacity: 0; }
    }
    .animate-float {
      animation-name: float;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }
    .magic-text-glow {
      text-shadow: 0 0 15px rgba(249, 115, 22, 0.4), 0 0 5px rgba(255, 255, 255, 0.5);
    }
    @keyframes flyUp {
      0% { transform: translateY(0) scale(1.2); opacity: 1; z-index: 100; }
      100% { transform: translateY(-300px) scale(0.5) rotate(15deg); opacity: 0; z-index: 100; }
    }
    @keyframes flyDown {
      0% { transform: translateY(0) scale(1.05); opacity: 1; z-index: 100; }
      100% { transform: translateY(300px) scale(0.5) rotate(-15deg); opacity: 0; z-index: 100; }
    }
    @keyframes dropIn {
      0% { transform: translateY(-40px) scale(1.05); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    
    /* ▼▼ 滑らかな画面遷移用のアニメーション ▼▼ */
    @keyframes fadeOutStage {
      0% { opacity: 1; filter: blur(0px); }
      100% { opacity: 0; filter: blur(4px); }
    }
    @keyframes fadeInStage {
      0% { opacity: 0; filter: blur(4px); }
      100% { opacity: 1; filter: blur(0px); }
    }
    .animate-fadeOut {
      animation: fadeOutStage 0.4s ease-out forwards !important;
      pointer-events: none;
    }
    .animate-fadeInStage {
      animation: fadeInStage 0.6s ease-out forwards;
    }
    
    .animate-fly-up {
      animation: flyUp 0.6s ease-in-out forwards !important;
      pointer-events: none;
    }
    .animate-fly-down {
      animation: flyDown 0.6s ease-in-out forwards !important;
      pointer-events: none;
    }
    .animate-drop-in {
      animation: dropIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
  </style>
</head>
<body class="bg-[#e8dcc4] text-stone-900 font-sans selection:bg-orange-900 selection:text-orange-100">

      Share2: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>'
    };

    function getIcon(name, classes) {
      let svg = ICONS[name] || '';
      if (classes) {
        svg = svg.replace('<svg ', `<svg class="${classes}" `);
      }
      return svg;
    }

    const getModeColorText = (mode) => {
      switch(mode) {
        case 'WONDER': return 'オレンジっぽい色';
        case 'KEEPER': return '青っぽい色';
        case 'NURTURE': return 'ピンクっぽい色';
        case 'ADAPTER': return '水色っぽい色';
        default: return '';
      }
    };

    const getJewelDescription = (mode) => {
      switch(mode) {
        case 'WONDER': return 'オレンジの【ワンダーの宝玉】は自由・発見・挑戦をつかさどります。';
        case 'KEEPER': return '青の【キーパーの宝玉】は論理・ルール・正しさをつかさどります。';
        case 'NURTURE': return 'ピンクの【ナーチャーの宝玉】は保護・調和・共感をつかさどります。';
        case 'ADAPTER': return '水色の【アダプターの宝玉】は洞察・適応・慎重さをつかさどります。';
        default: return '';
      }
    };

    const TOTAL_ROUNDS = 6;

    const SHOP_MESSAGES = {
      1: "「ようこそ転生者よ。ここは始まりの武器庫。これからの人生に備え、手札と場を見渡し、今の自分に必要な役割を1つ入れ替えるがよい。」",
      6: "「いよいよ最後の選択だ。これまでの旅で得たもの、手放したもの……すべてはお前の『伏線』となる。さあ、最後の装備を整えるがよい。」"
    };

    const TRADE_MESSAGES = {
      2: "「やあ、君も転生者かい？ 僕の持っているこの役割と、君の手札のどれかを交換してくれないか？ 自分にはない視点が欲しいんだ。」",
      3: "「ふふ、面白そうなものを持っているね。私のこれとトレードしようよ。手放すことで、気づくこともあるはずさ。」",
      4: "「だいぶ自分の強みが見えてきたんじゃない？ でも、人は関わりの中で変わっていくもの。さあ、交換しよう。」",
      5: "「もうすぐ旅立ちの時だね。最後に私と交換しよう。一見苦手に見える役割も、きっと君を助ける武器になるはずだ。」"
    };

    const PARCHMENT_TEXTURE = `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E")`;
    const SHOP_TEXTURE = `url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%2357534e' fill-opacity='0.1' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E")`;

    const BG_SHOP_IMG = "https://images.unsplash.com/photo-1593604340846-4fbe9763a8f3?auto=format&fit=crop&w=1200&q=80"; 
    const BG_TRADE_IMG = "https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=1200&q=80"; 
    const BG_DOOR_IMG = "https://images.unsplash.com/photo-1483664852095-d6cc6870702d?auto=format&fit=crop&w=1200&q=80";

    // --- State ---
    let state = {
      gameState: 'START',
      round: 1,
      shopRounds: [],
      hand: [],
      shop: [],
      deck: [],
      selectedHandCard: null,
      selectedShopCard: null,
      tradeOfferCard: null,
      isExchanging: false,
      isEntering: false,
      resultStep: 'SELECT_1',
      primaryCard: null,
      secondaryCard: null,
      shareMessage: ''
    };

    // --- Transitions (滑らかな画面遷移) ---
    function transitionState(callback) {
      const stage = document.getElementById('main-stage');
      const dock = document.getElementById('dock-stage');
      
      if (stage) {
        stage.classList.remove('animate-fadeInStage');
        stage.classList.add('animate-fadeOut');
      }
      if (dock) {
        dock.classList.remove('animate-fadeInStage');
        dock.classList.add('animate-fadeOut');
      }
      
      setTimeout(() => {
        callback();
        render();
      }, 400); // 400ms for fade out
    }

    // --- Functions ---
    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    }

    function startGame() {
      const shuffledCards = shuffleArray([...CARDS_DATA]);
      state.hand = shuffledCards.slice(0, 5);
      state.shop = shuffledCards.slice(5, 13);
      state.deck = shuffledCards.slice(13);
      state.shopRounds = [1, 6];
      state.round = 1;
      state.resultStep = 'SELECT_1';
      state.primaryCard = null;
      state.secondaryCard = null;
      state.gameState = 'PLAYING';
      state.shareMessage = '';
    }

    function handleTrade() {
      if (!state.selectedHandCard || !state.tradeOfferCard || state.isExchanging) return;
      state.isExchanging = true;
      render(); // カード飛ぶアニメーション開始
      
      setTimeout(() => {
        transitionState(() => {
          state.hand = state.hand.map(c => c.id === state.selectedHandCard.id ? state.tradeOfferCard : c);
          state.deck.push(state.selectedHandCard);
          state.deck.shift();
          proceedToNextRound(state.hand, state.shop, state.deck);
          state.isExchanging = false;
        });
      }, 600); // 飛ぶアニメーション完了待ち
    }

    function handleShopTrade() {
      if (!state.selectedHandCard || !state.selectedShopCard || state.isExchanging) return;
      state.isExchanging = true;
      render();
      
      setTimeout(() => {
        transitionState(() => {
          const newHand = state.hand.map(c => c.id === state.selectedHandCard.id ? state.selectedShopCard : c);
          const newShop = state.shop.map(c => c.id === state.selectedShopCard.id ? state.selectedHandCard : c);
          proceedToNextRound(newHand, newShop, state.deck);
          state.isExchanging = false;
        });
      }, 600);
    }

    function proceedToNextRound(newHand, newShop, newDeck) {
      state.selectedHandCard = null;
      state.selectedShopCard = null;
      state.tradeOfferCard = null;

      if (state.round >= TOTAL_ROUNDS) {
        state.hand = newHand;
        state.resultStep = 'SELECT_1';
        state.gameState = 'RESULT';
      } else {
        state.round++;
        state.hand = newHand;
        state.shop = newShop;
        state.deck = newDeck;
        
        state.isEntering = true;
        setTimeout(() => {
          state.isEntering = false;
          // ここはクラスが外れるだけなのでrender不要（次レンダリング時に消える）
        }, 800);
        
        if (!state.shopRounds.includes(state.round)) {
          state.tradeOfferCard = newDeck[0];
        }
      }
    }

    function handleResultCardSelect(card) {
      if (state.resultStep === 'SELECT_1') {
        state.primaryCard = card;
        render();
        setTimeout(() => { 
          transitionState(() => { state.resultStep = 'SELECT_2'; }); 
        }, 600);
      } else if (state.resultStep === 'SELECT_2') {
        if (card.id === state.primaryCard?.id) return;
        state.secondaryCard = card;
        render();

      for (const [mode, count] of Object.entries(counts)) {

      return maxMode;

                        `;
                      }).join('')}
                    </div>
                  </div>
                </div>
              ` : `
                  <div id="capture-area" class="bg-[#f0e6d2] pt-8 pb-10 px-4 sm:px-8 md:px-12 text-center relative overflow-hidden" style="background-image: ${PARCHMENT_TEXTURE}">
                    <div class="absolute inset-0 z-0 pointer-events-none">
                      <img src="${BG_DOOR_IMG}" alt="" class="w-full h-full object-cover opacity-[0.25] mix-blend-multiply" />
                    </div>
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-[2px] bg-gradient-to-r from-transparent via-orange-500/60 to-transparent"></div>

                    <div class="flex justify-center mb-4 relative z-10">
                      ${getIcon('Sparkles', "w-6 h-6 sm:w-8 sm:h-8 text-yellow-600 animate-pulse drop-shadow-[0_0_10px_rgba(249,115,22,0.5)]")}
                    </div>

                    <h2 class="text-2xl sm:text-3xl font-serif font-extrabold mb-4 sm:mb-6 tracking-widest text-stone-900 w-full text-center magic-text-glow relative z-10">役割確定</h2>
                    <p class="text-stone-800 mb-8 sm:mb-12 font-serif text-sm sm:text-base font-bold w-full text-center relative z-10">これがあなたが18歳の自分に持たせる「5つの役割」です。</p>
                    
                    <div class="flex flex-col items-center w-full mt-2 mb-6 relative z-10">
                      <div class="flex flex-nowrap gap-6 sm:gap-12 justify-center z-10 mb-6 sm:mb-8 w-full">
                        <div class="relative transform hover:scale-105 transition-transform duration-500">
                          <div class="absolute -inset-4 z-0 pointer-events-none animate-pulse">
                             ${getIcon('Sparkles', "absolute top-0 left-0 w-6 h-6 text-yellow-500")}
                             ${getIcon('Sparkles', "absolute bottom-0 right-0 w-8 h-8 text-orange-400")}
                             ${getIcon('Star', "absolute top-1/2 -right-4 w-5 h-5 text-yellow-300 fill-yellow-300")}
                          </div>
                          ${renderCardHTML(state.primaryCard, { isReadOnly: true, glow: true, customStyle: "shadow-[0_15px_40px_rgba(234,179,8,0.5)] z-20" })}
                        </div>
                        <div class="relative transform hover:scale-105 transition-transform duration-500">
                          <div class="absolute -inset-4 z-0 pointer-events-none animate-pulse" style="animation-delay: 0.5s">
                             ${getIcon('Sparkles', "absolute top-0 right-0 w-6 h-6 text-yellow-500")}
                             ${getIcon('Sparkles', "absolute bottom-0 left-0 w-8 h-8 text-orange-400")}
                             ${getIcon('Star', "absolute top-1/2 -left-4 w-5 h-5 text-yellow-300 fill-yellow-300")}
                          </div>
                          ${renderCardHTML(state.secondaryCard, { isReadOnly: true, glow: true, customStyle: "shadow-[0_15px_40px_rgba(234,179,8,0.5)] z-20" })}
                        </div>
                      </div>

                      <div class="flex flex-nowrap gap-3 sm:gap-4 justify-center z-10 w-full">
                        ${state.hand.filter(c => c.id !== state.primaryCard?.id && c.id !== state.secondaryCard?.id).map(card => `
                          <div class="shrink-0 transition-transform duration-500">
                            ${renderCardHTML(card, { isReadOnly: true, customStyle: "border-stone-400" })}
                          </div>
                        `).join('')}
                      </div>
                    </div>

                    <div class="w-full max-w-2xl mx-auto mt-8 sm:mt-12 border-t border-stone-400/60 pt-8 sm:pt-10 relative z-10">
                      <div class="mb-6 sm:mb-8 bg-[#f4ebd8]/90 p-4 sm:p-6 rounded-sm border border-stone-300 shadow-[inset_0_0_10px_rgba(0,0,0,0.05)]" style="background-image: ${PARCHMENT_TEXTURE}">
                        <p class="font-serif text-xs sm:text-sm text-stone-700 mb-2 sm:mb-3 tracking-widest font-bold text-center">一番多く選んだ色</p>
                        <p class="text-xl sm:text-2xl font-serif font-extrabold tracking-wider drop-shadow-sm text-center ${MODE_TEXT_COLORS[getMostFrequentMode()]}">
                          ${getModeColorText(getMostFrequentMode())}
                        </p>
                        <p class="text-[10px] sm:text-xs text-stone-800 mt-4 sm:mt-5 leading-relaxed font-serif font-bold text-center">
                          一番多く選んだ色は、今のあなたが人生に装備したいモードかもしれません。<br/>得意だから残ったものもあれば、苦手だけど必要だと感じて残ったものもあるはずです。<br/><br/>
                          <span class="${MODE_TEXT_COLORS[getMostFrequentMode()]} text-sm sm:text-base font-extrabold block mt-2 drop-shadow-sm">
                            ${getJewelDescription(getMostFrequentMode())}
                          </span>
                        </p>
                      </div>

                      <div class="space-y-4 sm:space-y-6 text-stone-900 font-serif font-bold mt-8 text-center px-2 sm:px-4">
                        <p class="font-extrabold text-sm sm:text-base mb-2 text-stone-800 bg-[#e8dcc4]/70 py-4 px-2 rounded-sm border border-stone-300/50 shadow-sm">Q. なぜ【${state.primaryCard?.name}】を一番大事に選びましたか？</p>
                        <p class="font-extrabold text-sm sm:text-base mb-2 text-stone-800 bg-[#e8dcc4]/70 py-4 px-2 rounded-sm border border-stone-300/50 shadow-sm">Q. 最後に、この装備でこれからどんな人生を歩みたいですか？</p>
                      </div>
                    </div>
                  </div>

                  <div class="flex flex-col items-center gap-4 sm:gap-6 mt-8 sm:mt-12 relative z-10">
                    <!-- ▼▼ 「SNSなどでシェアする」ボタンに変更 ▼▼ -->
                    <button data-action="capture-share" class="w-full sm:w-auto bg-black hover:bg-stone-900 border border-stone-800 text-white font-bold py-3 sm:py-4 px-4 sm:px-10 rounded-full shadow-[0_0_20px_rgba(0,0,0,0.5)] transition-all duration-300 hover:scale-105 hover:shadow-[0_0_25px_rgba(249,115,22,0.4)] flex items-center justify-center tracking-widest text-xs sm:text-sm">
                      ${getIcon('Share2', "w-4 h-4 sm:w-5 sm:h-5 mr-2 sm:mr-3")} SNSなどでシェアする
                    </button>

                    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-8 mt-2 sm:mt-4 relative z-10">
                      <button data-action="result-reset" class="flex items-center text-stone-600 hover:text-orange-900 font-serif font-bold tracking-widest text-xs sm:text-sm transition-colors border-b border-transparent hover:border-orange-900 pb-1">
                        ${getIcon('ChevronLeft', "w-4 h-4 mr-1")} 順位を選び直す
                      </button>
                      <button data-action="go-start" class="flex items-center text-stone-600 hover:text-orange-900 font-serif font-bold tracking-widest text-xs sm:text-sm transition-colors border-b border-transparent hover:border-orange-900 pb-1">
                        再び過去へ戻る
                      </button>
                    </div>
                  </div>
              `}
        `;
      }

      html += `
            </div> <!-- End of inner content -->
          </div> <!-- End of main-stage -->
      `;

      if (state.gameState === 'PLAYING') {
        html += `
          <div id="dock-stage" class="fixed bottom-0 left-0 w-full bg-[#dcccae] shadow-[0_-10px_40px_rgba(67,20,7,0.3)] border-t border-stone-500/80 z-50 animate-fadeInStage" style="background-image: ${PARCHMENT_TEXTURE}">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#c4b08b] via-orange-900/30 to-[#c4b08b]"></div>
            
            <div class="max-w-4xl mx-auto pt-2 sm:pt-4 relative flex flex-col">
              <div class="w-full flex justify-center">
                <div class="flex items-end h-[150px] sm:h-[210px] px-2 relative">
                  ${state.hand.map((card, index) => {
                    const isSelected = state.selectedHandCard?.id === card.id;
                    const customStyle = `${state.isExchanging && isSelected ? 'animate-fly-up' : ''} ${state.isEntering ? 'animate-drop-in' : ''}`;
                    return `
                      <div class="shrink-0 transition-all duration-500 relative ${index > 0 ? '-ml-8 sm:ml-4' : ''} ${isSelected ? 'z-[100]' : 'z-10'}">
                        ${renderCardHTML(card, { isSelected, isHandCard: true, customStyle })}
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>

              <div class="w-full flex justify-center px-4 py-3 sm:py-4 mt-2 sm:mt-4 bg-stone-900/5 border-t border-stone-500/20">
                ${isShopTime ? `
                  <button data-action="trade-shop" ${!state.selectedHandCard || !state.selectedShopCard || state.isExchanging ? 'disabled' : ''} class="w-full sm:w-auto bg-orange-700 hover:bg-orange-800 disabled:bg-stone-400/80 disabled:text-stone-700 disabled:border-stone-500 text-orange-50 font-serif font-bold py-2.5 sm:py-3 px-4 sm:px-10 border border-orange-700 rounded-sm shadow-[0_0_15px_rgba(249,115,22,0.3)] disabled:shadow-none transition-all duration-300 flex items-center justify-center tracking-widest text-[11px] sm:text-sm">
                    ${getIcon('RefreshCw', `w-4 h-4 mr-1.5 sm:mr-3 shrink-0 ${state.isExchanging ? 'animate-spin' : ''}`)}
                    ${state.isExchanging ? '入れ替え中...' : (state.selectedHandCard && state.selectedShopCard ? '役割を入れ替える' : '手札と場の役割を1枚ずつ選んでください')}
                  </button>
                ` : `
                  <button data-action="trade-offer" ${!state.selectedHandCard || state.isExchanging ? 'disabled' : ''} class="w-full sm:w-auto bg-blue-900 hover:bg-blue-950 disabled:bg-stone-400/80 disabled:text-stone-700 disabled:border-stone-500 text-blue-50 font-serif font-bold py-2.5 sm:py-3 px-4 sm:px-10 border border-blue-800 rounded-sm shadow-[0_0_15px_rgba(30,58,138,0.3)] disabled:shadow-none transition-all duration-300 flex items-center justify-center tracking-widest text-[11px] sm:text-sm">
                    ${getIcon('RefreshCw', `w-4 h-4 mr-1.5 sm:mr-3 shrink-0 ${state.isExchanging ? 'animate-spin' : ''}`)}
                    ${state.isExchanging ? '入れ替え中...' : (state.selectedHandCard ? '選んだ手札を渡す' : '渡す手札を1枚選んでください')}
                  </button>
                `}
              </div>
            </div>
          </div>
        `;
      }

      root.innerHTML = html;
    }

    // --- Event Listeners ---
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'go-rules') {
        transitionState(() => { state.gameState = 'RULES'; });
      } else if (action === 'go-start') {
        transitionState(() => { state.gameState = 'START'; });
      } else if (action === 'start-game') {
        transitionState(() => { startGame(); });
      } else if (action === 'select-hand') {
        const id = parseInt(btn.dataset.id);
        const card = CARDS_DATA.find(c => c.id === id);
        state.selectedHandCard = (state.selectedHandCard?.id === id) ? null : card;
        render();
      } else if (action === 'select-shop') {
        const id = parseInt(btn.dataset.id);
        const card = CARDS_DATA.find(c => c.id === id);
        state.selectedShopCard = (state.selectedShopCard?.id === id) ? null : card;
        render();
      } else if (action === 'trade-shop') {
        handleShopTrade();
      } else if (action === 'trade-offer') {
        handleTrade();
      } else if (action === 'select-result') {
        const id = parseInt(btn.dataset.id);
        const card = CARDS_DATA.find(c => c.id === id);
        handleResultCardSelect(card);
      } else if (action === 'result-reset') {
        transitionState(() => {
          state.resultStep = 'SELECT_1';
          state.primaryCard = null;
          state.secondaryCard = null;
        });
      } else if (action === 'capture-share') {
        // 画像キャプチャの代わりにOS標準の共有APIを呼び出す
        handleShare();
      }
    });

    // Initial render
    render();
  </script>
</body>
</html>
