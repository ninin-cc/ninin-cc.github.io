<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIESM™ Role TRADE</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    @keyframes float {
      0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      25% { opacity: 0.8; }
      50% { transform: translateY(-100px) translateX(20px) scale(1.2); }
      75% { opacity: 0.8; }
      100% { transform: translateY(-200px) translateX(-20px) scale(1); opacity: 0; }
    }
    .animate-float {
      animation-name: float;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
    }
    .magic-text-glow {
      text-shadow: 0 0 15px rgba(249, 115, 22, 0.4), 0 0 5px rgba(255, 255, 255, 0.5);
    }
    @keyframes flyUp {
      0% { transform: translateY(0) scale(1.2); opacity: 1; z-index: 100; }
      100% { transform: translateY(-300px) scale(0.5) rotate(15deg); opacity: 0; z-index: 100; }
    }
    @keyframes flyDown {
      0% { transform: translateY(0) scale(1.05); opacity: 1; z-index: 100; }
      100% { transform: translateY(300px) scale(0.5) rotate(-15deg); opacity: 0; z-index: 100; }
    }
    @keyframes dropIn {
      0% { transform: translateY(-40px) scale(1.05); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    
    /* ▼▼ 滑らかな画面遷移用のアニメーション ▼▼ */
    @keyframes fadeOutStage {
      0% { opacity: 1; filter: blur(0px); }
      100% { opacity: 0; filter: blur(4px); }
    }
    @keyframes fadeInStage {
      0% { opacity: 0; filter: blur(4px); }
      100% { opacity: 1; filter: blur(0px); }
    }
    .animate-fadeOut {
      animation: fadeOutStage 0.4s ease-out forwards !important;
      pointer-events: none;
    }
    .animate-fadeInStage {
      animation: fadeInStage 0.6s ease-out forwards;
    }
    
    .animate-fly-up {
      animation: flyUp 0.6s ease-in-out forwards !important;
      pointer-events: none;
    }
    .animate-fly-down {
      animation: flyDown 0.6s ease-in-out forwards !important;
      pointer-events: none;
    }
    .animate-drop-in {
      animation: dropIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fadeIn {
      animation: fadeIn 0.4s ease-out forwards;
    }

    /* ▼▼ 確認モーダル用の専用フェードアニメーション ▼▼ */
    @keyframes fadeInModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeOutModal {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    .animate-fadeInModal {
      animation: fadeInModal 0.3s ease-out forwards;
    }
    .animate-fadeOutModal {
      animation: fadeOutModal 0.3s ease-in forwards;
    }

    /* ▼▼ 木目調ボタンと魔法のオーラエフェクト ▼▼ */
    @keyframes magicAura {
      0% { box-shadow: 0 0 15px 2px rgba(251, 146, 60, 0.4), inset 0 0 10px rgba(0,0,0,0.5); }
      50% { box-shadow: 0 0 25px 8px rgba(253, 224, 71, 0.8), inset 0 0 10px rgba(0,0,0,0.5); border-color: rgba(253, 224, 71, 0.8); color: #fef08a; }
      100% { box-shadow: 0 0 15px 2px rgba(251, 146, 60, 0.4), inset 0 0 10px rgba(0,0,0,0.5); }
    }
    .animate-magicAura {
      animation: magicAura 1s ease-in-out infinite;
    }

    /* ▼▼ 手札カード用の魔法のオーラエフェクト ▼▼ */
    @keyframes cardAura {
      0% { box-shadow: 0 0 10px rgba(253, 224, 71, 0.4), 0 0 5px rgba(251, 146, 60, 0.3); border-color: rgba(253, 224, 71, 0.5); }
      50% { box-shadow: 0 0 20px rgba(253, 224, 71, 0.8), 0 0 10px rgba(251, 146, 60, 0.6); border-color: rgba(253, 224, 71, 0.9); }
      100% { box-shadow: 0 0 10px rgba(253, 224, 71, 0.4), 0 0 5px rgba(251, 146, 60, 0.3); border-color: rgba(253, 224, 71, 0.5); }
    }
    .animate-cardAura {
      animation: cardAura 2.5s ease-in-out infinite;
    }

    @keyframes cardAuraSelected {
      0% { box-shadow: 0 0 30px rgba(253, 224, 71, 0.8), 0 0 15px rgba(251, 146, 60, 0.6); border-color: rgba(253, 224, 71, 0.9); }
      50% { box-shadow: 0 0 50px rgba(253, 224, 71, 1), 0 0 25px rgba(251, 146, 60, 0.9); border-color: rgba(255, 255, 255, 1); }
      100% { box-shadow: 0 0 30px rgba(253, 224, 71, 0.8), 0 0 15px rgba(251, 146, 60, 0.6); border-color: rgba(253, 224, 71, 0.9); }
    }
    .animate-cardAuraSelected {
      animation: cardAuraSelected 1.5s ease-in-out infinite;
    }
    
    /* 共通木目ボタンベース */
    .wood-btn {
      position: relative;
      overflow: hidden;
      border-width: 2px;
      transition: all 0.3s ease;
    }

    /* ダークな木目ボタン（主要アクション用） */
    .wood-btn-dark {
      background-color: #5d4037; 
      border-color: #3e2723;
      color: #ffffff;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.9), 0 0 5px rgba(0,0,0,0.8);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
    }
    .wood-btn-dark:hover:not(:disabled) {
      box-shadow: inset 0 0 12px rgba(0,0,0,0.7), 0 5px 20px rgba(251, 146, 60, 0.4);
    }
    .wood-btn-dark:hover:not(:disabled) .wood-texture {
      filter: brightness(0.9);
    }
    .wood-btn-dark:disabled {
      background-color: #78716c;
      border-color: #57534e;
      color: #d6d3d1;
      text-shadow: none;
      box-shadow: none;
    }
    .wood-btn-dark:disabled .wood-texture {
      filter: grayscale(1) brightness(0.6);
      opacity: 0.5;
    }

    /* ライトな木目ボタン（サブアクション、戻る用） */
    .wood-btn-light {
      background-color: #f4ebd8; 
      border-color: #8c7355;
      color: #3e2723;
      font-weight: bold;
      text-shadow: 0 1px 1px rgba(255,255,255,0.8);
      box-shadow: inset 0 0 5px rgba(255,255,255,0.6), 0 3px 8px rgba(0,0,0,0.15);
    }
    .wood-btn-light:hover:not(:disabled) {
      background-color: #e8dcc4;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.1), 0 4px 12px rgba(249, 115, 22, 0.2);
    }
    .wood-btn-light:hover:not(:disabled) .wood-texture {
      filter: brightness(0.9);
    }
    .wood-btn-light:disabled {
      background-color: #d6d3d1;
      border-color: #a8a29e;
      color: #78716c;
      text-shadow: none;
      box-shadow: none;
    }
    .wood-btn-light:disabled .wood-texture {
      filter: grayscale(1) opacity(0.3);
    }

    /* 共通木目テクスチャ */
    .wood-texture {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: url("https://ninin-cc.github.io/img/rt/mokuzai.jpg");
      background-size: cover;
      background-position: center;
      transition: filter 0.3s ease;
      z-index: 0;
    }
    .wood-btn-dark .wood-texture {
      mix-blend-mode: normal; 
      opacity: 0.8; 
    }
    .wood-btn-light .wood-texture {
      mix-blend-mode: luminosity;
      opacity: 0.2; 
    }
  </style>
</head>

    function checkAppBrowser() {
      const ua = navigator.userAgent.toLowerCase();
      const isLine = ua.indexOf("line") > -1;
      const isTwitter = ua.indexOf("twitter") > -1;
      const isFB = ua.indexOf("fbav") > -1 || ua.indexOf("fban") > -1;
      const isInsta = ua.indexOf("instagram") > -1;
      
      if (isLine || isTwitter || isFB || isInsta) {
        state.isAppBrowser = true;
        if (ua.indexOf("android") > -1) {
          const url = location.href;
          if (url.startsWith('http')) {
            const intentUrl = url.replace(/^https?:\/\//, 'intent://') + '#Intent;scheme=https;package=com.android.chrome;end;';
            location.href = intentUrl;
          }
        }
      }
    }

    function transitionState(callback) {
      const stage = document.getElementById('main-stage');
      const dock = document.getElementById('dock-stage');
      
      if (stage) {
        stage.classList.remove('animate-fadeInStage');
        stage.classList.add('animate-fadeOut');
      }
      if (dock) {
        dock.classList.remove('animate-fadeInStage');
        dock.classList.add('animate-fadeOut');
      }
      
      setTimeout(() => {
        state.isTransitioning = true;
        callback();
        window.scrollTo(0, 0);
        render();
      }, 400);
    }

    function shuffleArray(array) {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = newArray[i];
        newArray[i] = newArray[j];
        newArray[j] = temp;
      }
      return newArray;
    }

    function startGame() {
      const allShuffled = shuffleArray([...CARDS_DATA]);
      state.hand = allShuffled.slice(0, 5);
      
      let remaining = allShuffled.slice(5);
      let shopCards = [];
      
      ['WONDER', 'KEEPER', 'NURTURE', 'ADAPTER'].forEach(mode => {
        const idx = remaining.findIndex(c => c.mode === mode);
        if (idx !== -1) {
          shopCards.push(remaining[idx]);
          remaining.splice(idx, 1);
        }
      });
      shopCards.push(remaining.shift());
      shopCards.push(remaining.shift());
      
      state.shop = shuffleArray(shopCards);
      state.deck = remaining;
      
      state.shopRounds = [1, 6];
      state.round = 1;
      state.showTutorial = true; 
      state.resultStep = 'SELECT_1';
      state.primaryCard = null;
      state.secondaryCard = null;
      state.confirmingCard = null;
      state.zoomedCard = null;
      state.isConfirmModalClosing = false;
      state.tradeAvatarImg = getRandomAvatar(); 
      
      state.gameState = 'INITIAL_HAND';
      state.shareMessage = '';
    }

    function handleTrade() {
      if (!state.selectedHandCard || !state.tradeOfferCard || state.isExchanging) return;
      state.isExchanging = true;
      render();
      
      setTimeout(() => {
        transitionState(() => {
          state.hand = state.hand.map(c => c.id === state.selectedHandCard.id ? state.tradeOfferCard : c);
          state.deck.push(state.selectedHandCard);
          state.deck.shift();
          proceedToNextRound(state.hand, state.shop, state.deck);
          state.isExchanging = false;
        });
      }, 600);
    }

    function handleShopTrade() {
      if (!state.selectedHandCard || !state.selectedShopCard || state.isExchanging) return;
      state.isExchanging = true;
      render();
      
      setTimeout(() => {
        transitionState(() => {
          const newHand = state.hand.map(c => c.id === state.selectedHandCard.id ? state.selectedShopCard : c);
          const newShop = state.shop.map(c => c.id === state.selectedShopCard.id ? state.selectedHandCard : c);
          
          if (state.round === 1) {
            // ラウンド1終了時は見送りシーンへ
            state.hand = newHand;
            state.shop = newShop;
            state.selectedHandCard = null;
            state.selectedShopCard = null;
            state.gameState = 'LEAVE_SHOP_1';
          } else {
            proceedToNextRound(newHand, newShop, state.deck);
          }
          state.isExchanging = false;
        });
      }, 600);
    }

    function proceedToNextRound(newHand, newShop, newDeck) {
      state.selectedHandCard = null;
      state.selectedShopCard = null;
      state.tradeOfferCard = null;

      if (state.round >= TOTAL_ROUNDS) {
        state.hand = newHand;
        state.resultStep = 'SELECT_1';
        state.gameState = 'RESULT';
      } else {
        state.round++;
        state.hand = newHand;
        state.shop = newShop;
        state.deck = newDeck;
        
        state.isEntering = true;
        setTimeout(() => {
          state.isEntering = false;
        }, 800);
        
        if (!state.shopRounds.includes(state.round)) {
          state.tradeOfferCard = newDeck[0];
          state.tradeAvatarImg = getRandomAvatar(); 
        }

        // ▼▼ ラウンド間でのシーン遷移 ▼▼
        if (state.round === 2) {
          state.gameState = 'LEAVE_SHOP_1';
        } else if (state.round === 6) {
          state.gameState = 'AFTER_TAVERN';
        } else {
          state.gameState = 'PLAYING';
        }
      }
    }

    function handleResultCardSelect(card) {
      if (state.resultStep === 'SELECT_1' || state.resultStep === 'SELECT_2') {
        if (state.resultStep === 'SELECT_2' && card.id === state.primaryCard?.id) return;
        state.confirmingCard = card;
        state.isConfirmModalClosing = false;
        render();
      }
    }

    function confirmResultCard(isConfirmed) {
      state.isConfirmModalClosing = true;
      render();
      
      setTimeout(() => {
        if (isConfirmed) {
          if (state.resultStep === 'SELECT_1') {
            state.primaryCard = state.confirmingCard;
            state.confirmingCard = null;
            transitionState(() => { state.resultStep = 'SELECT_2'; });
          } else if (state.resultStep === 'SELECT_2') {
            state.secondaryCard = state.confirmingCard;
            state.confirmingCard = null;
            transitionState(() => { state.resultStep = 'FINAL'; });
          }
        } else {
          state.confirmingCard = null;
          state.isConfirmModalClosing = false;
          render();
        }
      }, 300);
    }

    function getMostFrequentMode() {
      const counts = {};
      state.hand.forEach(c => {
        counts[c.mode] = (counts[c.mode] || 0) + 1;
      });
      let maxMode = '';
      let maxCount = 0;
      for (const [mode, count] of Object.entries(counts)) {
        if (count > maxCount) {
          maxCount = count;
          maxMode = mode;
        }
      }
      return maxMode;
    }

    async function generateImage() {
      const captureEl = document.getElementById('capture-area');
      if (!captureEl || !window.html2canvas) {
        throw new Error("Cannot capture image");
      }
      const canvas = await window.html2canvas(captureEl, {
        backgroundColor: '#e8dcc4', 
        scale: 2, 
        useCORS: true,
      });
      return canvas.toDataURL("image/png");
    }

    function dataURLtoFile(dataurl, filename) {
        var arr = dataurl.split(','),
            mime = arr[0].match(/:(.*?);/)[1],
            bstr = atob(arr[arr.length - 1]), 
            n = bstr.length, 
            u8arr = new Uint8Array(n);
        while(n--){
            u8arr[n] = bstr.charCodeAt(n);
        }
        return new File([u8arr], filename, {type:mime});
    }

        } else {
          html += `
                  <div id="capture-area" class="bg-[#f0e6d2] pt-8 pb-10 px-4 sm:px-8 md:px-12 text-center relative overflow-hidden mt-4" style="background-image: ${PARCHMENT_TEXTURE}">
                    <div class="absolute inset-0 z-0 pointer-events-none">
                      <img src="${BG_DOOR_IMG}" alt="" class="w-full h-full object-cover opacity-[0.25] mix-blend-multiply" />

                    <div class="flex flex-col items-center w-full mt-6 mb-2 relative z-10">
                      
                      <div class="flex flex-nowrap gap-10 sm:gap-16 justify-center z-10 mb-10 sm:mb-14 w-full mt-6">
                        <div class="relative transform scale-[1.3] transition-transform duration-500">
                          <div class="absolute -inset-4 z-0 pointer-events-none animate-pulse">
                             ${getIcon('Sparkles', "absolute top-0 left-0 w-6 h-6 text-yellow-500")}
                             ${getIcon('Sparkles', "absolute bottom-0 right-0 w-8 h-8 text-orange-400")}
                             ${getIcon('Star', "absolute top-1/2 -right-4 w-5 h-5 text-yellow-300 fill-yellow-300")}
                          </div>
                          ${renderCardHTML(state.primaryCard, { isReadOnly: true, glow: true, customStyle: "shadow-[0_15px_40px_rgba(234,179,8,0.5)] z-20" })}
                        </div>
                        
                        <div class="relative transform scale-[1.3] transition-transform duration-500">
                          <div class="absolute -inset-4 z-0 pointer-events-none animate-pulse" style="animation-delay: 0.5s">
                             ${getIcon('Sparkles', "absolute bottom-0 right-0 w-6 h-6 text-yellow-500")}
                             ${getIcon('Sparkles', "absolute top-0 left-0 w-8 h-8 text-orange-400")}
                             ${getIcon('Star', "absolute top-1/2 -left-4 w-5 h-5 text-yellow-300 fill-yellow-300")}
                          </div>
                          ${renderCardHTML(state.secondaryCard, { isReadOnly: true, glow: true, customStyle: "shadow-[0_15px_40px_rgba(234,179,8,0.5)] z-20" })}
                        </div>
                      </div>

                      <div class="flex flex-nowrap gap-3 sm:gap-4 justify-center z-10 w-full mt-4">
                        ${unselectedCardsHTML}
                      </div>
                    </div>

                    <div class="w-full max-w-2xl mx-auto mt-4 sm:mt-6 border-t border-stone-400/60 pt-6 sm:pt-8 relative z-10">
                      <div class="mb-6 sm:mb-8 bg-[#f4ebd8]/90 p-4 sm:p-6 rounded-sm border border-stone-300 shadow-[inset_0_0_10px_rgba(0,0,0,0.05)]" style="background-image: ${PARCHMENT_TEXTURE}">
                        <p class="font-serif text-xs sm:text-sm text-stone-700 mb-2 sm:mb-3 tracking-widest font-bold text-center">一番多く選んだ色</p>
                        
                        <div class="relative inline-flex justify-center w-full my-2">
                           <div class="absolute inset-0 pointer-events-none flex items-center justify-center animate-pulse opacity-70">
                              ${getIcon('Sparkles', "absolute -top-3 left-[30%] w-4 h-4 text-yellow-500")}
                              ${getIcon('Star', "absolute -bottom-2 right-[30%] w-3 h-3 text-yellow-400 fill-yellow-400")}
                           </div>
                           <p class="text-xl sm:text-2xl font-serif font-extrabold tracking-wider drop-shadow-md text-center magic-text-glow relative z-10 ${MODE_TEXT_COLORS[getMostFrequentMode()]}">
                             ${getModeColorText(getMostFrequentMode())}
                           </p>
                        </div>
                        
                        <p class="text-[10px] sm:text-xs text-stone-800 mt-4 sm:mt-5 leading-relaxed font-serif font-bold text-center">
                          一番多く選んだ色は、今のあなたが人生に装備したいモードかもしれません。<br/>得意だから残ったものもあれば、苦手だけど必要だと感じて残ったものもあるはずです。<br/><br/>
                          <span class="${MODE_TEXT_COLORS[getMostFrequentMode()]} text-sm sm:text-base font-extrabold block mt-2 drop-shadow-sm">

                    <p class="text-xs sm:text-sm text-stone-800 font-serif font-bold mb-3">現実のあなたにも備わっている「24の役割」についてもっと知りたい方はこちら</p>
                    <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" class="inline-block text-sm sm:text-base text-orange-900 font-extrabold hover:text-orange-700 transition-colors font-serif tracking-widest border-b-2 border-orange-900 hover:border-orange-700 pb-1 drop-shadow-md">
                      🌈RIESM™
                    </a>
                  </div>

                  <div class="w-full max-w-2xl mx-auto space-y-4 sm:space-y-6 text-stone-900 font-serif font-bold text-center px-2 sm:px-4 relative z-10">
                    <p class="font-extrabold text-sm sm:text-base mb-2 text-stone-800 bg-[#e8dcc4]/70 py-4 px-2 rounded-sm border border-stone-300/50 shadow-sm">Q. なぜ【${state.primaryCard?.name}】を一番大事に選びましたか？</p>
                    <p class="font-extrabold text-sm sm:text-base mb-2 text-stone-800 bg-[#e8dcc4]/70 py-4 px-2 rounded-sm border border-stone-300/50 shadow-sm">Q. もし「自分っぽくない役割」があるなら、それはなぜ残したのですか？</p>
                    <p class="font-extrabold text-sm sm:text-base mb-2 text-stone-800 bg-[#e8dcc4]/70 py-4 px-2 rounded-sm border border-stone-300/50 shadow-sm">Q. 最後に、この装備でこれからどんな人生を歩みたいですか？</p>
                  </div>

                  <div class="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6 mt-8 sm:mt-12 relative z-10 w-full px-4">
                    <button data-action="capture-save" class="w-full sm:w-auto wood-btn wood-btn-dark rounded-full transition-all duration-300 hover:scale-105 flex items-center justify-center tracking-widest text-xs sm:text-sm font-bold py-3 sm:py-4 px-4 sm:px-8">
                      <div class="wood-texture"></div>
                      <span class="relative z-10 flex items-center justify-center">
                        ${getIcon('Camera', "w-4 h-4 sm:w-5 sm:h-5 mr-2")} 画像を保存する
                      </span>
                    </button>
                    <button data-action="capture-share" class="w-full sm:w-auto wood-btn wood-btn-dark rounded-full transition-all duration-300 hover:scale-105 flex items-center justify-center tracking-widest text-xs sm:text-sm font-bold py-3 sm:py-4 px-4 sm:px-8">
                      <div class="wood-texture"></div>
                      <span class="relative z-10 flex items-center justify-center">
                        ${getIcon('Share2', "w-4 h-4 sm:w-5 sm:h-5 mr-2")} SNS等でシェア
                      </span>
                    </button>
                  </div>

                  <div class="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-8 mt-6 sm:mt-8 relative z-10">
                    <button data-action="result-reset" class="flex items-center text-stone-900 font-bold hover:text-orange-900 font-serif tracking-widest text-xs sm:text-sm transition-colors border-b border-transparent hover:border-orange-900 pb-1 drop-shadow-md">
                      ${getIcon('ChevronLeft', "w-4 h-4 mr-1")} 順位を選び直す
                    </button>
                    <button data-action="go-start" class="flex items-center text-stone-900 font-bold hover:text-orange-900 font-serif tracking-widest text-xs sm:text-sm transition-colors border-b border-transparent hover:border-orange-900 pb-1 drop-shadow-md">
                      再び過去へ戻る
                    </button>
                  </div>
              `;
        }
      }

      html += `
            </div> <!-- End of inner content -->
          </div> <!-- End of main-stage -->
      `;

      if (state.gameState === 'PLAYING') {
        let exchangeBtnHTML = '';
        if (isShopTime) {
          exchangeBtnHTML = `
                  <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                    <button data-action="trade-shop" ${!state.selectedHandCard || !state.selectedShopCard || state.isExchanging ? 'disabled' : ''} class="w-full sm:w-auto wood-btn wood-btn-dark rounded-sm transition-all duration-300 flex items-center justify-center tracking-widest text-[11px] sm:text-sm font-serif font-bold py-2.5 sm:py-3 px-4 sm:px-8 ${state.isExchanging ? 'animate-magicAura' : ''}">
                      <div class="wood-texture"></div>
                      <span class="relative z-10 flex items-center justify-center">
                        ${getIcon('RefreshCw', "w-4 h-4 mr-1.5 sm:mr-3 shrink-0 " + (state.isExchanging ? 'animate-spin' : ''))}
                        ${state.isExchanging ? '入れ替え中...' : (state.selectedHandCard && state.selectedShopCard ? '役割を入れ替える' : '手札と場から1枚ずつ選ぶ')}
                      </span>
                    </button>
                    ${state.round === 6 ? `
                      <button data-action="skip-trade" ${state.isExchanging ? 'disabled' : ''} class="w-full sm:w-auto wood-btn wood-btn-dark rounded-sm transition-all duration-300 flex items-center justify-center tracking-widest text-[11px] sm:text-sm font-serif font-bold py-2.5 sm:py-3 px-4 sm:px-8">
                        <div class="wood-texture"></div>
                        <span class="relative z-10 flex items-center justify-center">交換せずに旅立つ</span>
                      </button>
                    ` : ''}
                  </div>
          `;
        } else {
          exchangeBtnHTML = `
                  <button data-action="trade-offer" ${!state.selectedHandCard || state.isExchanging ? 'disabled' : ''} class="w-full sm:w-auto wood-btn wood-btn-dark rounded-sm transition-all duration-300 flex items-center justify-center tracking-widest text-[11px] sm:text-sm font-serif font-bold py-2.5 sm:py-3 px-4 sm:px-10 ${state.isExchanging ? 'animate-magicAura' : ''}">
                    <div class="wood-texture"></div>
                    <span class="relative z-10 flex items-center justify-center">
                      ${getIcon('RefreshCw', "w-4 h-4 mr-1.5 sm:mr-3 shrink-0 " + (state.isExchanging ? 'animate-spin' : ''))}
                      ${state.isExchanging ? '入れ替え中...' : (state.selectedHandCard ? '選んだ手札を渡す' : '渡す手札を1枚選んでください')}
                    </span>
                  </button>
          `;
        }

        /* ▼▼ 変更箇所: ドックの背景色を明るくし、木目を活かす ▼▼ */
        html += `
          <div id="dock-stage" class="fixed bottom-0 left-0 w-full shadow-[0_-10px_50px_rgba(0,0,0,0.6)] border-t-2 border-stone-800 z-50 ${stageFadeClass}" style="background-image: url('https://ninin-cc.github.io/img/rt/mokuzai.jpg'); background-size: cover; background-position: center bottom;">
            <div class="absolute inset-0 bg-[#281405]/30 pointer-events-none z-0"></div>
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#8b5a2b] via-orange-900/50 to-[#8b5a2b] z-10"></div>
            
            <div class="max-w-4xl mx-auto pt-2 sm:pt-4 relative flex flex-col z-10">
              <div class="w-full flex justify-center">
                <div class="flex items-end h-[150px] sm:h-[210px] px-2 relative">
                  ${dockCardsHTML}
                </div>
              </div>

              <div class="w-full flex justify-center px-4 py-3 sm:py-4 mt-2 sm:mt-4 bg-stone-900/30 border-t border-stone-900/40 backdrop-blur-sm">
                ${exchangeBtnHTML}
              </div>
            </div>
          </div>
        `;
      }

      root.innerHTML = html;
      
      state.isTransitioning = false;
    }

    // --- Event Listeners ---
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === 'go-rules') {
        transitionState(() => { state.gameState = 'RULES'; });
      } else if (action === 'go-start') {
        transitionState(() => { state.gameState = 'START'; });
      } else if (action === 'start-game') {
        transitionState(() => { startGame(); });
      } else if (action === 'go-playing') {
        transitionState(() => { 
          state.selectedHandCard = null; // 遷移時に選択状態をリセット
          state.gameState = 'PLAYING'; 
        });
      } else if (action === 'go-before-tavern') {
        transitionState(() => { state.gameState = 'BEFORE_TAVERN'; });
      } else if (action === 'select-hand') {
        const id = parseInt(btn.dataset.id);
        const card = CARDS_DATA.find(c => c.id === id);
        state.selectedHandCard = (state.selectedHandCard?.id === id) ? null : card;
        render();
      } else if (action === 'select-shop') {
        const id = parseInt(btn.dataset.id);
        const card = CARDS_DATA.find(c => c.id === id);
        state.selectedShopCard = (state.selectedShopCard?.id === id) ? null : card;
        render();
      } else if (action === 'trade-shop') {
        handleShopTrade();
      } else if (action === 'trade-offer') {
        handleTrade();
      } else if (action === 'skip-trade') {
        transitionState(() => {
          proceedToNextRound(state.hand, state.shop, state.deck);
        });
      } else if (action === 'select-result') {
        const id = parseInt(btn.dataset.id);
        const card = CARDS_DATA.find(c => c.id === id);
        handleResultCardSelect(card);
      } else if (action === 'confirm-yes') {
        confirmResultCard(true);
      } else if (action === 'confirm-no') {
        confirmResultCard(false);
      } else if (action === 'result-reset') {
        transitionState(() => {
          state.resultStep = 'SELECT_1';
          state.primaryCard = null;
          state.secondaryCard = null;
        });
      } else if (action === 'capture-share') {
        handleShare();
      } else if (action === 'capture-save') {
        handleSave();
      } else if (action === 'close-tutorial') {
        state.showTutorial = false;
        render();
      } else if (action === 'close-iab-modal') {
        state.isAppBrowser = false;
        render();
      }
    });

    // 起動時のIABチェック実行
    checkAppBrowser();

    // Initial render
    render();
  </script>
</body>
</html>
