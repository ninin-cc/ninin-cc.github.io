  <style>
    @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
    body { margin: 0; padding: 0; background: #000; color: #f3f4f6; overflow-x: hidden; }
    html, body { -webkit-touch-callout: none; }
    img { -webkit-user-drag: none; user-select: none; }
    .rpg-font { font-family: 'DotGothic16', sans-serif; letter-spacing: 0.05em; }
    
    /* ルビの調整 */
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: white; } /* ルビを白文字に */
    h1 rt { font-size: 0.35em; } /* タイトルでのルビはさらに小さく */

    .rpg-button { 
      border: 2px solid white; 
      padding: 12px 16px; 
      border-radius: 6px; 
      transition: all 0.2s; 
      background: black; 
      color: white; 
      cursor: pointer; 
      text-align: center; 
      font-weight: bold;
    }
    .rpg-button:hover:not(:disabled) { 
      background: white; 
      color: black; 
    }
    .rpg-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ページ切り替えのフェードイン */
    .animate-page-turn { 
      position: relative;
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* ページめくり（左固定で右から左へ縮小）アニメーション */
    .page-flip-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(to right, #050505 0%, #1a1a1a 95%, #3a3a3a 100%);
      z-index: 100;
      transform-origin: left center;
      animation: flipLeft 0.5s ease-in-out forwards;
      pointer-events: none;
    }
    @keyframes flipLeft {
      0% { transform: scaleX(1); opacity: 1; }
      99% { transform: scaleX(0); opacity: 1; }
      100% { transform: scaleX(0); opacity: 0; }
    }
    
    /* オーラエフェクト */
    .aura-effect-a {
      animation: pulseAuraA 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(230,194,128,0.6);
    }
    @keyframes pulseAuraA {
      0% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(230,194,128,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
    }

    .aura-effect-b {
      animation: pulseAuraB 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(212,184,149,0.6);
    }
    @keyframes pulseAuraB {
      0% { box-shadow: 0 0 20px 10px rgba(212,184,149,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(212,184,149,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(212,184,149,0.6); transform: scale(1); }
    }

    .progress-bar-fill {
      transition: width 0.3s ease-out;
    }

    /* 結果カードのスタイル */
    .result-card-gold {
      background: linear-gradient(135deg, rgba(30,25,0,0.9), rgba(10,5,0,0.95));
      border: 2px solid #facc15;
      box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
    }
    .result-card-silver {
      background: linear-gradient(135deg, rgba(20,25,30,0.9), rgba(5,10,15,0.95));
      border: 2px solid #94a3b8;
    }
    .result-card-bronze {
      background: linear-gradient(135deg, rgba(30,15,5,0.9), rgba(15,5,0,0.95));
      border: 2px solid #b45309;
    }
    .result-card-danger {
      background: linear-gradient(135deg, rgba(40,0,0,0.9), rgba(10,0,0,0.95));
      border: 2px solid #ef4444;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
    }
  </style>

    // --- キャリアアンカーの定義 ---
    const ANCHORS = {

    const ANCHOR_STORY_REACTIONS = {

      },

      },

    // シーン2（マイナスボーナス）用の極端な価値観の主張
    const ANCHOR_MINUS_REACTIONS = {
      TF: {
        roleName: '技を極める職人',
        quote: '私は自分の専門分野にしか興味がないな。雑務や専門外の作業には一切関わりたくないし、とにかく自分の技術だけをずっと磨き続けられるなら参加するよ。'
      },
      GM: {
        roleName: '仲間を束ねる指揮官',
        quote: 'やるからには、私が全体を仕切ってトップに立ちたいな。誰かの下で指示通りに動くつもりはないし、人や物事をすべて自分の権限でコントロールできないなら意味がないよ。'
      },
      AU: {

        quote: '王様やギルドのルールに縛られるのは絶対に嫌だな。誰にも干渉されず、すべて自分のやり方とペースで進められないなら、一人で勝手にやったほうがマシだよ。'
      },

      },
      LS: {
        roleName: '暮らしを大切にする生活者',
        quote: '仕事の成功よりも、自分の休みやプライベートの時間が絶対に最優先だな。この依頼のせいで自分の生活リズムが少しでも崩れるくらいなら、最初から参加するつもりはないよ。'
      }
    };

    const ANCHOR_DESCRIPTIONS = {
      TF: {
        strength: "特定の分野で高度なスキルと知識を発揮し、その専門性を深く探求していくプロセスにこそ、あなたの最大の喜びを感じます。ご自身の才能を信じ、スペシャリストとしての道を堂々と歩んでいくことが、あなたをさらに輝かせます。",
        weakness: "「専門家なのだから」という周囲の過度な期待や、一つのスキルだけを極め続けるプレッシャーで息苦しさを感じた時は、その役割を手放して構いません。あなたは特定の枠に縛られず、様々な業務に柔軟に関わる環境でも、十分に力を発揮できる可能性を持っています。"
      },
      GM: {
        strength: "組織全体の責任を背負い、多様な個性を持つ人々をまとめ上げて大きな成果を創り出す。そのダイナミックなやりがいこそがあなたの原動力です。ぜひ自信を持って、リーダーシップを発揮できる舞台を選んでください。",
        weakness: "「組織全体を引っ張らなければ」「全員をまとめなければ」という重圧に押しつぶされそうな時は、その責任を一人で抱え込まなくて大丈夫です。時には人の管理を手放し、あなた自身の仕事にじっくり集中できる環境を選ぶことも、大切な自己管理の形です。"
      },
      AU: {
        strength: "組織のルールや制約に縛られることなく、自分自身のやり方とペースで仕事を進められる時、あなたの真価は発揮されます。大きな裁量を持って、自由に羽ばたける環境を大切にしてください。",

        weakness: "ルールに守られすぎた安全な環境や、変化のない単調な毎日に退屈さや息苦しさを覚えた時は、そこにとどまらなくていいのです。適度なリスクや新しい刺激、変化を取り入れられる環境へ一歩踏み出すことで、あなたのモチベーションはさらに輝きを増すでしょう。"
      },
      EC: {
        strength: "リスクを恐れず、自分自身のアイデアで全く新しい事業や製品をゼロから創り出す情熱。それこそがあなたの才能であり、新しい価値を生み出す仕事はまさに天職と言えます。その創造力を存分に爆発させてください。",
        weakness: "「常にゼロから生み出さなければ」「斬新なアイデアを出し続けなければ」というプレッシャーで疲れてしまった時は、その強迫観念を手放しましょう。すでにある仕組みをより良く改善したり、着実に運用を回していく役割を選ぶことも、あなたの立派な才能の活かし方です。"
      },
      SV: {
        strength: "個人の利益を超え、社会を良くすることや他者を支援するという大きな意義に貢献できること。その尊い価値観と仕事が一致した時、あなたは誰よりも強い力を発揮します。あなたのその優しさと使命感を大切にしてください。",

      },

    // --- 設問データ (Q1 - Q10) ---
    const QUESTIONS = [

    // --- 共通UIコンポーネント ---

    // キャラクターのセリフボックス（アイコンの回り込み対応）
    const DialogBox = ({ charConfig, text, imageSide = 'left' }) => {
      const { name, img, dialogColor, imgBg } = charConfig;
      const isImageRight = imageSide === 'right';

      return (
        <div className={`w-full ${dialogColor} border-2 p-4 md:p-5 rounded-lg mb-6 relative animate-fade-in shadow-xl mt-6`}>
          <div className={`absolute -top-3 ${isImageRight ? 'right-4' : 'left-4'} ${dialogColor.split(' ')[0]} px-3 border border-white rounded-full text-white text-sm font-bold tracking-widest shadow-sm z-10`}>
            {name}
          </div>
          <div className="mt-2 w-full block">
            <div className={`w-16 h-16 md:w-20 md:h-20 ${imgBg} border-2 border-white rounded-md overflow-hidden shadow-inner ${isImageRight ? 'float-right ml-4 mb-2' : 'float-left mr-4 mb-2'}`}>
              <img src={img} alt={name} className="w-full h-full object-contain scale-110" style={{ imageRendering: 'pixelated', transform: isImageRight ? 'scaleX(-1) scale(1.1)' : 'scale(1.1)' }} />
            </div>
            <div className="text-white text-sm md:text-base leading-relaxed whitespace-pre-wrap">
              {text}
            </div>
            <div className="clear-both"></div>
          </div>
        </div>
      );
    };

    const ProgressBar = ({ current, total, label }) => {
      const percentage = Math.max(0, Math.min(100, (current / total) * 100));
      return (
        <div className="w-full mb-4 relative z-20 bg-black bg-opacity-80 p-3 rounded-lg border border-gray-600 shadow-md">
          <div className="flex justify-between text-xs text-gray-300 mb-2 px-1 font-bold">
            <span>{label}</span>
            <span>{current} / {total}</span>
          </div>
          <div className="w-full bg-gray-800 rounded-full h-2 border border-gray-600 overflow-hidden">
            <div className="bg-yellow-400 h-full progress-bar-fill" style={{ width: `${percentage}%` }}></div>
          </div>
        </div>
      );
    };

    const AnswerCircle = ({ val, selectedVal, onSelect, showDoubleTapMessage = false }) => {
      // ベージュ(A)と茶色(B)のサイズ配列
      const sizeA = [
        'w-10 h-10 md:w-14 md:h-14', // 0: A(強)
        'w-6 h-6 md:w-8 md:h-8',     // 1: A(弱)
        'w-0 h-0',                   // 2: B(弱)
        'w-0 h-0'                    // 3: B(強)
      ];
      const sizeB = [
        'w-0 h-0',                   // 0: A(強)
        'w-0 h-0',                   // 1: A(弱)
        'w-6 h-6 md:w-8 md:h-8',     // 2: B(弱)
        'w-10 h-10 md:w-14 md:h-14'  // 3: B(強)
      ];

      const textMap = [
        "Aに近い",
        "どちらかと\nいえばA",
        "どちらかと\nいえばB",
        "Bに近い"
      ];

      const isSelected = selectedVal === val;

      return (
        <button 
          onClick={() => onSelect(val)} 
          className="flex-1 flex flex-col items-center group relative z-10 hover:bg-gray-800 hover:bg-opacity-60 rounded-lg transition-all py-1"
        >
          <div className="h-20 md:h-24 w-full relative">
            {/* 中央の基準線 */}
            <div className={`absolute top-1/2 h-px bg-slate-500 -translate-y-1/2 z-0 ${val === 0 ? 'left-1/2 right-0' : val === 3 ? 'left-0 right-1/2' : 'left-0 right-0'}`}></div>
            
            {/* 「もう一度押して決定」を線上に表示 (練習問題のときのみ) */}
            {isSelected && showDoubleTapMessage && (
              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none w-max">
                <span className="bg-black bg-opacity-90 px-3 py-1.5 rounded-full text-[10px] md:text-xs text-yellow-300 font-bold animate-pulse border border-yellow-500 shadow-[0_0_10px_rgba(250,204,21,0.5)]">
                  もう一度押して決定
                </span>
              </div>
            )}

            {/* A: ベージュ (下揃え) absolute で中央線から上に配置 */}
            {val <= 1 && (
              <div className="absolute bottom-1/2 left-0 right-0 flex justify-center pb-[3px]">
                <div className={`rounded-full bg-[#e6c280] transform origin-bottom transition-all duration-300 ${sizeA[val]} ${val === 0 ? 'border-2 border-[#fefce8]' : ''} ${isSelected ? 'aura-effect-a scale-110 border-2 border-white' : 'group-hover:scale-110 shadow-[0_0_10px_rgba(230,194,128,0.4)]'}`}></div>
              </div>
            )}
            
            {/* B: 茶色 (上揃え) absolute で中央線から下に配置 */}
            {val >= 2 && (
              <div className="absolute top-1/2 left-0 right-0 flex justify-center pt-[3px]">
                <div className={`rounded-full bg-[#784a23] transform origin-top transition-all duration-300 ${sizeB[val]} ${val === 3 ? 'border-2 border-[#d4b895]' : ''} ${isSelected ? 'aura-effect-b scale-110 border-2 border-white' : 'group-hover:scale-110 shadow-[0_0_10px_rgba(120,74,35,0.4)]'}`}></div>
              </div>
            )}
          </div>
          <div className="h-8 mt-1 flex items-center justify-center w-full relative">
            <span className={`text-[9px] md:text-[11px] text-center leading-tight whitespace-pre-wrap font-bold transition-colors ${isSelected ? 'text-yellow-300' : 'text-gray-400 group-hover:text-yellow-200'}`}>
              {textMap[val]}
            </span>
          </div>
        </button>
      );
    };

    // --- メインアプリケーション ---
    const App = () => {
      const [step, setStep] = useState('intro'); // intro, practice, question, bonus1_story, bonus1_intro, bonus1_select, bonus2, calculating, result
      const [qIndex, setQIndex] = useState(0);
      const [scores, setScores] = useState({ TF: 0, GM: 0, AU: 0, SE: 0, EC: 0, SV: 0, CH: 0, LS: 0 });
      const [scoreHistory, setScoreHistory] = useState([]); // 戻るボタン用のスコア履歴
      
      const [selectedBonus, setSelectedBonus] = useState([]); // シーン1用（2つ選択）
      const [selectedMinusBonus, setSelectedMinusBonus] = useState(null); // シーン2用（1つ選択）
      
      const [results, setResults] = useState(null);
      const [randomImages, setRandomImages] = useState({}); // ボーナス画面用ランダム画像マップ
      const [popupType, setPopupType] = useState('none'); // 'none', 'talk', 'save', 'about', 'start', 'notYet'
      const [animationKey, setAnimationKey] = useState(0); // ページめくりアニメーション用キー

      // 現在選択中の値（一度目のタップで保存し、二度目で決定する）
      const [tempSelectedVal, setTempSelectedVal] = useState(null);

      // --- スコア処理 ---
      const handleAnswer = (val) => {
        // 1回目のタップ：光らせて選択状態にする
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        // 2回目のタップ（同じものを押した）：決定処理へ進む
        const q = QUESTIONS[qIndex];
        
        // 戻るボタンのために現在のスコアを履歴に保存
        setScoreHistory([...scoreHistory, { ...scores }]);

        const newScores = { ...scores };

        // 4択の配分ロジック (3-2-1-0)
        if (val === 0) { newScores[q.typeA] += 3; }
        else if (val === 1) { newScores[q.typeA] += 2; newScores[q.typeB] += 1; }
        else if (val === 2) { newScores[q.typeA] += 1; newScores[q.typeB] += 2; }
        else if (val === 3) { newScores[q.typeB] += 3; }

        setScores(newScores);
        setTempSelectedVal(null); // 選択状態をリセット

        // ページめくりアニメーションを発火させる
        setAnimationKey(prev => prev + 1);

        if (qIndex < QUESTIONS.length - 1) {
          setQIndex(qIndex + 1);
          window.scrollTo(0, 0);
        } else {
          // ボーナス画面へ移行する際に、全アンカーにランダムな画像を割り当てる
          const availableImgs = [1, 2, 3, 4, 5, 6, 7, 8].sort(() => 0.5 - Math.random());
          const sortedKeys = Object.entries(newScores)
            .sort((a, b) => b[1] - a[1])
            .map(item => item[0]);
          
          const imgMap = {};
          sortedKeys.forEach((k, idx) => {
            imgMap[k] = availableImgs[idx];
          });
          setRandomImages(imgMap);

          setStep('bonus1_story');
          window.scrollTo(0, 0);
        }
      };

      // --- 例題（練習画面）での選択処理 ---
      const handleExampleAnswer = (val) => {
        // 1回目のタップ：光らせて選択状態にする
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        // 2回目のタップ：決定処理へ進む
        setTempSelectedVal(null); // 選択状態をリセット

        // 右側（B寄り）の2つ（2, 3）を選んだ場合はスタート
        if (val >= 2) {
          setPopupType('start');
        } else {
          // 左側（A寄り）を選んだ場合はまだスタートしない
          setPopupType('notYet');
        }
      };

      // --- 戻る処理 ---
      const handleBack = () => {
        // 戻る際もアニメーションを発火
        setAnimationKey(prev => prev + 1);
        setTempSelectedVal(null); // 戻る時に選択状態もリセット

        if (step === 'practice') {
          setStep('intro');
          window.scrollTo(0, 0);
          return;
        }

        // 第一問目の場合は練習画面に戻る
        if (step === 'question' && qIndex === 0) {
          setStep('practice');
          window.scrollTo(0, 0);
          return;
        }

        if (step === 'bonus2') {
          setStep('bonus1_select');
          window.scrollTo(0, 0);
          return;
        }

        if (step === 'bonus1_select') {
          setStep('bonus1_intro');
          window.scrollTo(0, 0);
          return;
        }

        if (step === 'bonus1_intro') {
          setStep('bonus1_story');
          window.scrollTo(0, 0);
          return;
        }

        if (scoreHistory.length === 0) return;

        // 履歴から1つ前のスコアを取り出して復元
        const prevScores = scoreHistory[scoreHistory.length - 1];
        setScores(prevScores);
        setScoreHistory(scoreHistory.slice(0, -1));

        if (step === 'bonus1_story') {
          // ボーナス画面から最後の質問に戻る
          setStep('question');
          window.scrollTo(0, 0);
        } else if (step === 'question' && qIndex > 0) {
          // 質問画面で1つ前の質問に戻る
          setQIndex(qIndex - 1);
          window.scrollTo(0, 0);
        }
      };

      const toggleBonus = (key) => {
        if (selectedBonus.includes(key)) {
          setSelectedBonus(selectedBonus.filter(k => k !== key));
        } else if (selectedBonus.length < 2) {
          setSelectedBonus([...selectedBonus, key]);
        }
      };

      const calculateResult = () => {
        setStep('calculating');
        
        const finalScores = { ...scores };
        
        // シーン1のプラス加点
        selectedBonus.forEach((key, index) => {
          finalScores[key] += (index === 0) ? 3 : 2; 
        });
        
        // シーン2のマイナス減点
        if (selectedMinusBonus) {
          finalScores[selectedMinusBonus] -= 1;
        }

        const sorted = Object.entries(finalScores).sort((a, b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3).map(item => item[0]);
        const bottom1 = sorted[sorted.length - 1][0]; // 減点によってワースト1がより正確になる

        setTimeout(() => {
          setResults({ top3, bottom1, finalScores });
          setStep('result');
          window.scrollTo(0, 0);
        }, 1500);
      };

      const resetApp = () => {
        if(window.confirm('最初からやり直しますか？')) {
          setStep('intro');
          setQIndex(0);
          setScores({ TF: 0, GM: 0, AU: 0, SE: 0, EC: 0, SV: 0, CH: 0, LS: 0 });
          setScoreHistory([]);
          setSelectedBonus([]);
          setSelectedMinusBonus(null);
          setRandomImages({});
          setResults(null);
          setPopupType('none');
          setTempSelectedVal(null);
          window.scrollTo(0, 0);
        }
      };

      const openPopup = (type) => setPopupType(type);
      const closePopup = () => setPopupType('none');

      // --- 画像保存処理 ---
      const handleSaveImage = () => {
        const element = document.getElementById('result-capture-area');
        if (!element) return;
        
        // スマホなどで上部が切れないように、一度トップへスクロールする
        window.scrollTo(0, 0);

        // 少し待機して描画を安定させてからキャプチャを実行
        setTimeout(() => {
          html2canvas(element, { 
            backgroundColor: '#0a0a0a', // スクショしたときに透過して見えなくなるのを防ぐため、暗い背景を敷く
            scale: 2, // 高画質化
            useCORS: true
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'career_anchor_result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            closePopup();
          }).catch(err => {
            console.error('画像保存エラー', err);
            alert('画像の保存に失敗しました。');
            closePopup();
          });
        }, 300);
      };

      // --- 各画面のレンダリング ---
      const renderIntro = () => (
        <div className="animate-fade-in flex-1 flex flex-col items-center justify-center">
          <div className="text-center mb-4">
            <h1 className="font-bold text-white mb-2 leading-tight flex flex-col items-center justify-center" style={{ textShadow: '2px 2px 0 #000' }}>
              <span className="text-lg md:text-2xl mb-1 text-gray-300">{CONFIG.appTitlePre}</span>
              <span className="text-3xl md:text-5xl">～心の<ruby>錨<rt>いかり</rt></ruby>を観る魔法～</span>
            </h1>
            <p className="text-yellow-300 text-sm md:text-base font-bold tracking-widest">{CONFIG.appSubtitle}</p>
          </div>

          <DialogBox 
            charConfig={CONFIG.char1} 
            text={`よく来たな。\nここでは　お主が大切にしている【Role＝役割】における【絶対に譲れない軸】を見極めるための 問い を用意したぞい。 直感で答えてゆくのじゃ。`} 
          />
          <DialogBox 
            charConfig={CONFIG.char2} 
            imageSide="right"
            text={`全部で10問、3分くらいで終わると思います。\n4段階の◯から、自分が『そう感じる』ところを選んでくださいね！`} 
          />

          <div className="flex flex-col gap-4 w-full items-center mb-8 mt-4">
            <button 
              onClick={() => {
                setAnimationKey(prev => prev + 1);
                setStep('practice');
                window.scrollTo(0, 0);
              }}
              className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black w-full md:w-auto px-10 py-4 text-lg font-bold shadow-[0_0_15px_rgba(59,130,246,0.3)]"
            >
              練習もんだいへ進む
            </button>

            <div className="flex flex-col gap-2 mt-2">
              <button onClick={() => openPopup('about')} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center justify-center gap-2 underline underline-offset-4">
                <i className="fa-solid fa-book-open"></i> 心の錨の魔法とは？
              </button>
              <button onClick={() => openPopup('talk')} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center justify-center gap-2 underline underline-offset-4">
                <i className="fa-solid fa-comments"></i> ひとに話してみる
              </button>
            </div>
          </div>
        </div>
      );

      const renderPractice = () => (
        <div className="w-full flex flex-col items-center">
          <WindowBox title="練習もんだい" iconName="fa-solid fa-gamepad" className="bg-opacity-90 mb-8 animate-fade-in">
            <p className="text-sm md:text-base text-gray-300 text-center mb-3 font-bold border-b border-gray-600 pb-2">
              左がA、右がBに近づきます。<br />4段階の◯から、自分がそうだと感じたところを選んでください。
            </p>
            <div className="flex flex-col w-full py-1">
              {/* 選択肢 A */}
              <div className="bg-[#5c4a30] bg-opacity-40 border border-[#e6c280] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)]">
                <div className="absolute top-0 left-0 bg-[#e6c280] text-black text-[10px] md:text-xs font-bold px-2 py-1 rounded-br-lg shadow-md">A</div>
                <p className="text-sm md:text-lg font-bold text-[#fdf6e3] leading-relaxed">まだやらない</p>
              </div>

              {/* 円ボタン群 */}
              <div className="relative my-3 md:my-4 bg-black bg-opacity-40 rounded-xl p-1 md:p-2 border border-gray-700 shadow-inner">
                <div className="flex justify-between items-start relative z-10 w-full gap-1 md:gap-2">
                  {[0, 1, 2, 3].map(val => (
                    <AnswerCircle 
                      key={val} 
                      val={val} 
                      selectedVal={tempSelectedVal}
                      onSelect={handleExampleAnswer}
                      showDoubleTapMessage={true} 
                    />
                  ))}
                </div>
              </div>

              {/* 選択肢 B */}
              <div className="bg-[#3a2012] bg-opacity-50 border border-[#8b5a2b] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(139,90,43,0.1)]">
                <div className="absolute top-0 right-0 bg-[#8b5a2b] text-white text-[10px] md:text-xs font-bold px-2 py-1 rounded-bl-lg shadow-md">B</div>
                <p className="text-sm md:text-lg font-bold text-[#e8d5c4] leading-relaxed">さっそくやってみる</p>
              </div>
            </div>
          </WindowBox>

          <div className="flex justify-center mt-2">
            <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
              ◀ もどる
            </button>
          </div>
        </div>
      );

      const renderQuestion = () => {
        const q = QUESTIONS[qIndex];
        
        return (
          <div className="w-full">
            <WindowBox title={`第 ${qIndex + 1} 問`} iconName="fa-solid fa-clipboard-question" className="bg-opacity-90">
              <div className="flex flex-col w-full py-1">
                
                {/* 選択肢 A (ベージュ系) */}
                <div className="bg-[#5c4a30] bg-opacity-40 border border-[#e6c280] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)]">
                  <div className="absolute top-0 left-0 bg-[#e6c280] text-black text-[10px] md:text-xs font-bold px-2 py-1 rounded-br-lg shadow-md">A</div>
                  <p className="text-sm md:text-lg font-bold text-[#fdf6e3] leading-relaxed">{q.textA}</p>
                </div>

                {/* 円ボタン群 */}
                <div className="relative my-3 md:my-4 bg-black bg-opacity-40 rounded-xl p-1 md:p-2 border border-gray-700 shadow-inner">
                  <div className="flex justify-between items-start relative z-10 w-full gap-1 md:gap-2">
                    {[0, 1, 2, 3].map(val => (
                      <AnswerCircle 
                        key={val} 
                        val={val} 
                        selectedVal={tempSelectedVal}
                        onSelect={handleAnswer}
                        showDoubleTapMessage={false} 
                      />
                    ))}
                  </div>
                </div>

                {/* 選択肢 B (茶色系) */}
                <div className="bg-[#3a2012] bg-opacity-50 border border-[#8b5a2b] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(139,90,43,0.1)]">
                  <div className="absolute top-0 right-0 bg-[#8b5a2b] text-white text-[10px] md:text-xs font-bold px-2 py-1 rounded-bl-lg shadow-md">B</div>
                  <p className="text-sm md:text-lg font-bold text-[#e8d5c4] leading-relaxed">{q.textB}</p>
                </div>

              </div>
            </WindowBox>

            {/* 進捗バーを問題の下側に配置 */}
            <div className="mt-4">
              <ProgressBar current={qIndex + 1} total={QUESTIONS.length} label="診断の進捗" />
            </div>

            {/* 戻るボタン（設問の直下） */}
            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderBonus1_story = () => {
        return (
          <div className="w-full">
            <DialogBox 
              charConfig={CONFIG.char1} 
              text={`よくぞ答えた。\nこれは最後の設問じゃ。`} 
            />

            {/* 物語文 */}
            <div className="mb-6 relative rounded-lg shadow-xl overflow-hidden border-2 border-gray-500">
              <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: "url('./img/tabidachi.jpg')" }}></div>
              <div className="absolute inset-0 bg-black bg-opacity-60"></div>
              <div className="relative p-5 text-gray-100 text-sm md:text-base leading-relaxed whitespace-pre-wrap font-bold drop-shadow-md" style={{ textShadow: '1px 1px 2px black' }}>
{`王国の辺境に、新たな町を築く計画が持ち上がった。
豊かな資源と遺跡が眠る希望の地だが、魔物も潜む未開の地でもある。
そこで王が頼ったのは、未知を切り拓く力を持つ「冒険者ギルド」だった。
「この地に町を築いてほしい。必要な役割はひとつではない。
己の力と、望む生き方に応じてこの計画に加わるがよい」`}
              </div>
            </div>

            <div className="text-center mt-6">
              <button 
                onClick={() => {
                  setAnimationKey(prev => prev + 1);
                  setStep('bonus1_intro');
                  window.scrollTo(0, 0);
                }}
                className="rpg-button w-full md:w-auto px-10 py-4 text-lg font-bold bg-white text-black animate-pulse shadow-[0_0_15px_rgba(255,255,255,0.3)]"
              >
                次へ進む
              </button>
            </div>

            {/* 進捗バーを問題の下側に配置 */}
            <div className="mt-4">
              <ProgressBar current={1} total={4} label="最終確認" />
            </div>

            {/* 戻るボタン（最終確認の直下） */}
            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderBonus1_intro = () => {
        return (
          <div className="w-full">
            <DialogBox 
              charConfig={CONFIG.char2} 
              imageSide="right"
              text={`この依頼を聞いたとき、仲間たちはそれぞれ違う事を言いました。\n\nあなたが「わかる」「自分もそう感じる」と思った順に、仲間の言葉を2つ選んでください。`} 
            />

            <div className="text-center mt-6">
              <button 
                onClick={() => {
                  setAnimationKey(prev => prev + 1);
                  setStep('bonus1_select');
                  window.scrollTo(0, 0);
                }}
                className="rpg-button w-full md:w-auto px-10 py-4 text-lg font-bold bg-white text-black animate-pulse shadow-[0_0_15px_rgba(255,255,255,0.3)]"
              >
                仲間たちの言葉を聞く
              </button>
            </div>

            {/* 進捗バー */}
            <div className="mt-4">
              <ProgressBar current={2} total={4} label="最終確認" />
            </div>

            {/* 戻るボタン */}
            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderBonus1_select = () => {
        // 現在のスコアから上位4つを抽出
        const top4Keys = Object.entries(scores)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 4)
          .map(item => item[0]);

        return (
          <div className="w-full">
            <div className="mb-6 text-center space-y-2 animate-fade-in">
              <p className="text-yellow-300 font-bold">あなたが「わかる」「自分もそう感じる」と思った仲間を2人選んでください。</p>
            </div>

            <WindowBox title="心が動いた仲間の言葉" iconName="fa-solid fa-crown" className="bg-opacity-90">
              <div className="flex flex-col gap-4 p-2">
                {top4Keys.map((key) => {
                  const story = ANCHOR_STORY_REACTIONS[key];
                  const isSelected = selectedBonus.includes(key);
                  const isDisabled = !isSelected && selectedBonus.length >= 2;
                  const order = selectedBonus.indexOf(key);
                  const imgNum = randomImages[key] || 1;
                  
                  return (
                    <button 
                      key={key}
                      onClick={() => toggleBonus(key)}
                      disabled={isDisabled}
                      className={`relative block w-full p-3 md:p-4 border-2 rounded-lg transition-colors text-left ${
                        isSelected 
                          ? 'bg-yellow-900 border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.25)]' 
                          : 'bg-gray-900 border-gray-600 hover:border-gray-400'
                      } ${isDisabled ? 'opacity-50 cursor-not-allowed' : ''}`}
                    >
                      {/* 顔アイコン */}
                      <div className={`relative float-left w-16 h-16 md:w-20 md:h-20 mr-3 mb-1 bg-gray-800 border-2 rounded overflow-hidden shadow-inner ${isSelected ? 'border-yellow-400' : 'border-gray-500'}`}>
                        <img src={`./img/${imgNum}.jpg`} alt="仲間" className={`w-full h-full object-cover ${isSelected ? 'opacity-40' : ''}`} />
                        {/* 選択番号表示 */}
                        {isSelected && (
                          <div className="absolute inset-0 flex items-center justify-center text-yellow-400 text-3xl md:text-4xl font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">
                            {order === 0 ? '①' : '②'}
                          </div>
                        )}
                      </div>

                      {/* セリフ */}
                      <div className="text-sm md:text-base leading-relaxed text-gray-100">
                        {story.quote}
                      </div>
                      <div className="clear-both"></div>
                    </button>
                  );
                })}
              </div>
              
              <div className="text-center mt-6">
                <p className="text-sm text-yellow-300 mb-3 font-bold">
                  選択中: {selectedBonus.length} / 2
                </p>
                <button 
                  onClick={() => {
                    setAnimationKey(prev => prev + 1);
                    setStep('bonus2');
                    window.scrollTo(0, 0);
                  }}
                  disabled={selectedBonus.length !== 2}
                  className={`rpg-button w-full md:w-auto px-10 py-4 text-lg font-bold ${selectedBonus.length === 2 ? 'bg-white text-black animate-pulse' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}
                >
                  次へ進む
                </button>
              </div>
            </WindowBox>

            {/* 進捗バーを問題の下側に配置 */}
            <div className="mt-4">
              <ProgressBar current={3} total={4} label="最終確認" />
            </div>

            {/* 戻るボタン（最終確認の直下） */}
            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderBonus2 = () => {
        // 現在のスコアから下位4つを抽出
        const bottom4Keys = Object.entries(scores)
          .sort((a, b) => b[1] - a[1])
          .slice(4, 8)
          .map(item => item[0]);

        return (
          <div className="w-full">
            <DialogBox 
              charConfig={CONFIG.char2} 
              imageSide="right"
              text={`教えてくれてありがとう！\nほかに、こんなことを言ってる人もいたよ。`} 
            />

            {/* 問いかけ文 */}
            <div className="mb-6 text-center space-y-2 animate-fade-in">
              <p className="text-red-400 font-bold">あなたが「自分は絶対こうは思わない」「この働き方はごめんだ」と一番強く感じる者を1人選んでください。</p>
            </div>

            <WindowBox title="考え方が合わない仲間の言葉（1人選択）" iconName="fa-solid fa-skull" className="bg-opacity-90 border-red-900">
              <div className="flex flex-col gap-4 p-2">
                {bottom4Keys.map((key) => {
                  const story = ANCHOR_MINUS_REACTIONS[key];
                  const isSelected = selectedMinusBonus === key;
                  const imgNum = randomImages[key] || 1;
                  
                  return (
                    <button 
                      key={key}
                      onClick={() => setSelectedMinusBonus(key)}
                      className={`relative block w-full p-3 md:p-4 border-2 rounded-lg transition-colors text-left ${
                        isSelected 
                          ? 'bg-red-950 border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.4)]' 
                          : 'bg-gray-900 border-gray-600 hover:border-gray-400'
                      }`}
                    >
                      {/* 顔アイコン */}
                      <div className={`relative float-left w-16 h-16 md:w-20 md:h-20 mr-3 mb-1 bg-gray-800 border-2 rounded overflow-hidden shadow-inner ${isSelected ? 'border-red-500' : 'border-gray-500'}`}>
                        <img src={`./img/${imgNum}.jpg`} alt="仲間" className={`w-full h-full object-cover grayscale ${isSelected ? 'opacity-30' : ''}`} />
                        {/* 選択マーク */}
                        {isSelected && (
                          <div className="absolute inset-0 flex items-center justify-center text-red-500 text-4xl md:text-5xl font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">
                            <i className="fa-solid fa-xmark"></i>
                          </div>
                        )}
                      </div>

                      {/* セリフ */}
                      <div className={`text-sm md:text-base leading-relaxed ${isSelected ? 'text-red-100' : 'text-gray-300'}`}>
                        {story.quote}
                      </div>
                      <div className="clear-both"></div>
                    </button>
                  );
                })}
              </div>
              
              <div className="text-center mt-6">
                <button 
                  onClick={calculateResult} 
                  disabled={selectedMinusBonus === null}
                  className={`rpg-button w-full md:w-auto px-10 py-4 text-lg font-bold ${selectedMinusBonus !== null ? 'bg-red-900 border-red-500 text-white animate-pulse shadow-[0_0_15px_rgba(239,68,68,0.4)]' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}
                >
                  心の<ruby>錨<rt>いかり</rt></ruby>を見極める
                </button>
              </div>
            </WindowBox>

            {/* 進捗バーを問題の下側に配置 */}
            <div className="mt-4">
              <ProgressBar current={4} total={4} label="最終確認" />
            </div>

            {/* 戻るボタン（最終確認の直下） */}
            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderCalculating = () => (
        <div className="flex-1 flex flex-col items-center justify-center animate-pulse">
          <i className="fa-solid fa-hat-wizard text-5xl text-yellow-400 mb-4"></i>
          <p className="text-xl font-bold text-white tracking-widest">お主の軸を見極めておる...</p>
        </div>
      );

      const renderResult = () => {
        if (!results) return null;
        const { top3, bottom1 } = results;

        return (
          <div className="animate-fade-in w-full space-y-6 pb-12">
            {/* 画像保存の対象範囲。
              スクショ時に背景が透過して文字が見えなくなるのを防ぐため、
              html2canvas側で背景色を真っ黒（#0a0a0a）にして保存します。
            */}
            <div id="result-capture-area" className="w-full space-y-6 pt-4 pb-4 px-2">
              <div className="text-center mb-6">
                <h2 className="text-2xl md:text-3xl font-bold text-yellow-300" style={{ textShadow: '2px 2px 0 #000' }}>診断完了</h2>
              </div>

              <DialogBox 
                charConfig={CONFIG.char1} 
                text={`ふむ…見えたぞ。お主のキャリアの錨、そして手放してもよい環境じゃ。\nしっかりと目に焼き付けるがよい。`} 
              />

              <WindowBox title={<span>あなたのキャリアの<ruby>錨<rt>いかり</rt></ruby>（強み）</span>} iconName="fa-solid fa-gem" className="bg-opacity-95 border-yellow-500">
                <p className="text-sm text-gray-300 mb-4 px-2">以下の3つが、あなたが仕事において無意識に大切にしている「譲れない価値観」です。</p>
                <div className="space-y-4">
                  {top3.map((key, idx) => {
                    const data = ANCHORS[key];
                    const desc = ANCHOR_DESCRIPTIONS[key];
                    const cardClass = idx === 0 ? 'result-card-gold' : idx === 1 ? 'result-card-silver' : 'result-card-bronze';
                    const rankIcons = ['fa-crown text-yellow-400', 'fa-medal text-gray-300', 'fa-award text-amber-600'];
                    
                    return (
                      <div key={key} className={`${cardClass} p-4 rounded-lg relative overflow-hidden`}>
                        <div className="flex items-center gap-3 mb-2">
                          <i className={`fa-solid ${rankIcons[idx]} text-2xl`}></i>
                          <h3 className={`text-xl font-bold ${data.color}`}>{data.name}</h3>
                        </div>
                        <p className="text-sm font-bold text-gray-400 mb-2 border-b border-gray-700 pb-2">「{data.short}」</p>
                        <p className="text-sm leading-relaxed text-gray-100">{desc.strength}</p>
                      </div>
                    );
                  })}
                </div>
              </WindowBox>

              <DialogBox 
                charConfig={CONFIG.char2} 
                imageSide="right"
                text={<span>これがあなたの『心の<ruby>錨<rt>いかり</rt></ruby>』なんですね✨<br />でも、全部を持とうとすると疲れちゃいますから、『これは手放してもいい』という環境も知っておくといいですよ！</span>} 
              />

              <WindowBox title="避けるべき？・ストレスを感じる環境" iconName="fa-solid fa-skull-crossbones" className="bg-opacity-95 border-red-500">
                <p className="text-sm text-gray-300 mb-4 px-2">以下の要素はあなたが「なくてもいいかな？」と手放しをしやすく、逆にこの環境を強制されると強いストレスを感じる可能性があるので気を付けてください。</p>
                
                <div className="result-card-danger p-4 rounded-lg relative overflow-hidden">
                  <div className="flex items-center gap-3 mb-2">
                    <h3 className={`text-xl font-bold ${ANCHORS[bottom1].color}`}>
                      <i className={`${ANCHORS[bottom1].icon} mr-2`}></i>
                      {ANCHORS[bottom1].name}
                    </h3>
                  </div>
                  <p className="text-sm font-bold text-gray-400 mb-2 border-b border-red-900 pb-2">「{ANCHORS[bottom1].short}」に反する環境</p>
                  <p className="text-sm leading-relaxed text-red-100">{ANCHOR_DESCRIPTIONS[bottom1].weakness}</p>
                </div>
              </WindowBox>

              <DialogBox 
                charConfig={CONFIG.char1} 
                text={`どうじゃ、何かのヒントになったかの？\nここで得たヒントを基にゆっくり考えてみたり、人に話してみたりするとよいぞよー。\n汝の航海に光あれ！なのじゃー`} 
              />
            </div>

            {/* アクションボタン群 */}
            <div className="text-center pt-4 flex flex-col items-center gap-4">
              <button onClick={() => openPopup('save')} className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-blue-900 border-blue-400 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                <i className="fa-solid fa-camera"></i> じぶんで考えてみる
              </button>

              <button onClick={() => openPopup('talk')} className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-yellow-900 border-yellow-500 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(250,204,21,0.2)]">
                <i className="fa-solid fa-comments"></i> ひとに話してみる
              </button>

              <button onClick={resetApp} className="text-gray-400 hover:text-white underline underline-offset-4 text-sm mt-4">
                もう一度最初から診断する
              </button>
            </div>
          </div>
        );
      };

      const renderPopup = () => {
        if (popupType === 'none') return null;

        if (popupType === 'start') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="準備完了！" iconName="fa-solid fa-flag-checkered" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`そうそう！そんな感じ♪\nじゃあ、早速始めるね！`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={() => {
                        closePopup();
                        setAnimationKey(prev => prev + 1);
                        setStep('question');
                        window.scrollTo(0, 0);
                      }}
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      設問へ進む
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'notYet') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="ゆっくりで大丈夫" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`今はまだやらないんだね！\n心の準備ができたら、右の『さっそくやってみる』寄りのボタンを選んでね！`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'about') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title={<span>心の<ruby>錨<rt>いかり</rt></ruby>の魔法とは？</span>} iconName="fa-solid fa-book-open" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={<span>『心の<ruby>錨<rt>いかり</rt></ruby>（キャリアアンカー）』とは、シャインという心理学の賢者がとなえた、働くうえで【どうしても譲れない価値観】のことじゃ。<br /><br />自分の<ruby>錨<rt>いかり</rt></ruby>を知っておけば、人生の航海で迷ったときにも、自分を見失わずに納得のいく選択ができるようになるぞよ。<br /><br />お主の心の奥底に眠る<ruby>錨<rt>いかり</rt></ruby>を探す……それがこの魔法じゃ！</span>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'talk') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="酒場の片隅で" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={`どうじゃったかな？ お主の【Role=役割】の内側を見つめて、どんなことを感じたか……。\n\nその思いは、ひとに話してみるとさらに深まるかもしれぬぞ。\n\n『nininキャリアルーム』という、旅人の話をじっくり聞いてくれる場所があるそうじゃ。\n足を運んでみるのもよいじゃろう。`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <a 
                      href="https://ninin-cc.github.io/" 
                      target="_blank" 
                      rel="noopener noreferrer" 
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-door-open"></i> nininキャリアルームへ向かう
                    </a>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今はやめておく
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'save') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="思い出の記録" iconName="fa-solid fa-camera" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={<span>いいですね！<br />ご自身の『心の<ruby>錨<rt>いかり</rt></ruby>』を画像で保存しましょうか？<br />あとでゆっくり見返して、自分と対話するヒントにしてくださいね！</span>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={handleSaveImage}
                      className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-download"></i> 画像として保存する
                    </button>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今はやめておく
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }
      };

      return (
        <div className="flex flex-col flex-1 w-full justify-between">
          <div className="w-full">
            <div key={animationKey} className={animationKey > 0 ? "animate-page-turn w-full" : "w-full"}>
              {step === 'intro' && renderIntro()}
              {step === 'practice' && renderPractice()}
              {step === 'question' && renderQuestion()}
              {step === 'bonus1_story' && renderBonus1_story()}
              {step === 'bonus1_intro' && renderBonus1_intro()}
              {step === 'bonus1_select' && renderBonus1_select()}
              {step === 'bonus2' && renderBonus2()}
            </div>
            {step === 'calculating' && renderCalculating()}
            {step === 'result' && renderResult()}
          </div>
          
          {/* フッター・開発用 採番表示 */}
          <div className="w-full mt-12 mb-4 flex flex-col items-center animate-fade-in">
            {/* 説明ボックス (intro と result 画面のみ表示) */}
            {(step === 'intro' || step === 'result') && (
              <div className="w-full bg-black bg-opacity-60 border border-gray-500 rounded p-3 text-center text-[9px] md:text-xs text-gray-300 shadow-sm mb-4">
                <p className="mb-3 text-yellow-100 opacity-90 leading-relaxed">
                  ※本アプリは医療的な診断や占い、性格を決めつけるものではありません。<br className="hidden md:block" />
                  ご自身の「心の<ruby>錨<rt>いかり</rt></ruby>」に気づき、これからの生き方を考えるための「自己理解のきっかけ」としてご活用ください。
                </p>
                <div className="border-t border-gray-600/50 pt-2">
                  <p className="mb-1 leading-relaxed text-gray-400">本アプリは、交流分析・RIASEC・役割理論・キャリア理論などの知見をもとに、現代の働き方や人間関係に合わせて設計された RIESM™ / RoleTRADE™ の考え方に基づいて作られています。</p>
                  <p className="text-gray-400">© ninin consulting & counseling LLC. All rights reserved.</p>
                </div>
              </div>
            )}

            {/* 区切り線とリンク・ページ番号 */}
            <div className="w-full border-t border-gray-500/50 pt-3 flex flex-col items-center justify-center gap-1.5 text-[10px] md:text-xs text-gray-400">
              <a href="https://ninin-cc.github.io/" target="_blank" rel="noopener noreferrer" className="hover:text-yellow-300 transition-colors underline underline-offset-4">
                © 2026 ninin consulting＆counseling
              </a>
              <div className="font-mono opacity-70">
                PageNO: {step === 'question' ? qIndex + 1 : step}
              </div>
            </div>
          </div>

          {/* ポップアップ */}
          {renderPopup()}

          {/* ページめくりアニメーション用オーバーレイ */}
          {animationKey > 0 && step !== 'calculating' && step !== 'result' && (
            <div key={`page-turn-${animationKey}`} className="page-flip-overlay"></div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
