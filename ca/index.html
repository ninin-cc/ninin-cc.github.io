<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャリアアンカー ～心の錨を観る魔法～</title>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- html2canvas (画像保存用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
    body { margin: 0; padding: 0; background: #000; color: #f3f4f6; overflow-x: hidden; }
    html, body { -webkit-touch-callout: none; }
    img { -webkit-user-drag: none; user-select: none; }
    .rpg-font { font-family: 'DotGothic16', sans-serif; letter-spacing: 0.05em; }
    
    /* ルビの調整 */
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: white; } /* ルビを白文字に */
    h1 rt { font-size: 0.35em; } /* タイトルでのルビはさらに小さく */

    .rpg-button { 
      border: 2px solid white; 
      padding: 12px 16px; 
      border-radius: 6px; 
      transition: all 0.2s; 
      background: black; 
      color: white; 
      cursor: pointer; 
      text-align: center; 
      font-weight: bold;
    }
    .rpg-button:hover:not(:disabled) { 
      background: white; 
      color: black; 
    }
    .rpg-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ページめくり（左固定で右から左へ縮小）アニメーション */
    .page-flip-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(to right, #050505 0%, #1a1a1a 95%, #3a3a3a 100%);
      z-index: 100;
      transform-origin: left center;
      animation: flipLeft 0.5s ease-in-out forwards;
      pointer-events: none;
    }
    @keyframes flipLeft {
      0% { transform: scaleX(1); opacity: 1; }
      99% { transform: scaleX(0); opacity: 1; }
      100% { transform: scaleX(0); opacity: 0; }
    }
    
    /* オーラエフェクト */
    .aura-effect-a {
      animation: pulseAuraA 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(230,194,128,0.6);
    }
    @keyframes pulseAuraA {
      0% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(230,194,128,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
    }

    .aura-effect-b {
      animation: pulseAuraB 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(212,184,149,0.6);
    }
    @keyframes pulseAuraB {
      0% { box-shadow: 0 0 20px 10px rgba(212,184,149,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(212,184,149,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(212,184,149,0.6); transform: scale(1); }
    }

    .progress-bar-fill {
      transition: width 0.3s ease-out;
    }

    /* 結果カードのスタイル */
    .result-card-gold {
      background: linear-gradient(135deg, rgba(30,25,0,0.9), rgba(10,5,0,0.95));
      border: 2px solid #facc15;
      box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
    }
    .result-card-silver {
      background: linear-gradient(135deg, rgba(20,25,30,0.9), rgba(5,10,15,0.95));
      border: 2px solid #94a3b8;
    }
    .result-card-bronze {
      background: linear-gradient(135deg, rgba(30,15,5,0.9), rgba(15,5,0,0.95));
      border: 2px solid #b45309;
    }
    .result-card-danger {
      background: linear-gradient(135deg, rgba(40,0,0,0.9), rgba(10,0,0,0.95));
      border: 2px solid #ef4444;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body class="rpg-font min-h-screen relative" style="background-image: url('https://ninin-cc.github.io/cq/img/sakaba.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
  <div class="absolute inset-0 z-0 bg-black bg-opacity-30"></div>
  <div id="root" class="relative z-10 w-full max-w-2xl mx-auto p-4 md:p-6 min-h-screen flex flex-col overflow-hidden"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 設定データ ---
    const CONFIG = {
      appTitlePre: "キャリアアンカー",
      appTitleMain: "～心の錨を観る魔法～", // HTMLタイトル用
      appSubtitle: "-RIESM亭での語らい-",
      char1: {
        name: "リフレム",
        img: "https://ninin-cc.github.io/cq/img/rf.png",
        dialogColor: "bg-amber-900 border-yellow-500",
        imgBg: "bg-gradient-to-b from-amber-700 to-amber-950"
      },
      char2: {
        name: "ハルカ",
        img: "https://ninin-cc.github.io/cq/img/hr.png",
        dialogColor: "bg-rose-900 border-rose-400",
        imgBg: "bg-gradient-to-b from-rose-700 to-rose-950"
      }
    };

    // --- キャリアアンカーの定義 ---
    const ANCHORS = {
      TF: { name: '専門・職能別能力', short: '専門性を極めたい', icon: 'fa-solid fa-wrench', color: 'text-blue-400' },
      GM: { name: '経営管理能力', short: '組織を動かしたい', icon: 'fa-solid fa-chess-king', color: 'text-purple-400' },
      AU: { name: '自律・独立', short: '自分のペースで自由に働きたい', icon: 'fa-solid fa-dove', color: 'text-green-400' },
      SE: { name: '保障・安定', short: '安定と保障がほしい', icon: 'fa-solid fa-shield-halved', color: 'text-teal-400' },
      EC: { name: '起業家的創造性', short: 'ゼロから新しいものを創りたい', icon: 'fa-solid fa-lightbulb', color: 'text-yellow-400' },
      SV: { name: '奉仕・社会貢献', short: '社会や人の役に立ちたい', icon: 'fa-solid fa-hand-holding-heart', color: 'text-pink-400' },
      CH: { name: '純粋な挑戦', short: '困難な課題に挑みたい', icon: 'fa-solid fa-mountain', color: 'text-red-400' },
      LS: { name: '生活様式', short: '仕事とプライベートのバランスを保ちたい', icon: 'fa-solid fa-mug-hot', color: 'text-orange-400' }
    };

    const ANCHOR_STORY_REACTIONS = {
      TF: {
        roleName: '技を極める職人',
        quote: 'この町づくりには、水路、建築、交易路、治療所……いろいろな技術が必要になるはずだ。私は、自分の専門を活かして、この町の基盤を誰にも負けない精度でつくりたい。“この分野ならあの人に任せれば大丈夫”と言われる仕事がしたいんだ。'
      },
      GM: {
        roleName: '仲間を束ねる指揮官',
        quote: 'これは一人の力では無理だな。職人、兵士、商人、癒し手、住民……多くの人をまとめなければならない。私は、この計画全体を見渡して、人と資源を動かし、町づくりを成功に導く役割を担いたい。'
      },
      AU: {
        roleName: '自由を重んじる旅人',
        quote: '面白そうだけど、王様やギルドの細かい指示で動かされるのはごめんだな。やるなら、自分の判断で動ける領域がほしい。自分で計画を立て、自分のやり方で成果を出せるなら、この依頼に加わりたい。'
      },
      SE: {
        roleName: '堅実に支える守り人',
        quote: '辺境の町づくりか……夢はあるが、危険も多そうだ。参加するなら、住む場所、報酬、身分の保障、失敗したときの支援体制が必要だと思う。安心して長く関われる仕組みがあるなら、私は着実に貢献できる。'
      },
      EC: {
        roleName: 'ゼロから創る開拓者',
        quote: '何もない土地に、新しい町をつくるのか……最高じゃないか。まだ誰も見たことのない市場、店、仕組み、文化を自分の手で生み出せる。私は、この町に新しい価値を創る最初の一人になりたい。'
      },
      SV: {
        roleName: '人々を支える癒し手',
        quote: 'この町ができれば、住む場所を失った人や、働く場所を探している人たちの支えになるかもしれない。私は、町の成功そのものよりも、そこに暮らす人たちが安心して生きられることを大切にしたい。人の役に立てるなら、この依頼には意味がある。'
      },
      CH: {
        roleName: '困難に挑む冒険者',
        quote: '道もない、危険もある、何が起きるかわからない……だからこそ燃えるな。簡単な仕事なら、他の誰かがやればいい。私は、誰も成功できないと言うような難しい計画だからこそ、挑んでみたい。'
      },
      LS: {
        roleName: '暮らしを大切にする生活者',
        quote: '町づくりは魅力的だけど、それで自分の生活が壊れてしまうなら続かない。家族や仲間との時間、自分の休息、日々の暮らしも大切にしたい。無理をし続けるのではなく、人生全体と調和する形で関われるなら参加したい。'
      }
    };

    const ANCHOR_DESCRIPTIONS = {
      TF: {
        strength: "特定の分野で高度なスキルと知識を発揮し、その専門性を深めることに最大の喜びを感じます。スペシャリストとしての道を歩むことが重要です。",
        weakness: "「専門家としての高度な知識」や「一つのスキルを極め続けること」を過度に求められると、プレッシャーで疲弊してしまうかもしれません。特定の分野に縛られず、様々な業務に柔軟に関われる環境の方が向いているでしょう。"
      },
      GM: {
        strength: "組織全体の責任を担い、多様な人々をまとめ上げて大きな成果を出すことにやりがいを感じます。リーダーシップを発揮できるポジションが向いています。",
        weakness: "「組織全体を引っ張ること」や「多様な人をまとめ上げるリーダーシップ」を過度に求められると、重圧で大きなストレスを感じる可能性があります。人の管理よりも、自分自身の仕事に集中できる環境の方が安心できるでしょう。"
      },
      AU: {
        strength: "組織のルールや制約に縛られず、自分自身のやり方とペースで仕事を進めることに価値を置きます。裁量が大きい環境で力を発揮します。",
        weakness: "すべてを自分一人で判断する「完全な裁量」や「孤独な自律」を強いられると、かえって負担や心細さを感じやすいかもしれません。明確なルールや、仲間と助け合える体制が整っている環境の方が力を発揮しやすいでしょう。"
      },
      SE: {
        strength: "雇用や収入が長期的に安定していることに安心感を覚え、組織に対する忠誠心も高くなります。予測可能で落ち着いた環境で着実に成果を出します。",
        weakness: "ルールに守られすぎた「絶対に安全な環境」や、何の変化も起きない「単調な毎日」にずっといると、退屈で息苦しくなってしまうかもしれません。ある程度のリスクや、新しい刺激・変化がある環境の方がモチベーションを保てるでしょう。"
      },
      EC: {
        strength: "リスクを恐れず、自分自身のアイデアで全く新しい事業や製品をゼロから創り出すことに強い情熱を持っています。起業や新規事業開発が天職です。",
        weakness: "「ゼロから新しいビジネスを生み出すこと」や「常に斬新なアイデアを出すこと」を強要されると、プレッシャーで疲れてしまうかもしれません。すでにある仕組みをより良くしたり、着実に運用していく役割の方が向いているでしょう。"
      },
      SV: {
        strength: "個人の利益よりも、社会を良くすることや他者を支援するという大義に貢献することに価値を見出します。自身の価値観と仕事が一致することが重要です。",
        weakness: "「社会への貢献」や「他者のための自己犠牲」といった大義名分を過度に押し付けられると、重荷に感じて疲弊してしまう可能性があります。もっと自分自身の目標達成や、具体的な成果に集中できる環境の方が合っているでしょう。"
      },
      CH: {
        strength: "解決不可能と思われるような困難な問題や、手強いライバルとの競争に打ち勝つことにやりがいを感じます。タフな状況ほど燃え上がります。",
        weakness: "「絶対に無理だと思われる課題」に立ち向かうことや、他者との「激しい競争」を強要されると、心身ともにすり減ってしまうかもしれません。勝敗や難易度よりも、自分のペースで着実に穏やかに取り組める環境の方が安心できるでしょう。"
      },
      LS: {
        strength: "仕事、家族、個人の時間など、人生全体のバランスを最優先します。柔軟な働き方ができることで、仕事にも高いモチベーションを保てます。",
        weakness: "「仕事はほどほどにして休むべき」といった、一律のワークライフバランスを無理に押し付けられると、かえって不完全燃焼でストレスを感じるかもしれません。仕事にやりがいを感じた時は、思い切り没頭できる環境の方が充実感を得られるでしょう。"
      }
    };

    // --- 設問データ (Q1 - Q16) ---
    const QUESTIONS = [
      { id: 1, typeA: 'TF', typeB: 'GM', textA: '自分の専門分野でスキルを極め、その領域で存分に力を発揮する役割を担いたい。', textB: 'チーム全体を率いて組織を動かし、より大きな目標を達成するマネジメントの役割を担いたい。' },
      { id: 2, typeA: 'AU', typeB: 'SE', textA: '細かく指示を受けず、自分の裁量とペースで自由に仕事を進められる環境で働きたい。', textB: '将来の雇用や収入が長期的に安定しており、心から安心して取り組める環境で働きたい。' },
      { id: 3, typeA: 'EC', typeB: 'SE', textA: '自分のアイデアを形にし、ゼロから新しい事業や価値を創り出す働き方をしたい。', textB: '身分や経済的な基盤がしっかりと約束された、安心できる環境での働き方をしたい。' },
      { id: 4, typeA: 'GM', typeB: 'SV', textA: '組織の中で責任あるポジションに就き、多くの人を動かして大きな成果を上げることを重視する。', textB: '自分の仕事が世の中を良くし、他者の役に立っていると実感できることを重視する。' },
      { id: 5, typeA: 'GM', typeB: 'LS', textA: '組織のトップを目指し、より大きな責任と権限を持って物事を動かす働き方を大切にしたい。', textB: '自分や家族の生活全体が調和し、無理なくプライベートと両立できる働き方を大切にしたい。' },
      { id: 6, typeA: 'TF', typeB: 'SE', textA: '現場で自分の専門性をどこまでも深く追求し、スペシャリストとして働き続けたい。', textB: '安定した組織の中で、見通しを持って着実に長く働き続けたい。' },
      { id: 7, typeA: 'CH', typeB: 'SE', textA: '解決が難しそうなタスクや、困難な課題に挑める環境に魅力を感じる。', textB: '将来の見通しが立ち、落ち着いて業務に取り組める安心できる環境に魅力を感じる。' },
      { id: 8, typeA: 'CH', typeB: 'LS', textA: '非常に難しい課題や、難局の打開に全力で挑む働き方を優先したい。', textB: '自分や家族のプライベートな時間がしっかりと守られる働き方を優先したい。' },
      { id: 9, typeA: 'SV', typeB: 'LS', textA: '仕事を通じて世の中や他者のために貢献することに、大きな喜びを感じる。', textB: '自分や家族と過ごす時間を充実させ、豊かな暮らしを送ることに、大きな喜びを感じる。' },
      { id: 10, typeA: 'AU', typeB: 'GM', textA: '自分自身の判断で自由に動け、自律的に完結できる働き方を望んでいる。', textB: 'チームをまとめ上げ、組織としての大きな成果を創り出す働き方を望んでいる。' },
      { id: 11, typeA: 'AU', typeB: 'EC', textA: '誰のルールにも縛られない「自分のペースで自由に働ける環境」を創り出すために独立したい。', textB: '「全く新しい価値や事業」を自分の手でゼロから生み出し、世に問うために独立したい。' },
      { id: 12, typeA: 'GM', typeB: 'EC', textA: 'すでにある組織の仕組みを活かし、ゼネラルマネージャーとして全体を統括することに魅力を感じる。', textB: '自分自身で新しい会社や事業を立ち上げ、トップとして牽引することに魅力を感じる。' },
      { id: 13, typeA: 'SV', typeB: 'EC', textA: '世の中を良くしたり、他者を支援したりする活動に全力を尽くしたい。', textB: '自分の発案した製品やサービスを世に送り出し、事業として成長させることに全力を尽くしたい。' },
      { id: 14, typeA: 'TF', typeB: 'AU', textA: '自分が心から納得できるレベルまで、高度な専門性を深め続ける働き方を理想とする。', textB: '誰の干渉も受けず、自分の裁量で自由に仕事の進め方を決められる働き方を理想とする。' },
      { id: 15, typeA: 'CH', typeB: 'TF', textA: '自分の専門外であっても、解決困難でタフな課題に立ち向かうことに強い意欲を感じる。', textB: '自分の得意とする専門領域をひたすら深く磨き上げることに強い意欲を感じる。' },
      { id: 16, typeA: 'EC', typeB: 'CH', textA: 'まだ世の中にない新しい事業や価値を自分の手でゼロから生み出すことに情熱を注ぎたい。', textB: '不可能に見える難局を自らの力で打開し、限界に挑むことに情熱を注ぎたい。' }
    ];

    // --- 共通UIコンポーネント ---
    const WindowBox = ({ title, children, iconName, className = "" }) => (
      // スマホでタイトルが2行になっても本文に被らないよう、上部の余白(pt)を広めに確保
      <div className={`bg-black text-white border-4 border-gray-400 px-4 pb-4 pt-16 md:px-5 md:pb-5 md:pt-20 rounded-lg shadow-xl relative w-full mt-10 ${className}`}>
        {title && (
          <div className="absolute left-4 top-0 -translate-y-1/2 bg-black px-3 py-2 flex items-center space-x-2 border-2 border-gray-400 rounded max-w-[85%]">
            {iconName && <i className={`${iconName} text-yellow-300 shrink-0`}></i>}
            <h2 className="text-sm md:text-lg font-bold tracking-widest text-yellow-100 leading-snug">{title}</h2>
          </div>
        )}
        <div className="w-full">{children}</div>
      </div>
    );

    const DialogBox = ({ charConfig, text, imageSide = 'left' }) => {
      const { name, img, dialogColor, imgBg } = charConfig;
      const isImageRight = imageSide === 'right';

      return (
        <div className={`w-full ${dialogColor} border-2 p-4 rounded-lg mb-6 relative animate-fade-in shadow-xl mt-6`}>
          <div className={`absolute -top-3 ${isImageRight ? 'right-4' : 'left-4'} ${dialogColor.split(' ')[0]} px-3 border border-white rounded-full text-white text-sm font-bold tracking-widest shadow-sm z-10`}>
            {name}
          </div>
          <div className={`flex items-start gap-4 mt-2 ${isImageRight ? 'flex-row-reverse' : ''}`}>
            <div className={`shrink-0 self-start w-20 h-20 ${imgBg} border-2 border-white rounded-md overflow-hidden flex items-center justify-center shadow-inner`}>
              <img src={img} alt={name} className="w-full h-full object-contain scale-110" style={{ imageRendering: 'pixelated', transform: isImageRight ? 'scaleX(-1) scale(1.1)' : 'scale(1.1)' }} />
            </div>
            <div className="text-white text-sm md:text-base leading-relaxed flex-1 whitespace-pre-wrap">
              {text}
            </div>
          </div>
        </div>
      );
    };

    const ProgressBar = ({ current, total, label }) => {
      const percentage = Math.max(0, Math.min(100, (current / total) * 100));
      return (
        <div className="w-full mb-4 relative z-20 bg-black bg-opacity-80 p-3 rounded-lg border border-gray-600 shadow-md">
          <div className="flex justify-between text-xs text-gray-300 mb-2 px-1 font-bold">
            <span>{label}</span>
            <span>{current} / {total}</span>
          </div>
          <div className="w-full bg-gray-800 rounded-full h-2 border border-gray-600 overflow-hidden">
            <div className="bg-yellow-400 h-full progress-bar-fill" style={{ width: `${percentage}%` }}></div>
          </div>
        </div>
      );
    };

    const AnswerCircle = ({ val, selectedVal, onSelect, showDoubleTapMessage = false }) => {
      // ベージュ(A)と茶色(B)のサイズ配列
      const sizeA = [
        'w-10 h-10 md:w-14 md:h-14', 
        'w-7 h-7 md:w-10 md:h-10',   
        'w-5 h-5 md:w-7 md:h-7',     
        'w-3 h-3 md:w-4 md:h-4',     
        'w-0 h-0',                   
        'w-0 h-0'                    
      ];
      const sizeB = [
        'w-0 h-0',                   
        'w-0 h-0',                   
        'w-3 h-3 md:w-4 md:h-4',     
        'w-5 h-5 md:w-7 md:h-7',     
        'w-7 h-7 md:w-10 md:h-10',   
        'w-10 h-10 md:w-14 md:h-14'  
      ];

      const textMap = [
        "Aに非常に\nあてはまる",
        "Aに\nあてはまる",
        "どちらかと\nいえばA",
        "どちらかと\nいえばB",
        "Bに\nあてはまる",
        "Bに非常に\nあてはまる"
      ];

      const isSelected = selectedVal === val;

      return (
        <button 
          onClick={() => onSelect(val)} 
          className="flex-1 flex flex-col items-center group relative z-10 hover:bg-gray-800 hover:bg-opacity-60 rounded-lg transition-all py-1"
        >
          <div className="h-20 md:h-24 w-full relative">
            {/* 中央の基準線 */}
            <div className={`absolute top-1/2 h-px bg-slate-500 -translate-y-1/2 z-0 ${val === 0 ? 'left-1/2 right-0' : val === 5 ? 'left-0 right-1/2' : 'left-0 right-0'}`}></div>
            
            {/* 「もう一度押して決定」を線上に表示 (練習問題のときのみ) */}
            {isSelected && showDoubleTapMessage && (
              <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none w-max">
                <span className="bg-black bg-opacity-90 px-3 py-1.5 rounded-full text-[10px] md:text-xs text-yellow-300 font-bold animate-pulse border border-yellow-500 shadow-[0_0_10px_rgba(250,204,21,0.5)]">
                  もう一度押して決定
                </span>
              </div>
            )}

            {/* A: ベージュ (下揃え) absolute で中央線から上に配置 */}
            {val <= 3 && (
              <div className="absolute bottom-1/2 left-0 right-0 flex justify-center pb-[3px]">
                <div className={`rounded-full bg-[#e6c280] transform origin-bottom transition-all duration-300 ${sizeA[val]} ${val === 0 ? 'border-2 border-[#fefce8]' : ''} ${isSelected ? 'aura-effect-a scale-110 border-2 border-white' : 'group-hover:scale-110 shadow-[0_0_10px_rgba(230,194,128,0.4)]'}`}></div>
              </div>
            )}
            
            {/* B: 茶色 (上揃え) absolute で中央線から下に配置 */}
            {val >= 2 && (
              <div className="absolute top-1/2 left-0 right-0 flex justify-center pt-[3px]">
                <div className={`rounded-full bg-[#784a23] transform origin-top transition-all duration-300 ${sizeB[val]} ${val === 5 ? 'border-2 border-[#d4b895]' : ''} ${isSelected ? 'aura-effect-b scale-110 border-2 border-white' : 'group-hover:scale-110 shadow-[0_0_10px_rgba(120,74,35,0.4)]'}`}></div>
              </div>
            )}
          </div>
          <div className="h-8 mt-1 flex items-center justify-center w-full relative">
            <span className={`text-[9px] md:text-[11px] text-center leading-tight whitespace-pre-wrap font-bold transition-colors ${isSelected ? 'text-yellow-300' : 'text-gray-400 group-hover:text-yellow-200'}`}>
              {textMap[val]}
            </span>
          </div>
        </button>
      );
    };

    // --- メインアプリケーション ---
    const App = () => {
      const [step, setStep] = useState('intro'); // intro, practice, question, bonus, calculating, result
      const [qIndex, setQIndex] = useState(0);
      const [scores, setScores] = useState({ TF: 0, GM: 0, AU: 0, SE: 0, EC: 0, SV: 0, CH: 0, LS: 0 });
      const [scoreHistory, setScoreHistory] = useState([]); // 戻るボタン用のスコア履歴
      const [selectedBonus, setSelectedBonus] = useState([]);
      const [results, setResults] = useState(null);
      const [randomImages, setRandomImages] = useState({}); // ボーナス画面用ランダム画像マップ
      const [popupType, setPopupType] = useState('none'); // 'none', 'talk', 'save', 'about', 'start', 'notYet'
      const [animationKey, setAnimationKey] = useState(0); // ページめくりアニメーション用キー

      // 現在選択中の値（一度目のタップで保存し、二度目で決定する）
      const [tempSelectedVal, setTempSelectedVal] = useState(null);

      // --- スコア処理 ---
      const handleAnswer = (val) => {
        // 1回目のタップ：光らせて選択状態にする
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        // 2回目のタップ（同じものを押した）：決定処理へ進む
        const q = QUESTIONS[qIndex];
        
        // 戻るボタンのために現在のスコアを履歴に保存
        setScoreHistory([...scoreHistory, { ...scores }]);

        const newScores = { ...scores };

        // 3 2.5 2 1 0 0 の配分ロジック
        if (val === 0) { newScores[q.typeA] += 3; }
        else if (val === 1) { newScores[q.typeA] += 2.5; }
        else if (val === 2) { newScores[q.typeA] += 2; newScores[q.typeB] += 1; }
        else if (val === 3) { newScores[q.typeA] += 1; newScores[q.typeB] += 2; }
        else if (val === 4) { newScores[q.typeB] += 2.5; }
        else if (val === 5) { newScores[q.typeB] += 3; }

        setScores(newScores);
        setTempSelectedVal(null); // 選択状態をリセット

        // ページめくりアニメーションを発火させる
        setAnimationKey(prev => prev + 1);

        if (qIndex < QUESTIONS.length - 1) {
          setQIndex(qIndex + 1);
          window.scrollTo(0, 0);
        } else {
          // ボーナス画面へ移行する際に、上位4つにランダムな画像を割り当てる
          const availableImgs = [1, 2, 3, 4, 5, 6, 7, 8].sort(() => 0.5 - Math.random());
          const top4 = Object.entries(newScores)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 4)
            .map(item => item[0]);
          const imgMap = {};
          top4.forEach((k, idx) => {
            imgMap[k] = availableImgs[idx];
          });
          setRandomImages(imgMap);

          setStep('bonus');
          window.scrollTo(0, 0);
        }
      };

      // --- 例題（練習画面）での選択処理 ---
      const handleExampleAnswer = (val) => {
        // 1回目のタップ：光らせて選択状態にする
        if (tempSelectedVal !== val) {
          setTempSelectedVal(val);
          return;
        }

        // 2回目のタップ：決定処理へ進む
        setTempSelectedVal(null); // 選択状態をリセット

        // 右側（B寄り）の3つ（3, 4, 5）を選んだ場合はスタート
        if (val >= 3) {
          setPopupType('start');
        } else {
          // 左側（A寄り）を選んだ場合はまだスタートしない
          setPopupType('notYet');
        }
      };

      // --- 戻る処理 ---
      const handleBack = () => {
        // 戻る際もアニメーションを発火
        setAnimationKey(prev => prev + 1);
        setTempSelectedVal(null); // 戻る時に選択状態もリセット

        if (step === 'practice') {
          setStep('intro');
          window.scrollTo(0, 0);
          return;
        }

        // 第一問目の場合は練習画面に戻る
        if (step === 'question' && qIndex === 0) {
          setStep('practice');
          window.scrollTo(0, 0);
          return;
        }

        if (scoreHistory.length === 0) return;

        // 履歴から1つ前のスコアを取り出して復元
        const prevScores = scoreHistory[scoreHistory.length - 1];
        setScores(prevScores);
        setScoreHistory(scoreHistory.slice(0, -1));

        if (step === 'bonus') {
          // ボーナス画面から最後の質問に戻る
          setStep('question');
          window.scrollTo(0, 0);
        } else if (step === 'question' && qIndex > 0) {
          // 質問画面で1つ前の質問に戻る
          setQIndex(qIndex - 1);
          window.scrollTo(0, 0);
        }
      };

      const toggleBonus = (key) => {
        if (selectedBonus.includes(key)) {
          setSelectedBonus(selectedBonus.filter(k => k !== key));
        } else if (selectedBonus.length < 2) {
          setSelectedBonus([...selectedBonus, key]);
        }
      };

      const calculateResult = () => {
        setStep('calculating');
        
        const finalScores = { ...scores };
        selectedBonus.forEach(key => {
          finalScores[key] += 4; // ボーナス加点は維持
        });

        const sorted = Object.entries(finalScores).sort((a, b) => b[1] - a[1]);
        const top3 = sorted.slice(0, 3).map(item => item[0]);
        const bottom1 = sorted[sorted.length - 1][0];

        setTimeout(() => {
          setResults({ top3, bottom1, finalScores });
          setStep('result');
          window.scrollTo(0, 0);
        }, 1500);
      };

      const resetApp = () => {
        if(window.confirm('最初からやり直しますか？')) {
          setStep('intro');
          setQIndex(0);
          setScores({ TF: 0, GM: 0, AU: 0, SE: 0, EC: 0, SV: 0, CH: 0, LS: 0 });
          setScoreHistory([]);
          setSelectedBonus([]);
          setRandomImages({});
          setResults(null);
          setPopupType('none');
          setTempSelectedVal(null);
          window.scrollTo(0, 0);
        }
      };

      const openPopup = (type) => setPopupType(type);
      const closePopup = () => setPopupType('none');

      // --- 画像保存処理 ---
      const handleSaveImage = () => {
        const element = document.getElementById('result-capture-area');
        if (!element) return;
        
        // スマホなどで上部が切れないように、一度トップへスクロールする
        window.scrollTo(0, 0);

        // 少し待機して描画を安定させてからキャプチャを実行
        setTimeout(() => {
          html2canvas(element, { 
            backgroundColor: '#0a0a0a', // スクショしたときに透過して見えなくなるのを防ぐため、暗い背景を敷く
            scale: 2, // 高画質化
            useCORS: true
          }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'career_anchor_result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            closePopup();
          }).catch(err => {
            console.error('画像保存エラー', err);
            alert('画像の保存に失敗しました。');
            closePopup();
          });
        }, 300);
      };

      // --- 各画面のレンダリング ---
      const renderIntro = () => (
        <div className="animate-fade-in flex-1 flex flex-col items-center justify-center">
          <div className="text-center mb-4">
            <h1 className="font-bold text-white mb-2 leading-tight flex flex-col items-center justify-center" style={{ textShadow: '2px 2px 0 #000' }}>
              <span className="text-lg md:text-2xl mb-1 text-gray-300">{CONFIG.appTitlePre}</span>
              <span className="text-3xl md:text-5xl">～心の<ruby>錨<rt>いかり</rt></ruby>を観る魔法～</span>
            </h1>
            <p className="text-yellow-300 text-sm md:text-base font-bold tracking-widest">{CONFIG.appSubtitle}</p>
          </div>

          <DialogBox 
            charConfig={CONFIG.char1} 
            text={`「よく来たな。ここではお主のキャリアにおける【絶対に譲れない軸】を見極めるための試練を用意したぞい。\n直感で答えてゆくのじゃ。」`} 
          />
          <DialogBox 
            charConfig={CONFIG.char2} 
            imageSide="right"
            text={`「全部で16問、5分くらいで終わると思います。\n6段階の◯から、自分が『そう感じる』ところを選んでくださいね！」`} 
          />

          <div className="flex flex-col gap-4 w-full items-center mb-8 mt-4">
            <button 
              onClick={() => {
                setAnimationKey(prev => prev + 1);
                setStep('practice');
                window.scrollTo(0, 0);
              }}
              className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black w-full md:w-auto px-10 py-4 text-lg font-bold shadow-[0_0_15px_rgba(59,130,246,0.3)]"
            >
              練習もんだいへ進む
            </button>

            <div className="flex flex-col gap-2 mt-2">
              <button onClick={() => openPopup('about')} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center justify-center gap-2 underline underline-offset-4">
                <i className="fa-solid fa-book-open"></i> 心の錨の魔法とは？
              </button>
              <button onClick={() => openPopup('talk')} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center justify-center gap-2 underline underline-offset-4">
                <i className="fa-solid fa-comments"></i> ひとに話してみる
              </button>
            </div>
          </div>
        </div>
      );

      const renderPractice = () => (
        <div className="w-full flex flex-col items-center">
          <WindowBox title="練習もんだい" iconName="fa-solid fa-gamepad" className="bg-opacity-90 mb-8 animate-fade-in">
            <p className="text-sm md:text-base text-gray-300 text-center mb-3 font-bold border-b border-gray-600 pb-2">
              左がA、右がBに近づきます。<br />6段階の◯から、自分がそうだと感じたところを選んでください。
            </p>
            <div className="flex flex-col w-full py-1">
              {/* 選択肢 A */}
              <div className="bg-[#5c4a30] bg-opacity-40 border border-[#e6c280] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)]">
                <div className="absolute top-0 left-0 bg-[#e6c280] text-black text-[10px] md:text-xs font-bold px-2 py-1 rounded-br-lg shadow-md">A</div>
                <p className="text-sm md:text-lg font-bold text-[#fdf6e3] leading-relaxed">まだやらない</p>
              </div>

              {/* 円ボタン群 */}
              <div className="relative my-3 md:my-4 bg-black bg-opacity-40 rounded-xl p-1 md:p-2 border border-gray-700 shadow-inner">
                <div className="flex justify-between items-start relative z-10 w-full gap-1 md:gap-2">
                  {[0, 1, 2, 3, 4, 5].map(val => (
                    <AnswerCircle 
                      key={val} 
                      val={val} 
                      selectedVal={tempSelectedVal}
                      onSelect={handleExampleAnswer}
                      showDoubleTapMessage={true} 
                    />
                  ))}
                </div>
              </div>

              {/* 選択肢 B */}
              <div className="bg-[#3a2012] bg-opacity-50 border border-[#8b5a2b] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(139,90,43,0.1)]">
                <div className="absolute top-0 right-0 bg-[#8b5a2b] text-white text-[10px] md:text-xs font-bold px-2 py-1 rounded-bl-lg shadow-md">B</div>
                <p className="text-sm md:text-lg font-bold text-[#e8d5c4] leading-relaxed">さっそくやってみる</p>
              </div>
            </div>
          </WindowBox>

          <div className="flex justify-center mt-2">
            <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
              ◀ もどる
            </button>
          </div>
        </div>
      );

      const renderQuestion = () => {
        const q = QUESTIONS[qIndex];
        
        return (
          <div className="w-full">
            <WindowBox title={`第 ${qIndex + 1} 問`} iconName="fa-solid fa-clipboard-question" className="bg-opacity-90">
              <div className="flex flex-col w-full py-1">
                
                {/* 選択肢 A (ベージュ系) */}
                <div className="bg-[#5c4a30] bg-opacity-40 border border-[#e6c280] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(230,194,128,0.1)]">
                  <div className="absolute top-0 left-0 bg-[#e6c280] text-black text-[10px] md:text-xs font-bold px-2 py-1 rounded-br-lg shadow-md">A</div>
                  <p className="text-sm md:text-lg font-bold text-[#fdf6e3] leading-relaxed">{q.textA}</p>
                </div>

                {/* 円ボタン群 */}
                <div className="relative my-3 md:my-4 bg-black bg-opacity-40 rounded-xl p-1 md:p-2 border border-gray-700 shadow-inner">
                  <div className="flex justify-between items-start relative z-10 w-full gap-1 md:gap-2">
                    {[0, 1, 2, 3, 4, 5].map(val => (
                      <AnswerCircle 
                        key={val} 
                        val={val} 
                        selectedVal={tempSelectedVal}
                        onSelect={handleAnswer}
                        showDoubleTapMessage={false} 
                      />
                    ))}
                  </div>
                </div>

                {/* 選択肢 B (茶色系) */}
                <div className="bg-[#3a2012] bg-opacity-50 border border-[#8b5a2b] rounded-lg p-3 pt-6 md:p-4 md:pt-7 text-left relative overflow-hidden shadow-[inset_0_0_20px_rgba(139,90,43,0.1)]">
                  <div className="absolute top-0 right-0 bg-[#8b5a2b] text-white text-[10px] md:text-xs font-bold px-2 py-1 rounded-bl-lg shadow-md">B</div>
                  <p className="text-sm md:text-lg font-bold text-[#e8d5c4] leading-relaxed">{q.textB}</p>
                </div>

              </div>
            </WindowBox>

            {/* 進捗バーを問題の下側に配置 */}
            <div className="mt-4">
              <ProgressBar current={qIndex + 1} total={QUESTIONS.length} label="診断の進捗" />
            </div>

            {/* 戻るボタン（設問の直下） */}
            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderBonus = () => {
        // 現在のスコアから上位4つを抽出
        const top4Keys = Object.entries(scores)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 4)
          .map(item => item[0]);

        return (
          <div className="w-full">
            <DialogBox 
              charConfig={CONFIG.char1} 
              text={`「よくぞ答えた。\nこれは最後の設問じゃ。\n\nある時、王から冒険者ギルドに特別なクエストが告げられた。\nその依頼を聞いたとき、仲間たちはそれぞれ違う反応を見せたのじゃ。\n\nお主の心が動く言葉を、2つ選んでみるがよい。」`} 
            />

            {/* 物語文 */}
            <div className="mb-6 p-5 bg-black bg-opacity-70 border-2 border-gray-500 rounded-lg shadow-xl text-gray-200 text-sm md:text-base leading-relaxed whitespace-pre-wrap">
{`王国に、新しい町をつくる計画が持ち上がった。

その地は、森と山に囲まれた辺境にある。
道はまだ整っておらず、住む人も少ない。
魔物の影もあり、一般の民だけで開拓するには危険が大きい。
騎士団を常駐させるには、護衛の費用もかかりすぎる。

だが、その地には古い遺跡が眠り、豊かな水源がある。
うまく育てれば、王国の未来を支える大切な拠点になるかもしれない。

そこで白羽の矢が立ったのが、冒険者ギルドだった。

さまざまな経歴を持ち、未知の土地を歩き、自らの身を守る力を持つ冒険者たち。
王様は、君たちのギルドに特別なクエストを告げた。

「この辺境の地に、新たな町を築いてほしい。
必要な役割はひとつではない。
そなたたちは、それぞれの力と望む生き方に応じて、この計画に加わってよい」

こうして、君たちのギルドに、王国の未来を左右するスペシャルクエストが託されたのだった。`}
            </div>

            {/* 問いかけ文 */}
            <div className="mb-6 text-center space-y-2 animate-fade-in">
              <p className="text-gray-200 font-bold">この依頼を聞いたとき、仲間たちはそれぞれ違う反応を見せました。</p>
              <p className="text-yellow-300 font-bold">あなたが「わかる」「自分もそう感じる」と思った仲間を2人選んでください。</p>
              <p className="text-xs text-gray-400">その反応には、あなたが仕事や人生で大切にしている“心の<ruby>錨<rt>いかり</rt></ruby>”があらわれているかもしれません。</p>
            </div>

            <WindowBox title="心が動いた仲間の言葉（2人選択）" iconName="fa-solid fa-crown" className="bg-opacity-90">
              <div className="flex flex-col gap-4 p-2">
                {top4Keys.map((key) => {
                  const story = ANCHOR_STORY_REACTIONS[key];
                  const isSelected = selectedBonus.includes(key);
                  const isDisabled = !isSelected && selectedBonus.length >= 2;
                  const order = selectedBonus.indexOf(key);
                  const imgNum = randomImages[key] || 1;
                  
                  return (
                    <button 
                      key={key}
                      onClick={() => toggleBonus(key)}
                      disabled={isDisabled}
                      className={`flex flex-row items-center p-3 md:p-4 border-2 rounded-lg transition-colors text-left gap-4 ${
                        isSelected 
                          ? 'bg-yellow-900 border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.25)]' 
                          : 'bg-gray-900 border-gray-600 hover:border-gray-400'
                      } ${isDisabled ? 'opacity-50 cursor-not-allowed' : ''}`}
                    >
                      {/* 顔アイコン */}
                      <div className={`shrink-0 w-16 h-16 md:w-20 md:h-20 bg-gray-800 border-2 rounded overflow-hidden flex items-center justify-center shadow-inner ${isSelected ? 'border-yellow-400' : 'border-gray-500'}`}>
                        <img src={`./img/${imgNum}.jpg`} alt="仲間" className="w-full h-full object-cover" />
                      </div>

                      {/* セリフ */}
                      <div className="flex-1 relative pr-8">
                        <p className="text-sm md:text-base leading-relaxed text-gray-100 whitespace-pre-wrap">
                          「{story.quote}」
                        </p>
                        {/* 選択番号表示 */}
                        {isSelected && (
                          <div className="absolute top-1/2 -translate-y-1/2 right-0 text-yellow-400 text-xl md:text-2xl font-bold drop-shadow-md">
                            {order === 0 ? '①' : '②'}
                          </div>
                        )}
                      </div>
                    </button>
                  );
                })}
              </div>
              
              <div className="text-center mt-6">
                <p className="text-sm text-yellow-300 mb-3 font-bold">
                  選択中: {selectedBonus.length} / 2
                </p>
                <button 
                  onClick={calculateResult} 
                  disabled={selectedBonus.length !== 2}
                  className={`rpg-button w-full md:w-auto px-10 py-4 text-lg font-bold ${selectedBonus.length === 2 ? 'bg-white text-black animate-pulse' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}
                >
                  心の<ruby>錨<rt>いかり</rt></ruby>を見極める
                </button>
              </div>
            </WindowBox>

            {/* 進捗バーを問題の下側に配置 */}
            <div className="mt-4">
              <ProgressBar current={QUESTIONS.length} total={QUESTIONS.length} label="最終確認" />
            </div>

            {/* 戻るボタン（最終確認の直下） */}
            <div className="flex justify-center mt-2">
              <button onClick={handleBack} className="text-gray-400 hover:text-yellow-300 transition-colors text-sm font-bold flex items-center gap-1">
                ◀ もどる
              </button>
            </div>
          </div>
        );
      };

      const renderCalculating = () => (
        <div className="flex-1 flex flex-col items-center justify-center animate-pulse">
          <i className="fa-solid fa-hat-wizard text-5xl text-yellow-400 mb-4"></i>
          <p className="text-xl font-bold text-white tracking-widest">お主の軸を見極めておる...</p>
        </div>
      );

      const renderResult = () => {
        if (!results) return null;
        const { top3, bottom1 } = results;

        return (
          <div className="animate-fade-in w-full space-y-6 pb-12">
            {/* 画像保存の対象範囲。
              スクショ時に背景が透過して文字が見えなくなるのを防ぐため、
              html2canvas側で背景色を真っ黒（#0a0a0a）にして保存します。
            */}
            <div id="result-capture-area" className="w-full space-y-6 pt-4 pb-4 px-2">
              <div className="text-center mb-6">
                <h2 className="text-2xl md:text-3xl font-bold text-yellow-300" style={{ textShadow: '2px 2px 0 #000' }}>診断完了</h2>
              </div>

              <DialogBox 
                charConfig={CONFIG.char1} 
                text={`「ふむ…見えたぞ。お主のキャリアの錨、そして手放してもよい環境じゃ。\nしっかりと目に焼き付けるがよい。」`} 
              />

              <WindowBox title={<>あなたのキャリアの<ruby>錨<rt>いかり</rt></ruby>（強み）</>} iconName="fa-solid fa-gem" className="bg-opacity-95 border-yellow-500">
                <p className="text-sm text-gray-300 mb-4 px-2">以下の3つが、あなたが仕事において無意識に大切にしている「譲れない価値観」です。</p>
                <div className="space-y-4">
                  {top3.map((key, idx) => {
                    const data = ANCHORS[key];
                    const desc = ANCHOR_DESCRIPTIONS[key];
                    const cardClass = idx === 0 ? 'result-card-gold' : idx === 1 ? 'result-card-silver' : 'result-card-bronze';
                    const rankIcons = ['fa-crown text-yellow-400', 'fa-medal text-gray-300', 'fa-award text-amber-600'];
                    
                    return (
                      <div key={key} className={`${cardClass} p-4 rounded-lg relative overflow-hidden`}>
                        <div className="flex items-center gap-3 mb-2">
                          <i className={`fa-solid ${rankIcons[idx]} text-2xl`}></i>
                          <h3 className={`text-xl font-bold ${data.color}`}>{data.name}</h3>
                        </div>
                        <p className="text-sm font-bold text-gray-400 mb-2 border-b border-gray-700 pb-2">「{data.short}」</p>
                        <p className="text-sm leading-relaxed text-gray-100">{desc.strength}</p>
                      </div>
                    );
                  })}
                </div>
              </WindowBox>

              <DialogBox 
                charConfig={CONFIG.char2} 
                imageSide="right"
                text={<>「これがあなたの『心の<ruby>錨<rt>いかり</rt></ruby>』なんですね✨<br />でも、全部を持とうとすると疲れちゃいますから、『これは手放してもいい』という環境も知っておくといいですよ！」</>} 
              />

              <WindowBox title="避けるべき？・ストレスを感じる環境" iconName="fa-solid fa-skull-crossbones" className="bg-opacity-95 border-red-500">
                <p className="text-sm text-gray-300 mb-4 px-2">以下の要素はあなたが「なくてもいいかな？」と手放しをしやすく、逆にこの環境を強制されると強いストレスを感じる可能性があるので気を付けてください。</p>
                
                <div className="result-card-danger p-4 rounded-lg relative overflow-hidden">
                  <div className="flex items-center gap-3 mb-2">
                    <h3 className={`text-xl font-bold ${ANCHORS[bottom1].color}`}>
                      <i className={`${ANCHORS[bottom1].icon} mr-2`}></i>
                      {ANCHORS[bottom1].name}
                    </h3>
                  </div>
                  <p className="text-sm font-bold text-gray-400 mb-2 border-b border-red-900 pb-2">「{ANCHORS[bottom1].short}」に反する環境</p>
                  <p className="text-sm leading-relaxed text-red-100">{ANCHOR_DESCRIPTIONS[bottom1].weakness}</p>
                </div>
              </WindowBox>

              <DialogBox 
                charConfig={CONFIG.char1} 
                text={`「どうじゃ、何かのヒントになったかの？\nここで得たヒントを基にゆっくり考えてみたり、人に話してみたりするとよいぞよー。\n汝の航海に光あれ！なのじゃー」`} 
              />
            </div>

            {/* アクションボタン群 */}
            <div className="text-center pt-4 flex flex-col items-center gap-4">
              <button onClick={() => openPopup('save')} className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-blue-900 border-blue-400 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                <i className="fa-solid fa-camera"></i> じぶんで考えてみる
              </button>

              <button onClick={() => openPopup('talk')} className="rpg-button w-full md:w-auto px-8 py-3 text-base bg-yellow-900 border-yellow-500 font-bold flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(250,204,21,0.2)]">
                <i className="fa-solid fa-comments"></i> ひとに話してみる
              </button>

              <button onClick={resetApp} className="text-gray-400 hover:text-white underline underline-offset-4 text-sm mt-4">
                もう一度最初から診断する
              </button>
            </div>
          </div>
        );
      };

      const renderPopup = () => {
        if (popupType === 'none') return null;

        if (popupType === 'start') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="準備完了！" iconName="fa-solid fa-flag-checkered" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`「そうそう！そんな感じ♪\nじゃあ、早速始めるね！」`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={() => {
                        closePopup();
                        setAnimationKey(prev => prev + 1);
                        setStep('question');
                        window.scrollTo(0, 0);
                      }}
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      設問へ進む
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'notYet') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="ゆっくりで大丈夫" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`「今はまだやらないんだね！\n心の準備ができたら、右の『さっそくやってみる』寄りのボタンを選んでね！」`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'about') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title={<>心の<ruby>錨<rt>いかり</rt></ruby>の魔法とは？</>} iconName="fa-solid fa-book-open" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={<>「『心の<ruby>錨<rt>いかり</rt></ruby>（キャリアアンカー）』とは、シャインという心理学の賢者がとなえた、働くうえで【どうしても譲れない価値観】のことじゃ。<br /><br />自分の<ruby>錨<rt>いかり</rt></ruby>を知っておけば、人生の航海で迷ったときにも、自分を見失わずに納得のいく選択ができるようになるぞよ。<br /><br />お主の心の奥底に眠る<ruby>錨<rt>いかり</rt></ruby>を探す……それがこの魔法じゃ！」</>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'talk') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="酒場の片隅で" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-yellow-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={`「どうじゃったかな？ 自分の内側を見つめて、どんなことを感じたか……。\n\nその思いは、ひとに話してみるとさらに深まるかもしれぬぞ。\n\n『nininキャリアルーム』という、旅人の話をじっくり聞いてくれる場所があるそうじゃ。\n足を運んでみるのもよいじゃろう。」`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <a 
                      href="https://ninin-cc.github.io/" 
                      target="_blank" 
                      rel="noopener noreferrer" 
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-door-open"></i> nininキャリアルームへ向かう
                    </a>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今はやめておく
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'save') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="思い出の記録" iconName="fa-solid fa-camera" className="bg-opacity-100 border-blue-500 shadow-2xl">
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={<>「いいですね！<br />ご自身の『心の<ruby>錨<rt>いかり</rt></ruby>』を画像で保存しましょうか？<br />あとでゆっくり見返して、自分と対話するヒントにしてくださいね！」</>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={handleSaveImage}
                      className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-download"></i> 画像として保存する
                    </button>
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今はやめておく
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }
      };

      return (
        <div className="flex flex-col flex-1 w-full justify-between">
          <div className="w-full">
            <div key={animationKey} className={animationKey > 0 ? "animate-page-turn w-full" : "w-full"}>
              {step === 'intro' && renderIntro()}
              {step === 'practice' && renderPractice()}
              {step === 'question' && renderQuestion()}
              {step === 'bonus' && renderBonus()}
            </div>
            {step === 'calculating' && renderCalculating()}
            {step === 'result' && renderResult()}
          </div>
          
          {/* フッター・開発用 採番表示 */}
          <div className="w-full mt-12 mb-4 flex flex-col items-center animate-fade-in">
            {/* 説明ボックス (intro と result 画面のみ表示) */}
            {(step === 'intro' || step === 'result') && (
              <div className="w-full bg-black bg-opacity-60 border border-gray-500 rounded p-3 text-center text-[9px] md:text-xs text-gray-300 shadow-sm mb-4">
                <p className="mb-3 text-yellow-100 opacity-90 leading-relaxed">
                  ※本アプリは医療的な診断や占い、性格を決めつけるものではありません。<br className="hidden md:block" />
                  ご自身の「心の<ruby>錨<rt>いかり</rt></ruby>」に気づき、これからの生き方を考えるための「自己理解のきっかけ」としてご活用ください。
                </p>
                <div className="border-t border-gray-600/50 pt-2">
                  <p className="mb-1 leading-relaxed text-gray-400">本アプリは、交流分析・RIASEC・役割理論・キャリア理論などの知見をもとに、現代の働き方や人間関係に合わせて設計された RIESM™ / RoleTRADE™ の考え方に基づいて作られています。</p>
                  <p className="text-gray-400">© ninin consulting & counseling LLC. All rights reserved.</p>
                </div>
              </div>
            )}

            {/* 区切り線とリンク・ページ番号 */}
            <div className="w-full border-t border-gray-500/50 pt-3 flex flex-col items-center justify-center gap-1.5 text-[10px] md:text-xs text-gray-400">
              <a href="https://ninin-cc.github.io/" target="_blank" rel="noopener noreferrer" className="hover:text-yellow-300 transition-colors underline underline-offset-4">
                © 2026 ninin consulting＆counseling
              </a>
              <div className="font-mono opacity-70">
                PageNO: {step === 'question' ? qIndex + 1 : step}
              </div>
            </div>
          </div>

          {/* ポップアップ */}
          {renderPopup()}

          {/* ページめくりアニメーション用オーバーレイ */}
          {animationKey > 0 && step !== 'calculating' && step !== 'result' && (
            <div key={`page-turn-${animationKey}`} className="page-flip-overlay"></div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
