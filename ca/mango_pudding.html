        const pageElements = Array.from(document.querySelectorAll('.result-export-page'));
        if (pageElements.length === 0) return Promise.reject(new Error('保存対象が見つかりません。'));

        // スマホなどで上部が切れないように、一度トップへスクロールする
        window.scrollTo(0, 0);

        return new Promise((resolve, reject) => {
          setTimeout(async () => {
            try {
              const captureScale = 2;
              const pages = await Promise.all(pageElements.map(async (element) => {
                const pageRect = element.getBoundingClientRect();
                let canvas = await html2canvas(element, {
                  backgroundColor: '#fffaf0',
                  scale: captureScale,
                  useCORS: true
                });

                const expectedWidth = Math.round(pageRect.width * captureScale);
                const expectedHeight = Math.round(pageRect.height * captureScale);
                if (canvas.width !== expectedWidth || canvas.height !== expectedHeight) {
                  const croppedCanvas = document.createElement('canvas');
                  croppedCanvas.width = expectedWidth;
                  croppedCanvas.height = expectedHeight;
                  croppedCanvas
                    .getContext('2d')
                    .drawImage(canvas, 0, 0, expectedWidth, expectedHeight, 0, 0, expectedWidth, expectedHeight);
                  canvas = croppedCanvas;
                }

                const linkElements = Array.from(element.querySelectorAll('[data-pdf-link-url]'));
                const linkRects = linkElements.map(linkElement => {
                  const rect = linkElement.getBoundingClientRect();
                  return {
                    url: linkElement.getAttribute('data-pdf-link-url'),
                    x: rect.left - pageRect.left,
                    y: rect.top - pageRect.top,
                    width: rect.width,
                    height: rect.height,
                    pageWidth: pageRect.width,
                    pageHeight: pageRect.height
                  };
                });

                return { canvas, linkRects };
              }));
              resolve(pages);
            } catch (err) {

                pdf.link(

                  margin + linkRect.y * scale,
                  linkRect.width * scale,
                  linkRect.height * scale,
                  { url: linkRect.url }
                );
              });
            });

            const dateStr = getFormattedDateStr();

              </button>
            </div>
          </div>
        );
      };

      const renderPopup = () => {
        if (popupType === 'none') return null;

        if (popupType === 'start') {
          return (
            <div className="translucent-popup-overlay fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
              <div className="w-full max-w-lg">
                <WindowBox title="準備完了！" iconName="fa-solid fa-flag-checkered" className="translucent-popup-window border-yellow-500 shadow-2xl" onClose={closePopup}>
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`そうそう！そんな感じ♪\nじゃあ、早速始めるね！`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={() => {
                        closePopup();
                        setAnimationKey(prev => prev + 1);
                        setStep('question');
                        window.scrollTo(0, 0);
                      }}
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      設問へ進む
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'notYet') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title="ゆっくりで大丈夫" iconName="fa-solid fa-mug-hot" className="bg-opacity-100 border-blue-500 shadow-2xl" onClose={closePopup}>
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={`今はまだやらないんだね！\n心の準備ができたら、右の『さっそくやってみる』寄りのボタンを選んでね！`} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'about') {
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-80 animate-fade-in backdrop-blur-sm">
              <div className="w-full max-w-lg">
                <WindowBox title={<span>心の<ruby>錨<rt>いかり</rt></ruby>の魔法とは？</span>} iconName="fa-solid fa-book-open" className="bg-opacity-100 border-blue-500 shadow-2xl" onClose={closePopup}>
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={<span>『心の<ruby>錨<rt>いかり</rt></ruby>（キャリアアンカー）』とは、シャインという心理学の賢者がとなえた、働くうえで【どうしても譲れない価値観】のことじゃ。<br /><br />自分の<ruby>錨<rt>いかり</rt></ruby>を知っておけば、人生の航海で迷ったときにも、自分を見失わずに納得のいく選択ができるようになるぞよ。<br /><br />お主の心の奥底に眠る<ruby>錨<rt>いかり</rt></ruby>を探す……それがこの魔法じゃ！</span>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      閉じる
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'talk') {
          return (
            <div className="translucent-popup-overlay fixed inset-0 z-50 overflow-y-auto p-4 animate-fade-in">
              <div className="min-h-full w-full max-w-lg mx-auto flex items-start justify-center py-6">
                <WindowBox title="酒場の片隅で" iconName="fa-solid fa-mug-hot" className="translucent-popup-window talk-popup-window border-yellow-500 shadow-2xl" onClose={closePopup}>
                  <DialogBox 
                    charConfig={CONFIG.char1} 
                    text={`どうじゃったかな？ お主の【Role=役割】の内側を見つめて、どんなことを感じたか……。\n\nその思いは、ひとに話してみるとさらに深まるかもしれぬぞ。\n\nそうじゃな。わしの知っておる場所なのじゃが【 ${CONTACT_CONFIG.consultationName} 】で、ゆっくり話してみるのもよいじゃろう。`} 
                  />
                  <div className="flex flex-col gap-3 mt-4">
                    <a 
                      href={CONTACT_CONFIG.consultationUrl} 
                      target="_blank" 
                      rel="noopener noreferrer" 
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-door-open"></i> {CONTACT_CONFIG.consultationName}へ向かう
                    </a>
                  </div>
                  <div
                    className="letter-note relative mt-5 rounded-sm border border-stone-300 px-4 pb-4 pt-6 text-[#2d1b10]"
                  >
                    <div className="absolute -top-3 left-3 rounded-sm border border-stone-400 bg-white px-3 py-1 text-[11px] font-bold tracking-wider text-[#5b3518] shadow">
                      📝紹介状
                    </div>
                    <p className="text-[12px] leading-7 font-medium">
                      {CONTACT_CONFIG.consultationDescription}
                    </p>
                    {CONTACT_CONFIG.profileUrl && (
                      <p className="mt-3 border-t border-stone-300/60 pt-2 text-[10px] leading-relaxed text-stone-500">
                        <span>{CONTACT_CONFIG.profileLinkLabel || '自己紹介ページ'}：</span>
                        <a
                          href={CONTACT_CONFIG.profileUrl}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="underline underline-offset-2 hover:text-stone-700 break-all"
                        >
                          {CONTACT_CONFIG.profileUrl}
                        </a>
                      </p>
                    )}
                  </div>
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={closePopup}
                      className="rpg-button bg-gray-800 text-gray-300 border-gray-600 hover:border-gray-400"
                    >
                      今はやめておく
                    </button>
                    <button 
                      onClick={() => setPopupType('save')}
                      className="rpg-button bg-blue-900 border-blue-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-camera"></i> あとで見返す（結果保存）
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }

        if (popupType === 'save') {
          return (
            <div className="translucent-popup-overlay fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
              <div className="w-full max-w-lg">
                <WindowBox title="保存" iconName="fa-solid fa-camera" className="translucent-popup-window border-blue-500 shadow-2xl" onClose={closePopup}>
                  <DialogBox 
                    charConfig={CONFIG.char2} 
                    imageSide="right"
                    text={<span>いいですね！<br />ご自身の『心の<ruby>錨<rt>いかり</rt></ruby>』の結果レポートを保存しましょうか？</span>} 
                  />
                  <div className="flex flex-col gap-3 mt-6">
                    <button 
                      onClick={handleSavePdf}
                      className="rpg-button bg-amber-900 border-amber-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-file-pdf"></i> PDFで保存
                    </button>
                    <button 
                      onClick={() => setPopupType('talk')}
                      className="rpg-button bg-yellow-900 border-yellow-400 text-white hover:bg-white hover:text-black flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-comments"></i> ひとに話してみる
                    </button>
                    <button 
                      onClick={handleSaveImage}
                      className="rpg-button transparent-save-button flex items-center justify-center gap-2"
                    >
                      <i className="fa-solid fa-download"></i> 画像として保存
                    </button>
                  </div>
                </WindowBox>
              </div>
            </div>
          );
        }
      };

      return (
        <div className="flex flex-col flex-1 w-full justify-between">
          <div className="w-full">
            <div key={animationKey} className={animationKey > 0 ? "animate-page-turn w-full" : "w-full"}>
              {step === 'intro' && renderIntro()}
              {step === 'practice' && renderPractice()}
              {step === 'colorPractice' && renderColorPractice()}
              {step === 'question' && renderQuestion()}
              {step === 'bonus1_story' && renderBonus1_story()}
              {step === 'bonus1_intro' && renderBonus1_intro()}
              {step === 'bonus1_select' && renderBonus1_select()}
              {step === 'bonus2' && renderBonus2()}
            </div>
            {step === 'calculating' && renderCalculating()}
            {step === 'result' && renderResult()}
          </div>
          
          {/* フッター・開発用 採番表示 */}
          <div className="w-full mt-12 mb-4 flex flex-col items-center animate-fade-in">
            {/* 説明ボックス (intro と result 画面のみ表示) */}
            {(step === 'intro' || step === 'result') && (
              <div className="w-full bg-black bg-opacity-60 border border-gray-500 rounded p-3 text-center text-[9px] md:text-xs text-gray-300 shadow-sm mb-4">
                <p className="mb-3 text-yellow-100 opacity-90 leading-relaxed">
                  ※本アプリは医療的な診断や占い、性格を決めつけるものではありません。<br className="hidden md:block" />
                  ご自身の「心の<ruby>錨<rt>いかり</rt></ruby>」に気づき、これからのキャリア（生き方）を考えるための「自己理解のきっかけ」としてご活用ください。
                </p>
                <div className="border-t border-gray-600/50 pt-2">
                  <p className="mb-1 leading-relaxed text-gray-400">本アプリは、交流分析・RIASEC・役割理論・キャリア理論などの知見をもとに、現代の働き方や人間関係に合わせて設計された RIESM™ / RoleTRADE™ の考え方に基づいて作られています。</p>
                  <p className="text-gray-400">© ninin consulting & counseling LLC. All rights reserved.</p>
                </div>
              </div>
            )}

            {/* 区切り線とリンク・ページ番号 */}
            <div className="w-full border-t border-gray-500/50 pt-3 flex flex-col items-center justify-center gap-1.5 text-[10px] md:text-xs text-gray-400">
              <a href="https://ninin-cc.github.io/" target="_blank" rel="noopener noreferrer" className="hover:text-yellow-300 transition-colors underline underline-offset-4">
                © 2026 ninin consulting＆counseling
              </a>
              <div className="font-mono opacity-70">
                PageNO: {step === 'question' ? qIndex + 1 : step}
              </div>
              {step === 'intro' && (
                <button
                  type="button"
                  onClick={goToDevResult}
                  aria-label="開発用：リザルト画面へ"
                  title="開発用：リザルト画面へ"
                  className="h-8 w-40 opacity-0 cursor-default"
                >
                  リザルト画面へ
                </button>
              )}
            </div>
          </div>

          {/* ポップアップ */}
          {renderPopup()}

          {/* ページめくりアニメーション用オーバーレイ */}
          {animationKey > 0 && step !== 'calculating' && step !== 'result' && (
            <div key={`page-turn-${animationKey}`} className="page-flip-overlay"></div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    (() => {
      const blockedCommandKeys = new Set(['u', 's']);
      const blockedDevtoolKeys = new Set(['i', 'j', 'c']);

      document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      document.addEventListener('dragstart', (event) => {
        event.preventDefault();
      });

      document.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        const commandKey = event.ctrlKey || event.metaKey;
        const shouldBlock =
          event.key === 'F12' ||
          (commandKey && blockedCommandKeys.has(key)) ||
          (commandKey && event.shiftKey && blockedDevtoolKeys.has(key));

        if (!shouldBlock) return;
        event.preventDefault();
        event.stopImmediatePropagation();
      }, true);
    })();
  </script>
</body>
</html>
