  <style>
    @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Yomogi&display=swap');
    body { margin: 0; padding: 0; background: #000; color: #f3f4f6; overflow-x: hidden; }
    html, body { -webkit-touch-callout: none; }
    img { -webkit-user-drag: none; user-select: none; }
    .rpg-font { font-family: 'DotGothic16', sans-serif; letter-spacing: 0.05em; }
    
    /* ルビの調整 */
    ruby { ruby-align: center; }
    rt { font-size: 0.5em; color: white; } /* ルビを白文字に */
    h1 rt { font-size: 0.35em; } /* タイトルでのルビはさらに小さく */

    .rpg-button { 
      border: 2px solid white; 
      padding: 12px 16px; 
      border-radius: 6px; 
      transition: all 0.2s; 
      background: black; 
      color: white; 
      cursor: pointer; 
      text-align: center; 
      font-weight: bold;
    }
    .rpg-button:hover:not(:disabled) { 
      background: white; 
      color: black; 
    }
    .rpg-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .transparent-save-button {
      background: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
      color: #fff8df !important;
    }
    .transparent-save-button:hover:not(:disabled) {
      background: rgba(255, 248, 223, 0.08) !important;
      border-color: rgba(255, 248, 223, 0.18) !important;
      color: #fff8df !important;
      box-shadow: none !important;
    }

    .letter-note {
      font-family: 'Yomogi', 'DotGothic16', sans-serif;
      background-color: #fffffd;
      background-image:
        linear-gradient(90deg, transparent 0, transparent 34px, rgba(170, 70, 65, 0.12) 35px, transparent 36px),
        repeating-linear-gradient(178deg, transparent 0, transparent 27px, rgba(92, 72, 48, 0.16) 28px, transparent 29px);
      box-shadow:
        inset 0 0 18px rgba(120, 90, 60, 0.10),
        0 6px 14px rgba(0, 0, 0, 0.18);
    }

    .translucent-popup-overlay {
      background: rgba(0, 0, 0, 0.42) !important;
      backdrop-filter: blur(2px);
    }
    .translucent-popup-window {
      background-color: rgba(18, 12, 8, 0.34) !important;
      backdrop-filter: blur(3px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42) !important;
    }
    .translucent-popup-window > div.absolute {
      background-color: rgba(18, 12, 8, 0.48) !important;
      backdrop-filter: blur(2px);
    }
    .translucent-popup-window .letter-note {
      background-color: rgba(255, 255, 253, 0.95);
    }
    .talk-popup-window {
      background-color: rgba(18, 12, 8, 0.06) !important;
      backdrop-filter: blur(1px);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28) !important;
    }
    .talk-popup-window > div.absolute {
      background-color: rgba(18, 12, 8, 0.44) !important;
    }

    .question-frame-transparent {
      background: transparent !important;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18) !important;
    }
    .question-frame-soft {
      background: rgba(0, 0, 0, 0.32) !important;
      backdrop-filter: blur(1px);
    }
    .question-frame-letter {
      background:
        url('./img/youhishi.jpg') center / cover repeat !important;
      color: #2d1b10 !important;
      box-shadow:
        inset 0 0 26px rgba(90,48,18,0.18),
        0 10px 24px rgba(0,0,0,0.24) !important;
    }
    .question-frame-black {
      background: #050505 !important;
    }
    .question-choice-transparent {
      background: transparent !important;
      box-shadow: inset 0 0 14px rgba(230,194,128,0.10) !important;
    }
    .question-choice-soft {
      background: rgba(0, 0, 0, 0.34) !important;
      box-shadow: inset 0 0 18px rgba(230,194,128,0.10) !important;
    }
    .question-choice-letter {
      background:
        url('./img/youhishi.jpg') center / cover repeat !important;
      box-shadow: inset 0 0 14px rgba(90,48,18,0.13) !important;
    }
    .question-choice-black {
      background: #050505 !important;
      box-shadow: inset 0 0 18px rgba(255,255,255,0.04) !important;
    }
    .question-answer-transparent {
      background: transparent !important;
    }
    .question-answer-soft {
      background: rgba(0, 0, 0, 0.34) !important;
    }
    .question-answer-letter {
      background: rgba(255,248,223,0.72) !important;
    }
    .question-answer-black {
      background: #050505 !important;
    }

    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ページ切り替えのフェードイン */
    .animate-page-turn { 
      position: relative;
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* ページめくり（左固定で右から左へ縮小）アニメーション */
    .page-flip-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(to right, #050505 0%, #1a1a1a 95%, #3a3a3a 100%);
      z-index: 100;
      transform-origin: left center;
      animation: flipLeft 0.5s ease-in-out forwards;
      pointer-events: none;
    }
    @keyframes flipLeft {
      0% { transform: scaleX(1); opacity: 1; }
      99% { transform: scaleX(0); opacity: 1; }
      100% { transform: scaleX(0); opacity: 0; }
    }
    
    /* オーラエフェクト */
    .aura-effect-a {
      animation: pulseAuraA 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(230,194,128,0.6);
    }
    @keyframes pulseAuraA {
      0% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(230,194,128,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(230,194,128,0.6); transform: scale(1); }
    }

    .aura-effect-b {
      animation: pulseAuraB 1.5s infinite;
      box-shadow: 0 0 20px 10px rgba(212,184,149,0.6);
    }
    @keyframes pulseAuraB {
      0% { box-shadow: 0 0 20px 10px rgba(212,184,149,0.6); transform: scale(1); }
      50% { box-shadow: 0 0 30px 15px rgba(212,184,149,0.8); transform: scale(1.05); }
      100% { box-shadow: 0 0 20px 10px rgba(212,184,149,0.6); transform: scale(1); }
    }

    .progress-bar-fill {
      transition: width 0.3s ease-out;
    }

    /* 結果カードのスタイル */
    .result-card-gold {
      background: linear-gradient(135deg, rgba(30,25,0,0.9), rgba(10,5,0,0.95));
      border: 2px solid #facc15;
      box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
    }
    .result-card-silver {
      background: linear-gradient(135deg, rgba(20,25,30,0.9), rgba(5,10,15,0.95));
      border: 2px solid #94a3b8;
    }
    .result-card-bronze {
      background: linear-gradient(135deg, rgba(30,15,5,0.9), rgba(15,5,0,0.95));
      border: 2px solid #b45309;
    }
    .result-card-danger {
      background: linear-gradient(135deg, rgba(40,0,0,0.9), rgba(10,0,0,0.95));
      border: 2px solid #ef4444;
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
    }
    .result-window-translucent {
      background: rgba(0, 0, 0, 0.62) !important;
      backdrop-filter: blur(1px);
    }
    .result-window-translucent > div.absolute {
      background-color: rgba(0, 0, 0, 0.74) !important;
    }
    .result-window-translucent .result-card-gold {
      background: linear-gradient(135deg, rgba(30,25,0,0.72), rgba(10,5,0,0.78));
    }
    .result-window-translucent .result-card-silver {
      background: linear-gradient(135deg, rgba(20,25,30,0.72), rgba(5,10,15,0.78));
    }
    .result-window-translucent .result-card-bronze {
      background: linear-gradient(135deg, rgba(30,15,5,0.72), rgba(15,5,0,0.78));
    }
    .result-window-translucent .result-card-danger {
      background: linear-gradient(135deg, rgba(40,0,0,0.72), rgba(10,0,0,0.78));
    }
    .result-story-toggle {
      background: rgba(47, 29, 16, 0.62) !important;
    }
    .result-story-toggle:hover {
      background: rgba(61, 39, 22, 0.72) !important;
    }
    .result-story-choice-positive {
      background: rgba(66, 32, 6, 0.52) !important;
    }
    .result-story-choice-negative {
      background: rgba(69, 10, 10, 0.52) !important;
    }
    .result-story-note {
      background: rgba(69, 26, 3, 0.48) !important;
    }
  </style>
</head>
<body class="rpg-font min-h-screen relative" style="background-image: url('https://ninin-cc.github.io/cq/img/sakaba.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">
  <!-- 背景の暗さを和らげる -->
  <div class="absolute inset-0 z-0 bg-black bg-opacity-30"></div>
  <div id="root" class="relative z-10 w-full max-w-2xl mx-auto p-4 md:p-6 min-h-screen flex flex-col overflow-hidden"></div>

  <script src="./js/mango_pudding.bundle.js"></script>
  <script>
    (() => {
      const blockedCommandKeys = new Set(['u', 's']);
      const blockedDevtoolKeys = new Set(['i', 'j', 'c']);

      document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
      });

      document.addEventListener('dragstart', (event) => {
        event.preventDefault();
      });

      document.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        const commandKey = event.ctrlKey || event.metaKey;
        const shouldBlock =
          event.key === 'F12' ||
          (commandKey && blockedCommandKeys.has(key)) ||
          (commandKey && event.shiftKey && blockedDevtoolKeys.has(key));

        if (!shouldBlock) return;
        event.preventDefault();
        event.stopImmediatePropagation();
      }, true);
    })();
  </script>
</body>
