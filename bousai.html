          options: ["目印にして友達を呼ぶため", "家族全員が無事で、助けはいらないというご近所へのサイン", "洗濯物を干しているだけ"],
          answer: 1,
          explanation: "「うちは大丈夫！」というサインを出しておけば、町会や消防の人が『まだサインが出ていない、助けが必要な家』へ早く行くことができるんだ。立派な共助だね。"
        },
        {
          question: "日暮里のような木のお家が密集している地域で、地震の後に怖い「二次災害」は？",
          options: ["雪崩（なだれ）", "竜巻（たつまき）", "地震の後に発生して広がる「火災（火事）」"],
          answer: 2,
          explanation: "倒れた家から火が出ると、細い道や密集した家を伝ってあっという間に火事が広がってしまう。だからこそ「初期消火」が命運を分けるんだ！"
        },
        {
          question: "停電の夜、安全に明かりを確保するために「使わないほうがいい」ものはどれ？",
          options: ["LEDランタン", "懐中電灯", "ロウソク"],
          answer: 2,
          explanation: "地震の余震（あとから来るゆれ）でロウソクが倒れると、火事の原因になってすごく危険だよ！電池で光るライトを使おう。"
        },
        {
          question: "避難所に行く時、お家で飼っているペット（犬や猫）はどうする？",
          options: ["家に置いていく", "ケージなどに入れて一緒に避難する（同行避難）", "逃がしてあげる"],
          answer: 1,
          explanation: "ペットも大切な家族！一緒に安全な場所へ逃げる「同行避難」が基本だよ。ただ、避難所では動物が苦手な人もいるから、ケージに入れるなどのルールを守ろう。"
        },
        {
          question: "ラップ（食品用ラップフィルム）は防災の時にどう役立つ？",
          options: ["お皿に敷いてからご飯をのせる（お皿を洗わずに済む）", "体に巻いて空を飛ぶ", "窓ガラスに貼って割れないようにする"],
          answer: 0,
          explanation: "水が出ない時、お皿を洗うことができないよ。お皿にラップを敷いてから食べ物をのせ、食べ終わったらラップを捨てるだけにすれば、大切な水を節約できるんだ。"
        },
        {
          question: "家族の中で、誰の命を一番最初に守るべき？",
          options: ["お父さんやお母さん", "自分の命", "飼っているペット"],
          answer: 1,
          explanation: "「自分の命は自分で守る」。自分がケガをしてしまったら、周りの人を助けるどころか、他の人に助けてもらわなきゃいけなくなる。まずは自分が無事でいることが一番の貢献だよ。"
        },
        {
          question: "カセットコンロとガスボンベ、備蓄しておく理由は？",
          options: ["キャンプで遊ぶため", "電気が止まった時の照明にするため", "ガスや電気が止まっても、温かいご飯を作ったりお湯を沸かすため"],
          answer: 2,
          explanation: "冬の寒い時や不安な時、温かいスープやご飯を食べるとすごくホッとするんだ。カセットコンロは命をつなぐ大切なアイテムだよ。"
        },
        {
          question: "怪我をした時のための「救急箱」。中に入れておくと良いのは絆創膏と、あとは何？",
          options: ["おもちゃ", "いつも飲んでいる薬（処方薬）やお薬手帳のコピー", "図書カード"],
          answer: 1,
          explanation: "災害時は病院が開いていなかったり、いつもの薬がすぐにもらえないことがあるよ。数日分の薬とお薬手帳のコピーは必ず持ち出し袋に入れておこう。"
        },
        {
          question: "エレベーターに乗っている時に地震が来たら、どのボタンを押す？",
          options: ["1階のボタンだけ押す", "すべての階のボタンを全部押す", "「閉める」ボタンを連打する"],
          answer: 1,
          explanation: "閉じ込められるのを防ぐため、すべての階のボタンを押し、最初に止まった階で素早く降りて、階段で安全な場所へ逃げよう。"
        },
        {
          question: "町会などで配られている「ハザードマップ」ってどんな地図？",
          options: ["美味しいお店が載っている地図", "地震や水害の時に、自分の家の周りがどれくらい危険か色分けされている地図", "宝探しの地図"],
          answer: 1,
          explanation: "自分の家が「水に浸かりやすいか」「火事が広がりやすいか」が一目でわかる大切な地図だよ。家族で一度は必ず確認しておこう！"
        },
        {
          question: "地震の時、机の下に隠れたら次にすることは？",
          options: ["目をつぶって耳をふさぐ", "机の脚をしっかりと両手で握る", "スマートフォンで写真を撮る"],
          answer: 1,
          explanation: "大きなゆれだと、机自体が飛んでいってしまうことがあるよ！対角線上の机の脚を両手でしっかり握って、机と一緒に動くようにしよう。"
        },
        {
          question: "電柱から垂れ下がっている電線を見つけたら？",
          options: ["触ってみる", "絶対に触らず、近づかない", "引っぱって切る"],
          answer: 1,
          explanation: "電気が通っていて感電する危険があるから、絶対に近づかないで！見つけたら大人に教えて、電力会社や消防に連絡してもらおう。"
        },
        {
          question: "災害のあと、ご近所さんに会ったらどんな言葉をかける？",
          options: ["「何か食べるものちょうだい」", "「こんにちは！お怪我はないですか？」と挨拶して状況を聞く", "何も言わずに通り過ぎる"],
          answer: 1,
          explanation: "挨拶と声かけが一番の「共助」！顔見知りになっておくと、いざという時にお互いを助け合いやすくなるんだよ。"
        }
      ];

      // 初回レンダリング時とリセット時にランダムに7問をセットする
      useEffect(() => {
        startNewQuiz();
      }, []);

      const startNewQuiz = () => {
        const shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
        setQuestions(shuffled.slice(0, 7));
        setCurrentQuestion(0);
        setScore(0);
        setShowResult(false);
        setIsAnswered(false);
        setSelectedOption(null);
      };

      const handleAnswerClick = (index) => {
        if (isAnswered) return;
        
        setSelectedOption(index);
        setIsAnswered(true);
        
        if (index === questions[currentQuestion].answer) {
          setScore(score + 1);
        }
      };

      const handleNextQuestion = () => {
        if (currentQuestion + 1 < questions.length) {
          setCurrentQuestion(currentQuestion + 1);
          setIsAnswered(false);
          setSelectedOption(null);
        } else {
          setShowResult(true);
        }
      };

      const resetQuiz = () => {
        startNewQuiz();
      };

      if (questions.length === 0) return null;

      return (
        <div className="min-h-screen bg-blue-50 flex items-center justify-center p-4 font-sans text-gray-800">
          <div className="bg-white rounded-3xl shadow-xl w-full max-w-2xl overflow-hidden border-4 border-blue-300">
            
            {/* ヘッダー */}
            <div className="bg-blue-600 text-white p-6 text-center">
              <h1 className="text-2xl md:text-3xl font-bold tracking-wider mb-2">🏢 日暮里・北部町会<br/>防災クイズ探検隊！ 🚒</h1>
              <p className="mt-2 text-blue-100 font-medium">〜キミも町会の防災リーダーになろう！〜</p>
            </div>

            <div className="p-4 md:p-8">
              {showResult ? (
                /* 結果画面 */
                <div className="text-center space-y-6 animate-fade-in">
                  <IconTrophy className="w-24 h-24 mx-auto text-yellow-400 drop-shadow-md" />
                  <h2 className="text-3xl font-bold text-gray-700">探検おつかれさま！</h2>
                  <p className="text-2xl font-bold text-blue-600">
                    {questions.length}問中、{score}問正解！
                  </p>
                  
                  <div className="bg-yellow-50 p-6 rounded-2xl border-2 border-yellow-300 text-left shadow-sm">
                    <h3 className="font-bold text-xl mb-4 flex items-center text-yellow-800 border-b-2 border-yellow-200 pb-2">
                      <IconLightbulb className="w-6 h-6 mr-2" />
                      北部町会からのミッション！
                    </h3>
                    <p className="text-gray-700 mb-4 font-bold">
                      スマホを置いたら、お家の人と一緒に次の3つをやってみよう。
                    </p>
                    <ul className="space-y-4 text-gray-700">
                      <li className="flex items-start">
                        <IconCheckCircle className="w-6 h-6 text-green-600 mr-2 flex-shrink-0 mt-0.5" />
                        <span><strong>うちの家具は倒れないように固定してあるか</strong>を今すぐ確認しよう。</span>
                      </li>
                      <li className="flex items-start">
                        <IconMapPin className="w-6 h-6 text-red-500 mr-2 flex-shrink-0 mt-0.5" />
                        <span>自分のお家の<strong>指定避難所（ひぐらし小など）</strong>まで、どの道を通って行くか歩いてみよう。（せまい道やブロック塀に注意！）</span>
                      </li>
                      <li className="flex items-start">
                        <IconUsers className="w-6 h-6 text-blue-500 mr-2 flex-shrink-0 mt-0.5" />
                        <span>ご近所の人に会ったら<strong>「こんにちは！」</strong>と元気に挨拶しよう。それが一番の防災だよ。</span>
                      </li>
                    </ul>
                  </div>

                  <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 text-sm text-gray-600 text-left">
                    <strong>💡 保護者の方へ：</strong><br/>
                    休みの日に、電気や水道を使わずに数時間過ごしてみる「ホームサバイバルトライアル」にぜひご家族で挑戦してみてください。足りない備蓄品やマンション特有のトイレの課題が見えてきます。
                  </div>

                  <button 
                    onClick={resetQuiz}
                    className="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full shadow-lg transform transition active:scale-95 flex items-center justify-center mx-auto text-lg"
                  >
                    <IconHome className="w-6 h-6 mr-2" />
                    もういちど探検する（別の問題が出るよ！）
                  </button>
                </div>
              ) : (
                /* クイズ画面 */
                <div className="space-y-6">
                  <div className="flex justify-between items-center mb-4">
                    <span className="bg-blue-100 text-blue-800 text-sm font-bold px-4 py-1.5 rounded-full">
                      第 {currentQuestion + 1} 問 / {questions.length}問
                    </span>
                    <span className="text-gray-500 font-bold bg-gray-100 px-4 py-1.5 rounded-full">
                      スコア: {score}
                    </span>
                  </div>

                  {/* プログレスバー */}
                  <div className="w-full bg-gray-200 rounded-full h-3 mb-6">
                    <div 
                      className="bg-blue-500 h-3 rounded-full transition-all duration-500" 
                      style={{ width: `${((currentQuestion) / questions.length) * 100}%` }}
                    ></div>
                  </div>

                  <h2 className="text-xl md:text-2xl font-bold text-gray-800 leading-snug min-h-[5rem]">
                    {questions[currentQuestion].question}
                  </h2>

                  <div className="space-y-3 mt-6">
                    {questions[currentQuestion].options.map((option, index) => {
                      let buttonClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 font-bold text-base md:text-lg ";
                      
                      if (!isAnswered) {
                        buttonClass += "border-gray-200 hover:border-blue-500 hover:bg-blue-50 bg-white hover:shadow-md";
                      } else {
                        if (index === questions[currentQuestion].answer) {
                          buttonClass += "border-green-500 bg-green-50 text-green-800 shadow-inner"; // 正解
                        } else if (index === selectedOption) {
                          buttonClass += "border-red-400 bg-red-50 text-red-800"; // 選んだ不正解
                        } else {
                          buttonClass += "border-gray-200 bg-gray-50 text-gray-400 opacity-50"; // その他
                        }
                      }

                      return (
                        <button
                          key={index}
                          onClick={() => handleAnswerClick(index)}
                          disabled={isAnswered}
                          className={buttonClass}
                        >
                          <div className="flex items-center justify-between">
                            <span>{option}</span>
                            {isAnswered && index === questions[currentQuestion].answer && <IconCheckCircle className="w-7 h-7 text-green-500 flex-shrink-0 ml-2" />}
                            {isAnswered && index === selectedOption && index !== questions[currentQuestion].answer && <IconXCircle className="w-7 h-7 text-red-500 flex-shrink-0 ml-2" />}
                          </div>
                        </button>
                      );
                    })}
                  </div>

                  {/* 解説エリア（回答後に表示） */}
                  {isAnswered && (
                    <div className="mt-6 bg-blue-50 p-5 rounded-2xl border-2 border-blue-200 animate-fade-in shadow-sm">
                      <h3 className="font-bold text-blue-800 mb-2 flex items-center">
                        <IconLightbulb className="w-5 h-5 mr-1" />
                        【なるほど！解説】
                      </h3>
                      <p className="text-gray-800 leading-relaxed font-medium">{questions[currentQuestion].explanation}</p>
                      
                      <div className="mt-6 flex justify-end">
                        <button 
                          onClick={handleNextQuestion}
                          className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-full shadow-md transform transition active:scale-95 flex items-center"
                        >
                          {currentQuestion + 1 === questions.length ? "探検の結果を見る！" : "次の問題へすすむ"}
                          <IconArrowRight className="w-5 h-5 ml-2" />
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
