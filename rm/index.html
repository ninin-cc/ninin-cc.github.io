          K: { title: "キーパー", desc: "今は「ルール」や「正確さ」よりも、柔軟な発想や周囲の感情に寄り添うことを大切にしている状態です。\n\n人に指示をしなくてはいけないシーンや、自分を律し続けないシーンが続くと疲れを感じやすいかもしれません。また、長時間議論をする、根拠や情報を分析し積み上げなくてはいけない状況が続くと疲れやすいかもしれません。" },
          N: { title: "ナーチャー", desc: "今は「他者への共感」や「気遣い」よりも、自分の直感や論理的な判断を優先して進みたい状態です。\n\n人を気遣わなくてはいけないシーン、人に気遣い続けられるシーンが続くと疲れやすいかもしれません。" },
          A: { title: "アダプター", desc: "今は「失敗への警戒」や「空気を読むこと」を手放し、自分の信念や直感を信じて大胆に動けている状態です。\n\n人に合わせなくてはいけないシーンが続くと疲れを感じやすいかもしれません。" }
        };
        const backResult = backsData[resultType.back];

        return (
          <div className={`min-h-screen flex items-center justify-center p-2 sm:p-4 py-8 sm:py-12 transition-colors duration-1000 ${t.bg}`}>
            <div className="max-w-lg w-full animate-fade-in relative">
              {toastMessage && (
                <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl z-50 text-sm font-bold text-center whitespace-pre-line w-[90%] max-w-sm border border-slate-600">
                  {toastMessage}
                </div>
              )}
              
              <div id="result-card" className={`bg-white rounded-2xl sm:rounded-3xl shadow-2xl overflow-hidden border-2 ${t.border}`}>
                
                {/* --- ▼▼▼ ここからキャプチャ範囲 ▼▼▼ --- */}
                <div id="capture-area" className="bg-white">
                  <div className={`p-6 sm:p-8 text-center relative overflow-hidden bg-gradient-to-r ${t.header} text-white`}>
                    <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent"></div>
                    <h2 className="text-xs sm:text-sm font-bold tracking-widest text-white/90 mb-3 relative z-10">
                      今の【フロント】
                    </h2>
                    <div className="flex items-center justify-center gap-4 mb-2 relative z-10">
                      <ModeIcon type={resultType.front} className="w-8 h-8 sm:w-10 sm:h-10 drop-shadow-md" />
                      {resultType.isDouble && (
                        <>
                          <span className="text-xl sm:text-2xl font-bold opacity-70">+</span>
                          <ModeIcon type={resultType.second} className="w-8 h-8 sm:w-10 sm:h-10 drop-shadow-md" />
                        </>
                      )}
                    </div>
                    <h1 className="text-xl sm:text-2xl font-extrabold relative z-10 drop-shadow-md">
                      {result.title}
                      {result.subTitle && (
                        <>
                          <br />
                          <span className="text-sm sm:text-lg font-bold opacity-90">{result.subTitle}</span>
                        </>
                      )}
                    </h1>
                  </div>
                  
                  <div className="p-4 sm:p-8 pb-1 sm:pb-2">
                    <div className={`rounded-2xl p-4 sm:p-6 border border-white/50 shadow-inner bg-white/60`}>
                      <h3 className={`font-bold text-xs sm:text-sm mb-4 sm:mb-5 tracking-wide text-center ${t.textLight}`}>今のあなたのモードバランス</h3>
                      <div className="space-y-3 sm:space-y-4">
                        {['W', 'K', 'N', 'A'].sort((a, b) => resultScores[b] - resultScores[a]).map(type => {
                          const score = resultScores[type];
                          const maxScore = Math.max(...Object.values(resultScores));
                          const percent = maxScore > 0 ? Math.round(30 + (score / maxScore) * 70) : 30;
                          const barColors = { W: 'bg-amber-400', K: 'bg-blue-500', N: 'bg-pink-400', A: 'bg-cyan-400' };
                          const labels = { W: 'ワンダー', K: 'キーパー', N: 'ナーチャー', A: 'アダプター' };
                          return (
                            <div key={type} className="flex items-center gap-2">
                              <div className={`w-5 sm:w-6 flex justify-center`}>
                                <ModeIcon type={type} className={`w-4 h-4 sm:w-5 sm:h-5 ${t.textLight}`} />
                              </div>
                              <div className={`w-14 sm:w-16 text-left sm:text-right text-[10px] sm:text-xs font-bold ${t.textLight}`}>{labels[type]}</div>
                              <div className="flex-1 h-3 sm:h-4 bg-slate-200/50 rounded-full overflow-hidden">
                                <div className={`h-full ${barColors[type]} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${percent}%` }}></div>
                              </div>
                              <div className={`w-8 sm:w-10 text-right text-xs font-bold ${t.text}`}>{percent}%</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    {/* キャプチャ画像にのみ表示されるメッセージとウォーターマーク */}
                    <div id="capture-watermark" style={{ display: 'none' }} className="text-center mt-3 pb-1">
                      <p className="text-[10px] sm:text-xs font-bold text-slate-500 mb-1.5">
                        皆さんも体験してみてください。<br className="sm:hidden" />少し詳細なモードバランスの解説も出てきます🔍
                      </p>
                      <p className="text-[9px] sm:text-[10px] text-slate-400/80 font-medium">
                        🌈 RIESM™ mini ©2026ninin consulting＆counseling
                      </p>
                    </div>
                  </div>
                </div>
                {/* --- ▲▲▲ ここまでキャプチャ範囲 ▲▲▲ --- */}

                {/* --- ▼▼▼ ここからキャプチャしない範囲 (Web画面のみ) ▼▼▼ --- */}
                <div className="px-4 sm:px-8 pb-0" data-html2canvas-ignore="true">
                  <div className={`rounded-xl sm:rounded-2xl p-4 sm:p-6 mb-4 border border-white/50 shadow-inner ${t.cardBg}`}>
                    <p className={`leading-relaxed text-sm md:text-base font-medium ${t.text}`}>{result.detail[resultType.detailIndex]}</p>
                    <div className={`mt-6 pt-4 border-t border-white/40`}>
                      <h4 className={`font-bold text-[13px] md:text-sm mb-2 opacity-90 ${t.text}`}>▼ お休み中のモード（バックス）について</h4>
                      <p className={`text-[13px] md:text-sm font-medium opacity-80 whitespace-pre-line ${t.text}`}>{backResult.desc}</p>
                      
                      <div className={`mt-4 p-3 sm:p-4 rounded-xl bg-white/40 border border-white/50 shadow-sm`}>
                         <p className={`text-[11px] sm:text-xs font-bold opacity-90 ${t.text} leading-relaxed`}>
                           💡 観測のヒント<br/>
                           フロントはその日の気分でよく揺らぎますが、スコアの低い【バックス】は何度実施してもあまり変わらない傾向があります。<br/>
                           「心の体温計」として、気になった時にまた観測してみてくださいね。
                         </p>
                         <div className={`mt-3 pt-3 border-t border-white/30 flex items-center gap-2 text-[10px] sm:text-[11px] font-medium opacity-80 ${t.text}`}>
                           <span className="text-xs">📱</span> ブラウザのメニュー（︙）から【ホーム画面に追加】しておくと毎日の観測に便利です。
                         </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="px-4 sm:px-8 pb-6 sm:pb-8 space-y-3 sm:space-y-4" data-html2canvas-ignore="true">
                  <button onClick={handleShare} disabled={isSharing} className={`flex items-center justify-center gap-2 w-full py-3 sm:py-4 px-4 sm:px-6 rounded-xl font-bold transition-all text-sm md:text-base text-white shadow-md active:scale-95 ${isSharing ? 'bg-slate-400 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700'}`}>
                    <ShareIcon /> {isSharing ? '画像を作成中...' : '今のフロントを保存・シェアする'}
                  </button>
                  
                  <button onClick={startQuiz} className={`flex items-center justify-center gap-2 w-full py-3 sm:py-4 px-4 sm:px-6 rounded-xl font-bold transition-all text-sm md:text-base ${t.btnBg} ${t.text} ${t.btnHover}`}>
                    <RefreshCwIcon /> もう一度観る
                  </button>

                  {/* ▼ RIESM Lite & 完全版への導線エリア ▼ */}
                  <div className={`mt-6 p-4 sm:p-5 rounded-xl border-2 ${t.border} bg-white/80 text-left shadow-sm`}>
                    <p className={`text-[13px] md:text-sm font-medium mb-3 leading-relaxed ${t.text}`}>
                      完全版RIESM™では、4つのモードに加えて、<br className="hidden sm:block"/>
                      <span className="font-bold">「どんな役割で力を発揮しやすいか」</span>まで整理できます。
                    </p>
                    <div className="space-y-2">
                      <a href="https://ninin-cc.github.io/rl/" target="_blank" rel="noopener noreferrer" className={`flex items-center justify-between p-3 bg-white rounded-lg border shadow-sm hover:shadow transition-all group ${t.border}`}>
                        <div>
                          <div className={`text-[10px] sm:text-[11px] font-bold mb-0.5 opacity-70 ${t.text}`}>まずは気軽に知りたい方は</div>
                          <div className={`text-[13px] sm:text-sm font-bold ${t.text}`}>🌈 RIESM™ cockpit Liteへ</div>
                        </div>
                        <div className={`opacity-50 group-hover:opacity-100 ${t.text}`}><ExternalLinkIcon /></div>
                      </a>
                      <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className={`flex items-center justify-between p-3 rounded-lg shadow-sm hover:shadow transition-all group text-white bg-gradient-to-r ${t.header}`}>
                        <div>
                          <div className="text-[10px] sm:text-[11px] font-bold mb-0.5 opacity-90">仕事や人間関係で本格的に活かしたい方は</div>
                          <div className="text-[13px] sm:text-sm font-bold">🌈 完全版RIESM™へ</div>
                        </div>
                        <div className="opacity-80 group-hover:opacity-100"><ExternalLinkIcon /></div>
                      </a>
                    </div>
                  </div>
                  {/* ▲ 導線エリア ここまで ▲ */}

                  <div className="text-center pt-2 sm:pt-3 space-y-2">
                    <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className={`text-[11px] sm:text-xs font-bold opacity-60 hover:opacity-100 transition-opacity inline-flex items-center gap-1 ${t.text}`}>
                      🌈RIESM™について詳しく知る(note) <ExternalLinkIcon />
                    </a>
                    <div>
                      <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className="text-[10px] sm:text-xs text-slate-400 font-medium hover:text-slate-600 transition-colors">
                        © 2026 ninin consulting＆counseling
                      </a>
                    </div>
                  </div>
                </div>
                {/* --- ▲▲▲ キャプチャしない範囲ここまで ▲▲▲ --- */}

              </div>
            </div>
          </div>
        );
      }

      const q = currentQuestions[currentIndex];
      const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
      const labelStrong = q.isSituation ? "に、強く惹かれる" : "と、強くそう思う";
      const labelMid = q.isSituation ? "に、惹かれる" : "と、そう思う";

      const topType = q.options[0].type;
      const bottomType = q.options[1].type;
      const topColorRGB = bgColors[topType];
      const bottomColorRGB = bgColors[bottomType];

      return (
        <div className="min-h-screen flex items-center justify-center p-2 sm:p-4 bg-slate-50 transition-colors duration-1000">
          <div className="max-w-md w-full bg-white/90 rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border border-white/60 animate-fade-in relative backdrop-blur-2xl">
            
            {/* 背景グラデーション: 上 */}
            <div 
              className="absolute top-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${100 - hoverPos + 10}%`, 
                background: `linear-gradient(to bottom, rgba(${topColorRGB}, 0.35) 0%, rgba(${topColorRGB}, 0) 100%)`,
              }}
            ></div>

            {/* 背景グラデーション: 下 */}
            <div 
              className="absolute bottom-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${hoverPos + 10}%`, 
                background: `linear-gradient(to top, rgba(${bottomColorRGB}, 0.35) 0%, rgba(${bottomColorRGB}, 0) 100%)`,
              }}
            ></div>

            <div className="relative z-20 h-1.5 bg-slate-100/50 w-full">
              <div className="h-full bg-indigo-500 transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
            </div>

            <div className="relative z-10 p-3 sm:p-8 pb-2 sm:pb-6">
              <div className="text-[11px] sm:text-sm font-bold text-slate-500 mb-2 sm:mb-4 tracking-wider flex justify-between drop-shadow-sm px-1">
                <span>QUESTION</span>
                <span>{currentIndex + 1} / {currentQuestions.length}</span>
              </div>
              
              <h2 className="text-base sm:text-xl font-bold text-slate-800 mb-3 sm:mb-6 leading-relaxed bg-white p-3 sm:p-6 rounded-xl sm:rounded-2xl shadow-md border border-slate-200">
                {q.text}
              </h2>
              
              <div className="space-y-1 sm:space-y-2 animate-fade-in relative z-10">
                <button 
                  onMouseEnter={() => setHoverPos(15)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[0].type, weight: 4 }])} 
                  className="w-full text-left py-2.5 px-3 sm:p-4 rounded-xl border border-white/60 bg-white/50 hover:bg-white/80 transition-all text-slate-900 font-bold shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight text-[13px] sm:text-base"
                >
                  【{q.options[0].text}】{labelStrong}
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(30)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[0].type, weight: 3 }])} 
                  className="w-full text-left py-2 px-3 sm:p-3.5 rounded-xl border border-white/60 bg-white/60 hover:bg-white/90 transition-all text-slate-800 font-medium shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight text-[13px] sm:text-base"
                >
                  【{q.options[0].text}】{labelMid}
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(45)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[0].type, weight: 2 }, { type: q.options[1].type, weight: 1 }])} 
                  className="w-full text-left py-1.5 px-2.5 sm:p-3 rounded-xl border border-white/60 bg-white/70 hover:bg-white transition-all text-slate-700 shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight text-[11px] sm:text-sm"
                >
                  どちらかといえば【{q.options[0].text}】だが、【{q.options[1].text}】もある
                </button>
                
                <div className="flex items-center justify-center py-0.5 sm:py-2 opacity-50">
                  <div className="h-px bg-slate-400 w-1/3"></div>
                  <span className="text-[9px] sm:text-xs text-slate-500 px-3 font-bold tracking-widest">OR</span>
                  <div className="h-px bg-slate-400 w-1/3"></div>
                </div>

                <button 
                  onMouseEnter={() => setHoverPos(55)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[1].type, weight: 2 }, { type: q.options[0].type, weight: 1 }])} 
                  className="w-full text-left py-1.5 px-2.5 sm:p-3 rounded-xl border border-white/60 bg-white/70 hover:bg-white transition-all text-slate-700 shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight text-[11px] sm:text-sm"
                >
                  どちらかといえば【{q.options[1].text}】だが、【{q.options[0].text}】もある
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(70)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[1].type, weight: 3 }])} 
                  className="w-full text-left py-2 px-3 sm:p-3.5 rounded-xl border border-white/60 bg-white/60 hover:bg-white/90 transition-all text-slate-800 font-medium shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight text-[13px] sm:text-base"
                >
                  【{q.options[1].text}】{labelMid}
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(85)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[1].type, weight: 4 }])} 
                  className="w-full text-left py-2.5 px-3 sm:p-4 rounded-xl border border-white/60 bg-white/50 hover:bg-white/80 transition-all text-slate-900 font-bold shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight text-[13px] sm:text-base"
                >
                  【{q.options[1].text}】{labelStrong}
                </button>
              </div>

              <div className="mt-2 sm:mt-6 flex items-center justify-between border-t border-slate-200 pt-2 sm:pt-4 relative z-10 px-1">
                <button 
                  onClick={handleBack} 
                  disabled={currentIndex === 0} 
                  className={`flex items-center gap-1 text-[13px] sm:text-base font-extrabold text-slate-800 transition-opacity ${currentIndex === 0 ? 'opacity-30 cursor-not-allowed' : 'hover:opacity-70'}`}
                >
                  <ArrowLeftIcon /> もどる
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
