    // ==========================================
    // メインアプリケーション
    // ==========================================
    function App() {
      const [started, setStarted] = useState(false);
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [resultType, setResultType] = useState(null);
      const [resultScores, setResultScores] = useState(null);
      const [isSharing, setIsSharing] = useState(false);
      const [toastMessage, setToastMessage] = useState('');
      
      // モード切替 (TOPページのみで変更)
      const [colorMode, setColorMode] = useState('natural');
      
      // 2度タップ用のステート
      const [selectedChoiceIndex, setSelectedChoiceIndex] = useState(null);
      const [tempSelectedChoiceIndex, setTempSelectedChoiceIndex] = useState(null);

      const [isPractice, setIsPractice] = useState(false);
      const [tutorialCompleted, setTutorialCompleted] = useState(false);
      
      const [hoverPos, setHoverPos] = useState(50); // 0〜100

      useEffect(() => {
        if (started && !resultType) {
          setHoverPos(50);
          setSelectedChoiceIndex(null);
          setTempSelectedChoiceIndex(null);
        }
      }, [currentIndex, started, resultType, isPractice]);

      const shuffleArray = (array) => {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      };

      const generateTodayQuestions = useCallback(() => {
        const getRandom = (arr, n) => shuffleArray([...arr]).slice(0, n);
        let textSelected = [
          ...getRandom(questionsPool.filter(q => q.group === 'A'), 3),
          ...getRandom(questionsPool.filter(q => q.group === 'B'), 3),
          ...getRandom(questionsPool.filter(q => q.group === 'C'), 3),
          ...getRandom(questionsPool.filter(q => q.group === 'D'), 3),
        ];
        textSelected = shuffleArray(textSelected).map(q => ({ ...q, options: shuffleArray(q.options) }));
        let situationSelected = shuffleArray(situationQuestionsPool).slice(0, 3).map(q => ({ ...q, options: shuffleArray(q.options) }));
        return [...textSelected, ...situationSelected];
      }, []);

      const startQuiz = () => {
        const questions = generateTodayQuestions();
        setCurrentQuestions(questions);
        setCurrentIndex(0);
        setAnswers([]);
        setResultType(null);
        setResultScores(null);
        setSelectedChoiceIndex(null);
        setTempSelectedChoiceIndex(null);
        setIsPractice(false);
        setTutorialCompleted(false);
        setStarted(true);
      };

      const startTutorial = () => {
        setCurrentQuestions([]);
        setCurrentIndex(0);
        setAnswers([]);
        setResultType(null);
        setResultScores(null);
        setSelectedChoiceIndex(null);
        setTempSelectedChoiceIndex(null);
        setIsPractice(true);
        setTutorialCompleted(false);
        setHoverPos(50);
        setStarted(true);
      };

      const returnToTop = () => {
        setStarted(false);
        setIsPractice(false);
        setTutorialCompleted(false);
        setSelectedChoiceIndex(null);
        setTempSelectedChoiceIndex(null);
        setHoverPos(50);
      };

      const handleAnswer = useCallback((scoreUpdates) => {
        const newAnswers = [...answers, scoreUpdates];
        setAnswers(newAnswers);
        if (currentIndex < currentQuestions.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateResult(newAnswers);
        }
      }, [answers, currentIndex, currentQuestions]);

      const handleBack = () => {
        if (isPractice) return;
        if (currentIndex > 0) {
          setSelectedChoiceIndex(null);
          setTempSelectedChoiceIndex(null);
          setCurrentIndex(currentIndex - 1);
          setAnswers(answers.slice(0, -1));
        }
      };

      // --- 6択ボタン用 二度タップ選択の処理 ---
      const handleChoiceSelect = (choice) => {
        if (selectedChoiceIndex !== null) return; 

        if (tempSelectedChoiceIndex !== choice.index) {
          // 1回目のタップ (仮選択)
          setTempSelectedChoiceIndex(choice.index);
        } else {
          // 2回目のタップ (本決定)
          setSelectedChoiceIndex(choice.index);
          setTempSelectedChoiceIndex(null);
          
          window.setTimeout(() => {
            if (isPractice) {
              setTutorialCompleted(true);
              return;
            }
            handleAnswer(choice.scoreUpdates);
          }, 350); 
        }
      };

      const calculateResult = (finalAnswers) => {
        const scores = { W: 0, K: 0, N: 0, A: 0 };
        finalAnswers.forEach(updates => {
          updates.forEach(update => { if (scores[update.type] !== undefined) scores[update.type] += update.weight; });
        });
        const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
        const maxType = sortedTypes[0];
        const maxScore = scores[maxType];
        const secondType = sortedTypes[1];
        const secondScore = scores[secondType];
        const minType = sortedTypes[3];

        let front = maxType; 
        let isDouble = false;
        let frontKey = "";

        if (maxScore > 0) {
          const ratio = secondScore / maxScore;
          if (ratio >= 0.85) {
            isDouble = true;
            frontKey = [maxType, secondType].sort().join('_');
          }
        }

        setResultScores(scores);
        const detailIndex = Math.floor(Math.random() * 3);
        setResultType({ front: front, second: secondType, back: minType, isDouble: isDouble, frontKey: frontKey, detailIndex: detailIndex });
      };

      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 5000);
      };

      const handleShare = async () => {
        setIsSharing(true);
        const element = document.getElementById('capture-area');
        if (!element || !window.html2canvas) {
          showToast('エラー：画像の生成に失敗しました。');
          setIsSharing(false);
          return;
        }
        
        try {
          await new Promise(resolve => setTimeout(resolve, 300));
          const canvas = await window.html2canvas(element, { 
            scale: 2, 
            useCORS: true, 
            backgroundColor: '#ffffff',
            logging: false,
            onclone: (clonedDoc) => {
              const watermark = clonedDoc.getElementById('capture-watermark');
              if (watermark) {
                watermark.style.display = 'block';
              }
            }
          });
          
          const dataUrl = canvas.toDataURL('image/png');
          const blob = await (await fetch(dataUrl)).blob();
          const file = new File([blob], 'riesm_mini_result.png', { type: 'image/png' });
          
          const shareText = "約３分！やるたびに設問が替わり今の自分を感じれる #RIESM_mini🌈\n私のいまの「心のフロント」はこんな感じでした✨皆さんも体験してみて！🔍#自己理解\nhttps://ninin-cc.github.io/rm/";
          
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({ text: shareText, files: [file] });
            } catch (shareError) {
              console.log('Share canceled or failed:', shareError);
            }
          } else {
            fallbackShare(shareText, dataUrl);
          }
        } catch (error) {
          console.error('Share failed:', error);
          showToast('エラー：画像の生成に失敗しました。もう一度お試しください。');
        } finally {
          setIsSharing(false);
        }
      };

      const fallbackShare = (text, dataUrl) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          textArea.style.position = "fixed";
          textArea.style.left = "-999999px";
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          
          const link = document.createElement('a');
          link.download = 'riesm_mini_result.png';
          link.href = dataUrl;
          link.click();
          
          showToast('結果画像を保存し、投稿文をコピーしました！\nSNSに画像を添付して投稿してください。');
        } catch (err) {
          console.error('Fallback copy/download failed', err);
          showToast('画像の保存に失敗しました。');
        }
      };

      // ==========================================
      // 画面描画: トップ（未開始）
      // ==========================================
      if (!started) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 flex-col selection:bg-indigo-100">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-6 sm:p-8 text-center animate-fade-in border border-slate-100 relative overflow-hidden">
              
              {/* 装飾用背景サークル */}
              <div className="absolute -top-20 -right-20 w-40 h-40 bg-indigo-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>
              <div className="absolute -bottom-20 -left-20 w-40 h-40 bg-pink-50 rounded-full blur-3xl opacity-60 pointer-events-none"></div>

              {/* ▼ タイトルロゴ（画像の色・配置に統一） ▼ */}
              <div className="relative z-10 mb-6 flex items-center justify-center gap-4">
                <div className="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl shadow-lg flex flex-none items-center justify-center transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                  <span className="text-3xl sm:text-4xl">🌈</span>
                </div>
                <h1 className="text-left text-3xl sm:text-4xl font-extrabold text-slate-800 tracking-tight">RIESM™ mini</h1>
              </div>

              {/* ▼ ナチュラル/カラフル 切替エリア ▼ */}
              <div className="flex justify-center gap-3 sm:gap-4 mb-8 relative z-10">
                <button 
                  onClick={() => setColorMode('natural')} 
                  className={`flex items-center gap-1.5 px-5 py-2 sm:px-6 sm:py-2.5 rounded-full text-[13px] sm:text-sm transition-all shadow-sm border border-slate-200 ${
                    colorMode === 'natural' 
                      ? 'bg-white text-slate-800 font-extrabold shadow-md' 
                      : 'bg-white text-slate-500 font-bold hover:bg-slate-50'
                  }`}
                >
                  🌿 ナチュラル
                </button>
                <button 
                  onClick={() => setColorMode('colorful')} 
                  className={`flex items-center gap-1.5 px-5 py-2 sm:px-6 sm:py-2.5 rounded-full text-[13px] sm:text-sm transition-all shadow-sm border border-slate-200 ${
                    colorMode === 'colorful' 
                      ? 'bg-white text-slate-800 font-extrabold shadow-md' 
                      : 'bg-white text-slate-500 font-bold hover:bg-slate-50'
                  }`}

                  🎨 カラフル

              </p>
              
              <div className="relative z-10 space-y-4 mb-10">
                <button onClick={startTutorial} className="w-full py-4 px-6 bg-white text-slate-700 rounded-xl font-bold text-base sm:text-lg hover:bg-slate-50 transition-all shadow-sm hover:shadow-md active:scale-[0.98] border-2 border-slate-200 flex justify-center items-center gap-2">
                  <span>チュートリアル</span>
                </button>
                <button onClick={startQuiz} className={`w-full py-4 px-6 rounded-xl font-bold text-base sm:text-lg transition-all shadow-md hover:shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 ${
                  colorMode === 'colorful'
                    ? 'bg-gradient-to-r from-amber-400 to-pink-500 text-white hover:opacity-90'
                    : 'bg-gradient-to-r from-emerald-400 to-lime-400 text-emerald-950 hover:opacity-90'
                }`}>
                  <span>いまの自分を観る</span>

                <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className="text-xs font-bold text-slate-400 hover:text-slate-600 transition-colors inline-flex items-center gap-1">

      // ==========================================
      // 画面描画: 結果画面
      // ==========================================
      if (resultType) {

        if (resultType.isDouble) {
          const frontData = resultsData[resultType.front];

          const themeKey = resultType.frontKey;
          
          result = {
            title: `${frontData.title} ＆ ${secondData.title}`,
            subTitle: `（${frontData.subTitle.replace(/[（）]/g, '')} × ${secondData.subTitle.replace(/[（）]/g, '')}）`,

            theme: doubleThemes[themeKey] || frontData.theme

        } else {

        }

        const t = result.theme;
        const backResult = backsData[resultType.back];

        return (

                          const maxScore = Math.max(...Object.values(resultScores));
                          const percent = maxScore > 0 ? Math.round(30 + (score / maxScore) * 70) : 30;

                          const labels = { W: 'ワンダー', K: 'キーパー', N: 'ナーチャー', A: 'アダプター' };
                          return (
                            <div key={type} className="flex items-center gap-3">
                              <div className="w-6 flex justify-center">
                                <ModeIcon type={type} className={`w-5 h-5 ${t.textLight}`} />
                              </div>
                              <div className={`w-16 text-left text-xs font-bold ${t.textLight}`}>{labels[type]}</div>
                              <div className="flex-1 h-3 sm:h-3.5 bg-slate-200/70 rounded-full overflow-hidden">
                                <div className={`h-full ${barColors[type]} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${percent}%` }}></div>
                              </div>
                              <div className={`w-9 text-right text-xs font-bold ${t.text}`}>{percent}%</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    {/* ウォーターマーク（キャプチャ時のみ表示） */}
                    <div id="capture-watermark" style={{ display: 'none' }} className="text-center mt-6 pb-2">
                      <p className="text-xs font-bold text-slate-500 mb-2">

                      </p>

                      </p>
                    </div>
                  </div>
                </div>
                {/* --- ▲▲▲ ここまでキャプチャ範囲 ▲▲▲ --- */}

                <div className="px-5 sm:px-8 pb-0" data-html2canvas-ignore="true">
                  <div className={`rounded-2xl p-5 sm:p-7 mb-5 border border-white shadow-sm ${t.cardBg}`}>
                    <p className={`leading-relaxed text-[14px] sm:text-base font-medium whitespace-pre-line ${t.text}`}>
                      {result.detail[resultType.detailIndex]}
                    </p>
                  </div>
                </div>

                <div className="px-5 sm:px-8 pb-5 space-y-3 sm:space-y-4" data-html2canvas-ignore="true">
                  <button onClick={handleShare} disabled={isSharing} className={`flex items-center justify-center gap-2 w-full py-4 px-6 rounded-xl font-bold transition-all text-sm sm:text-base text-white shadow-md hover:shadow-lg active:scale-[0.98] ${isSharing ? 'bg-slate-400 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700'}`}>

                  </button>
                  
                  <button onClick={startQuiz} className={`flex items-center justify-center gap-2 w-full py-4 px-6 rounded-xl font-bold transition-all text-sm sm:text-base border-2 border-transparent active:scale-[0.98] ${t.btnBg} ${t.text} ${t.btnHover}`}>
                    <RefreshCwIcon /> もう一度観る
                  </button>

                  {/* 完全版への導線 */}
                  <div className={`mt-8 p-5 sm:p-6 rounded-2xl border-2 ${t.border} bg-white text-left shadow-sm hover:shadow-md transition-shadow`}>
                    <p className={`text-[13px] sm:text-sm font-medium mb-4 leading-relaxed ${t.text}`}>
                      完全版RIESM™では、4つのモードに加えて、6つの興味の蛇口。そして24の役割「あなただけのコックピット」により<br className="hidden sm:block"/>
                      <span className="font-bold bg-gradient-to-r from-indigo-100 via-purple-100 to-pink-100 px-1.5 py-0.5 rounded">「どんな役割で力を発揮しやすいか・どうしたら自然にラクにできるのか？」</span>まで整理できます。
                    </p>
                    <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className={`flex items-center justify-between p-4 rounded-xl shadow-sm hover:shadow-md transition-all group text-white bg-gradient-to-r ${t.header}`}>
                      <div>
                        <div className="text-[10px] sm:text-xs font-bold mb-1 opacity-90">仕事や人間関係で本格的に活かしたい方は</div>
                        <div className="text-sm sm:text-base font-bold">🌈 完全版RIESM™へ</div>
                      </div>
                      <div className="opacity-80 group-hover:opacity-100 transform group-hover:translate-x-1 transition-all"><ExternalLinkIcon /></div>
                    </a>
                  </div>
                </div>

                <div className="px-5 sm:px-8 pb-8" data-html2canvas-ignore="true">
                  <div className={`rounded-2xl p-5 sm:p-7 mb-6 border border-white shadow-sm ${t.cardBg}`}>
                    <h4 className={`font-bold text-sm sm:text-base mb-4 opacity-90 ${t.text} flex items-center gap-2`}>
                      <span className="bg-white/50 p-1.5 rounded-lg">▼</span> バックスについて
                    </h4>
                    <p className={`text-[13px] sm:text-sm font-medium opacity-80 whitespace-pre-line leading-relaxed ${t.text}`}>
                      {backResult.desc}

                    <div className={`mt-6 p-4 sm:p-5 rounded-xl bg-white/60 border border-white shadow-sm`}>
                       <p className={`text-[11px] sm:text-xs font-bold opacity-90 leading-relaxed ${t.text}`}>
                         💡 観測のヒント：【バックス】は何度実施してもあまり変わらない傾向があります。自分が何を避け、何を守ろうとしているのか。何度か観測する中で、そんな自分との対話も楽しんでみてくださいね。
                       </p>
                    </div>
                  </div>

                  <div className="text-center pt-2 space-y-3">
                    <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className={`text-xs font-bold opacity-60 hover:opacity-100 transition-opacity inline-flex items-center gap-1 ${t.text}`}>
                      🌈RIESM™について詳しく知る(note) <ExternalLinkIcon />
                    </a>
                    <div>
                      <a href="https://ninin-cc.github.io/riesm.html" target="_blank" rel="noopener noreferrer" className={`text-[10px] sm:text-xs font-medium opacity-50 hover:opacity-100 transition-opacity ${t.text}`}>
                        © 2026 ninin consulting＆counseling
                      </a>
                    </div>
                  </div>
                </div>
                {/* --- ▲▲▲ キャプチャしない範囲ここまで ▲▲▲ --- */}
              </div>
            </div>
          </div>
        );
      }

      // ==========================================
      // 画面描画: 質問画面
      // ==========================================
      const q = isPractice ? practiceQuestion : currentQuestions[currentIndex];
      const progress = isPractice ? 4 : ((currentIndex + 1) / currentQuestions.length) * 100;
      const labelStrong = q.isSituation ? "に、強く惹かれる" : "と、強くそう思う";
      const labelMid = q.isSituation ? "に、惹かれる" : "と、そう思う";

      const topType = q.options[0].type;
      const bottomType = q.options[1].type;
      
      // カラーモードによる色の出し分け
      const topColorRGB = colorMode === 'colorful' ? bgColors[topType] : '110, 231, 183'; // emerald-300
      const bottomColorRGB = colorMode === 'colorful' ? bgColors[bottomType] : '190, 242, 100'; // lime-300
      
      const answerChoices = [
        { index: 0, hoverPos: 15, caption: 'かなりA', topSize: 'w-10 h-10 sm:w-12 sm:h-12', bottomSize: null, scoreUpdates: [{ type: topType, weight: 4 }], ariaLabel: `【${q.options[0].text}】${labelStrong}` },
        { index: 1, hoverPos: 30, caption: 'A', topSize: 'w-8 h-8 sm:w-10 sm:h-10', bottomSize: null, scoreUpdates: [{ type: topType, weight: 3 }], ariaLabel: `【${q.options[0].text}】${labelMid}` },
        { index: 2, hoverPos: 45, caption: 'ややA', topSize: 'w-7 h-7 sm:w-8 sm:h-8', bottomSize: 'w-4 h-4 sm:w-5 sm:h-5', scoreUpdates: [{ type: topType, weight: 2 }, { type: bottomType, weight: 1 }], ariaLabel: `どちらかといえば【${q.options[0].text}】` },
        { index: 3, hoverPos: 55, caption: 'ややB', topSize: 'w-4 h-4 sm:w-5 sm:h-5', bottomSize: 'w-7 h-7 sm:w-8 sm:h-8', scoreUpdates: [{ type: bottomType, weight: 2 }, { type: topType, weight: 1 }], ariaLabel: `どちらかといえば【${q.options[1].text}】` },
        { index: 4, hoverPos: 70, caption: 'B', topSize: null, bottomSize: 'w-8 h-8 sm:w-10 sm:h-10', scoreUpdates: [{ type: bottomType, weight: 3 }], ariaLabel: `【${q.options[1].text}】${labelMid}` },
        { index: 5, hoverPos: 85, caption: 'かなりB', topSize: null, bottomSize: 'w-10 h-10 sm:w-12 sm:h-12', scoreUpdates: [{ type: bottomType, weight: 4 }], ariaLabel: `【${q.options[1].text}】${labelStrong}` }
      ];

      return (
        <div className="min-h-screen flex items-center justify-center p-3 sm:p-4 bg-slate-50 transition-colors duration-1000 selection:bg-indigo-100">

            {/* 背景グラデーション: 上 */}

              className="absolute top-0 left-0 w-full transition-all duration-700 ease-in-out pointer-events-none"
              style={{ 
                height: `${100 - hoverPos + 10}%`, 
                background: `linear-gradient(to bottom, rgba(${topColorRGB}, 0.25) 0%, rgba(${topColorRGB}, 0) 100%)`,

            {/* 背景グラデーション: 下 */}
            <div 
              className="absolute bottom-0 left-0 w-full transition-all duration-700 ease-in-out pointer-events-none"
              style={{ 
                height: `${hoverPos + 10}%`,

            ></div>

            {/* プログレスバー */}
            <div className="relative z-20 h-2 bg-slate-100/50 w-full">
              <div className="h-full bg-indigo-500/80 transition-all duration-500 ease-out" style={{ width: `${progress}%` }}></div>
            </div>

            <div className="relative z-10 p-4 sm:p-8 pb-4 sm:pb-6">
              <div className="text-[11px] sm:text-xs font-bold text-slate-400 mb-3 sm:mb-4 tracking-[0.2em] flex justify-between px-2">
                <span>{isPractice ? 'PRACTICE' : 'QUESTION'}</span>
                <span>{isPractice ? '練習' : `${currentIndex + 1} / ${currentQuestions.length}`}</span>
              </div>
              
              {/* ▼ ノート風背景を適用した設問エリア ▼ */}
              <div className="notebook-bg min-h-[6rem] sm:min-h-[8rem] rounded-xl sm:rounded-2xl shadow-sm border border-slate-200/80 mb-4 sm:mb-6 w-full flex items-center relative z-10">
                <div className="px-6 sm:px-8 py-5 w-full">
                  <p className="text-[15px] sm:text-[17px] font-bold text-slate-700 leading-[32px] tracking-wide relative z-10 text-center">
                    {q.text}
                  </p>
                </div>
              </div>
              
              <div className="space-y-4 sm:space-y-5 animate-fade-in relative z-10">
                {/* 選択肢 A (付箋風デザイン) */}
                <div className="relative h-full w-full rounded-xl sm:rounded-2xl border border-white/70 bg-white/70 shadow-sm backdrop-blur-md flex items-center min-h-[4.5rem] overflow-hidden mb-2">
                  <div
                    className="absolute top-0 left-0 h-full w-8 sm:w-10 flex items-center justify-center text-sm sm:text-base font-black text-white shadow-md z-10"
                    style={{ backgroundColor: `rgb(${topColorRGB})` }}
                  >
                    A
                  </div>
                  {/* px-10 sm:px-12 と relative z-20 でラベルを無視して枠のセンターに配置 */}
                  <div className="w-full py-4 sm:py-5 flex items-center justify-center px-10 sm:px-12">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-slate-900 text-center relative z-20">
                      {q.options[0].text}
                    </p>
                  </div>
                </div>

                {/* スケール（6択選択ボタン） */}
                <div className="relative rounded-3xl border border-white bg-white/60 p-2 sm:p-3 shadow-[inset_0_2px_10px_rgba(0,0,0,0.03)] backdrop-blur-md">
                  <div className="grid grid-cols-6 items-start gap-1 sm:gap-1.5">
                    {answerChoices.map(choice => {
                      const isSelected = selectedChoiceIndex === choice.index;
                      const isTempSelected = tempSelectedChoiceIndex === choice.index;
                      const isDimmed = (selectedChoiceIndex !== null && !isSelected) || (tempSelectedChoiceIndex !== null && !isTempSelected);
                      const topShadow = (isSelected || isTempSelected) ? `0 0 20px 6px rgba(${topColorRGB}, 0.5)` : `0 0 8px rgba(${topColorRGB}, 0.2)`;
                      const bottomShadow = (isSelected || isTempSelected) ? `0 0 20px 6px rgba(${bottomColorRGB}, 0.5)` : `0 0 8px rgba(${bottomColorRGB}, 0.2)`;

                      return (
                        <button
                          key={choice.index}
                          type="button"
                          aria-label={choice.ariaLabel}
                          title={choice.ariaLabel}
                          disabled={selectedChoiceIndex !== null}
                          onMouseEnter={() => setHoverPos(choice.hoverPos)}
                          onMouseLeave={() => selectedChoiceIndex === null && tempSelectedChoiceIndex === null && setHoverPos(50)}

                          className={`relative group flex min-w-0 flex-col items-center rounded-2xl border py-1.5 sm:py-2 transition-all duration-300 active:scale-[0.95] disabled:cursor-default ${(isSelected || isTempSelected) ? 'border-white bg-white/95 shadow-[0_0_20px_rgba(255,255,255,0.8)] z-20' : 'border-transparent hover:bg-white/80 hover:shadow-sm z-10'} ${isDimmed ? 'opacity-30 scale-95' : ''}`}
                        >
                          {/* 2タップ決定のポップアップ（チュートリアルのみ表示） */}
                          {isPractice && isTempSelected && (
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap bg-indigo-500/95 text-white text-[10px] sm:text-xs font-bold px-3 py-1.5 rounded-full shadow-lg z-40 animate-fade-in pointer-events-none tracking-wide flex items-center gap-1.5">

                            </div>
                          )}
                          <div className="relative h-24 sm:h-28 w-full flex flex-col justify-center pointer-events-none">
                            {/* 中央の線 */}
                            <div className={`absolute top-1/2 h-px -translate-y-1/2 bg-slate-200 ${choice.index === 0 ? 'left-1/2 right-0' : choice.index === answerChoices.length - 1 ? 'left-0 right-1/2' : 'left-0 right-0'}`}></div>
                            
                            {/* キャプション */}
                            <span className={`absolute left-1/2 top-1/2 z-10 -translate-x-1/2 -translate-y-1/2 whitespace-nowrap rounded-full bg-white px-2 py-1 text-[10px] sm:text-[11px] font-black leading-none transition-all duration-300 ${(isSelected || isTempSelected) ? 'text-slate-800 shadow-md ring-2 ring-slate-100 scale-110' : 'text-slate-400 shadow-sm group-hover:text-slate-600 group-hover:shadow'}`}>
                              {choice.caption}
                            </span>
                            
                            {/* 上部の玉 (A) */}
                            {choice.topSize && (
                              <div className="absolute bottom-1/2 left-0 right-0 flex justify-center pb-2">
                                <div
                                  className={`rounded-full transition-all duration-300 ${choice.topSize} ${(isSelected || isTempSelected) ? 'riesm-orb-selected ring-4 ring-white' : 'group-hover:scale-110 group-hover:-translate-y-1'}`}
                                  style={{ backgroundColor: `rgb(${topColorRGB})`, boxShadow: topShadow }}
                                ></div>
                              </div>
                            )}
                            
                            {/* 下部の玉 (B) */}
                            {choice.bottomSize && (
                              <div className="absolute top-1/2 left-0 right-0 flex justify-center pt-2">
                                <div
                                  className={`rounded-full transition-all duration-300 ${choice.bottomSize} ${(isSelected || isTempSelected) ? 'riesm-orb-selected ring-4 ring-white' : 'group-hover:scale-110 group-hover:translate-y-1'}`}
                                  style={{ backgroundColor: `rgb(${bottomColorRGB})`, boxShadow: bottomShadow }}
                                ></div>
                              </div>
                            )}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* 選択肢 B (付箋風デザイン) */}
                <div className="relative h-full w-full rounded-xl sm:rounded-2xl border border-white/70 bg-white/70 shadow-sm backdrop-blur-md flex items-center min-h-[4.5rem] overflow-hidden mt-2">
                  {/* px-10 sm:px-12 と relative z-20 でラベルを無視して枠のセンターに配置 */}
                  <div className="w-full py-4 sm:py-5 flex items-center justify-center px-10 sm:px-12">
                    <p className="text-[13px] sm:text-base font-bold leading-relaxed text-slate-900 text-center relative z-20">
                      {q.options[1].text}
                    </p>
                  </div>
                  <div
                    className="absolute top-0 right-0 h-full w-8 sm:w-10 flex items-center justify-center text-sm sm:text-base font-black text-white shadow-md z-10"
                    style={{ backgroundColor: `rgb(${bottomColorRGB})` }}
                  >
                    B
                  </div>
                </div>
              </div>

              {/* チュートリアル完了モーダル */}
              {isPractice && tutorialCompleted && (
                <div className="absolute inset-0 z-30 flex items-center justify-center bg-slate-900/40 p-4 backdrop-blur-sm animate-fade-in">
                  <div role="dialog" aria-modal="true" className="w-full max-w-sm rounded-3xl border border-white/20 bg-white p-6 sm:p-8 text-center shadow-2xl transform scale-100 transition-transform">
                    <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                      <svg className="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <p className="mb-3 text-lg sm:text-xl font-extrabold leading-relaxed text-slate-800">
                      操作方法はバッチリです！
                    </p>
                    <p className="mb-6 text-[13px] sm:text-sm font-bold leading-relaxed text-slate-700">
                      このように自分の気持ちを素直に感じて選んで下さい。<br/>
                      <br/>
                      ここからが傾向確認設問です。<br/>
                      リラックスしてお進みください。
                    </p>
                    <button
                      onClick={startQuiz}
                      className={`w-full rounded-xl px-4 py-3 sm:py-4 text-sm sm:text-base font-bold shadow-sm transition-all active:scale-[0.98] ${
                        colorMode === 'colorful'
                          ? 'bg-gradient-to-r from-amber-400 to-pink-500 text-white hover:opacity-90'
                          : 'bg-gradient-to-r from-emerald-400 to-lime-400 text-emerald-950 hover:opacity-90'
                      }`}
                    >
                      準備はできたので開始する
                    </button>
                  </div>
                </div>
              )}

              <div className="mt-4 sm:mt-6 flex items-center justify-between pt-2 sm:pt-4 relative z-10 px-2">
                <button 
                  onClick={handleBack} 
                  disabled={isPractice || currentIndex === 0 || selectedChoiceIndex !== null} 
                  className={`flex items-center gap-1.5 text-xs sm:text-sm font-bold text-slate-500 transition-all ${isPractice || currentIndex === 0 || selectedChoiceIndex !== null ? 'opacity-30 cursor-not-allowed' : 'hover:opacity-100 hover:text-slate-800'}`}
                >
                  <ArrowLeftIcon /> ひとつ前の質問にもどる
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
