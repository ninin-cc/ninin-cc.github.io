<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIESM mini</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    /* 読み込み中のアニメーション */
    .loading-screen { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #4b5563; }
  </style>
</head>
<body class="bg-gray-50">

  <div id="error-log" style="color: red; padding: 20px; font-weight: bold; background: #fee2e2; display: none;"></div>
  
  <div id="root">
    <div class="loading-screen">
      <div>システムを読み込んでいます。数秒お待ちください...🚀</div>
    </div>
  </div>

  <script>
    // 画面が真っ白になるのを防ぐためのエラー監視
    window.onerror = function(msg, url, line, col, error) {
      var errDiv = document.getElementById('error-log');
      errDiv.style.display = 'block';
      errDiv.innerHTML = "【エラーが発生しました】<br>" + msg + "<br>※お手数ですが、この画面をスクリーンショットしてジェミーに見せてください！";
    };
  </script>

  <script type="text/babel" data-presets="react,env">
    const { useState, useRef } = React;

    // --- アイコンの設定 ---
    const IconBase = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Rocket = ({className}) => <IconBase className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></IconBase>;
    const Shield = ({className}) => <IconBase className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></IconBase>;
    const Heart = ({className}) => <IconBase className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path></IconBase>;
    const Radar = ({className}) => <IconBase className={className}><path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"></path><path d="M4 6h.01"></path><path d="M2.29 9.62A10 10 0 1 0 21.31 8.35"></path><path d="M16.24 7.76A6 6 0 1 0 8.23 16.67"></path><path d="M12 18h.01"></path><path d="M17.99 11.66A6 6 0 0 1 15.77 16.67"></path><circle cx="12" cy="12" r="2"></circle><path d="m13.41 10.59 5.66-5.66"></path></IconBase>;
    const ArrowRight = ({className}) => <IconBase className={className}><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></IconBase>;
    const ArrowLeft = ({className}) => <IconBase className={className}><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></IconBase>;
    const RefreshCw = ({className}) => <IconBase className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></IconBase>;
    const ExternalLink = ({className}) => <IconBase className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></IconBase>;
    const Sparkles = ({className}) => <IconBase className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></IconBase>;
    const Share2 = ({className}) => <IconBase className={className}><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></IconBase>;
    const Loader2 = ({className}) => <IconBase className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></IconBase>;
    const Compass = ({className}) => <IconBase className={className}><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></IconBase>;

    const loadHtml2Canvas = () => {
      return new Promise((resolve, reject) => {
        if (window.html2canvas) {
          resolve(window.html2canvas);
          return;
        }
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.onload = () => resolve(window.html2canvas);
        script.onerror = () => reject(new Error('html2canvasの読み込みに失敗しました'));
        document.head.appendChild(script);
      });
    };

    // フロントモードに関する15問
    const ALL_QUESTIONS = [
      { id: 1, format: 'tradeoff', category: 'mode', typeA: 'W', typeB: 'K', text: '新しいアイデアを思いついたとき', optA: 'まず試したくなる', optB: '実現性やリスクを考える' },
      { id: 4, format: 'tradeoff', category: 'mode', typeA: 'A', typeB: 'N', text: '初対面の人との会話', optA: '様子を見ながら慎重に入る', optB: '自然に話しかけられる' },
      { id: 5, format: 'tradeoff', category: 'mode', typeA: 'A', typeB: 'W', text: '知らないことに出会ったとき', optA: '少し警戒する', optB: 'ワクワクする' },
      { id: 9, format: 'tradeoff', category: 'mode', typeA: 'K', typeB: 'N', text: '誰かがミスしたとき', optA: '正すことが大事', optB: '気持ちを守ることが大事' },
      { id: 2, format: 'tradeoff', category: 'mode', typeA: 'K', typeB: 'W', text: '仕事での優先順位は', optA: '正確さ・確実性', optB: '面白さ・可能性' },
      { id: 8, format: 'tradeoff', category: 'mode', typeA: 'W', typeB: 'N', text: 'チームでの役割は', optA: '盛り上げる・広げる', optB: '支える・整える' },
      { id: 12, format: 'tradeoff', category: 'mode', typeA: 'A', typeB: 'K', text: '意見が対立したとき', optA: '衝突を避ける', optB: '論理で整理する' },
      { id: 3, format: 'tradeoff', category: 'mode', typeA: 'N', typeB: 'A', text: '人が悩んでいるとき', optA: '気持ちに寄り添う', optB: '状況を分析して対処を考える' },
      { id: 7, format: 'tradeoff', category: 'mode', typeA: 'N', typeB: 'W', text: '人との関わりで大事なのは', optA: '安心させること', optB: '一緒に楽しむこと' },
      { id: 10, format: 'tradeoff', category: 'mode', typeA: 'N', typeB: 'K', text: 'フィードバックするとき', optA: '相手が受け取りやすくする', optB: '正確に指摘する' },
      { id: 6, format: 'tradeoff', category: 'mode', typeA: 'W', typeB: 'A', text: '変化が起きたとき', optA: 'チャンスと感じる', optB: 'リスクを感じる' },
      { id: 11, format: 'tradeoff', category: 'mode', typeA: 'K', typeB: 'A', text: '判断するとき', optA: '正しいかどうかを重視', optB: '安全かどうかを重視' },
      { 
        id: 20, format: 'select4', category: 'mode', text: 'プライベートで、周りの人から言われて「一番嬉しい・自分らしい」と感じる言葉はどれですか？', 
        options: [
          { type: 'W', text: '「いつも面白くて、一緒にいるとワクワクするよ！」' },
          { type: 'K', text: '「いつも冷静で、いざという時に本当に頼りになるね。」' },
          { type: 'N', text: '「いつも気遣ってくれて、一緒にいると安心するよ。」' },
          { type: 'A', text: '「いつも周りをよく見ていて、細やかな配慮が助かるよ。」' }
        ]
      },
      { 
        id: 21, format: 'select4', category: 'mode', text: '心や時間に余裕がないとき、ついやってしまう「マイナスの反応」はどれに近いですか？', 
        options: [
          { type: 'W', text: '「もういいや！」と投げ出したり、一人で勝手に行動してしまう' },
          { type: 'K', text: '「それは違う」と批判的になり、つい語気が荒くなってしまう' },
          { type: 'N', text: '「自分が我慢すれば」と無理をして、人に言えず一人で抱え込んでしまう' },
          { type: 'A', text: '自分の意見を飲み込み、周りの顔色をうかがって従ってしまう' }
        ]
      },
      { 
        id: 22, format: 'select4', category: 'mode', text: 'あなたが一番「エネルギーが湧いてくる」のはどんな状況ですか？', 
        options: [
          { type: 'W', text: '誰もやったことのない新しいアイデアや、面白そうなことを見つけたとき' },
          { type: 'K', text: '物事の筋道を立てて、問題を根本から正しく解決しようとしているとき' },
          { type: 'N', text: '困っている人を助けたり、誰かに心から喜んでもらえたとき' },
          { type: 'A', text: '周りの状況を素早く察知し、的確に空気を読んで場をうまく回せたとき' }
        ]
      }
    ];

    const RESULTS = {
      W: { name: 'ワンダー', shortEng: 'W', color: 'bg-orange-500', lightColor: 'bg-orange-50', borderColor: 'border-orange-500', textColor: 'text-orange-600', icon: Rocket, subtitle: '自由・発見・挑戦を愛する冒険家', description: 'あなたのフロントモードは「ワンダー」です。直感や好奇心を原動力に、新しい世界を切り開く力を持っています。ルーチンワークよりも、ゼロからイチを生み出す環境でこそ輝きます。あなたの「とりあえずやってみよう！」という純粋なエネルギーが、周りの空気を動かし、チームに希望の光をもたらします。', backsDescription: 'ノリとか勢いを強要されるようなシーンでは疲れやすいかもしれません。' },
      K: { name: 'キーパー', shortEng: 'K', color: 'bg-blue-900', lightColor: 'bg-blue-50', borderColor: 'border-blue-900', textColor: 'text-blue-900', icon: Shield, subtitle: '信念・論理・規律を重んじる守護者', description: 'あなたのフロントモードは「キーパー」です。荒波の中でも正確なコンパスを持ち、論理的な分析と計画でチームを安全に導く力があります。感情論に流されず、「どうすべきか」を冷静に判断できる存在です。あなたのその誠実さと厳しさは、大切なものを守るための深い「愛」と「責任感」に基づいています。', backsDescription: 'ルールを守らせるような役割や、厳格な進行を求められるシーンでは疲れやすいかもしれません。' },
      N: { name: 'ナーチャー', shortEng: 'N', color: 'bg-pink-500', lightColor: 'bg-pink-50', borderColor: 'border-pink-500', textColor: 'text-pink-600', icon: Heart, subtitle: '保護・調和を大切にする癒やしの泉', description: 'あなたのフロントモードは「ナーチャー」です。誰かの笑顔のために心を砕き、チームに安心感と温かさをもたらすオアシスのような存在です。他者の感情の機微を察知し、ありのままを受容するその力は、人が安心して挑戦し、生きていくために不可欠な「安全基地」となります。', backsDescription: '気遣いを長い時間しないといけないシーンでは疲れやすいかもしれません。' },
      A: { name: 'アダプター', shortEng: 'A', color: 'bg-sky-400', lightColor: 'bg-sky-50', borderColor: 'border-sky-400', textColor: 'text-sky-700', icon: Radar, subtitle: '洞察・適応・安全を確保するレーダー', description: 'あなたのフロントモードは「アダプター」です。周囲の環境や人の感情を瞬時にスキャンし、波風を立てずに的確に対応する力を持っています。あなたのその慎重さと細やかな配慮が、見えないところでチームを危機から守っています。確かな手順と安心できる環境があれば、最強の実務能力を発揮します。', backsDescription: '空気を読んで人に合わせなくてはいけないシーンでは疲れやすいかもしれません。' },
    };

    function App() {
      const [step, setStep] = useState('start');
      const [currentIndex, setCurrentIndex] = useState(0);
      
      const [modeScores, setModeScores] = useState({ W: 0, K: 0, N: 0, A: 0 });
      
      const [history, setHistory] = useState([]);
      const [resultTypes, setResultTypes] = useState([]);
      const [isGeneratingImage, setIsGeneratingImage] = useState(false);
      
      // 画像化するためのRef
      const modeRef = useRef(null);

      const [questions, setQuestions] = useState(ALL_QUESTIONS);

      const startQuiz = () => {
        setModeScores({ W: 0, K: 0, N: 0, A: 0 });
        setHistory([]);
        setCurrentIndex(0);
        
        const tradeoffs = ALL_QUESTIONS.filter(q => q.format === 'tradeoff').sort(() => Math.random() - 0.5);
        const directs = ALL_QUESTIONS.filter(q => q.format !== 'tradeoff').sort(() => Math.random() - 0.5);
        setQuestions([...tradeoffs, ...directs]);
        setStep('question');
      };

      const handleAnswer = (choice, value, directType = null) => {
        const currentQ = questions[currentIndex];
        const format = currentQ.format || 'tradeoff';
        
        setHistory([...history, { modeScores }]);
        
        let newModeScores = { ...modeScores };

        if (format === 'select4') {
          newModeScores[directType] += 1;
        } else {
          if (choice === 'A') newModeScores[currentQ.typeA] += value;
          else if (choice === 'B') newModeScores[currentQ.typeB] += value;
        }

        setModeScores(newModeScores);

        if (currentIndex < ALL_QUESTIONS.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateResult(newModeScores);
        }
      };

      const handleBack = () => {
        if (currentIndex > 0) {
          const prevScores = history[history.length - 1];
          setModeScores(prevScores.modeScores);
          setHistory(history.slice(0, -1));
          setCurrentIndex(currentIndex - 1);
        }
      };

      const calculateResult = (finalModeScores) => {
        const maxScore = Math.max(...Object.values(finalModeScores));
        const topTypes = Object.keys(finalModeScores).filter(type => finalModeScores[type] === maxScore);
        
        if (maxScore === 0) setResultTypes(['A']); 
        else setResultTypes(topTypes);
        
        setStep('result');
      };

      const getRelativePercentage = (score) => {
        const MAX_POSSIBLE_SCORE = 15; 
        const percentage = 30 + (score / MAX_POSSIBLE_SCORE) * 70;
        return Math.round(Math.min(percentage, 100)); 
      };

      const modeChartData = [
        { id: 'W', name: RESULTS.W.name, score: modeScores.W, percentage: getRelativePercentage(modeScores.W), color: RESULTS.W.color },
        { id: 'K', name: RESULTS.K.name, score: modeScores.K, percentage: getRelativePercentage(modeScores.K), color: RESULTS.K.color },
        { id: 'N', name: RESULTS.N.name, score: modeScores.N, percentage: getRelativePercentage(modeScores.N), color: RESULTS.N.color },
        { id: 'A', name: RESULTS.A.name, score: modeScores.A, percentage: getRelativePercentage(modeScores.A), color: RESULTS.A.color },
      ];
      const sortedModeChartData = [...modeChartData].sort((a, b) => b.percentage - a.percentage);

      // --- ランダムシェアテキスト対応＆1枚出力 ---
      const handleShare = async () => {
        if (isGeneratingImage) return;
        setIsGeneratingImage(true);
        try {
          const html2canvas = await loadHtml2Canvas();
          
          const refs = [modeRef].filter(r => r.current);
          const files = [];

          for (let i = 0; i < refs.length; i++) {
            const canvas = await html2canvas(refs[i].current, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
            const dataUrl = canvas.toDataURL('image/png');
            const blob = await (await fetch(dataUrl)).blob();
            files.push(new File([blob], `riesm-mini-result.png`, { type: 'image/png' }));
          }

          // シェア文のバリエーション定義
          const shareTexts = {
            W: [
              `【私のフロントモードは「ワンダー」🚀】\n面白そうなことにはすぐ飛びつく私の「ワクワクの源」と「実は疲れること」が丸わかりに…！\nみんなのモードも教えて！👀✨\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #自己分析`,
              `【新しい世界を切り開く「ワンダー」✨】\n自分が一番自然体でいられるモードと、意外な弱点がわかってスッキリ。\nサクッとできるから、みんなもやってみて👇\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #フロントモード`
            ],
            K: [
              `【私のフロントモードは「キーパー」🛡️】\nチームを安全に導くための最適なモードが判明！\n自分の強みと「無理しがちな役割」がわかるよ👇\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #自己分析`,
              `【冷静沈着な「キーパー」タイプ！🧭】\nいつも論理的に考えちゃう私の、一番力を発揮できるモードはこれでした。\n今の自分を観るのにぴったりだから、あなたもやってみて！✨\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #フロントモード`
            ],
            N: [
              `【私のフロントモードは「ナーチャー」🌸】\n自分が一番無理なく人をサポートできる「モード」がわかったよ！\nみんなのトリセツも教えて👇\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #自己理解`,
              `【みんなの安全基地「ナーチャー」💖】\n人に寄り添うのが得意な私の、自然に輝ける場所と「実はエネルギーを使う場所」が判明！\nサクッと今の自分を観てみて👀👇\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #フロントモード`
            ],
            A: [
              `【私のフロントモードは「アダプター」📡】\n空気を読んで動く私の、一番居心地のいい「モード」はこれでした！\n意外な発見があるかも…？👇\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #自己分析`,
              `【洞察力バツグンの「アダプター」✨】\n状況に合わせて動くのが得意な私の、真の強みと「疲れる役割」がサクッとわかったよ。\nみんなもやってみてね👇\nhttps://ninin-cc.github.io/rm/\n\n#RIESM_mini #フロントモード`
            ]
          };

          const frontMode = resultTypes[0]; 
          const texts = shareTexts[frontMode];
          const shareText = texts[Math.floor(Math.random() * texts.length)];

          if (navigator.canShare && navigator.canShare({ files: files })) {
            await navigator.share({ files: files, title: 'RIESM mini 結果', text: shareText });
          } else {
            files.forEach((file, index) => {
              const url = URL.createObjectURL(file);
              const link = document.createElement('a');
              link.download = file.name;
              link.href = url;
              setTimeout(() => link.click(), index * 500); 
            });
          }
        } catch (error) {
          console.error(error);
          alert("画像の保存に失敗しました。お手数ですがスクリーンショットをご利用ください。");
        } finally {
          setIsGeneratingImage(false);
        }
      };

      const renderQuestionButtons = () => {
        const currentQ = questions[currentIndex];
        const format = currentQ.format || 'tradeoff';

        if (format === 'select4') {
          return (
            <div className="flex flex-col gap-2 mt-auto">
              {currentQ.options.map((opt) => (
                <button key={opt.type} onClick={() => handleAnswer(null, 0, opt.type)} className="w-full py-3 px-4 bg-white border-2 border-gray-200 hover:border-gray-300 rounded-xl text-gray-700 font-medium text-sm transition-all active:scale-[0.98] text-left shadow-sm flex items-center">
                  <span className="flex-1">{opt.text}</span>
                </button>
              ))}
            </div>
          );
        }

        return (
          <div className="flex flex-col gap-2 mt-auto">
            <button onClick={() => handleAnswer('A', 2)} className="w-full py-3 px-4 bg-gray-100 border-2 border-gray-200 hover:border-gray-300 rounded-xl text-gray-800 font-bold text-sm transition-all active:scale-[0.98]">
              「{currentQ.optA}」にとても近い
            </button>
            <button onClick={() => handleAnswer('A', 1)} className="w-full py-2.5 px-4 bg-gray-50 border-2 border-gray-100 hover:border-gray-200 rounded-xl text-gray-700 font-medium text-sm transition-all active:scale-[0.98]">
              「{currentQ.optA}」にやや近い
            </button>
            <button onClick={() => handleAnswer('none', 0)} className="w-full py-2 px-4 bg-white border-2 border-gray-200 hover:border-gray-300 rounded-xl text-gray-600 font-medium text-xs transition-all active:scale-[0.98] shadow-sm">
              どちらでもない / 状況による
            </button>
            <button onClick={() => handleAnswer('B', 1)} className="w-full py-2.5 px-4 bg-gray-50 border-2 border-gray-100 hover:border-gray-200 rounded-xl text-gray-700 font-medium text-sm transition-all active:scale-[0.98]">
              「{currentQ.optB}」にやや近い
            </button>
            <button onClick={() => handleAnswer('B', 2)} className="w-full py-3 px-4 bg-gray-100 border-2 border-gray-200 hover:border-gray-300 rounded-xl text-gray-800 font-bold text-sm transition-all active:scale-[0.98]">
              「{currentQ.optB}」にとても近い
            </button>
          </div>
        );
      };

      const maxScore = Math.max(...Object.values(modeScores));
      const minScore = Math.min(...Object.values(modeScores));
      const bottomTypes = Object.keys(modeScores).filter(type => modeScores[type] === minScore);

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4 font-sans text-gray-800">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
            
            {step === 'start' && (
              <div className="p-8 text-center space-y-6">
                
                <div className="flex justify-center items-center gap-2 mb-6">
                  <div className="w-8 h-8 rounded-full bg-orange-500"></div>
                  <div className="w-8 h-8 rounded-full bg-blue-900"></div>
                  <div className="w-8 h-8 rounded-full bg-pink-500"></div>
                  <div className="w-8 h-8 rounded-full bg-sky-400"></div>
                </div>
                
                <div className="space-y-3">
                  <h1 className="text-3xl font-bold text-gray-900 tracking-tight">RIESM mini</h1>
                </div>

                <div className="text-gray-600 leading-relaxed text-sm md:text-base space-y-6 mt-8">
                  <div className="space-y-4">
                    <p>自分という乗り物を最適に運転するための<br />「RIESM」のミニ版です。</p>
                    <p>あなたの「フロントモード」（思考や行動のクセ）を観て、今の自分の状態を把握しましょう！</p>
                  </div>
                  
                  <div className="bg-[#f0f4ff] p-5 rounded-2xl text-indigo-800 text-sm mx-auto max-w-[95%]">
                    <p className="font-bold mb-3 flex items-center justify-center gap-1.5 text-indigo-700">
                      <Rocket className="w-4 h-4"/> 回答のポイント
                    </p>
                    <div className="space-y-2 text-indigo-700/80 font-medium">
                      <p>全部で15問なので、3分ほどでおわります。</p>
                      <p>ただ、回答に葛藤するような設問もあるので、時にはゆっくりと悩みながら回答してください。</p>
                    </div>
                  </div>
                </div>

                <button onClick={startQuiz} className="w-full py-4 px-6 bg-gray-900 text-white rounded-xl font-bold text-lg hover:bg-gray-800 transition-colors flex items-center justify-center gap-2 shadow-md mt-6">
                  スタート <ArrowRight className="w-5 h-5" />
                </button>
                
                <div className="bg-slate-50 p-5 md:p-6 rounded-2xl border border-slate-200 text-center space-y-4 mt-8">
                  <h3 className="font-bold text-base md:text-lg text-slate-800">🌈 RIESM -リズム- についてもっと知る</h3>
                  <p className="text-[13px] md:text-sm text-slate-600 leading-relaxed">自分の強みやストレスの対処法など、詳しい解説はこちら。</p>
                  <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 w-full py-3 px-4 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-100 shadow-sm text-sm md:text-base">
                    詳しく知りたい人はこちらへ <ExternalLink className="w-4 h-4" />
                  </a>
                </div>
              </div>
            )}

            {step === 'question' && (
              <div className="p-6 md:p-8 flex flex-col h-full animate-in fade-in">
                <div className="mb-6">
                  <div className="flex justify-between text-sm font-medium text-gray-500 mb-2">
                    <span className="flex items-center gap-1"><Compass className="w-4 h-4 text-gray-700"/> Question</span>
                    <span>{currentIndex + 1} / {questions.length}</span>
                  </div>
                  <div className="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
                    <div className="h-full transition-all duration-300 bg-gray-900" style={{ width: `${((currentIndex + 1) / questions.length) * 100}%` }}></div>
                  </div>
                </div>
                <div className="text-center mb-6">
                  <h2 className="text-lg md:text-xl font-bold text-gray-900 leading-snug">{questions[currentIndex].text}</h2>
                </div>
                {renderQuestionButtons()}
                <div className="mt-4 pt-2">
                  <button onClick={handleBack} disabled={currentIndex === 0} className={`w-full py-2 px-4 font-medium text-sm rounded-xl transition-all flex items-center justify-center gap-1 ${currentIndex === 0 ? 'text-transparent cursor-default' : 'text-gray-500 hover:bg-gray-100'}`}>
                    {currentIndex > 0 && <><ArrowLeft className="w-4 h-4" /> 前の質問に戻る</>}
                  </button>
                </div>
              </div>
            )}

            {step === 'result' && resultTypes.length > 0 && (
              <div className="pb-8 animate-in fade-in duration-500 bg-white">
                
                {/* モードとバランスの表示部分 */}
                <div ref={modeRef} className="bg-white pb-4 md:pb-6">
                  <div className={`${resultTypes.length > 1 ? 'bg-gradient-to-br from-slate-800 to-slate-900' : RESULTS[resultTypes[0]].color} p-8 text-center text-white`}>
                    <div className="flex justify-center gap-4 mb-4">
                      {resultTypes.map((type) => {
                        const IconElement = RESULTS[type].icon;
                        return (
                          <div key={type} className={`${resultTypes.length > 1 ? RESULTS[type].color : 'bg-white/20'} p-3 rounded-full backdrop-blur-sm shadow-md`}>
                            <IconElement className="w-8 h-8 text-white" />
                          </div>
                        );
                      })}
                    </div>
                    <h2 className="text-lg font-medium opacity-90 mb-1">今のあなたのフロントモードは</h2>
                    <h1 className="text-3xl md:text-4xl font-extrabold mb-3 tracking-wider leading-tight">
                      {resultTypes.map(t => RESULTS[t].name).join(' ＆ ')}
                    </h1>
                    <p className="font-medium opacity-90 text-sm md:text-base leading-relaxed">
                      {resultTypes.length > 1 ? '複数のモードが同率で一番前に出ています！' : RESULTS[resultTypes[0]].subtitle}
                    </p>
                  </div>

                  <div className="p-4 md:p-8 pb-0 space-y-6 md:space-y-8">
                    <div className="bg-white p-5 md:p-6 rounded-2xl border border-gray-100 shadow-sm">
                      <h3 className="text-base md:text-lg font-bold text-gray-800 mb-5 text-center">あなたのモード・バランス</h3>
                      <div className="flex flex-col gap-4">
                        {sortedModeChartData.map((data) => (
                          <div key={data.id} className="flex flex-col gap-1.5 group">
                            <div className="flex justify-between items-end px-1">
                              <span className="text-xs md:text-sm font-bold text-gray-700 tracking-wide">{data.name}</span>
                              <span className="text-xs md:text-sm font-bold text-gray-500">{data.percentage}%</span>
                            </div>
                            <div className="w-full h-5 md:h-6 bg-gray-50 rounded-full relative flex items-center overflow-hidden shadow-inner">
                              <div className={`h-full ${data.color} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${data.percentage}%` }}></div>
                            </div>
                          </div>
                        ))}
                      </div>
                      <div className="mt-5 pt-4 border-t border-gray-100">
                        <p className="text-[11px] md:text-xs text-gray-500 text-center leading-relaxed">
                          ※このバランスは固定されたものではなく、状況によって変化します。<br className="hidden md:block" />
                          「今の自分のフロントは何なのか」を日々感じることが大切です。<br />
                          また、フロントだけではなく２番目３番目（スタンド）がどう働くか、働かせるかが良いコミュニケーションのポイントです。
                        </p>
                      </div>
                    </div>

                    {resultTypes.length === 1 ? (
                      <div className="bg-white p-5 md:p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <p className="text-gray-700 leading-relaxed text-sm md:text-[15px] m-0">{RESULTS[resultTypes[0]].description}</p>
                        {maxScore !== minScore && bottomTypes.length > 0 && (
                          <div className="mt-4 space-y-1">
                            {bottomTypes.map(type => (
                              <p key={type} className="text-[13px] text-gray-500 leading-relaxed">
                                （{RESULTS[type].backsDescription}）
                              </p>
                            ))}
                          </div>
                        )}
                      </div>
                    ) : (
                      <div className="space-y-4">
                        <p className="text-sm text-gray-600 font-medium px-2 leading-relaxed">同率一位のモードが複数あります。状況によって器用に切り替えている状態です。</p>
                        {resultTypes.map((type) => {
                          const IconComponent = RESULTS[type].icon;
                          return (
                            <div key={type} className={`${RESULTS[type].lightColor} border-l-4 ${RESULTS[type].borderColor} p-4 rounded-r-xl`}>
                              <h3 className={`font-bold flex items-center gap-2 mb-2 ${RESULTS[type].textColor}`}>
                                <IconComponent className="w-5 h-5" /> {RESULTS[type].name}の特徴
                              </h3>
                              <p className="text-sm text-gray-700 leading-relaxed">{RESULTS[type].description.replace(`あなたのフロントモードは「${RESULTS[type].name}」です。`, '')}</p>
                            </div>
                          );
                        })}
                        {maxScore !== minScore && bottomTypes.length > 0 && (
                          <div className="px-2 mt-3 space-y-1">
                            {bottomTypes.map((type) => (
                              <p key={type} className="text-[13px] text-gray-500 leading-relaxed">
                                （{RESULTS[type].backsDescription}）
                              </p>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>

                <div className="px-4 md:px-8 space-y-4 pb-4">
                  <button onClick={handleShare} disabled={isGeneratingImage} className="w-full py-4 px-6 bg-slate-900 text-white rounded-xl font-bold flex items-center justify-center gap-2 transition-all hover:bg-slate-800 disabled:bg-slate-400 shadow-md text-sm md:text-base">
                    {isGeneratingImage ? <><Loader2 className="w-5 h-5 animate-spin" /> 画像を生成中...</> : <><Share2 className="w-5 h-5" /> 画像で保存・シェア</>}
                  </button>
                  <div className="bg-slate-50 p-5 md:p-6 rounded-2xl border border-slate-200 text-center space-y-4">
                    <h3 className="font-bold text-base md:text-lg text-slate-800">🌈 RIESM -リズム- についてもっと知る</h3>
                    <p className="text-[13px] md:text-sm text-slate-600 leading-relaxed">自分の強みやストレスの対処法など、詳しい解説はこちら。</p>
                    <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 w-full py-3 px-4 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-100 shadow-sm text-sm md:text-base">
                      詳しく知りたい人はこちらへ <ExternalLink className="w-4 h-4" />
                    </a>
                  </div>
                  <button onClick={startQuiz} className="w-full py-3 px-6 bg-transparent text-gray-500 rounded-xl font-bold hover:bg-gray-100 flex items-center justify-center gap-2 text-sm md:text-base">
                    <RefreshCw className="w-4 h-4" /> もう一度観る
                  </button>
                </div>
              </div>
            )}
          </div>
          <div className="mt-8 text-center text-[11px] md:text-sm text-gray-400">
            <p>Based on RIESM (Roll(Role)_Interest & EgoStresscare Model)</p>
            <p>© 2026 ninin consulting & counseling</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
