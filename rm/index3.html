<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIESM mini</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <!-- 画像生成用のライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    .loading-screen { 
      display: flex; justify-content: center; align-items: center; 
      height: 100vh; font-family: sans-serif; color: #4b5563; 
    }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 font-sans">
  
  <div id="root">
    <div class="loading-screen">
      <div>システムを起動中...</div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- RIESM モードアイコン (SVG) ---
    
    // ワンダー: 🚀
    const WonderIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>

        <path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3"/>
        <path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5"/>
      </svg>
    );

    // キーパー: 🛡️
    const KeeperIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    );

    const NurturerIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    );

    // アダプター: レーダー
    const AdapterIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M19.07 4.93a10 10 0 0 0-14.14 0"/>
        <path d="M16.24 7.76a6 6 0 0 0-8.48 0"/>
        <circle cx="12" cy="12" r="1" fill="currentColor"/>
        <path d="M12 2v2M12 20v2M2 12h2M20 12h2"/>
        <path d="m12 12 5-5" strokeOpacity="0.8"/>
      </svg>
    );

    const ModeIcon = ({ type, className }) => {
      switch(type) {
        case 'W': return <WonderIcon className={className} />;
        case 'K': return <KeeperIcon className={className} />;
        case 'N': return <NurturerIcon className={className} />;
        case 'A': return <AdapterIcon className={className} />;
        default: return null;
      }
    };

    // UIアイコン
    const ExternalLinkIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
    );
    const RefreshCwIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    );
    const InfoIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-indigo-500"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>

    const ShareIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>

    const ArrowLeftIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    );

    // ==========================================
    // 問題プール
    // ==========================================
    const questionsPool = [
      { id: 1, group: 'A', text: "旅行の準備をする時、あなたは…", options: [ { text: "気分で決めたい", type: "W" }, { text: "事前にリストアップする", type: "K" }] },
      { id: 2, group: 'A', text: "新しいプロジェクトが立ち上がりました。最初の関心は？", options: [ { text: "新しい可能性や面白さ", type: "W" }, { text: "目的やスケジュールなどの手順", type: "K" }] },

      { id: 5, group: 'A', text: "休日、ふらっと立ち寄った書店で惹かれるのは？", options: [ { text: "未知の新しいジャンルの本", type: "W" }, { text: "実生活に役立つ実用書", type: "K" }] },
      { id: 6, group: 'A', text: "目標を立てるとき", options: [ { text: "ワクワクする大きなビジョン", type: "W" }, { text: "達成可能な数値と計画", type: "K" }] },
      { id: 7, group: 'A', text: "未知のトラブルが発生！最初のアクションは？", options: [ { text: "直感を信じてとりあえず動く", type: "W" }, { text: "類似事例を探し、冷静に分析する", type: "K" }] },

      { id: 9, group: 'A', text: "会議でのアイデア出し", options: [ { text: "斬新で面白いアイデアを出す", type: "W" }, { text: "論理的で実現可能なアイデアを出す", type: "K" }] },
      { id: 10, group: 'B', text: "未経験の業務を任された時", options: [ { text: "とりあえずやってみる", type: "W" }, { text: "リスクや前例を調べる", type: "A" }] },
      { id: 11, group: 'B', text: "複数人での食事、お店選びは？", options: [ { text: "興味のある新しいお店", type: "W" }, { text: "みんなが安心できる無難なお店", type: "A" }] },
      { id: 12, group: 'B', text: "休日の予定が急に空きました", options: [ { text: "面白そうなことを見つけて出かける", type: "W" }, { text: "家でいつものようにゆっくり過ごす", type: "A" }] },
      { id: 13, group: 'B', text: "会議で誰も発言しない沈黙の時間が流れたら…", options: [ { text: "とりあえず声に出してみる", type: "W" }, { text: "誰かが話し出すのを待ち、静観する", type: "A" }] },
      { id: 14, group: 'B', text: "はじめて行く街を散策するとき", options: [ { text: "気になるお店にふらっと寄り道する", type: "W" }, { text: "スマホでルートを常に確認する", type: "A" }] },
      { id: 15, group: 'B', text: "やったことのない新しい業務を打診されたら", options: [ { text: "「面白そう！」と前向きに捉える", type: "W" }, { text: "リスクを考え、慎重になる", type: "A" }] },
      { id: 16, group: 'B', text: "いつもと違う帰り道を通ってみようか迷った時", options: [ { text: "ワクワクして寄り道する", type: "W" }, { text: "道に迷うかもと不安になる", type: "A" }] },
      { id: 17, group: 'B', text: "グループ旅行の計画中、意見を求められたら", options: [ { text: "「行きたい！」と思うスポットを提案する", type: "W" }, { text: "無理のない無難なスケジュールに賛同する", type: "A" }] },
      { id: 18, group: 'B', text: "予期せぬスケジュールの変更があった時", options: [ { text: "新鮮で楽しいと感じる", type: "W" }, { text: "段取りが狂って強いストレスを感じる", type: "A" }] },
      { id: 19, group: 'C', text: "落ち込んでいる同僚がいたら…", options: [ { text: "気持ちに寄り添って話を聞く", type: "N" }, { text: "原因を分析し、解決策を考える", type: "K" }] },
      { id: 20, group: 'C', text: "チームで仕事をする時、重視するのは？", options: [ { text: "気持ちよく働ける「雰囲気」", type: "N" }, { text: "役割分担とルールの「正確さ」", type: "K" }] },
      { id: 21, group: 'C', text: "人から相談を受けた時", options: [ { text: "感情に共感し、受け止める", type: "N" }, { text: "論理に基づき、正しい意見を伝える", type: "K" }] },
      { id: 22, group: 'C', text: "後輩が仕事でミスをしてしまった時", options: [ { text: "気持ちに寄り添い、フォローする", type: "N" }, { text: "原因を分析し、再発防止策を指導する", type: "K" }] },
      { id: 23, group: 'C', text: "映画やドラマを見た後、誰かと感想を話すなら？", options: [ { text: "感情を共有したい", type: "N" }, { text: "ストーリーの構成や矛盾点を考察したい", type: "K" }] },
      { id: 24, group: 'C', text: "チームのリーダーに最も必要だと思う要素は？", options: [ { text: "悩みに寄り添い、温かい居場所を作れること", type: "N" }, { text: "的確な指示と管理ができること", type: "K" }] },
      { id: 25, group: 'C', text: "議論が白熱し、意見が対立している時", options: [ { text: "誰も傷つかないよう間を取り持つ", type: "N" }, { text: "論点を整理し、合理的な結論へ導く", type: "K" }] },
      { id: 26, group: 'C', text: "家族や友人が「最近疲れてるんだ」と相談してきたら", options: [ { text: "「いつも頑張ってるね」と労う", type: "N" }, { text: "具体的な解決策を提示する", type: "K" }] },
      { id: 27, group: 'C', text: "何か重要な決断を下す時に重視する基準は？", options: [ { text: "関わる人がどう感じるか", type: "N" }, { text: "原理原則に則っているか", type: "K" }] },
      { id: 28, group: 'D', text: "会議で意見が対立しています", options: [ { text: "気持ちを尊重し、間を取り持つ", type: "N" }, { text: "波風が立たないよう静観する", type: "A" }] },
      { id: 29, group: 'D', text: "頼まれごとをした時", options: [ { text: "相手が助かるなら引き受ける", type: "N" }, { text: "断った後の影響を考えて引き受ける", type: "A" }] },
      { id: 30, group: 'D', text: "初対面の人が多い場では…", options: [ { text: "孤立している人に声をかける", type: "N" }, { text: "自分が浮かないよう周囲を観察する", type: "A" }] },
      { id: 31, group: 'D', text: "職場でとても忙しそうにしている同僚を見かけたら", options: [ { text: "積極的に声をかける", type: "N" }, { text: "邪魔にならないよう自分の仕事を進める", type: "A" }] },
      { id: 32, group: 'D', text: "複数人のLINEグループでのやり取り", options: [ { text: "温かく反応を返す", type: "N" }, { text: "他の人のやり取りを見て無難に同調する", type: "A" }] },
      { id: 33, group: 'D', text: "友人との待ち合わせに、相手が遅刻してきそうなら", options: [ { text: "相手を気遣う", type: "N" }, { text: "自分の予定を確認する", type: "A" }] },
      { id: 34, group: 'D', text: "パーティーなどの場で、ポツンと一人でいる人がいたら", options: [ { text: "隣に行って話しかける", type: "N" }, { text: "話しかけるのを躊躇する", type: "A" }] },
      { id: 35, group: 'D', text: "上司から少し理不尽な指示を受けた時", options: [ { text: "事情を汲んで受け入れる", type: "N" }, { text: "面倒になりそうだからとりあえず従う", type: "A" }] },
      { id: 36, group: 'D', text: "飲み会で大皿の料理が少しだけ残っている時", options: [ { text: "周りの人に勧める", type: "N" }, { text: "周りの出方をうかがう", type: "A" }] }
    ];

    const situationQuestionsPool = [
      { id: 101, isSituation: true, text: "今、あなたの手元に花があります。どんな風に飾りたいですか？", options: [ { text: "無造作なブーケにする", type: "W" }, { text: "種類や高さを揃えて美しく生ける", type: "K" }] },
      { id: 102, isSituation: true, text: "今の気持ちを色に例えるなら、どちらに近いですか？", options: [ { text: "やわらかな暖色", type: "N" }, { text: "深く落ち着いた寒色", type: "A" }] },
      { id: 103, isSituation: true, text: "今、歩いてみたいのはどんな道ですか？", options: [ { text: "曲がりくねった小道", type: "W" }, { text: "見通しの良い平坦な道", type: "A" }] },
      { id: 104, isSituation: true, text: "絵の具で絵を描くなら、どんなスタイルが良いですか？", options: [ { text: "思いのままに筆を走らせる", type: "W" }, { text: "構図を決め、丁寧に塗る", type: "K" }] },
      { id: 105, isSituation: true, text: "音楽を聴くとき、今のあなたがより惹かれるのは？", options: [ { text: "想いや感情が伝わる曲", type: "N" }, { text: "緻密な音の構成が美しい曲", type: "K" }] },
      { id: 106, isSituation: true, text: "休日の朝、窓の外の風景はどちらが良いですか？", options: [ { text: "雲ひとつない青空", type: "W" }, { text: "しとしとと降る静かな雨", type: "A" }] },
      { id: 107, isSituation: true, text: "お茶の時間を楽しむなら、どちらが良いですか？", options: [ { text: "誰かとおしゃべりしながら", type: "N" }, { text: "一人で静かに本を読みながら", type: "A" }] },
      { id: 108, isSituation: true, text: "未知の世界を旅するなら、何を持って行きたいですか？", options: [ { text: "真っ白なスケッチブック", type: "W" }, { text: "精密なコンパス", type: "K" }] },
      { id: 109, isSituation: true, text: "今のあなたの内側にあるエネルギーは、どちらに近いですか？", options: [ { text: "ゆっくり育む「土」", type: "N" }, { text: "鋭く本質を見抜く「鷹」", type: "K" }] }
    ];

    const resultsData = {
      W: {
        title: "ワンダー（自由・発見・挑戦）",
        theme: { bg: "bg-amber-50", border: "border-amber-200", cardBg: "bg-amber-100/50", header: "from-amber-400 to-orange-500", text: "text-amber-900", textLight: "text-amber-700", btnBg: "bg-amber-100", btnHover: "hover:bg-amber-200" }
      },
      K: {
        title: "キーパー（信念・論理・規律）",
        theme: { bg: "bg-blue-50", border: "border-blue-200", cardBg: "bg-blue-100/50", header: "from-blue-500 to-indigo-600", text: "text-blue-900", textLight: "text-blue-700", btnBg: "bg-blue-100", btnHover: "hover:bg-blue-200" }
      },
      N: {
        title: "ナーチャー（受容・共感・育成）",
        theme: { bg: "bg-pink-50", border: "border-pink-200", cardBg: "bg-pink-100/50", header: "from-pink-400 to-rose-500", text: "text-pink-900", textLight: "text-pink-700", btnBg: "bg-pink-100", btnHover: "hover:bg-pink-200" }
      },
      A: {
        title: "アダプター（洞察・適応・慎重）",
        theme: { bg: "bg-cyan-50", border: "border-cyan-200", cardBg: "bg-cyan-100/50", header: "from-cyan-400 to-teal-500", text: "text-cyan-900", textLight: "text-cyan-700", btnBg: "bg-cyan-100", btnHover: "hover:bg-cyan-200" }
      }
    };

    const doubleResultsData = {
      K_W: { title: "ワンダー ＆ キーパー", theme: { bg: "bg-teal-50", border: "border-teal-200", cardBg: "bg-teal-100/50", header: "from-amber-400 to-blue-500", text: "text-teal-900", textLight: "text-teal-700", btnBg: "bg-teal-100", btnHover: "hover:bg-teal-200" } },
      N_W: { title: "ワンダー ＆ ナーチャー", theme: { bg: "bg-orange-50", border: "border-orange-200", cardBg: "bg-orange-100/50", header: "from-amber-400 to-pink-400", text: "text-orange-900", textLight: "text-orange-700", btnBg: "bg-orange-100", btnHover: "hover:bg-orange-200" } },
      A_W: { title: "ワンダー ＆ アダプター", theme: { bg: "bg-lime-50", border: "border-lime-200", cardBg: "bg-lime-100/50", header: "from-amber-400 to-cyan-400", text: "text-lime-900", textLight: "text-lime-700", btnBg: "bg-lime-100", btnHover: "hover:bg-lime-200" } },
      K_N: { title: "キーパー ＆ ナーチャー", theme: { bg: "bg-violet-50", border: "border-violet-200", cardBg: "bg-violet-100/50", header: "from-blue-500 to-pink-500", text: "text-violet-900", textLight: "text-violet-700", btnBg: "bg-violet-100", btnHover: "hover:bg-violet-200" } },
      A_K: { title: "キーパー ＆ アダプター", theme: { bg: "bg-sky-50", border: "border-sky-200", cardBg: "bg-sky-100/50", header: "from-blue-500 to-cyan-500", text: "text-sky-900", textLight: "text-sky-700", btnBg: "bg-sky-100", btnHover: "hover:bg-sky-200" } },
      A_N: { title: "ナーチャー ＆ アダプター", theme: { bg: "bg-fuchsia-50", border: "border-fuchsia-200", cardBg: "bg-fuchsia-100/50", header: "from-pink-400 to-cyan-400", text: "text-fuchsia-900", textLight: "text-fuchsia-700", btnBg: "bg-fuchsia-100", btnHover: "hover:bg-fuchsia-200" } }
    };

    // グラデーション色定義 (RGB)
    const bgColors = {
      W: '251, 191, 36',  // amber-400
      K: '59, 130, 246',  // blue-500
      N: '244, 114, 182', // pink-400
      A: '34, 211, 238'   // cyan-400
    };

    function App() {
      const [started, setStarted] = useState(false);
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [resultType, setResultType] = useState(null);
      const [resultScores, setResultScores] = useState(null);
      const [isSharing, setIsSharing] = useState(false);
      const [toastMessage, setToastMessage] = useState('');
      
      // ホバーアニメーション用 (0〜100)
      const [hoverPos, setHoverPos] = useState(50);

      // 質問が変わるたびにホバー位置をリセット
      useEffect(() => {
        if (started && !resultType) {
          setHoverPos(50);
        }
      }, [currentIndex, started, resultType]);

      const shuffleArray = (array) => {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      };

      const generateTodayQuestions = () => {
        const getRandom = (arr, n) => shuffleArray([...arr]).slice(0, n);
        let textSelected = [
          ...getRandom(questionsPool.filter(q => q.group === 'A'), 3),
          ...getRandom(questionsPool.filter(q => q.group === 'B'), 3),
          ...getRandom(questionsPool.filter(q => q.group === 'C'), 3),
          ...getRandom(questionsPool.filter(q => q.group === 'D'), 3),
        ];
        textSelected = shuffleArray(textSelected).map(q => ({ ...q, options: shuffleArray(q.options) }));
        let situationSelected = shuffleArray(situationQuestionsPool).slice(0, 3).map(q => ({ ...q, options: shuffleArray(q.options) }));
        return [...textSelected, ...situationSelected];
      };

      const startQuiz = () => {
        const questions = generateTodayQuestions();
        setCurrentQuestions(questions);
        setCurrentIndex(0);
        setAnswers([]);
        setResultType(null);
        setResultScores(null);
        setStarted(true);
      };

      const handleAnswer = (scoreUpdates) => {
        const newAnswers = [...answers, scoreUpdates];
        setAnswers(newAnswers);
        if (currentIndex < currentQuestions.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateResult(newAnswers);
        }
      };

      const handleBack = () => {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
          setAnswers(answers.slice(0, -1));
        }
      };

      const calculateResult = (finalAnswers) => {
        const scores = { W: 0, K: 0, N: 0, A: 0 };
        finalAnswers.forEach(updates => {
          updates.forEach(update => { if (scores[update.type] !== undefined) scores[update.type] += update.weight; });
        });
        const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
        const maxType = sortedTypes[0];
        const maxScore = scores[maxType];
        const secondType = sortedTypes[1];
        const secondScore = scores[secondType];
        const minType = sortedTypes[3];

        let front = maxType; 
        let isDouble = false;
        let frontKey = "";

        if (maxScore > 0 && secondScore >= maxScore * 0.9) {
          isDouble = true;
          frontKey = [maxType, secondType].sort().join('_');
        }
        setResultScores(scores);
        setResultType({ front: front, second: secondType, back: minType, isDouble: isDouble, frontKey: frontKey });
      };

      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 5000);
      };

      const handleShare = async () => {
        setIsSharing(true);
        const element = document.getElementById('result-card');
        if (!element || !window.html2canvas) {
          showToast('エラー：画像の生成に失敗しました。');
          setIsSharing(false);
          return;
        }
        try {
          const canvas = await window.html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
          const dataUrl = canvas.toDataURL('image/png');
          const blob = await (await fetch(dataUrl)).blob();
          const file = new File([blob], 'riesm_result.png', { type: 'image/png' });
          const shareText = "私のいまの「心のフロント」はこんな感じでした🌈✨\n細かな説明については皆さんご自身で実施してみて！\n\n#RIESM_mini #自己理解\nhttps://ninin-cc.github.io/rm/";
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ text: shareText, files: [file] });
          } else {
            const textArea = document.createElement("textarea");
            textArea.value = shareText;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try { document.execCommand('copy'); } catch (err) { console.error('Fallback copy failed', err); }
            document.body.removeChild(textArea);
            const link = document.createElement('a');
            link.download = 'riesm_result.png';
            link.href = dataUrl;
            link.click();
            showToast('結果画像を保存し、投稿文をコピーしました！\nSNSに画像を添付して投稿してください。');
          }
        } catch (error) {
          console.error('Share failed:', error);
          showToast('エラー：画像の生成に失敗しました。');
        } finally {
          setIsSharing(false);
        }
      };

      if (!started) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-gray-50 flex-col">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl p-8 text-center animate-fade-in border border-slate-100">
              <div className="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mx-auto mb-6 shadow-lg flex items-center justify-center transform -rotate-6">
                <span className="text-4xl">🌈</span>
              </div>
              <h1 className="text-3xl font-extrabold text-slate-800 mb-3 tracking-tight">RIESM mini</h1>
              <p className="text-slate-500 mb-8 font-medium leading-relaxed">
                今のあなたの「心のモード（フロント）」を測ります。<br/>
                直感で、いまの自分に近い方を選んでください。
              </p>
              <div className="bg-blue-50 rounded-xl p-4 mb-8 text-left border border-blue-100">
                <div className="flex items-start gap-3">
                  <div className="mt-0.5"><InfoIcon /></div>
                  <p className="text-sm text-blue-800 leading-relaxed">
                    <strong>心の状態は「天気」のように毎日揺らぎます。</strong><br/>
                    昨日と結果が違っても大丈夫。それは環境に合わせて心が柔軟にモードを切り替えている証拠です。
                  </p>
                </div>
              </div>
              <button onClick={startQuiz} className="w-full py-4 px-6 bg-slate-800 text-white rounded-xl font-bold text-lg hover:bg-slate-700 transition-all shadow-md active:scale-[0.98]">
                いまの自分を観る
              </button>
              <div className="mt-8 pt-6 border-t border-slate-100">
                <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className="text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors flex items-center justify-center gap-1">
                  RIESMをもっと知りたい方へ <ExternalLinkIcon />
                </a>
              </div>
            </div>
          </div>
        );
      }

      if (resultType) {
        const result = resultType.isDouble ? doubleResultsData[resultType.frontKey] : resultsData[resultType.front];
        const t = result.theme;

        return (
          <div className={`min-h-screen flex items-center justify-center p-4 py-12 transition-colors duration-1000 ${t.bg}`}>
            <div className="max-w-lg w-full animate-fade-in relative">
              {toastMessage && (
                <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-4 rounded-xl shadow-2xl z-50 text-sm font-bold text-center whitespace-pre-line w-[90%] max-w-sm border border-slate-600">
                  {toastMessage}
                </div>
              )}
              <div id="result-card" className={`bg-white rounded-3xl shadow-2xl overflow-hidden border-2 ${t.border}`}>
                <div className={`p-8 text-center relative overflow-hidden bg-gradient-to-r ${t.header} text-white`}>
                  <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent"></div>
                  <h2 className="text-sm font-bold tracking-widest text-white/90 mb-3 relative z-10">
                    今の【フロント】
                  </h2>
                  <div className="flex items-center justify-center gap-4 mb-1 relative z-10">
                    <ModeIcon type={resultType.front} className="w-10 h-10 drop-shadow-md" />
                    {resultType.isDouble && (
                      <>
                        <span className="text-2xl font-bold opacity-70">+</span>
                        <ModeIcon type={resultType.second} className="w-10 h-10 drop-shadow-md" />
                      </>
                    )}
                  </div>
                  <h1 className="text-2xl font-extrabold relative z-10 drop-shadow-md">{result.title}</h1>
                </div>
                <div className="p-8">
                  <div className={`rounded-2xl p-6 border border-white/50 shadow-inner bg-white/60`}>
                    <h3 className={`font-bold text-sm mb-5 tracking-wide text-center ${t.textLight}`}>今のあなたのモードバランス</h3>
                    <div className="space-y-4">
                      {['W', 'K', 'N', 'A'].sort((a, b) => resultScores[b] - resultScores[a]).map(type => {
                        const score = resultScores[type];
                        const maxScore = Math.max(...Object.values(resultScores));
                        const percent = maxScore > 0 ? Math.round(30 + (score / maxScore) * 70) : 30;
                        const barColors = { W: 'bg-amber-400', K: 'bg-blue-500', N: 'bg-pink-400', A: 'bg-cyan-400' };
                        const labels = { W: 'ワンダー', K: 'キーパー', N: 'ナーチャー', A: 'アダプター' };
                        return (
                          <div key={type} className="flex items-center gap-3">
                            <div className={`w-8 flex justify-center`}>
                              <ModeIcon type={type} className={`w-5 h-5 ${t.textLight}`} />
                            </div>
                            <div className={`w-16 text-right text-xs font-bold ${t.textLight}`}>{labels[type]}</div>
                            <div className="flex-1 h-2.5 bg-slate-200/50 rounded-full overflow-hidden">
                              <div className={`h-full ${barColors[type]} rounded-full transition-all duration-1000 ease-out`} style={{ width: `${percent}%` }}></div>
                            </div>
                            <div className={`w-10 text-right text-xs font-bold ${t.text}`}>{percent}%</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
                <div className="px-8 pb-8 space-y-3" data-html2canvas-ignore="true">
                  <button onClick={handleShare} disabled={isSharing} className={`flex items-center justify-center gap-2 w-full py-4 px-6 rounded-xl font-bold transition-all text-sm md:text-base text-white shadow-md active:scale-95 ${isSharing ? 'bg-slate-400 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700'}`}>
                    <ShareIcon /> {isSharing ? '画像を作成中...' : '今のフロントを保存・シェアする'}
                  </button>
                  <a href="https://note.com/ninin2025/n/n236a6f29ad63" target="_blank" rel="noopener noreferrer" className={`flex items-center justify-center gap-2 w-full py-4 px-4 bg-white border-2 ${t.border} rounded-xl font-bold transition-all text-sm md:text-base ${t.text} hover:bg-slate-50`}>
                    RIESMをもっと知りたい方へ <ExternalLinkIcon />
                  </a>
                  <button onClick={startQuiz} className={`flex items-center justify-center gap-2 w-full py-4 px-6 rounded-xl font-bold transition-all text-sm md:text-base ${t.btnBg} ${t.text} ${t.btnHover}`}>
                    <RefreshCwIcon /> もう一度観る
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const q = currentQuestions[currentIndex];
      const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
      const labelStrong = q.isSituation ? "に、強く惹かれる" : "と、強くそう思う";
      const labelMid = q.isSituation ? "に、惹かれる" : "と、そう思う";

      const topType = q.options[0].type;
      const bottomType = q.options[1].type;
      const topColorRGB = bgColors[topType];
      const bottomColorRGB = bgColors[bottomType];

      return (
        <div className="min-h-screen flex items-center justify-center p-2 sm:p-4 bg-slate-50 transition-colors duration-1000">
          <div className="max-w-md w-full bg-white/90 rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border border-white/60 animate-fade-in relative backdrop-blur-2xl">
            
            {/* 背景グラデーション: 上 */}
            <div 
              className="absolute top-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${100 - hoverPos + 10}%`, 
                background: `linear-gradient(to bottom, rgba(${topColorRGB}, 0.35) 0%, rgba(${topColorRGB}, 0) 100%)`,
              }}
            ></div>

            {/* 背景グラデーション: 下 */}
            <div 
              className="absolute bottom-0 left-0 w-full transition-all duration-500 ease-out pointer-events-none"
              style={{ 
                height: `${hoverPos + 10}%`, 
                background: `linear-gradient(to top, rgba(${bottomColorRGB}, 0.35) 0%, rgba(${bottomColorRGB}, 0) 100%)`,
              }}
            ></div>

            <div className="relative z-20 h-1.5 bg-slate-100/50 w-full">
              <div className="h-full bg-indigo-500 transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
            </div>

            <div className="relative z-10 p-4 sm:p-8">
              <div className="text-xs sm:text-sm font-bold text-slate-500 mb-2 sm:mb-4 tracking-wider flex justify-between drop-shadow-sm">
                <span>QUESTION</span>
                <span>{currentIndex + 1} / {currentQuestions.length}</span>
              </div>
              
              <h2 className="text-lg sm:text-xl font-bold text-slate-800 mb-3 sm:mb-6 leading-relaxed bg-white p-4 sm:p-6 rounded-xl sm:rounded-2xl shadow-md border border-slate-200">
                {q.text}
              </h2>
              
              <div className="space-y-1 sm:space-y-2 animate-fade-in relative z-10">
                <button 
                  onMouseEnter={() => setHoverPos(15)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[0].type, weight: 4 }])} 
                  className="w-full text-left py-2.5 px-3 sm:p-4 rounded-xl border border-white/60 bg-white/50 hover:bg-white/80 transition-all text-slate-900 font-bold shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight"
                >
                  【{q.options[0].text}】{labelStrong}
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(30)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[0].type, weight: 3 }])} 
                  className="w-full text-left py-2 px-3 sm:p-3.5 rounded-xl border border-white/60 bg-white/60 hover:bg-white/90 transition-all text-slate-800 font-medium shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight"
                >
                  【{q.options[0].text}】{labelMid}
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(45)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[0].type, weight: 2 }, { type: q.options[1].type, weight: 1 }])} 
                  className="w-full text-left py-1.5 px-2.5 sm:p-3 rounded-xl border border-white/60 bg-white/70 hover:bg-white transition-all text-slate-700 text-xs sm:text-sm shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight"
                >
                  どちらかといえば【{q.options[0].text}】だが、【{q.options[1].text}】もある
                </button>
                
                <div className="flex items-center justify-center py-0.5 sm:py-2 opacity-50">
                  <div className="h-px bg-slate-400 w-1/3"></div>
                  <span className="text-[10px] sm:text-xs text-slate-500 px-3 font-bold tracking-widest">OR</span>
                  <div className="h-px bg-slate-400 w-1/3"></div>
                </div>

                <button 
                  onMouseEnter={() => setHoverPos(55)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[1].type, weight: 2 }, { type: q.options[0].type, weight: 1 }])} 
                  className="w-full text-left py-1.5 px-2.5 sm:p-3 rounded-xl border border-white/60 bg-white/70 hover:bg-white transition-all text-slate-700 text-xs sm:text-sm shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight"
                >
                  どちらかといえば【{q.options[1].text}】だが、【{q.options[0].text}】もある
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(70)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[1].type, weight: 3 }])} 
                  className="w-full text-left py-2 px-3 sm:p-3.5 rounded-xl border border-white/60 bg-white/60 hover:bg-white/90 transition-all text-slate-800 font-medium shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight"
                >
                  【{q.options[1].text}】{labelMid}
                </button>
                <button 
                  onMouseEnter={() => setHoverPos(85)} onMouseLeave={() => setHoverPos(50)}
                  onClick={() => handleAnswer([{ type: q.options[1].type, weight: 4 }])} 
                  className="w-full text-left py-2.5 px-3 sm:p-4 rounded-xl border border-white/60 bg-white/50 hover:bg-white/80 transition-all text-slate-900 font-bold shadow-sm backdrop-blur-md active:scale-[0.98] leading-tight"
                >
                  【{q.options[1].text}】{labelStrong}
                </button>
              </div>

              <div className="mt-3 sm:mt-8 flex items-center justify-between border-t border-slate-200 pt-3 sm:pt-5 relative z-10">
                <button 
                  onClick={handleBack} 
                  disabled={currentIndex === 0} 
                  className={`flex items-center gap-1 text-base font-extrabold text-slate-800 transition-opacity ${currentIndex === 0 ? 'opacity-30 cursor-not-allowed' : 'hover:opacity-70'}`}
                >
                  <ArrowLeftIcon /> もどる
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
